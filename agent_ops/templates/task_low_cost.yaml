task_id: ITER-YYYY-MM-DD-NNN-A
title: Replace with low-cost stage title
type: governance-optimization
status: draft
priority: medium
mode: scan

goal: >
  Replace with a single-stage low-cost objective.

user_visible_outcome:
  - "Replace with user-visible outcome"

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

limits:
  max_files: 12
  max_candidates: 15
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage execution only
  - use prompt templates before free-form prompting
  - do not mix scan screen verify responsibilities
  - allow role-parallel execution only when role_parallel.enabled is true
  - usability rounds are backend-semantic-first
  - frontend must remain a generic semantic consumer
  - do not introduce model-specific frontend branching
  - backend usability batches must declare business-fact vs scene-orchestration ownership before implementation

context:
  branch: codex/next-round
  baseline_sha: REPLACE_ME
  explicit_user_authorization: true
  usability_battlefield: backend

architecture:
  layer_target: Agent Governance
  module: replace with module name
  module_owner: agent_ops governance surface
  kernel_or_scenario: scenario
  backend_sub_layer_target: business_fact_or_scene_orchestration
  backend_sub_layer_reason: >
    Replace with explicit reason for choosing business-fact or scene-orchestration layer.
  reason: >
    Replace with the reason for this low-cost single-stage task.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py REPLACE_ME

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - limit_exceeded
  - forbidden_path_touched
  - stage_boundary_broken
  - backend_sub_layer_not_decided_before_implementation

deliverables:
  - single-stage structured result

rollback:
  - git restore REPLACE_ME

depends_on: []
