task_id: ITER-2026-03-30-353
title: Remove direct scene seed records from smart_construction_core fact data
type: code
status: in_progress
priority: high

goal: >
  Clean the explicit scene-data pollution inside smart_construction_core by
  removing direct `sc.scene` and `sc.scene.tile` seed records from
  `data/sc_scene_seed.xml`, leaving capability facts in the industry fact layer
  while relying on smart_construction_scene to own scene records.

user_visible_outcome:
  - smart_construction_core no longer seeds direct scene records in its fact data file
  - scene ownership moves one step closer to the scene orchestration layer
  - capability facts remain intact

scope:
  allowed_paths:
    - addons/smart_construction_core/data/sc_scene_seed.xml
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - remove only direct scene seed records from the fact-layer xml
  - keep capability records intact
  - do not modify manifest loading order in this batch

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Domain Layer Cleanup
  module: smart_construction_core fact data
  module_owner: addons/smart_construction_core
  kernel_or_scenario: scenario
  reason: >
    Scene records currently live inside an industry fact data file. Those
    records belong to the scene orchestration layer and should be removed from
    the industry fact layer where the scene module already provides ownership.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-353.yaml
    - bash -lc "if rg -n 'model=\"sc.scene|model=\"sc.scene.tile' addons/smart_construction_core/data/sc_scene_seed.xml; then exit 1; fi"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - scene_module_cannot_cover_removed_records
  - capability_seed_block_cannot_be_preserved_cleanly

deliverables:
  - cleaned smart_construction_core scene seed file without direct scene records
  - report and task result artifacts for ITER-2026-03-30-353
  - delivery log checkpoint for the fact-layer cleanup

rollback:
  - git restore addons/smart_construction_core/data/sc_scene_seed.xml
  - git restore agent_ops/tasks/ITER-2026-03-30-353.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-353.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-353.json

depends_on:
  - ITER-2026-03-30-352

notes: >
  This batch intentionally does not clean runtime scene mapping inside
  `core_extension.py`; that requires a separate migration of active runtime
  hooks into the scene layer.
