task_id: ITER-2026-03-29-224
title: Add generic detail layout containers for form sections
type: product_task
status: pending
priority: high

goal: Make generic record-detail routes render `views.form.layout` with stronger container hierarchy by nesting grouped sections inside higher-level detail shells instead of flattening every section into the same card layer.
user_visible_outcome:
  - detail pages feel closer to Odoo-native form hierarchy
  - sheet/group structure becomes visible in the page body instead of reading like a flat section list

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail layout containers
  reason: Backend form facts already provide usable `sheet/group` structure. The next fastest usability gain is to let that container hierarchy shape the detail body instead of rendering all sections as one flat card list.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-224.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-224.yaml frontend/apps/web/src/pages/ContractFormPage.vue docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-224.md agent_ops/state/task_results/ITER-2026-03-29-224.json

depends_on:
  - ITER-2026-03-29-223

notes: "Keep the batch generic to record-detail routes; project.project remains only the first validation sample."
