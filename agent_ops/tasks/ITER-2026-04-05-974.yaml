task_id: ITER-2026-04-05-974
title: Align release verification lane to real customer user account
type: backend
status: active
priority: high
mode: implement

goal: >
  Replace demo-era verification login lane with a real customer user account in
  sc_prod_sim so release execution protocol can run under delivery-aligned user semantics.

user_visible_outcome:
  - "发布验证账号切换到真实客户用户并可完成发布执行门禁"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_account_lane_alignment_only
  - no_repository_source_change

context:
  branch: codex/next-round
  baseline_sha: 7de445f
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-973
  priority_lane: delivery_simulation_alignment

architecture:
  layer_target: Delivery Simulation Runtime Alignment
  module: release verification account lane
  module_owner: operations_runtime
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact
  backend_sub_layer_reason: >
    Verification identity is runtime user truth and authentication state in the
    target simulated production database.
  reason: >
    After de-demo alignment, release verification failed because legacy
    svc_e2e_smoke credentials are invalid; user requested verification to align
    to real customer users.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-974.yaml
    - docker exec sc-backend-odoo-prod-sim-db-1 psql -U odoo -d sc_prod_sim -c "select login,active from res_users where login in ('wutao','yangdesheng','zhangwencui','lijianfeng','yelingyue','lidexue','chenshuai') order by login;"
    - docker exec -i sc-backend-odoo-prod-sim-odoo-1 odoo shell -d sc_prod_sim -c /var/lib/odoo/odoo.conf
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make restart
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost API_BASE_URL=http://127.0.0.1:18069 DB_NAME=sc_prod_sim E2E_LOGIN=wutao E2E_PASSWORD=demo make verify.release.execution_protocol.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - uncertain_runtime_scope

deliverables:
  - real_user_verification_lane_aligned
  - release_execution_protocol_rechecked_under_real_user

rollback:
  - restore sc_prod_sim from snapshot before runtime account password alignment
  - git restore agent_ops/tasks/ITER-2026-04-05-974.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-974.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-974.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-973
