task_id: ITER-2026-03-31-442
title: Implement bootstrap semantic split between smart_platform_bootstrap and compatibility shim
type: implementation
status: active
priority: high

goal: >
  Implement the redesigned bootstrap semantics so smart_platform_bootstrap is
  safe on used databases, while smart_construction_bootstrap temporarily keeps
  the fresh-DB currency compatibility behavior during the migration phase.

user_visible_outcome:
  - "smart_platform_bootstrap 可安全安装到已使用数据库"
  - "旧 reset 路径继续通过 smart_construction_bootstrap 兼容保持币种初始化"
  - "bootstrap 迁移线恢复可验证状态"

scope:
  allowed_paths:
    - addons/smart_platform_bootstrap/**
    - addons/smart_construction_bootstrap/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - scripts/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive migration batch
  - no downstream reference migration in this batch
  - no security or financial-domain changes beyond bootstrap currency compatibility

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Platform Bootstrap Module Migration
  module: smart_platform_bootstrap / smart_construction_bootstrap
  module_owner: platform bootstrap semantics and migration path
  kernel_or_scenario: kernel
  reason: >
    The redesign is frozen, so the next step is to implement the semantic split
    and rerun the migration verification that failed in ITER-2026-03-31-440.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-442.yaml
    - make mod.install MODULE=smart_platform_bootstrap DB_NAME=sc_demo
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_bootstrap DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - smart_platform_bootstrap_still_cannot_install_safely_on_used_db
  - compatibility_shim_can_no_longer_preserve_current_fresh_db_semantics

deliverables:
  - implementation/report/result artifacts for ITER-2026-03-31-442

rollback:
  - git restore addons/smart_platform_bootstrap
  - git restore addons/smart_construction_bootstrap
  - git restore agent_ops/tasks/ITER-2026-03-31-442.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-442.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-442.json

depends_on:
  - ITER-2026-03-31-441
