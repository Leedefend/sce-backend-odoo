task_id: ITER-2026-03-29-142
title: Count canonical action semantics in scene ready metrics
type: governance_task
status: pending
priority: high

goal: Make scene ready consumption metrics count canonical action_surface semantics even when counts have not been materialized yet.
user_visible_outcome:
  - scenes with primary_actions or grouped actions are no longer undercounted as missing action consumption

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: backend orchestration
  module: smart_core scene_ready_contract_builder
  reason: Scene ready action surfaces are already canonicalized around primary_actions, groups and selection_mode, but consumption metrics still only count action_surface when counts.total exists. This iteration aligns metrics with the canonical action surface shape.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-142.yaml
    - python3 -m py_compile addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_consumption_metrics.py
    - python3 addons/smart_core/tests/test_scene_ready_consumption_metrics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-142.yaml addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_consumption_metrics.py

depends_on:
  - ITER-2026-03-29-141

notes: "Batch acceleration: continue grouped scene-ready metrics alignment by counting canonical action semantics, not just materialized counts."
