  module: git ignore policy for agent_ops runtime artifact
  reason: Remove the transient `agent_ops/state/run_iteration.lock` from the repository surface so later grouped commits and risk scans do not treat it as user-visible drift.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-027.yaml
    - git status --short

