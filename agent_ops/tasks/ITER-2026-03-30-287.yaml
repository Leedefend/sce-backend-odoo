task_id: ITER-2026-03-30-287
title: Surface searchpanel select semantics on list toolbar
type: feature
status: in_progress
priority: medium

goal: >
  Expose native searchpanel select semantics so users can tell whether a facet
  dimension is single-select or multi-select, without inventing interaction before
  value-level execution semantics exist.

user_visible_outcome:
  - facet dimensions show single-select or multi-select semantics
  - searchpanel metadata becomes more informative without fake click behavior

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend contract changes
  - no click behavior changes

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: list metadata consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Searchpanel metadata already carries select semantics, and surfacing them is the
    next safest step after proving that value-level execution semantics are not yet
    available.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-287.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - searchpanel_select_shape_unclear

deliverables:
  - richer_searchpanel_semantics
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-287.yaml
  - git restore frontend/apps/web/src/views/ActionView.vue

depends_on:
  - ITER-2026-03-30-286

notes: >
  Keep this batch passive. Only expose semantics already present in native metadata.
