task_id: ITER-2026-04-05-1139
title: Target business runtime lane capability trusted capture and evidence archive
type: implementation
status: active
priority: high
mode: execute

goal: >
  Identify a reachable runtime/database lane with expected capability data,
  execute trusted off/on capability capture, and archive evidence for release gating.

user_visible_outcome:
  - "在目标业务运行时通道完成 trusted capability v1/v2 抓取并归档证据"

scope:
  allowed_paths:
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - artifacts/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 10
  max_output_lines: 260
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_probe_and_evidence_only
  - no_business_semantic_change

context:
  branch: codex/next-round
  baseline_sha: da08944
  explicit_user_authorization: true
  input_from: user_approved_1139
  priority_lane: rollout_gating

architecture:
  layer_target: Governance Monitoring
  module: runtime_capture_evidence
  module_owner: platform
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: produce trusted rollout evidence on target business lane.
  reason: close remaining evidence gap after recovery by capturing on data-bearing runtime lane.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1139.yaml
    - python3 scripts/verify/capability_payload_real_env_capture.py --out-dir artifacts/capability_payload_capture_1139 --allow-env-unstable --request-timeout-sec 8
    - rg -n '"env_status"|"v1_count"|"v2_count"|"diff_report"' artifacts/capability_payload_capture_1139/latest/capture_report.json
    - make verify.controller.boundary.guard

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - artifacts/capability_payload_capture_1139/latest/capture_report.json

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-05-1139.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1139.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1139.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1138
