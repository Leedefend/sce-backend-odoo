task_id: ITER-2026-04-18-IMPORTED-BUSINESS-CONTINUITY-GUARD
title: Add real imported business continuity guard
type: verification-governance
status: pass
priority: high

goal: >
  Add a reusable verification guard that runs against real imported customer
  business facts and proves the new system can both carry historical facts and
  continue a daily payment flow on top of an imported project/contract carrier.

user_visible_outcome:
  - "真实导入业务事实不只可查看，还能通过可重放脚本验证新系统付款办理链路可继续运转。"

scope:
