task_id: ITER-2026-04-03-904
title: Isolate chained host gate by caching recent runtime-probe PASS
type: backend
status: active
priority: high
mode: implement

goal: >
  Avoid repeated browser probe relaunch inside chained make execution by
  short-circuiting on a recent PASS probe artifact.

user_visible_outcome:
  - "链式验收可复用最近一次 runtime probe PASS 结果"
  - "减少同一批次内重复探针导致的非确定性失败"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_probe_cache_short_circuit_only
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-903
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host runtime probe chain isolation
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch optimizes verification execution orchestration and does not
    change business facts.
  reason: >
    Current chained host gate re-launches runtime probe and hits intermittent
    permission failures; recent PASS artifact reuse can isolate chain noise.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-904.yaml
    - HOST_RUNTIME_PROBE_MAX_AGE_SEC=300 make verify.portal.host_browser_runtime_probe
    - HOST_RUNTIME_PROBE_MAX_AGE_SEC=300 GATEWAY_BASE_URLS=http://localhost:8069 make verify.portal.project_dashboard_primary_entry_browser_smoke.host

