task_id: ITER-2026-03-31-494
title: Audit auto-task bootstrap source on fresh in-progress projects
type: permission-governance
status: active
priority: high

goal: >
  Isolate the source of the automatic task that appears on a fresh in-progress
  project so the remaining create-task recommendation branch can be classified
  correctly.

user_visible_outcome:
  - "明确 fresh in-progress project 上 auto-task 的来源"
  - "明确它是平台预期 bootstrap 语义还是意外副作用"
  - "为 create-task 分支后续治理提供具体落点"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only batch
  - no code, ACL, record-rule, manifest, schema, seed, or runtime data changes
  - combine repository tracing with bounded runtime observation only

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: create-task bootstrap semantics audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-493 showed that a fresh in-progress project immediately
    carries a task, preventing direct acceptance of the create-task branch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-494.yaml
    - "repository and runtime audit identify the concrete source or trigger path for the automatic task on a fresh in-progress project"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - auto_task_source_cannot_be_classified_with_certainty
  - the_source_points_to_broader_platform_bootstrap_semantics_that_need_separate_governance

deliverables:
  - classified source of auto-task bootstrap on fresh in-progress projects
  - governance/report artifacts for ITER-2026-03-31-494

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-494.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-494.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-494.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-493
