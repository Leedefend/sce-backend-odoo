task_id: ITER-2026-03-29-252
title: Align preload and asset entrypoints with canonical finalize helper
type: refactor_task
status: in_progress
priority: high

goal: Align preload and asset-producing backend entrypoints with the canonical finalize helper so they stop hand-wrapping contracts before finalization, while preserving behavior and architecture.
user_visible_outcome:
  - backend auxiliary entrypoints follow the same finalization pattern as main contract delivery
  - fewer ad hoc finalize wrappers remain in the chain
  - future sequencing cleanup can proceed from a more uniform baseline

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/app_config_engine/services/**
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

change_rules:
  - additive_or_refactor_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change
  - preserve_contract_output

architecture:
  layer_target: platform layer
  module: preload and asset entrypoints
  reason: after clarifying canonical delivery naming, remaining drift is in auxiliary entrypoints that still hand-build finalize envelopes instead of using the shared helper.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-252.yaml
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - output_contract_changed_unintentionally

deliverables:
  - preload_asset_entrypoint_alignment
  - canonical_finalize_helper_usage
  - regression_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-252.yaml docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore addons/smart_core/core/system_init_preload_builder.py addons/smart_core/core/ui_base_contract_asset_producer.py

depends_on:
  - ITER-2026-03-29-251

notes: "Refactor only. Move auxiliary entrypoints to finalize_data helper usage."
