task_id: ITER-2026-04-03-949
title: Harden release approval/operator guards for missing demo_pm runtime seed
type: backend
status: active
priority: high
mode: implement

goal: >
  Prevent environment-only seed gaps from blocking release operator surface
  verification by converting missing demo_pm failures into explicit SKIP_ENV.

user_visible_outcome:
  - "demo_pm 缺失时不再硬阻断 operator_surface 主链"

scope:
  allowed_paths:
    - scripts/verify/release_approval_guard.sh
    - scripts/verify/release_operator_orchestration_guard.sh
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 2
  max_output_lines: 140
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - verify_guard_error_handling_only
  - no_business_fact_change
  - no_acl_or_manifest_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-948
  priority_lane: usability_release_proof

architecture:
  layer_target: Product Release Usability Proof
  module: release approval/operator verification guards
  module_owner: scene_orchestration
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Change only affects verification orchestration and environment skip behavior.
  reason: >
    Full operator_surface chain now blocks at demo_pm seed absence; this is an
    environment precondition issue and should be reported as SKIP_ENV.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-949.yaml
    - bash -n scripts/verify/release_approval_guard.sh
    - bash -n scripts/verify/release_operator_orchestration_guard.sh
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim make verify.release.approval_guard DB_NAME=sc_demo
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim make verify.release.operator_orchestration_guard DB_NAME=sc_demo
    - ARTIFACTS_DIR=artifacts HOST_RUNTIME_PROBE_MAX_AGE_SEC=7200 HOST_RUNTIME_PROBE_CACHE_ONLY=1 ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost E2E_LOGIN=admin E2E_PASSWORD=admin make verify.release.operator_surface.v1 DB_NAME=sc_demo

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - release_guard_missing_demo_pm_skip_env_hardening

rollback:
  - git restore scripts/verify/release_approval_guard.sh
  - git restore scripts/verify/release_operator_orchestration_guard.sh
  - git restore agent_ops/tasks/ITER-2026-04-03-949.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-949.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-949.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-948
