task_id: ITER-2026-03-30-316
title: Humanize common Odoo system field names in list sort display
type: frontend
status: in_progress
priority: high

goal: >
  Fix the remaining raw system-field sort wording on the list page by adding a
  frontend fallback label map for common Odoo fields such as write_date and id.

user_visible_outcome:
  - default sort no longer shows raw field keys like write_date
  - list sort wording stays business-readable even when the field is not part of visible columns

scope:
  allowed_paths:
    - frontend/apps/web/src/app/action_runtime/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display fallback only
  - no request or sorting behavior change

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: list sort label presentation
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    Some default-sort fields are system fields not present in list columns, so
    contract column labels are unavailable and the UI falls back to raw field
    keys. This batch adds a safe presentation fallback for common Odoo fields.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-316.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - fallback_label_fix_requires_backend_change

deliverables:
  - system_field_sort_label_fallback
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewSurfaceDisplayRuntime.ts
  - git restore agent_ops/tasks/ITER-2026-03-30-316.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-315

notes: >
  Keep the request order token unchanged. Only improve user-facing labels for
  common technical field names.
