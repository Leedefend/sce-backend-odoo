  module: project form live contract field modifiers
  reason: The parity audit now leaves only one backend completeness gap, `views.form.field_modifiers`, so this batch verifies the live runtime before any backend implementation batch is opened.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-201.yaml
