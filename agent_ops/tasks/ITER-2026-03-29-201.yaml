  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-201.yaml agent_ops/reports/2026-03-29/report.ITER-2026-03-29-201.md agent_ops/state/task_results/ITER-2026-03-29-201.json

