task_id: ITER-2026-04-13-1828
title: Project skeleton rollback dry-run script and stage default diagnosis v1
status: completed
type: implementation
priority: high
mode: execute

goal: >
  Implement a no-delete rollback dry-run script for the 30 project skeleton
  write-trial records and diagnose their default stage_id behavior.

user_visible_outcome:
  - "项目骨架 30 条回滚 dry-run 精确锁定结果与 stage_id 默认行为诊断完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1828.yaml
    - scripts/migration/project_rollback_dry_run.py
    - artifacts/migration/project_rollback_dry_run_result_v1.json
    - docs/migration_alignment/project_rollback_dry_run_report_v1.md
    - docs/migration_alignment/project_stage_default_behavior_review_v1.md
    - docs/migration_alignment/project_write_trial_next_gate_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1828.md
    - agent_ops/state/task_results/ITER-2026-04-13-1828.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - rollback-dry-run-only
  - read-only-review-only
  - no-delete
  - no-new-data-write
  - no-sample-expansion
  - no-update
  - no-upsert
  - no-model-view-menu-frontend-acl-change
  - rollback-target-by-legacy-project-id-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_database: sc_demo
  write_trial: ITER-2026-04-13-1825
  post_write_review: ITER-2026-04-13-1827
  target_identity_count: 30

architecture:
  layer_target: Migration Dry-Run Tooling
  module: project.project rollback dry-run and stage default diagnosis
  module_owner: scripts/migration + docs/migration_alignment + artifacts/migration
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch reads existing project skeleton business facts and reports rollback
    targetability and default stage behavior without deleting or writing records.
  reason: >
    The write trial passed and post-write review locked 30 targets. Before any
    real rollback or sample expansion, rollback target selection must be proven
    by dry-run and stage_id default behavior must be diagnosed.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1828.yaml
    - python3 -m py_compile scripts/migration/project_rollback_dry_run.py
    - ENV=dev DB_NAME=sc_demo make odoo.shell.exec
    - python3 -m json.tool artifacts/migration/project_rollback_dry_run_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1828.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - database_write_attempted
  - delete_attempted
  - sample_expansion_attempted
  - rollback_target_not_locked_by_legacy_project_id

deliverables:
  - rollback dry-run script
  - rollback dry-run result artifact
  - rollback dry-run report
  - stage_id default behavior review
  - next gate decision
  - iteration report

depends_on:
  - ITER-2026-04-13-1827

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1828.yaml
  - git restore scripts/migration/project_rollback_dry_run.py
  - git restore artifacts/migration/project_rollback_dry_run_result_v1.json
  - git restore docs/migration_alignment/project_rollback_dry_run_report_v1.md
  - git restore docs/migration_alignment/project_stage_default_behavior_review_v1.md
  - git restore docs/migration_alignment/project_write_trial_next_gate_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1828.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1828.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
