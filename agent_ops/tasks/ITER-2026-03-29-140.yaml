  layer_target: backend orchestration
  module: smart_core scene_dsl_compiler
  reason: Scene dsl compiler already preserves core search facts like filters, group_by, searchpanel and mode, but still drops base_search.default_sort and under-reports search semantic profile richness. This iteration closes that grouped compile-side gap.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-140.yaml
    - python3 -m py_compile addons/smart_core/core/scene_dsl_compiler.py addons/smart_core/tests/test_scene_dsl_compiler_search_semantic_profile.py
    - python3 addons/smart_core/tests/test_scene_dsl_compiler_search_semantic_profile.py

risk:
