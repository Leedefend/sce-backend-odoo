  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-140.yaml addons/smart_core/core/scene_dsl_compiler.py addons/smart_core/tests/test_scene_dsl_compiler_search_semantic_profile.py

depends_on:
  - ITER-2026-03-29-139

notes: "Batch acceleration: close the grouped compile-side search semantic gaps together instead of splitting default_sort and profile metrics into separate micro-iterations."
