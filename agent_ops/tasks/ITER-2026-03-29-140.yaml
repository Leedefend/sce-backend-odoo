task_id: ITER-2026-03-29-140
title: Normalize compile-time search semantic profile
type: governance_task
status: pending
priority: high

goal: Make scene dsl compiler preserve base_search.default_sort and expose search mode/default_sort in compile-time surface profiling.
user_visible_outcome:
