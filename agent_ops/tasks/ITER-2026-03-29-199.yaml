task_id: ITER-2026-03-29-199
title: Audit project form contract metadata and frontend consumption
type: governance_task
status: pending
priority: high

goal: Produce a gap matrix for project form productization by auditing which backend view metadata already exists and which frontend consumption points are implemented in ContractFormPage.
user_visible_outcome:
  - the team gets a concrete backend-metadata vs frontend-consumption matrix for project form
  - subsequent batches can iterate against explicit parity gaps instead of screenshot-driven guesswork

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: governance layer
  module: project form contract parity audit
  reason: Before more UI iterations, we need a stable audit artifact that tells us whether backend project form metadata is complete and how much of it the frontend already consumes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-199.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_contract_parity_audit.py
    - python3 agent_ops/scripts/frontend_contract_parity_audit.py --snapshot docs/contract/snapshots/project_form_pm.json --frontend-file frontend/apps/web/src/pages/ContractFormPage.vue --expect-status PASS

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - audit_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-199.yaml agent_ops/scripts/frontend_contract_parity_audit.py agent_ops/reports/2026-03-29/report.ITER-2026-03-29-199.md agent_ops/state/task_results/ITER-2026-03-29-199.json

depends_on:
  - ITER-2026-03-29-197

notes: "Governance reset batch: quantify backend project-form metadata completeness and frontend ContractFormPage consumption coverage before new parity implementation batches."
