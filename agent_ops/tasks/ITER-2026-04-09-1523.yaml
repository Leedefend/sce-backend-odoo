task_id: ITER-2026-04-09-1523
title: backend refactor A1 intent registry skeleton
type: product-implementation
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  在不替换现有 intent_router 的前提下，落地 intents registry 骨架与审计脚本，建立后续迁移锚点。

user_visible_outcome:
  - "后端已有显式 intent 注册总表与可执行 audit，能识别缺失覆盖而不破坏现网行为"

scope:
  allowed_paths:
    - addons/smart_core/intents/__init__.py
    - addons/smart_core/intents/registry.py
    - addons/smart_core/intents/registry_entries/__init__.py
    - addons/smart_core/intents/registry_entries/core_bootstrap.py
    - scripts/verify/intent_registry_audit.py
    - artifacts/architecture/intent_registry_audit_v1.json
    - agent_ops/tasks/ITER-2026-04-09-1523.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1523.md
    - agent_ops/state/task_results/ITER-2026-04-09-1523.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/smart_core/controllers/**
    - addons/smart_core/core/intent_router.py
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 10
  max_output_lines: 360

change_rules:
  - additive only
  - no runtime dispatch replacement
  - audit may report gaps but should not break runtime

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Backend intent governance layer
  module: Intent registry baseline
  module_owner: smart_core intents
  kernel_or_scenario: kernel
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    intent 注册元数据属于平台级业务事实目录，不涉及前端解释与展示语义。
  reason: >
    先建立可审计 registry，再逐批迁移 dispatcher/handler，避免直接切主链风险。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1523.yaml"
    - "python3 scripts/verify/intent_registry_audit.py"
    - "rg -n \"intent_name|handler_class|request_schema|response_contract|capability_code|permission_mode|idempotent|version|tags\" addons/smart_core/intents/registry.py"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - intent registry skeleton
  - intent registry audit script and artifact

rollback:
  - git restore addons/smart_core/intents scripts/verify/intent_registry_audit.py artifacts/architecture/intent_registry_audit_v1.json

depends_on:
  - ITER-2026-04-09-1522

