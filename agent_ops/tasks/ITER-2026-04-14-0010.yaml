task_id: ITER-2026-04-14-0010
title: Project v2 100-row post-write readonly review
status: in_progress
type: migration-post-write-review
priority: high
mode: verify

goal: >
  Run an immediate readonly review for the project v2 100-row write batch and
  freeze a rollback target list keyed by legacy_project_id.

user_visible_outcome:
  - "project v2 100 条写后只读复核完成，并锁定 rollback target list"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0010.yaml
    - scripts/migration/project_v2_100_post_write_review.py
    - artifacts/migration/project_v2_100_post_write_review_result.json
    - artifacts/migration/project_v2_100_rollback_target_list.csv
    - docs/migration_alignment/project_v2_100_post_write_review.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0010.md
    - agent_ops/state/task_results/ITER-2026-04-14-0010.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_v2_100_post_write_snapshot.csv
    - artifacts/migration/project_v2_100_write_result.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-db-review
  - no-create
  - no-update
  - no-unlink
  - no-workflow-replay
  - no-acl-security-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-14-0009
  write_result: artifacts/migration/project_v2_100_write_result.json
  post_write_snapshot: artifacts/migration/project_v2_100_post_write_snapshot.csv

architecture:
  layer_target: Project Migration Post-Write Review
  module: project.project v2 100-row rollback eligibility
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch verifies already materialized project business facts and freezes
    rollback targeting metadata without adding presentation semantics.
  reason: >
    The authorized project v2 100-row write passed and requires immediate
    readonly review before any broader migration batch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0010.yaml
    - python3 -m py_compile scripts/migration/project_v2_100_post_write_review.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_v2_100_post_write_review.py
    - python3 -m json.tool artifacts/migration/project_v2_100_post_write_review_result.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0010.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: false
  reason: "Readonly follow-up review for the already authorized write batch."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - unlink_attempted
  - workflow_replay_attempted
  - acl_or_security_change_attempted
  - rollback_blocked

deliverables:
  - task contract
  - readonly review script
  - post-write review result json
  - rollback target list
  - review report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0009

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0010.yaml
  - git restore scripts/migration/project_v2_100_post_write_review.py
  - git restore artifacts/migration/project_v2_100_post_write_review_result.json
  - git restore artifacts/migration/project_v2_100_rollback_target_list.csv
  - git restore docs/migration_alignment/project_v2_100_post_write_review.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0010.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0010.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
