task_id: ITER-2026-04-05-1135
title: Generate v1-v2 capability payload diff snapshot evidence
type: implementation
status: active
priority: high
mode: execute

goal: >
  Add a verification script that compares capability payload snapshots between
  legacy path (v1) and registry-query path (v2 toggle enabled), producing
  machine-readable diff evidence for rollout gating.

user_visible_outcome:
  - "输出 capability v1/v2 差异快照报告，作为开关上线前 gate 证据"

scope:
  allowed_paths:
    - scripts/verify/capability_payload_v1_v2_diff_snapshot.py
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 8
  max_output_lines: 220
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - verification_script_only
  - no_runtime_behavior_change

context:
  branch: codex/next-round
  baseline_sha: da08944
  explicit_user_authorization: true
  input_from: user_approved_1135
  priority_lane: rollout_gating

architecture:
  layer_target: Governance Monitoring
  module: scripts/verify
  module_owner: platform
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: output rollout evidence without changing semantics.
  reason: support controlled toggle rollout decision.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1135.yaml
    - python3 -m py_compile scripts/verify/capability_payload_v1_v2_diff_snapshot.py
    - bash -lc 'printf "[{\"key\":\"a\",\"name\":\"A\"}]" > artifacts/cap_v1.json && printf "[{\"key\":\"a\",\"name\":\"A1\"},{\"key\":\"b\",\"name\":\"B\"}]" > artifacts/cap_v2.json && python3 scripts/verify/capability_payload_v1_v2_diff_snapshot.py --sample-v1-file artifacts/cap_v1.json --sample-v2-file artifacts/cap_v2.json --out artifacts/capability_payload_v1_v2_diff_snapshot.json && rg -n "added_keys|removed_keys|changed_keys" artifacts/capability_payload_v1_v2_diff_snapshot.json'
    - make verify.controller.boundary.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - scripts/verify/capability_payload_v1_v2_diff_snapshot.py

rollback:
  - git restore scripts/verify/capability_payload_v1_v2_diff_snapshot.py
  - git restore agent_ops/tasks/ITER-2026-04-05-1135.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1135.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1135.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1134
