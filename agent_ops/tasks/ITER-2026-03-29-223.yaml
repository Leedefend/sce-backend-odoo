task_id: ITER-2026-03-29-223
title: Tighten generic detail shell to native-first form surface
type: product_task
status: pending
priority: high

goal: Make generic record detail routes in `ContractFormPage` render primarily through the live form contract structure by suppressing non-essential platform blocks when the backend already provides usable form facts.
user_visible_outcome:
  - detail pages lead with statusbar, contract actions, and sectioned form fields
  - non-essential detail blocks stop overwhelming the native form reading order

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail shell
  reason: Live form facts are already sufficient for `project.project`, and the fastest path to basic usability is to let `views.form.layout/statusbar/field_groups/field_modifiers/buttons` dominate the detail surface instead of generic platform helper blocks.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-223.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-223.yaml frontend/apps/web/src/pages/ContractFormPage.vue docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-223.md agent_ops/state/task_results/ITER-2026-03-29-223.json

depends_on:
  - ITER-2026-03-29-222

notes: "Keep the batch generic to record-detail routes; project.project is only the first validation sample."
