task_id: ITER-2026-04-03-885
title: Add deterministic host runtime probe before release-grade browser gates
type: backend
status: active
priority: high
mode: implement

goal: >
  Add a fast deterministic host Playwright runtime probe as a pre-gate for
  release-grade browser checks, so publishability blockers surface quickly with
  explicit root-cause evidence.

user_visible_outcome:
  - "发布门禁阻塞原因可快速明确"
  - "避免 host 门禁长时间无效等待"

scope:
  allowed_paths:
    - scripts/verify/**
    - Makefile
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - minimal_runtime_guard_only
  - no_business_model_change
  - no_contract_field_change

context:
  branch: codex/next-round
  baseline_sha: 02a3ee9
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-884
  priority_lane: usability_release_proof
  usability_battlefield: backend_plus_cross_stack

architecture:
  layer_target: Product Release Usability Proof
  module: host runtime pre-gate
  module_owner: verify chain
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Release decision depends on reliable host browser gate execution; runtime
    failures must be surfaced deterministically before scenario assertions.
  reason: >
    Improve release-gate signal quality and iteration efficiency.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-885.yaml
    - make verify.portal.host_browser_runtime_probe
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - deterministic host runtime probe and gate integration
  - release-grade re-verification result for ITER-2026-04-03-885

rollback:
  - git restore scripts/verify/host_browser_runtime_probe.mjs
  - git restore Makefile
  - git restore agent_ops/tasks/ITER-2026-04-03-885.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-885.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-885.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-884
