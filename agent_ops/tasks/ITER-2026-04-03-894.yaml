task_id: ITER-2026-04-03-894
title: Stabilize host login preflight against transient fetch aborts
type: backend
status: active
priority: high
mode: implement

goal: >
  Reduce false-negative host gate failures by adding bounded retry and adaptive
  timeout behavior for custom-login preflight probes.

user_visible_outcome:
  - "主入口预检对瞬时网络抖动更稳健，减少误判不可达"
  - "验证更快进入语义入口判定而非卡在 fetch 中断"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - host_preflight_resilience_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-893
  priority_lane: usability_release_proof
