task_id: ITER-2026-03-31-398
title: Realign projects.intake custom page to the fact-layer form surface
type: implementation
status: completed
priority: high

goal: >
  Reduce the confirmed frontend-originated drift in `projects.intake` by making
  the custom scene route hand off directly to the existing form handling surface,
  instead of rendering a two-card routing shell.

user_visible_outcome:
  - "访问 `/s/projects.intake` 时直接进入项目立项表单承接面"
  - "不再看到“快速创建 / 标准立项”的双卡分流壳"
  - "项目立项结构更贴近业务事实层的 form surface"

scope:
  allowed_paths:
    - frontend/apps/web/src/views/ProjectsIntakeView.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - addons/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/router/**
    - migrations/**
    - deploy/**

change_rules:
  - keep the change additive and low-risk
  - do not introduce new business semantics or custom field rules
  - reuse the existing `/f/project.project/new` form surface
  - preserve `scene_key` and workspace context when handing off

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Frontend Layer
  module: projects.intake scene handoff
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-397 proved that `projects.intake` drift is primarily
    frontend-originated. The next low-risk repair is to remove the custom
    routing shell and hand the scene route off to the existing form handling
    surface that already reuses native form semantics.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-398.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - existing_form_surface_cannot_accept_scene_handoff
  - typecheck_failure

deliverables:
  - low-risk handoff update in `ProjectsIntakeView.vue`
  - report and task result artifacts for ITER-2026-03-31-398
  - delivery log checkpoint with next suggestion

rollback:
  - git restore frontend/apps/web/src/views/ProjectsIntakeView.vue
  - git restore agent_ops/tasks/ITER-2026-03-31-398.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-398.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-398.json

depends_on:
  - ITER-2026-03-31-397
