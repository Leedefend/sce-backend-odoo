task_id: ITER-2026-03-30-306
title: Enrich list search placeholder with searchable-field count
type: frontend
status: in_progress
priority: medium

goal: >
  Improve the native list search hint by appending the total searchable-field
  count when the underlying Odoo metadata exposes more searchable fields than
  the placeholder preview can show.

user_visible_outcome:
  - users can see that search covers more fields than the first three examples
  - the search placeholder remains grounded in native searchable field metadata
  - no search behavior or backend semantics change

scope:
  allowed_paths:
    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/components/page/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend changes
  - no new interactions

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The current placeholder previews at most three searchable fields, which can
    understate broader native search coverage. Appending the total field count
    improves discoverability while staying fully read-only.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-306.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - placeholder_requires_behavior_change

deliverables:
  - searchable_field_count_hint
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-306.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-305

notes: >
  Keep the placeholder read-only. Only adjust the displayed hint text derived
  from existing searchable field metadata.
