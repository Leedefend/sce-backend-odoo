task_id: ITER-2026-04-03-897
title: Add host origin fallback discovery for connectivity diagnostics gate
type: backend
status: active
priority: high
mode: implement

goal: >
  Expand custom-frontend origin discovery with bounded fallback origins so host
  diagnostics can find reachable local endpoints when primary port is down.

user_visible_outcome:
  - "主入口诊断支持 origin 回退候选，减少单端口故障导致的整链不可达"
  - "可通过环境变量声明额外回退 origin"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - origin_discovery_fallback_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-896
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host diagnostics origin discovery
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch adjusts runtime verification origin selection only and does not
    modify business semantics.
  reason: >
    Host gate currently fails due to fixed local port assumptions; bounded
    origin fallback discovery is needed to find valid local entry endpoints.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-897.yaml
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - extended origin discovery candidates with env-configurable fallbacks
  - updated host diagnostics evidence under fallback discovery mode

rollback:
  - git restore scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
  - git restore agent_ops/tasks/ITER-2026-04-03-897.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-897.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-897.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-896
