task_id: ITER-2026-03-29-200
title: Implement project form section shells
type: product_task
status: pending
priority: high

goal: Close the current frontend parity gap by making ContractFormPage render stronger section shells for project form sections using existing contract layout metadata.
user_visible_outcome:
  - project form body has clearer section containers
  - core and advanced groups read like business sections instead of a flat field list
  - parity audit no longer reports missing `section_shells`

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: project form section shell rendering
  reason: The current audit matrix shows the main missing frontend parity item is `section_shells`, so this batch implements that one missing structural consumer.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-200.yaml
    - python3 agent_ops/scripts/frontend_contract_parity_audit.py --snapshot docs/contract/snapshots/project_form_pm.json --frontend-file frontend/apps/web/src/pages/ContractFormPage.vue --expect-status PASS
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-200.yaml frontend/apps/web/src/pages/ContractFormPage.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-200.md agent_ops/state/task_results/ITER-2026-03-29-200.json

depends_on:
  - ITER-2026-03-29-199

notes: "Direct parity implementation batch: close the audited frontend `section_shells` gap before revisiting backend metadata completeness."
