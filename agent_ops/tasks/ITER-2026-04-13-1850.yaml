task_id: ITER-2026-04-13-1850
title: Legacy database full rebuild migration blueprint v1
status: PASS
type: legacy-db-readonly-blueprint
priority: high
mode: execute

goal: >
  Systematically profile LegacyDb in read-only mode and produce a repeatable
  full new-database rebuild migration blueprint. Do not write either database.

user_visible_outcome:
  - "旧库全局盘点与完整新库重建迁移方案完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1850.yaml
    - scripts/migration/legacy_db_full_rebuild_blueprint_probe.py
    - artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json
    - docs/migration_alignment/legacy_db_system_inventory_v1.md
    - docs/migration_alignment/full_rebuild_migration_blueprint_v1.md
    - docs/migration_alignment/full_rebuild_migration_execution_plan_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1850.md
    - agent_ops/state/task_results/ITER-2026-04-13-1850.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - LegacyDb.sys.tables
    - LegacyDb.sys.columns
    - LegacyDb core business tables
    - artifacts/migration/partner_import_decision_support_v1.json
    - artifacts/migration/partner_strong_evidence_dry_run_result_v1.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - legacy-db-read-only
  - governance-and-blueprint-only
  - no-db-write
  - no-odoo-orm
  - no-partner-create
  - no-contract-import
  - no-model-view-menu-acl-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  sqlserver_container: legacy-sqlserver
  sqlserver_database: LegacyDb

architecture:
  layer_target: Migration Rebuild Blueprint
  module: LegacyDb full business-data reconstruction
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The blueprint reconstructs legacy business facts into the new database in a
    repeatable order; it does not define frontend presentation.
  reason: >
    The user reset the migration target to repeatable full new-database
    reconstruction and authorized direct LegacyDb fact analysis.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1850.yaml
    - python3 -m py_compile scripts/migration/legacy_db_full_rebuild_blueprint_probe.py
    - python3 scripts/migration/legacy_db_full_rebuild_blueprint_probe.py
    - python3 -m json.tool artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1850.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - legacy_db_write_attempted
  - odoo_db_write_attempted
  - partner_create_attempted
  - contract_import_attempted

deliverables:
  - task contract
  - LegacyDb blueprint probe
  - blueprint artifact
  - system inventory document
  - full rebuild blueprint document
  - execution plan document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1849

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1850.yaml
  - git restore scripts/migration/legacy_db_full_rebuild_blueprint_probe.py
  - git restore artifacts/migration/legacy_db_full_rebuild_blueprint_v1.json
  - git restore docs/migration_alignment/legacy_db_system_inventory_v1.md
  - git restore docs/migration_alignment/full_rebuild_migration_blueprint_v1.md
  - git restore docs/migration_alignment/full_rebuild_migration_execution_plan_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1850.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1850.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
