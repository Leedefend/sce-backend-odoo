task_id: ITER-2026-03-30-371
title: Move dormant cost-domain demo facts out of smart_construction_core
type: code
status: in_progress
priority: medium

goal: >
  Clean the industry core module boundary by removing the dormant demo business
  facts file `cost_domain_demo.xml` from `smart_construction_core` and merging
  those records into an already-loaded `smart_construction_demo` data file.

user_visible_outcome:
  - industry core no longer carries the dormant cost-domain demo facts file
  - the same demo facts live under `smart_construction_demo`
  - no manifest changes are required

scope:
  allowed_paths:
    - addons/smart_construction_core/data/cost_domain_demo.xml
    - addons/smart_construction_demo/data/base/cost_demo.xml
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - do not change any manifest
  - only move the dormant demo business facts file; do not reclassify stage/config/sequence data in this batch
  - keep xmlids and record values unchanged where possible

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Domain Layer
  module: demo fact source cleanup
  module_owner: smart_construction_core + smart_construction_demo
  kernel_or_scenario: scenario
  reason: >
    The repository boundary rule is that the industry core should keep models,
    actions, menus, and permissions, while demo business facts belong in the
    demo module. `cost_domain_demo.xml` is a dormant demo facts file currently
    parked in the wrong module.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-371.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_demo DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - demo_data_merge_breaks_upgrade

deliverables:
  - dormant demo facts moved from core to demo module
  - report and task result artifacts for ITER-2026-03-30-371
  - delivery log checkpoint for the next data-boundary cleanup batch

rollback:
  - git restore addons/smart_construction_core/data/cost_domain_demo.xml
  - git restore addons/smart_construction_demo/data/base/cost_demo.xml
  - git restore agent_ops/tasks/ITER-2026-03-30-371.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-371.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-371.json

depends_on:
  - ITER-2026-03-30-370
