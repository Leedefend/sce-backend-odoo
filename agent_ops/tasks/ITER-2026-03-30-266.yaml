task_id: ITER-2026-03-30-266
title: Make frontend dev reset readiness check reliable
type: fix
status: in_progress
priority: high

goal: Ensure the Makefile-driven frontend dev reset only reports success when a fresh Vite instance is actually reachable on the target port.
user_visible_outcome:
  - make fe.dev.reset no longer reports false readiness from stale logs
  - frontend hot-reload runtime is actually reachable on 127.0.0.1:5174

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - scripts/dev/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/**
    - migrations/**
    - deploy/**

change_rules:
  - minimal_runtime_fix_only
  - no_backend_change
  - no_frontend_app_code_change

architecture:
  layer_target: platform ops runtime
  module: frontend dev reset script readiness probe
  kernel_or_scenario: kernel
  reason: The current frontend reset script can report success from stale log content even when the new Vite process is not actually reachable.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-266.yaml
    - bash -n scripts/dev/frontend_dev_reset.sh
    - make fe.dev.reset
    - bash -lc 'curl -I --max-time 5 http://127.0.0.1:5174/'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - frontend_reset_still_false_positive
  - acceptance_failed

deliverables:
  - reliable_frontend_dev_reset
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-266.yaml
  - git restore scripts/dev/frontend_dev_reset.sh

depends_on:
  - ITER-2026-03-30-265

notes: "Prefer a fresh log and an actual localhost probe over readiness text matching alone."
