task_id: ITER-2026-03-28-009
title: Fix repo risk scan empty-effective-diff false positive
type: bugfix_task
status: pending
priority: high

goal: Fix the repo-level risk scan so an empty effective changed-file set does not fall back to scanning the entire dirty worktree and falsely trigger diff_too_large.
user_visible_outcome:
  - risk scan reports zero diff volume when all dirty files are covered by baseline
  - baseline governance iterations no longer stop on false diff_too_large
  - continuous queue can trust repo-level guard decisions

scope:
  allowed_paths:
    - agent_ops/scripts/**
    - agent_ops/tasks/**
    - agent_ops/queue/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: agent_ops risk scan + queue prep
  reason: Repair a false-positive stop condition in the repo-level guard before continuing autonomous queue execution.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-009.yaml
    - python3 agent_ops/scripts/risk_scan.py > /tmp/agent_risk_scan_009.json
    - python3 -c "import json, pathlib; payload=json.loads(pathlib.Path('/tmp/agent_risk_scan_009.json').read_text(encoding='utf-8')); assert payload['stop_required'] is False, payload; assert payload['risk_level'] == 'low', payload; assert 'agent_ops/tasks/ITER-2026-03-28-009.yaml' in payload['changed_files'], payload; assert payload['diff_summary']['files'] >= 1, payload"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/scripts/diff_parser.py agent_ops/scripts/risk_scan.py agent_ops/tasks/ITER-2026-03-28-009.yaml agent_ops/queue/platform_kernel_refactor_prep_queue.yaml docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-28-007
notes: "Bugfix required because baseline-covered dirty trees currently still trip diff_too_large."
