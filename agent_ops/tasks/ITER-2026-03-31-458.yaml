task_id: ITER-2026-03-31-458
title: Materialize Sichuan Baosheng customer authorization matrix into install-time user group assignments
type: implementation
status: active
priority: high

goal: >
  Convert the audited Sichuan Baosheng user authorization gap into a concrete
  install-time authorization matrix so the customer users on sc_odoo receive
  the intended PM, finance, executive, business-admin, and general-user role
  grants through smart_construction_custom module data.

user_visible_outcome:
  - "四川保盛用户权限矩阵落到系统组"
  - "PM / 财务 / 管理层 / 业务系统管理员 / 通用角色 权限可重复再现"
  - "升级 smart_construction_custom 即可重放授权结果"

scope:
  allowed_paths:
    - addons/smart_construction_custom/data/**
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive changes only
  - keep authorization materialized in customer install-time XML data
  - do not change ACL, record rules, or financial semantics
  - reuse existing role groups rather than inventing new security groups

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
  layer_target: Customer Delivery Authorization Materialization
  module: smart_construction_custom
  module_owner: customer delivery chain
  kernel_or_scenario: scenario
  reason: >
    The current customer users only have owner plus partial business-admin
    authority. Before business-flow usability can be verified, the Sichuan
    Baosheng authorization matrix must be materialized into install-time group
    assignments using the existing customer users, posts, and system-role facts.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-458.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo
    - runtime SQL audit confirms Sichuan Baosheng users now have non-zero PM / finance / executive role coverage as intended

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - customer_authorization_matrix_cannot_be_materialized_with_certainty
  - smart_construction_custom_upgrade_fails_on_sc_odoo

deliverables:
  - updated install-time customer user group assignments
  - implementation/report/result artifacts for ITER-2026-03-31-458

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo`
  - git restore addons/smart_construction_custom/data
  - git restore addons/smart_construction_custom/README.md
  - git restore agent_ops/tasks/ITER-2026-03-31-458.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-458.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-458.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-457
