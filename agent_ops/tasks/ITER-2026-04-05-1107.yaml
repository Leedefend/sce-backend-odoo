task_id: ITER-2026-04-05-1107
title: Add guard to forbid smart_core controller imports from industry controllers
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Introduce a dedicated verify guard that fails when files under
  `addons/smart_core/controllers` import from
  `odoo.addons.smart_construction_core.controllers.*`.

user_visible_outcome:
  - "新增可执行 guard，防止 platform controller 再次直接依赖 industry controller"

scope:
  allowed_paths:
    - addons/smart_core/controllers/api_base.py
    - addons/smart_core/controllers/platform_ops_logic.py
    - addons/smart_core/controllers/platform_packs_logic.py
    - addons/smart_core/controllers/platform_scene_template_logic.py
    - addons/smart_core/controllers/platform_preference_logic.py
    - addons/smart_core/controllers/platform_scene_logic.py
    - addons/smart_core/controllers/platform_capability_catalog_logic.py
    - addons/smart_core/controllers/platform_ui_contract_api.py
    - addons/smart_core/controllers/platform_portal_execute_api.py
    - scripts/verify/controller_platform_no_industry_import_guard.py
    - Makefile
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 16
  max_candidates: 15
  max_output_lines: 280
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - guard_only_no_runtime_semantic_change

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: controller_boundary_recovery_phase5
  priority_lane: controller_boundary_recovery

architecture:
  layer_target: Governance Monitoring
  module: scripts/verify
  module_owner: governance
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: enforce controller ownership boundary in CI/verify lane.
  reason: block platform->industry controller import regression.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1107.yaml
    - python3 -m py_compile addons/smart_core/controllers/api_base.py addons/smart_core/controllers/platform_ops_logic.py addons/smart_core/controllers/platform_packs_logic.py addons/smart_core/controllers/platform_scene_template_logic.py addons/smart_core/controllers/platform_preference_logic.py addons/smart_core/controllers/platform_scene_logic.py addons/smart_core/controllers/platform_capability_catalog_logic.py addons/smart_core/controllers/platform_ui_contract_api.py addons/smart_core/controllers/platform_portal_execute_api.py scripts/verify/controller_platform_no_industry_import_guard.py
    - make verify.controller.platform_no_industry_import.guard
    - make verify.controller.allowlist.routes.guard
    - make verify.controller.route.policy.guard
    - make verify.controller.delegate.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - scripts/verify/controller_platform_no_industry_import_guard.py
  - Makefile

rollback:
  - git restore addons/smart_core/controllers/api_base.py
  - git restore addons/smart_core/controllers/platform_ops_logic.py
  - git restore addons/smart_core/controllers/platform_packs_logic.py
  - git restore addons/smart_core/controllers/platform_scene_template_logic.py
  - git restore addons/smart_core/controllers/platform_preference_logic.py
  - git restore addons/smart_core/controllers/platform_scene_logic.py
  - git restore addons/smart_core/controllers/platform_capability_catalog_logic.py
  - git restore addons/smart_core/controllers/platform_ui_contract_api.py
  - git restore addons/smart_core/controllers/platform_portal_execute_api.py
  - git restore scripts/verify/controller_platform_no_industry_import_guard.py
  - git restore Makefile
  - git restore agent_ops/tasks/ITER-2026-04-05-1107.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1107.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1107.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
