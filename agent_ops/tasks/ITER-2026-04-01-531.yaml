task_id: ITER-2026-04-01-531
title: Scan native list toolbar for the next low-risk usability slice after verify recovery
type: frontend
status: active
priority: medium
mode: scan

goal: >
  Identify the next low-risk product-usability slice on the native list toolbar
  now that the route-preset dedup verification chain has recovered.

user_visible_outcome:
  - "产出下一条 native list toolbar 可用性候选"
  - "保持低消耗 scan，不直接下实现结论"
  - "为后续 screen/implement 批次提供短上下文输入"

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/PageToolbar.vue
    - frontend/apps/web/src/pages/ListPage.vue
    - frontend/apps/web/src/views/ActionView.vue
    - frontend/apps/web/src/app/action_runtime/useActionViewSurfaceDisplayRuntime.ts
    - frontend/apps/web/src/app/action_runtime/useActionViewRoutePresetRuntime.ts
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/api/**
    - frontend/apps/web/src/stores/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 5
  max_candidates: 15
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost scan stage only
  - do not modify product code in this batch
  - do not conclude implementation choice in this batch
  - do not read files outside the declared toolbar slice

context:
  branch: codex/next-round
  baseline_sha: 2a02eb6
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-530
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar scan
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The route-preset verify line is now green. The next low-risk move is a
    bounded scan that stays inside the current toolbar slice and proposes the
    next minimal usability improvement without mixing in implementation.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-531.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - repo_wide_scan_attempted
  - scan_exceeds_declared_file_budget
  - scan_output_exceeds_limit

deliverables:
  - bounded candidate list for the next native-list usability slice
  - governance/report artifacts for ITER-2026-04-01-531

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-531.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-531.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-531.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-530
