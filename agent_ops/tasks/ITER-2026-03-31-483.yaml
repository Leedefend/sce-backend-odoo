task_id: ITER-2026-03-31-483
title: Audit role-specific next-action recommendation stability
type: customer-delivery-flow-acceptance
status: active
priority: medium

goal: >
  Audit whether next-action recommendations remain role-consistent when sampled
  per role without cross-role execution side effects on the corrected 482
  baseline.

user_visible_outcome:
  - "确认不同角色看到的 next-action 推荐是否稳定且可解释"
  - "如果存在 role-specific 偏差，明确定位到 recommendation 层还是执行副作用层"
  - "如果未发现残差，形成更稳定的 next-action 验收基线"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only batch unless a new explicitly authorized implementation task is opened
  - no ACL, record-rule, manifest, or schema changes
  - use repository facts plus runtime audit on sc_odoo
  - stop immediately if a newly found residual would require forbidden-path edits

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: role-specific next-action stability audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-482 closed the rule-expression residual. The next low-risk
    step is to inspect recommendation stability per role on the corrected
    baseline.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-483.yaml
    - repository and runtime audit classify role-specific next-action recommendation stability as PASS or PASS_WITH_RISK

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - newly_found_residual_requires_acl_or_record_rule_change
  - runtime_audit_cannot_classify_with_confidence

deliverables:
  - audit report for ITER-2026-03-31-483
  - result snapshot for ITER-2026-03-31-483
  - updated delivery context log

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-483.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-483.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-483.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-482
