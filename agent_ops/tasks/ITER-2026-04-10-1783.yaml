task_id: ITER-2026-04-10-1783
title: enforce visible form structure projection mode

type: implementation
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  当用户持续反馈“没有结构”时，前端进入结构可视投影模式，
  强制显示分区并输出页面内投影摘要，快速判断消费链是否生效。

user_visible_outcome:
  - "项目详情页显示结构投影摘要"
  - "DetailShell 不再使用 native-like 隐式压平"
  - "结构层级（shell/tab/section）肉眼可见"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-10-1783.yaml
    - frontend/apps/web/src/pages/ContractFormPage.vue
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1783.md
    - agent_ops/state/task_results/ITER-2026-04-10-1783.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 5
  max_output_lines: 1200

change_rules:
  - frontend runtime rendering only
  - no backend semantic mutation
  - additive compatibility-safe changes

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Frontend contract-consumer runtime
  module: ContractFormPage structure projection visibility
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    用户明确反馈结构仍未出现，需要先确保结构渲染可视化，再判断是否为契约缺口。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1783.yaml"
    - "rg -n \"forceStructureVisibilityMode|structureProjectionSummary|native-like\" frontend/apps/web/src/pages/ContractFormPage.vue"
    - "make frontend.restart"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - visible structure projection mode patch
  - iteration report and task result

rollback:
  - "git restore frontend/apps/web/src/pages/ContractFormPage.vue"

depends_on:
  - ITER-2026-04-10-1782
