    - "make -n verify.v2.app.governance"
    - "make -n verify.v2.app.contract"
    - 'rg -n "verify.v2.app.governance|verify.v2.app.contract" Makefile makefile'
    - 'rg -n "app verify naming batch" docs/architecture/backend_core_refactor_blueprint_v1.md'

risk:
