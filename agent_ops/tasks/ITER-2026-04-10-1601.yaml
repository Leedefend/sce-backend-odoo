  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 10
  max_output_lines: 680

change_rules:
  - v2 independent rebuild only
  - additive make/verify alignment
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

