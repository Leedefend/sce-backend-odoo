  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - no-menu-view-action-surface
  - no-permission-chain-wiring
  - create-only-safe-slice-write
  - rollback-target-required

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: project_member
  upstream_tasks:
    - ITER-2026-04-14-0030W
    - ITER-2026-04-14-0030RD
  execution_authorization: "user defined 0030N project_member neutral carrier design/write"
  safe_slice_rows: 34

architecture:
  layer_target: Project Member Neutral Migration Carrier
  module: smart_construction_core support model + migration importer
  module_owner: addons/smart_construction_core/models/support + scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The neutral carrier stores legacy membership relation facts and explicitly
    avoids responsibility, permission, approval, and record-rule semantics.
  reason: >
    The old database confirms project-member relation facts but not role facts.
    project.responsibility participates in record-rule visibility via
    project_member_ids.user_id, so neutral staging is required before any
    formal responsibility promotion.

odoo_module_change:
  module: smart_construction_core
  manifest_change: false
  security_change: false
  record_rule_change: false
  view_change: false
  model_change: true
  upgrade_required: true

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030N.yaml
    - python3 -m py_compile addons/smart_construction_core/models/support/project_member_neutral.py
    - python3 -m py_compile scripts/migration/project_member_neutral_34_write.py
    - python3 -m py_compile scripts/migration/project_member_neutral_34_post_write_review.py
    - make mod.upgrade MODULE=smart_construction_core DB_NAME=sc_demo
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_neutral_34_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_neutral_34_post_write_review.py
    - python3 -m json.tool artifacts/migration/project_member_neutral_34_write_result_v1.json
    - python3 -m json.tool artifacts/migration/project_member_neutral_34_post_write_review_result_v1.json
    - test -s artifacts/migration/project_member_rollback_targets_v1.csv
    - make verify.native.business_fact.static
    - make verify.portal.load_view_smoke.container

risk:
