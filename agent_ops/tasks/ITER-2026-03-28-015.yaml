task_id: ITER-2026-03-28-015
title: Promote second-wave runtime planning artifacts into dirty baseline
type: governance_task
status: pending
priority: high

goal: Canonicalize the accepted runtime planning artifacts produced after the first refactor-prep bootstrap so continuous planning can proceed without repeating diff_too_large on already reviewed docs.
user_visible_outcome:
  - canonical baseline includes the second-wave runtime planning artifacts
  - review summary records the accepted planning delta
  - system_init trace planning can continue without replaying accepted doc growth as repo-level risk

scope:
  allowed_paths:
    - agent_ops/policies/**
    - agent_ops/tasks/**
    - docs/ops/releases/archive/temp/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: baseline governance for second-wave runtime planning artifacts
  reason: Keep continuous iteration honest by moving accepted runtime planning docs into canonical baseline before opening the first code-oriented batch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-015.yaml
    - test -f docs/ops/releases/archive/temp/TEMP_refactor_prep_baseline_review_round2_20260328.md
    - rg -n "runtime_entrypoint_inventory_v1.md|runtime_representative_slice_selection_v1.md|system_init_runtime_trace_inventory_v1.md" docs/ops/releases/archive/temp/TEMP_refactor_prep_baseline_review_round2_20260328.md
    - rg -n "docs/architecture/system_init_runtime_trace_inventory_v1.md" agent_ops/policies/repo_dirty_baseline.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/policies/repo_dirty_baseline.yaml agent_ops/tasks/ITER-2026-03-28-015.yaml docs/ops/releases/archive/temp/TEMP_refactor_prep_baseline_review_round2_20260328.md docs/ops/iterations/delivery_context_switch_log_v1.md docs/ops/releases/archive/temp/TEMP_agent_ops_continuous_iteration_status_20260328.md

depends_on:
  - ITER-2026-03-28-014
notes: "Second-wave baseline governance after runtime planning PASS_WITH_RISK accumulation."

baseline_governance:
  candidate_required: true
  review_summary_required: true
  canonical_update_requires_dedicated_task: true
