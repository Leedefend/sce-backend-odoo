task_id: ITER-2026-04-14-0030ZC
title: Project member responsibility promotion candidate screening v1
status: completed
type: migration-responsibility-promotion-screen
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030ZB

goal: >
  Screen consolidated project/user pairs for responsibility promotion readiness
  without writing project.responsibility or changing permission semantics.

user_visible_outcome:
  - "明确 362 个 consolidated pair 中哪些具备 responsibility 提升条件，以及阻塞原因"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030ZC.yaml
    - scripts/migration/project_member_responsibility_promotion_candidate_screen.py
    - artifacts/migration/project_member_responsibility_promotion_candidates_v1.json
    - artifacts/migration/project_member_responsibility_promotion_candidates_v1.csv
    - artifacts/migration/project_member_responsibility_promotion_screen_summary_v1.json
    - docs/migration_alignment/project_member_responsibility_promotion_candidate_screen_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030ZC.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030ZC.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_consolidated_pairs_v1.json
    - artifacts/migration/project_member_consolidated_summary_v1.json
    - docs/migration_alignment/project_member_neutral_to_responsibility_promotion_gate_v1.md
    - docs/migration_alignment/project_member_responsibility_promotion_rule_v1.md
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-screen-only
  - no-db-write
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - no-promotion-execution

architecture:
  layer_target: Migration Responsibility Promotion Candidate Screening
  module: project_member consolidated pair promotion screen
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch screens whether verified business role facts exist for promotion.
    It does not create responsibility facts or permission semantics.
  reason: >
    0030ZB produced 362 consolidated pairs. 0030ZC applies the promotion gate
    and classifies each pair as promotable or blocked before any future write.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030ZC.yaml
    - python3 -m py_compile scripts/migration/project_member_responsibility_promotion_candidate_screen.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_responsibility_promotion_candidate_screen.py
    - python3 -m json.tool artifacts/migration/project_member_responsibility_promotion_candidates_v1.json
    - python3 -m json.tool artifacts/migration/project_member_responsibility_promotion_screen_summary_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

rollback:
  - "No database rollback required because this batch is readonly."
  - "Delete generated 0030ZC JSON/CSV artifacts if the screen must be regenerated."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_detected
  - project_responsibility_write_attempted
  - promotion_candidate_without_role_fact
  - project_responsibility_or_record_rule_change_required

deliverables:
  - task contract
  - readonly promotion candidate screen script
  - candidate json
  - candidate csv
  - screen summary json
  - screen documentation
  - iteration report
  - task result json
