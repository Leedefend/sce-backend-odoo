task_id: ITER-2026-04-02-866
title: Align payment list and summary guards with extended response semantics
type: backend
status: active
priority: high
mode: implement

goal: >
  Update payment list/summary guard scripts to enforce required contract keys
  while allowing approved extension fields in current backend responses.

user_visible_outcome:
  - "付款链路门禁不再被兼容扩展字段误阻断"
  - "付款闭环验证结果更稳定"

scope:
  allowed_paths:
    - scripts/verify/product_payment_list_block_guard.py
    - scripts/verify/product_payment_summary_block_guard.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - additive_only
  - verify_guard_only
  - no_business_semantics_change

context:
  branch: codex/next-round
  baseline_sha: a161f84
  explicit_user_authorization: true
  input_from: ITER-2026-04-02-865
  priority_lane: usability_verification_mainline
  usability_battlefield: backend

architecture:
  layer_target: Backend Usability
  module: payment list and summary contract guards
  module_owner: verify scripts
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Guard scripts should freeze required shapes and tolerate bounded response
    extensions from backend orchestration.
  reason: >
    Remove strict-key false negatives in payment-chain verification.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-02-866.yaml
    - make verify.product.payment_entry_contract_guard
    - make verify.product.payment_list_block_guard
    - make verify.product.payment_summary_block_guard
    - make verify.product.project_flow.execution_payment

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - payment list/summary guards aligned to required+optional key model
  - governance/report artifacts for ITER-2026-04-02-866

rollback:
  - git restore scripts/verify/product_payment_list_block_guard.py
  - git restore scripts/verify/product_payment_summary_block_guard.py
  - git restore agent_ops/tasks/ITER-2026-04-02-866.yaml
  - git restore agent_ops/reports/2026-04-02/report.ITER-2026-04-02-866.md
  - git restore agent_ops/state/task_results/ITER-2026-04-02-866.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-02-865
