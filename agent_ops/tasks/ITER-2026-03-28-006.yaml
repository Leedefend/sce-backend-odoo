task_id: ITER-2026-03-28-006
title: Align target architecture and implementation architecture baseline docs
type: governance_task
status: pending
priority: high

goal: Align the enterprise PM PaaS architecture narrative into a dual-doc baseline that reflects both the target blueprint and the current repository implementation reality.
user_visible_outcome:
  - a target architecture document exists for backend platform-kernel refactor planning
  - an implementation mapping document exists for current-to-target migration guidance
  - the existing product design document links to the new architecture baseline

scope:
  allowed_paths:
    - docs/architecture/**
    - docs/product/**
    - docs/ops/iterations/**
    - agent_ops/tasks/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Platform Layer + Documentation Governance
  module: docs/architecture + docs/product + docs/ops/iterations
  reason: Create an executable architecture baseline that reconciles the target PaaS blueprint with the current smart_core/smart_scene implementation and upcoming kernel refactor.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-006.yaml
    - test -f docs/architecture/enterprise_pm_paas_target_architecture_v1.md
    - test -f docs/architecture/enterprise_pm_paas_implementation_mapping_v1.md
    - rg -n "现状到目标映射|Current-to-Target Mapping" docs/architecture/enterprise_pm_paas_implementation_mapping_v1.md
    - rg -n "目标架构|Target Architecture" docs/product/construction_enterprise_management_system_product_design_v2.md

risk:
  level: low
  manual_approval_required: false
  threshold_overrides:
    max_changed_files: 8
    max_added_lines: 1200
    max_removed_lines: 120

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore docs/architecture docs/product docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-03-28-006.yaml

depends_on: []
notes: "Docs-only architecture alignment task for target blueprint plus implementation baseline."
