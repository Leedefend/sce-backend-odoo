task_id: ITER-2026-04-01-506
title: Audit tender as the next representative non-first-batch flow family
type: permission-governance
status: active
priority: medium

goal: >
  Continue the non-first-batch objective by auditing the tender/bid secondary
  flow family and determining whether its entry surface and runtime boundary are
  clean for representative delivered roles.

user_visible_outcome:
  - "明确 tender / 招投标 是否可作为下一条 clean representative family"
  - "识别其入口、角色边界与 runtime follow-through 是否存在残差"
  - "不改 ACL、不改 manifest、不引入高风险 side effects"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first batch for the tender family
  - implementation changes are out of scope unless a later narrow batch is opened
  - prefer read-only or no-write runtime classification paths

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: tender secondary flow audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    After three representative non-first-batch families have been classified,
    tender is the next likely low-risk secondary family with a visible action
    surface and a bounded runtime audit path.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-506.yaml
    - "repository audit identifies tender entrypoints and role boundaries"
    - "runtime audit classifies at least one representative tender entrypoint without high-risk side effects"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - tender_runtime_requires_high_risk_side_effects
  - tender_family_cannot_be_classified_with_confidence
  - audit_requires_acl_or_manifest_changes

deliverables:
  - tender family classification result
  - governance/report artifacts for ITER-2026-04-01-506

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-506.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-506.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-506.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-505
