task_id: ITER-2026-04-01-511
title: Select and audit another uncovered representative non-first-batch flow family
type: permission-governance
status: active
priority: medium

goal: >
  Continue expanding non-first-batch coverage after contract-family closure by
  selecting another uncovered low-risk representative secondary-flow family and
  classifying its repository/runtime boundary.

user_visible_outcome:
  - "继续扩展非首批流程覆盖面"
  - "选出另一个尚未覆盖的代表性 secondary family"
  - "明确该家族是否 clean 或存在新的 runtime residual"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first batch for another uncovered representative secondary-flow family
  - implementation changes are out of scope unless a later narrow batch is opened
  - do not reopen already-closed material, execution-side, document, tender, or contract families in this batch

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: another uncovered non-first-batch family audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    Five representative non-first-batch families are now closed. The next
    eligible low-risk step is to continue broadening coverage with a different
    secondary-flow family that does not duplicate the already-classified set.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-511.yaml
    - "repository audit identifies another uncovered representative family and role boundaries"
    - "runtime audit classifies at least one representative entrypoint without high-risk side effects"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - candidate_family_requires_high_risk_side_effects
  - runtime_cannot_classify_the_next_family_with_confidence
  - audit_requires_acl_or_manifest_changes

deliverables:
  - another uncovered non-first-batch family classification
  - governance/report artifacts for ITER-2026-04-01-511

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-511.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-511.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-511.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-510
