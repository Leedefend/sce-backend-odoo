task_id: ITER-2026-03-30-308
title: Normalize searchable-field metadata counts and preview wording
type: frontend
status: in_progress
priority: medium

goal: >
  Align the list search placeholder, searchable-field count, and searchable
  field preview wording around one canonical deduplicated native metadata
  source.

user_visible_outcome:
  - searchable-field totals stay consistent across placeholder and toolbar
  - preview wording no longer mixes preview length with total count
  - no search behavior or backend semantics change

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend changes
  - no new interactions

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Searchable-field metadata is already exposed, but the placeholder, preview
    chips, and count labels currently derive from slightly different slices.
    This batch aligns them on one frontend-consumed metadata source.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-308.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - metadata_alignment_requires_behavior_change

deliverables:
  - canonical_searchable_field_metadata_preview
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore frontend/apps/web/src/pages/ListPage.vue
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-308.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-307

notes: >
  Reuse existing native searchable-field metadata only. Do not add facet
  behavior or change search execution semantics.
