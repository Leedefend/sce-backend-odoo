task_id: ITER-2026-03-29-261
title: Add in-page scene switch between project list and ledger
type: feature
status: in_progress
priority: high

goal: Restore a native-feeling list/kanban switch for project pages by adding an in-page scene switch between `projects.list` and `projects.ledger`, without changing sidebar navigation.
user_visible_outcome:
  - users can switch between project list and project kanban from within the current scene page
  - sidebar remains product-menu only
  - implementation follows existing scene routing rather than action-route hacks

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - frontend/apps/web/src/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend_only
  - no_sidebar_nav_change
  - no_backend_contract_change
  - scene_route_first

architecture:
  layer_target: frontend layer
  module: SceneView in-page switch for projects.list/projects.ledger
  reason: Product navigation already splits list and kanban into two scenes. The correct low-risk fix is a scene-level switch instead of trying to force a single-action view switch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-261.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - scene_switch_path_uncertain
  - acceptance_failed

deliverables:
  - project_scene_switch_buttons
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-261.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore frontend/apps/web/src/views/SceneView.vue

depends_on:
  - ITER-2026-03-29-259

notes: "Do not touch sidebar. Implement only the in-page switch between projects.list and projects.ledger."
