task_id: ITER-2026-03-29-218
title: Align project record route scene query
type: product_task
status: pending
priority: high

goal: Stop `project.project` detail routes from inheriting the list-scene query identity (`scene_key=projects.list`) when navigating from action/list pages.
user_visible_outcome:
  - project detail routes no longer carry list-scene query identity
  - project detail pages use record/detail route context more cleanly

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend navigation runtime
  module: action-view row click target
  reason: Project record routes currently inherit `scene_key=projects.list` from the list page query, which keeps list-scene identity attached to a detail route.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-218.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-218.yaml frontend/apps/web/src/app/action_runtime/useActionViewNavigationRuntime.ts agent_ops/reports/2026-03-29/report.ITER-2026-03-29-218.md agent_ops/state/task_results/ITER-2026-03-29-218.json

depends_on:
  - ITER-2026-03-29-216

notes: "Keep the batch scoped to project detail route query cleanup; do not expand back into general scene routing."
