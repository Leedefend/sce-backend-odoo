task_id: ITER-2026-04-14-0030NY
title: Project member duplicate-relation neutral write gate v1
status: completed
type: migration-neutral-carrier-write-gate
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030NX

goal: >
  Validate the 500-row duplicate-relation evidence slice for a later neutral
  carrier write, without writing the database.

user_visible_outcome:
  - "确认 500 行重复 project/user 关系证据是否能作为 neutral carrier 扩容批次写入"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030NY.yaml
    - scripts/migration/project_member_duplicate_relation_write_gate.py
    - artifacts/migration/project_member_duplicate_relation_write_gate_v1.json
    - artifacts/migration/project_member_duplicate_relation_rollback_plan_v1.csv
    - docs/migration_alignment/project_member_duplicate_relation_write_gate_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030NY.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030NY.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_neutral_expansion_plan_v1.json
    - artifacts/migration/project_member_neutral_expansion_duplicate_relation_evidence_slice_v1.csv
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - write-gate-only
  - no-db-write
  - no-model-change
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - duplicate-relation-evidence-only
  - rollback-plan-required

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: project_member
  upstream_tasks:
    - ITER-2026-04-14-0030N
    - ITER-2026-04-14-0030NX
  execution_authorization: "continuous migration objective; readonly write gate only"

architecture:
  layer_target: Project Member Neutral Migration Carrier Write Gate
  module: scripts/migration + docs/migration_alignment + agent_ops
  module_owner: migration governance and importer planning
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The gate validates duplicate legacy relation evidence for neutral staging
    without creating responsibility or permission facts.
  reason: >
    0030NX found no new relation-unique rows. Remaining mapped rows are duplicate
    relation evidence and require a dedicated gate before any bounded write.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030NY.yaml
    - python3 -m py_compile scripts/migration/project_member_duplicate_relation_write_gate.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_duplicate_relation_write_gate.py
    - python3 -m json.tool artifacts/migration/project_member_duplicate_relation_write_gate_v1.json
    - test -s artifacts/migration/project_member_duplicate_relation_rollback_plan_v1.csv

risk:
  level: low
  manual_approval_required: false

rollback:
  - "No database rollback required because this batch is readonly."
  - "Delete generated 0030NY gate artifacts if classification must be regenerated."

stop_conditions:
  - acceptance_failed
  - db_write_detected
  - forbidden_path_touched
  - project_responsibility_write_attempted
  - role_key_fabrication_attempted
  - existing_neutral_conflict
  - rollback_plan_missing

deliverables:
  - task contract
  - duplicate-relation write gate script
  - write gate json
  - rollback plan csv
  - write gate doc
  - iteration report
