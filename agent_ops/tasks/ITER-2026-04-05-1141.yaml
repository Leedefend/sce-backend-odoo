task_id: ITER-2026-04-05-1141
title: Add lane-readiness guard for capability capture
type: implementation
status: active
priority: high
mode: execute

goal: >
  Add pre-capture lane-readiness guard to prevent false-empty snapshots by
  verifying scene module install state and sc.capability availability before
  trusted capture execution.

user_visible_outcome:
  - "抓取前新增 lane 就绪守卫，避免未就绪库出现假空 capability 报告"

