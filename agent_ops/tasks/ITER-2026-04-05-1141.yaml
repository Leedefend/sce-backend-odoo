  max_files: 10
  max_candidates: 12
  max_output_lines: 280
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - verification_script_guard_only
  - no_business_semantic_change

context:
  branch: codex/next-round
  baseline_sha: da08944
  explicit_user_authorization: true
  input_from: user_approved_1141
