task_id: ITER-2026-04-05-1103
title: Migrate /api/meta/project_capabilities ownership to smart_core
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Move `/api/meta/project_capabilities` controller ownership from
  `smart_construction_core` to `smart_core` and remove duplicate industry
  module route surface.

user_visible_outcome:
  - "平台模块统一承接 /api/meta/project_capabilities 入口"

scope:
  allowed_paths:
    - addons/smart_core/controllers/platform_meta_api.py
    - addons/smart_construction_core/controllers/__init__.py
    - addons/smart_construction_core/controllers/meta_controller.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 20
  max_output_lines: 320
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - additive_or_minimal_replacement_only
  - no_business_fact_semantics_change

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: user_stop_repetitive_loop_request
  priority_lane: controller_boundary_recovery

architecture:
  layer_target: Platform Layer
  module: smart_core.controllers
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: recover platform API entry ownership without changing domain facts.
  reason: eliminate industry-module occupation of platform meta entry route.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1103.yaml
    - python3 -m py_compile addons/smart_core/controllers/platform_meta_api.py addons/smart_construction_core/controllers/meta_controller.py addons/smart_construction_core/controllers/__init__.py
    - make verify.controller.allowlist.routes.guard
    - make verify.controller.route.policy.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_core/controllers/platform_meta_api.py
  - addons/smart_construction_core/controllers/__init__.py

rollback:
  - git restore addons/smart_core/controllers/platform_meta_api.py
  - git restore addons/smart_construction_core/controllers/__init__.py
  - git restore addons/smart_construction_core/controllers/meta_controller.py
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1103.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1103.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1102
