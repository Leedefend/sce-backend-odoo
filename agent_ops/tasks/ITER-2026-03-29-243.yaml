task_id: ITER-2026-03-29-243
title: Preserve notebook page group hierarchy in detail renderer
type: implementation_task
status: done
priority: high

goal: Fix the frontend detail renderer so project.project form layout is consumed as a hierarchy rather than being flattened into linear sections before notebook/page/group rendering.
user_visible_outcome:
  - project detail renders notebook tabs from the governed form contract
  - page and group content stays under the correct tab instead of being flattened into a single flow

scope:
  allowed_paths:
    - frontend/apps/web/src/**
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**
    - frontend/**/__tests__/**

change_rules:
  - additive_or_minimal_fix_only
  - no_schema_change
  - no_backend_contract_change
  - no_model_specific_frontend_hardcode

architecture:
  layer_target: frontend detail renderer
  module: ContractFormPage and detail layout runtime
  reason: Backend governed form facts already preserve notebook/page/group structure, but the current frontend consumer flattens the layout tree into layoutNodes/layoutSections before rendering.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-243.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - hierarchy_still_flattened

deliverables:
  - frontend_detail_hierarchy_fix
  - task_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-243.yaml frontend/apps/web/src/pages/ContractFormPage.vue frontend/apps/web/src/app/runtime/detailLayoutRuntime.ts docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-29-242

notes: "Frontend-only batch: stop flattening governed form layout before notebook/page/group rendering."
