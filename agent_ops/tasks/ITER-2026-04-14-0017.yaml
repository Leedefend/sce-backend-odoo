  - forbidden_path_touched
  - update_attempted
  - unlink_attempted
  - workflow_replay_attempted
  - acl_or_security_change_attempted

deliverables:
  - task contract
  - authorized write script
  - pre-write snapshot
  - post-write snapshot
  - write result json
  - write report
  - iteration report
  - task result json

