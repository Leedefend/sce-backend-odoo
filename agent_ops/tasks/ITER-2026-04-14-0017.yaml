    - agent_ops/state/task_results/ITER-2026-04-14-0017.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_next_200_candidate_v4.csv
    - artifacts/migration/project_v4_200_write_authorization_packet.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
