  - git restore docs/migration_alignment/project_v4_200_create_only_write_report.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0017.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0017.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
