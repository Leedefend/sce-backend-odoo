  - create-only
  - no-update
  - no-unlink
  - no-workflow-replay
  - no-acl-security-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-14-0016
  user_authorization: "同意授权"
  authorization_packet: artifacts/migration/project_v4_200_write_authorization_packet.json
  batch_size: 200

architecture:
  layer_target: Project Migration Write Batch
  module: project.project v4 200-row create-only write
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch materializes explicitly authorized project business facts from
    the frozen larger migration candidate, without adding presentation semantics.
  reason: >
    The user explicitly authorized execution after the v4 200-row authorization
    packet passed.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0017.yaml
    - python3 -m py_compile scripts/migration/project_v4_200_create_only_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_v4_200_create_only_write.py
    - python3 -m json.tool artifacts/migration/project_v4_200_write_result.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0017.json
    - make verify.native.business_fact.static

