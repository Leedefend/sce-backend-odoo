task_id: ITER-2026-04-01-643
title: Screen next backend usability candidate in business-fact layer after semantic guard stabilization
type: backend
status: active
priority: high
mode: screen

goal: >
  After lifecycle semantic guard stabilization, screen the next backend
  usability candidate and decide whether to operate on business-fact layer.

user_visible_outcome:
  - "下一轮可用性主目标明确"
  - "分层判定继续受控"
  - "避免在已稳定语义线重复低收益改动"

scope:
  allowed_paths:
    - addons/smart_construction_core/services/**
    - addons/smart_construction_core/handlers/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*

limits:
  max_files: 8
  max_candidates: 3
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - screen stage only
  - no implementation
  - must explicitly choose backend_sub_layer_target

context:
  branch: codex/next-round
  baseline_sha: ce01c1c
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-642
  priority_lane: P1_project_lifecycle_usability
  usability_battlefield: backend

architecture:
  layer_target: Backend Usability
  module: next-candidate layer decision screen
  module_owner: smart_construction_core
  kernel_or_scenario: scenario
  backend_sub_layer_target: business_fact
  backend_sub_layer_reason: >
    Semantic orchestration line is guarded; next screen evaluates business-fact usability leverage.
  reason: >
    Continue user-usability-first iteration while preserving enforced backend sub-layer boundary decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-643.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - no_backend_semantic_candidate_remains

deliverables:
  - selected_next_backend_usability_candidate_with_sub_layer
  - governance/report artifacts for ITER-2026-04-01-643

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-643.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-643.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-643.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-642
