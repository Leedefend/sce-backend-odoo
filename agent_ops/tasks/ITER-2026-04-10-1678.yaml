task_id: ITER-2026-04-10-1678
title: focus intent controlled promotion to v2_primary

type: governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  在 allow_v2_candidate=READY 条件下，受控将 session.bootstrap / meta.describe_model /
  ui.contract 从 v2_shadow 提升到 v2_primary，并冻结 rollback-ready 路由快照。

user_visible_outcome:
  - "三条 focus intents 主路由切到 v2_primary，且保留可回退到 v2_shadow 的快照"

scope:
  allowed_paths:
    - artifacts/v2/v2_intent_route_policy_v1.json
    - artifacts/v2/v2_focus_intent_route_policy_rollback_v1.json
    - scripts/verify/v2_focus_intent_promotion_state_machine_audit.py
    - docs/ops/v2_app_governance_gate_usage_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1678.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1678.md
    - agent_ops/state/task_results/ITER-2026-04-10-1678.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 8
  max_output_lines: 1000

change_rules:
  - route policy promotion only for three focus intents
  - keep default_mode and allowed_modes unchanged
  - rollback-ready snapshot must remain v2_shadow for three focus intents
  - no new v2 intent migration

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel independent rebuild layer
  module: smart_core focus-intent controlled promotion
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅调整路由编排策略及回滚快照，不涉及业务事实、权限、财务语义。
  reason: >
    1677 状态机已输出 candidate_ready/promote_to_v2_primary，按主线执行受控提升并固化回滚基线。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1678.yaml"
    - "python3 scripts/verify/v2_dual_track_route_policy_audit.py --json"
    - "python3 scripts/verify/v2_focus_intent_promotion_state_machine_audit.py --json"
    - "python3 scripts/verify/v2_focus_intent_compare_summary.py --json"
    - "python3 scripts/verify/v2_app_governance_gate_audit.py --json"
    - "python3 scripts/verify/v2_app_governance_output_schema_audit.py --json"
    - 'rg -n "session.bootstrap|meta.describe_model|ui.contract|v2_primary" artifacts/v2/v2_intent_route_policy_v1.json'
    - 'rg -n "session.bootstrap|meta.describe_model|ui.contract|v2_shadow" artifacts/v2/v2_focus_intent_route_policy_rollback_v1.json'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - focus-intent route policy promoted to v2_primary with rollback-ready snapshot

rollback:
  - git restore artifacts/v2/v2_intent_route_policy_v1.json artifacts/v2/v2_focus_intent_route_policy_rollback_v1.json scripts/verify/v2_focus_intent_promotion_state_machine_audit.py docs/ops/v2_app_governance_gate_usage_v1.md

depends_on:
  - ITER-2026-04-10-1677
