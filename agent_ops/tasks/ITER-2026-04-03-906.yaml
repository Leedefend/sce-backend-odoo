task_id: ITER-2026-04-03-906
title: Degrade TCP-EPERM diagnostics to allow preflight continuation
type: backend
status: active
priority: high
mode: implement

goal: >
  Prevent connectivity diagnostics from hard-failing immediately on TCP EPERM,
  and continue into login preflight for richer signal classification.

user_visible_outcome:
  - "当 TCP 探针受权限限制时，验收可继续执行登录预检"
  - "输出更完整的连通性与契约失败证据"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - diagnostics_degrade_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-905
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host connectivity diagnostics continuation policy
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch adjusts verification diagnostics policy only and does not alter
    business facts.
  reason: >
    Current host gate stops too early at TCP EPERM; continuing preflight can
    distinguish permission-sandbox noise from real login-contract failures.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-906.yaml
    - HOST_RUNTIME_PROBE_MAX_AGE_SEC=7200 HOST_RUNTIME_PROBE_CACHE_ONLY=1 GATEWAY_BASE_URLS=http://localhost:8069 make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - HOST_RUNTIME_PROBE_MAX_AGE_SEC=7200 HOST_RUNTIME_PROBE_CACHE_ONLY=1 GATEWAY_BASE_URLS=http://localhost:8069 make verify.product.main_entry_convergence.v1

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - diagnostics output marks EPERM as degraded-not-terminal
  - host gate evidence includes post-diagnostics preflight results

rollback:
  - git restore scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
  - git restore agent_ops/tasks/ITER-2026-04-03-906.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-906.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-906.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-905
