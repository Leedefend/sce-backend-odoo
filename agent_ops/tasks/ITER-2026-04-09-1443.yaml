task_id: ITER-2026-04-09-1443
title: scan contract-interpreter boundary overreach candidates
status: active
type: governance
priority: high
mode: scan
batch: 1/1

goal: >
  在契约解释层与业务事实层边界上执行低成本候选扫描，识别可能由解释层改写业务事实的实现位置。

user_visible_outcome:
  - "输出越界候选清单（仅候选，不下结论）"

scope:
  allowed_paths:
    - addons/smart_core/handlers/**
    - addons/smart_core/app_config_engine/services/assemblers/**
    - docs/architecture/**
    - docs/ops/business_admin_config_center_intent_parity_v1.md
    - agent_ops/tasks/ITER-2026-04-09-1443.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1443.md
    - agent_ops/state/task_results/ITER-2026-04-09-1443.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - frontend/**
    - security/**
    - record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 12
  max_candidates: 15
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage execution only
  - scan only find candidates and must not conclude
  - do not run verification commands in scan
  - do not modify code in scan

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true
  usability_battlefield: backend

architecture:
  layer_target: Backend semantic boundary governance
  module: smart_core contract interpreter surface
  module_owner: smart_core backend contract stack
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅扫描解释层输出与业务事实层边界候选，不改业务事实与权限。
  reason: >
    用户明确指出契约解释层越界，需要先形成可验证候选池，再进入 screen 分类与修复。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1443.yaml"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_command_failed
  - forbidden_path_touched
  - stage_boundary_broken
  - scan_limit_exceeded

deliverables:
  - scan candidate list JSON
  - scan stage report and state snapshot

depends_on:
  - ITER-2026-04-09-1442

rollback:
  - "git restore agent_ops/tasks/ITER-2026-04-09-1443.yaml"
  - "git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1443.md"
  - "git restore agent_ops/state/task_results/ITER-2026-04-09-1443.json"
  - "git restore docs/ops/iterations/delivery_context_switch_log_v1.md"
