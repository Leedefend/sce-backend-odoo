task_id: ITER-2026-03-29-260
title: Restore in-page list-kanban switch for project action view
type: feature
status: in_progress
priority: high

goal: Expose kanban as an in-page view switch for project action pages by consuming native action `meta.views` facts, while keeping sidebar navigation unchanged.
user_visible_outcome:
  - project list action page shows a native-style list/kanban switch when the action exposes both modes
  - users can switch from list to kanban within the same action page without requiring a sidebar entry
  - implementation remains generic and uses contract/meta facts instead of model-specific hacks

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - frontend/apps/web/src/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend_contract_consumer_only
  - no_backend_change
  - no_model_specific_hardcode
  - preserve_sidebar_navigation_behavior

architecture:
  layer_target: frontend layer
  module: action view mode exposure for list/kanban switching
  reason: Sidebar navigation is product-menu only. The correct low-risk fix is to expose list/kanban switching inside the same action page by consuming native action multi-view facts.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-260.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - contract_fact_uncertain
  - acceptance_failed

deliverables:
  - generic_action_view_mode_fix
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-260.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore frontend/apps/web/src/app/contracts/actionViewSurfaceContract.ts
  - git restore frontend/apps/web/src/app/runtime/actionViewContractLoadRuntime.ts

depends_on:
  - ITER-2026-03-29-259

notes: "Keep sidebar untouched. Fix only the in-page list/kanban switch by consuming native action multi-view facts."
