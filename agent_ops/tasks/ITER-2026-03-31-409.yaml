task_id: ITER-2026-03-31-409
title: Add customer company and department bootstrap actions to smart_construction_custom
type: implementation
status: completed
priority: high

goal: >
  Add an implementation-ready, manually triggered bootstrap path for customer
  company and department setup inside smart_construction_custom, without
  touching ACL files, manifest dependencies, or automatic install-time data
  mutation.

user_visible_outcome:
  - "模块内可直接触发公司与部门 bootstrap"
  - "bootstrap 逻辑按客户确认的公司与部门基线执行"
  - "不需要修改 security/ACL/manifest 即可进入下一步导入准备"

scope:
  allowed_paths:
    - addons/smart_construction_custom/models/security_policy.py
    - addons/smart_construction_custom/data/security_policy_actions.xml
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/smart_construction_custom/security/**
    - addons/smart_construction_custom/hooks.py
    - addons/smart_construction_custom/__manifest__.py
    - addons/**/security/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive changes only
  - no ACL or record-rule changes
  - no automatic install-time company or department writes
  - bootstrap must be manually triggered and idempotent
  - bootstrap target must use res.company and hr.department already present in the install chain

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Scenario Delivery Bootstrap
  module: smart_construction_custom
  module_owner: customer-specific delivery customization
  kernel_or_scenario: scenario
  reason: >
    The customer structure baseline is frozen, and the next valid low-risk
    implementation step is to add a bootstrap entry for company and department
    creation without changing high-risk security files.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-409.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

