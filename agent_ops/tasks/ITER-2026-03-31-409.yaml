  - updated server action exposure in addons/smart_construction_custom/data/security_policy_actions.xml
  - updated implementation note in addons/smart_construction_custom/README.md
  - report and task result artifacts for ITER-2026-03-31-409
  - delivery log checkpoint with next suggestion

