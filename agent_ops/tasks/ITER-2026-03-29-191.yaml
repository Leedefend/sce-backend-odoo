task_id: ITER-2026-03-29-191
title: Apply contract action gating to ActionView header actions
type: product_task
status: pending
priority: high

goal: Extend contract-based disabled action behavior to ActionView's non-homogeneous header action pipeline, so the remaining major page action surface also respects contract gating.
user_visible_outcome:
  - ActionView header actions obey contract disabled state
  - disabled action reason codes are visible before click on the main action page

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: action view header runtime
  reason: ActionView is the only remaining major page using a different header action pipeline, so it needs a dedicated batch instead of the previous pageGlobalActions bulk pattern.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-191.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-191.yaml frontend/apps/web/src/views/ActionView.vue frontend/apps/web/src/app/action_runtime/useActionViewHeaderRuntime.ts

depends_on:
  - ITER-2026-03-29-190

notes: "Productization batch: close the remaining non-homogeneous header action surface in ActionView."
