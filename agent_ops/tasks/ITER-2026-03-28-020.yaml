task_id: ITER-2026-03-28-020
title: Promote system_init refactor slice artifacts into dirty baseline
type: governance_task
status: pending
priority: high

goal: Canonicalize the approved system_init refactor slice artifacts from iterations 016 to 019 into the dirty baseline so the platform-kernel continuous queue can continue without replaying accepted cumulative diff as repo-level risk.
user_visible_outcome:
  - canonical baseline includes approved 016 to 019 code and evidence artifacts
  - review summary records the accepted refactor delta
  - platform kernel continuous queue can resume after the diff_too_large stop

scope:
  allowed_paths:
    - agent_ops/policies/**
    - agent_ops/tasks/**
    - docs/ops/releases/archive/temp/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: baseline governance for system_init refactor slice artifacts
  reason: Respect stop-on-risk semantics by moving the approved 016 to 019 refactor slice delta into canonical baseline before the continuous runtime-mainline queue continues.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-020.yaml
    - test -f docs/ops/releases/archive/temp/TEMP_system_init_refactor_baseline_review_20260328.md
    - rg -n "approved_paths|system_init_extension_fact_merger.py|ITER-2026-03-28-019" docs/ops/releases/archive/temp/TEMP_system_init_refactor_baseline_review_20260328.md
    - rg -n "addons/smart_core/core/system_init_extension_fact_merger.py" agent_ops/policies/repo_dirty_baseline.yaml
    - rg -n "agent_ops/tasks/ITER-2026-03-28-019.yaml" agent_ops/policies/repo_dirty_baseline.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/policies/repo_dirty_baseline.yaml agent_ops/policies/repo_dirty_baseline.candidate.yaml agent_ops/tasks/ITER-2026-03-28-020.yaml docs/ops/releases/archive/temp/TEMP_system_init_refactor_baseline_review_20260328.md docs/ops/iterations/delivery_context_switch_log_v1.md docs/ops/releases/archive/temp/TEMP_agent_ops_continuous_iteration_status_20260328.md

depends_on:
  - ITER-2026-03-28-019
notes: "Dedicated baseline governance follow-up for the first system_init code slices after diff_too_large."

baseline_governance:
  candidate_required: true
  review_summary_required: true
  canonical_update_requires_dedicated_task: true
