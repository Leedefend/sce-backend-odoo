  - git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1491.md
  - git restore agent_ops/state/task_results/ITER-2026-04-09-1491.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

