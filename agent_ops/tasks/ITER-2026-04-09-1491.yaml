    - agent_ops/state/task_results/ITER-2026-04-09-1491.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - scripts/**
    - frontend/**/security/**

limits:
  max_files: 5
  max_output_lines: 220

change_rules:
  - minimal frontend consumer convergence only
  - no backend contract changes
  - no ACL or business fact changes

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true

architecture:
  layer_target: Frontend contract consumer alignment
  module: ContractFormPage interaction handlers
  module_owner: frontend contract form page
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅强化前端动作入口门控，不改变后端事实与编排输出。
  reason: >
    list/toolbar/kanban 已完成函数层门控，本批补齐 form 关键动作入口，
    统一三类典型视图交互并发控制口径。

acceptance:
