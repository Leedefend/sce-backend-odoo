task_id: ITER-2026-04-01-515
title: Diagnose workflow visibility false-positive and isolate the next true family candidate
type: permission-governance
status: active
priority: medium

goal: >
  Resolve whether the workflow finding from ITER-2026-04-01-514 is a real
  delivered-role residual or a direct-action false-positive, then isolate the
  next true low-risk family candidate without entering implementation.

user_visible_outcome:
  - "厘清 workflow 是否真的是用户可见 residual"
  - "把平台 config-admin 面和客户 secondary family 分开"
  - "收敛出下一条真正值得继续审计的候选家族"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only diagnosis batch
  - no implementation changes
  - distinguish user-visible menu/action surfaces from direct action record readability

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: workflow false-positive diagnosis
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    A follow-up runtime check after ITER-2026-04-01-514 showed workflow menus
    are hidden from PM and finance, so the earlier action-read finding may not
    represent a user-visible residual. The next safe step is to resolve that
    ambiguity before opening any governance fix.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-515.yaml
    - "runtime diagnosis distinguishes true menu/action visibility from direct action-read false positives"
    - "the next true low-risk family candidate is isolated with confidence"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - workflow_visibility_cannot_be_classified_with_confidence
  - diagnosis_requires_acl_or_manifest_changes
  - no_next_candidate_can_be_isolated_without_scope_expansion

deliverables:
  - workflow visibility diagnosis
  - next true family candidate isolation
  - governance/report artifacts for ITER-2026-04-01-515

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-515.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-515.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-515.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-514
