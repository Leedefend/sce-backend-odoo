  layer_target: scene layer
  module: smart_scene scene_resolver + scene_engine
  reason: smart_scene already receives canonical permission_surface, but still does not use it to drive page status or scene contract permissions. This iteration converts that runtime semantic surface into actual scene-layer decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-155.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-155.yaml addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py

