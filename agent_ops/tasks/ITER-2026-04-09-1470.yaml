task_id: ITER-2026-04-09-1470
title: implement page-toolbar active-condition route-preset parity
type: governance-optimization
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  收敛 PageToolbar 当前条件区与路由预设状态的一致性，
  在优化编排模式下让 route preset 进入 active_conditions 汇总口径，
  保证“显示条件”与“清空行为”语义一致。

user_visible_outcome:
  - "当前条件区可见 route preset 状态，且与清空全部条件行为一致"

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/PageToolbar.vue
    - agent_ops/tasks/ITER-2026-04-09-1470.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1470.md
    - agent_ops/state/task_results/ITER-2026-04-09-1470.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - scripts/**
    - frontend/**/security/**

limits:
  max_files: 5
  max_output_lines: 200

change_rules:
  - minimal frontend consumer convergence only
  - no backend contract changes
  - no ACL or business fact changes

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true

architecture:
  layer_target: Frontend contract consumer alignment
  module: PageToolbar active conditions
  module_owner: frontend page toolbar
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅修复前端“状态展示口径”，不改后端语义供给。
  reason: >
    当前 resetActiveConditions 已清除 route preset，但 active_conditions
    汇总未稳定呈现该状态，造成显示与交互语义不一致。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1470.yaml"
    - "rg -n \"routePreset|activeStateChips|preset:\" frontend/apps/web/src/components/page/PageToolbar.vue"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed

deliverables:
  - page-toolbar active-conditions parity patch

rollback:
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1470.md
  - git restore agent_ops/state/task_results/ITER-2026-04-09-1470.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-09-1469
