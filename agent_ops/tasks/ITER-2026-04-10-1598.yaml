user_visible_outcome:
  - "v2 app contract baseline 可回归、可审计"

scope:
  allowed_paths:
    - artifacts/v2/**
    - scripts/verify/v2_*audit.py
    - docs/architecture/backend_core_refactor_blueprint_v1.md
    - docs/architecture/backend_core_v2_rebuild_spec_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1598.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1598.md
    - agent_ops/state/task_results/ITER-2026-04-10-1598.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 12
  max_output_lines: 720

change_rules:
  - v2 independent rebuild only
  - additive snapshot baseline and audit
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
