  module: smart_core v2 app contract snapshot
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅冻结解释层 contract baseline，不涉及业务事实模型变更。
  reason: >
    在连续重构链中增加 snapshot 对照门禁，降低后续 contract 变更不确定性。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1598.yaml"
    - "python3 scripts/verify/v2_app_contract_guard_audit.py --json"
    - "python3 scripts/verify/v2_app_contract_snapshot_audit.py --json"
    - "python3 scripts/verify/v2_rebuild_audit.py --json"
    - 'rg -n "app_contract_snapshot_v1" docs/architecture/backend_core_refactor_blueprint_v1.md'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - v2 app contract snapshot baseline and audit

rollback:
