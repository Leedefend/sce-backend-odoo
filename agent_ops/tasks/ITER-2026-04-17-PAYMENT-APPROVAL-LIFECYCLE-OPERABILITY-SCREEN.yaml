    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-17-PAYMENT-APPROVAL-LIFECYCLE-OPERABILITY-SCREEN.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**
    - migrations/**
    - deploy/**

context:
  branch: codex/next-round
  baseline_sha: 7099a3b
  prior_task: ITER-2026-04-17-DEV-MAIL-SENDER-CONFIG-SYNC

architecture:
  layer_target: Business Flow Verification
  module: smart_construction_core payment lifecycle
  module_owner: construction industry business flow
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The next behavior depends on payment workflow state, tier validation facts,
    and finance manager authority. These are business workflow facts, not
    frontend rendering or scene orchestration semantics.
  reason: >
    Payment submit now succeeds; the next operational question is whether the
    new system can continue through approval and completion.

change_rules:
