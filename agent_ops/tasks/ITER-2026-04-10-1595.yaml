    - "python3 scripts/verify/v2_rebuild_audit.py --json"
    - 'rg -n "class AppAvailabilityPolicyV2|available|degraded|unavailable" addons/smart_core/v2/modules/app'
    - "rg -n \"app availability classification batch\" docs/architecture/backend_core_refactor_blueprint_v1.md"

