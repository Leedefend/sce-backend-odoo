task_id: ITER-2026-03-29-244
title: Render nested notebook containers as detail tabs
type: implementation_task
status: done
priority: high

goal: Fix the frontend detail renderer so notebook containers nested under sheet/group are rendered as tab shells instead of being flattened into sequential sections.
user_visible_outcome:
  - project detail shows Description / Settings / 协作 / 系统 as tabs
  - notebook pages no longer appear as plain sequential blocks under the sheet body

scope:
  allowed_paths:
    - frontend/apps/web/src/**
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**
    - frontend/**/__tests__/**

change_rules:
  - additive_or_minimal_fix_only
  - no_schema_change
  - no_backend_contract_change
  - no_model_specific_frontend_hardcode

architecture:
  layer_target: frontend detail renderer
  module: detailLayoutRuntime nested notebook handling
  reason: The tree consumer now preserves layout hierarchy, but notebook containers nested inside sheet are still flattened because only root-level notebooks are promoted into tab shells.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-244.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - nested_notebook_still_flattened

deliverables:
  - nested_notebook_detail_fix
  - task_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-244.yaml frontend/apps/web/src/app/runtime/detailLayoutRuntime.ts docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-29-243

notes: "Frontend-only batch: promote sheet-nested notebook containers into tab shells."
