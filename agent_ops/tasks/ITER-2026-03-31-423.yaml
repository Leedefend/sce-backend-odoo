task_id: ITER-2026-03-31-423
title: Permit narrow ACL exception for post master-data batch
type: governance
status: active
priority: high

goal: >
  Amend repository execution rules in a narrow, explicit way so the authorized
  post master-data batch may touch the exact `ir.model.access.csv` file needed
  for the new platform-level 岗位 carrier.

user_visible_outcome:
  - "仓库规则允许受控岗位主数据批次修改指定 ACL 文件"
  - "继续保持 record rules、manifest、财务域禁止"

scope:
