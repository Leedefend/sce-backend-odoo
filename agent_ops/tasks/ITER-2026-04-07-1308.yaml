task_id: ITER-2026-04-07-1308
title: Contract Runtime Verification v1 Batch A runtime payload capture
status: active
type: governance
priority: high
mode: execute

goal: >
  Capture real runtime ui.contract payload evidence across six business objects and
  four roles to establish runtime baseline before freeze/consumer comparison batches.

user_visible_outcome:
  - "输出运行时 contract payload 样本（角色 × 对象 × list/form）"
  - "输出 Batch A 运行态抓取报告"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-07-1308.yaml
    - docs/ops/contract_runtime_payload_samples_v1.json
    - docs/ops/contract_runtime_capture_report_v1.md
    - agent_ops/reports/2026-04-07/report.ITER-2026-04-07-1308.md
    - agent_ops/state/task_results/ITER-2026-04-07-1308.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**

limits:
  max_files: 6
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - low-cost-mode
  - batch-a-runtime-capture-only
  - no-business-logic-change
  - no-frontend-permission-patch

context:
  branch: codex/next-round
  explicit_user_authorization: true

architecture:
  layer_target: Contract Runtime Evidence
  module: runtime payload capture
  module_owner: docs/ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene-orchestration layer
  backend_sub_layer_reason: >
    This batch collects runtime contract evidence only and does not modify backend facts.
  reason: >
    Start Contract Runtime Verification v1 with runtime payload capture baseline.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-07-1308.yaml
    - "payload samples cover project/task/budget/cost/payment/settlement"
    - "payload samples cover owner/pm/finance/outsider"
    - "payload samples include list/form and rights/runtime observations"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - runtime_payload_capture_failed

deliverables:
  - runtime payload sample json
  - runtime capture summary report

depends_on:
  - ITER-2026-04-07-1307

rollback:
  - git restore docs/ops/contract_runtime_payload_samples_v1.json
  - git restore docs/ops/contract_runtime_capture_report_v1.md
  - git restore agent_ops/reports/2026-04-07/report.ITER-2026-04-07-1308.md
  - git restore agent_ops/state/task_results/ITER-2026-04-07-1308.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
