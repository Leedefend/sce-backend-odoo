task_id: ITER-2026-03-29-192
title: Audit frontend action-gating coverage across page consumers
type: governance_task
status: pending
priority: high

goal: Add a repo-local audit script that verifies contract-based action gating remains applied across the current frontend page consumers, so productization progress can be checked without manually re-reading each view.
user_visible_outcome:
  - frontend action gating coverage becomes machine-auditable
  - future regressions in page-level contract gating can be detected before product pages drift

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: action-gating coverage audit
  reason: The productization mainline has already landed contract-driven action gating across the major frontend consumers, so the next low-risk batch should convert that coverage into a stable audit capability instead of continuing blind page edits.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-192.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_action_gating_audit.py
    - python3 agent_ops/scripts/frontend_action_gating_audit.py --frontend-dir frontend/apps/web --expect-status PASS --expect-covered-count 12

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - audit_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-192.yaml agent_ops/scripts/frontend_action_gating_audit.py docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-192.md agent_ops/state/task_results/ITER-2026-03-29-192.json

depends_on:
  - ITER-2026-03-29-191

notes: "Governance batch: freeze the current frontend action-gating productization coverage into a repeatable audit entrypoint."
