task_id: ITER-2026-03-29-143
title: Normalize rich base fact metrics in scene ready
type: governance_task
status: pending
priority: high

goal: Make scene ready consumption metrics correctly interpret richer base_fact objects instead of treating any non-empty dict as a hit.
user_visible_outcome:
  - diagnostics and governance metrics no longer overcount unavailable search/action facts when richer fact objects are present

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: backend orchestration
  module: smart_core scene_ready_contract_builder
  reason: 'Scene ready metrics currently use bare truthiness for base_facts, which overcounts richer fact objects like {"available": false}. This iteration normalizes hit detection while staying within the same metrics subsystem.'

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-143.yaml
    - python3 -m py_compile addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_consumption_metrics.py
    - python3 addons/smart_core/tests/test_scene_ready_consumption_metrics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-143.yaml addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_consumption_metrics.py

depends_on:
  - ITER-2026-03-29-142

notes: "Batch acceleration: keep grouped scene-ready metrics alignment going by fixing richer base_fact hit interpretation within the same file."
