task_id: ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN
title: Legacy no-settlement model logic screen
type: business-logic-screen
status: active
priority: high

goal: >
  Locate the new-system business logic that assumes every payment request must
  have a settlement order, and decide the safe adjustment boundary for legacy
  data that has payment/ledger facts but no old settlement facts.

user_visible_outcome:
  - "Prepare the model-logic adjustment path for old payment/ledger facts that cannot be backed by old settlement facts."

scope:
  allowed_paths:
    - docs/ops/business_continuity/legacy_no_settlement_model_logic_screen_v1.md
    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**
    - migrations/**
    - deploy/**

context:
  branch: codex/next-round
  baseline_sha: 1b0f1ff
  prior_task: ITER-2026-04-18-LEGACY-SETTLEMENT-FACT-EXISTENCE-SCREEN

architecture:
  layer_target: Business Logic Verification
  module: payment settlement compliance logic
  module_owner: construction industry business flow
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The decision concerns how payment/ledger facts satisfy compliance when
    settlement facts do not exist in legacy data. This is business truth and
    must be decided in backend business logic, not frontend or orchestration.
  reason: >
    Old data has payment/ledger facts but no old settlement facts. New-system
    validation currently assumes settlement linkage and blocks daily settlement
    submit/approve because historical orphan payments exist.

change_rules:
  - screen only
  - read-only code and database inspection
  - do not modify payment, settlement, account, ACL, frontend, or script code
  - produce explicit implementation boundary for a later high-risk batch

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN.yaml
    - rg -n "SC.VAL.3WAY.001|P0_PAYMENT_SETTLEMENT_NOT_READY|P0_PAYMENT_OVER_BALANCE|settlement_id" addons/smart_construction_core

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - implementation_required_in_payment_or_settlement_code

deliverables:
  - model logic adjustment boundary
  - high-risk implementation batch recommendation

rollback:
  - git restore docs/ops/business_continuity/legacy_no_settlement_model_logic_screen_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN.yaml

depends_on:
  - ITER-2026-04-18-LEGACY-SETTLEMENT-FACT-EXISTENCE-SCREEN
