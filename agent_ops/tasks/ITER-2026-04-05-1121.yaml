task_id: ITER-2026-04-05-1121
title: Six-clause closure recheck evidence scan (scan stage)
type: governance
stage: scan
status: active
priority: high
mode: low_cost

goal: >
  Collect bounded, file-backed evidence candidates for the six boundary
  governance closure clauses, without producing final closure conclusions.

user_visible_outcome:
  - "形成六条治理闭环复核扫描台账（仅证据候选，不定性）"

scope:
  allowed_paths:
    - docs/audit/boundary/six_clause_closure_recheck_scan_2026-04-06.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 36
  max_output_lines: 260
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - scan_only_no_conclusion
  - evidence_must_be_file_backed
  - bounded_target_files_only

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: six_clause_completion_recheck
  priority_lane: governance_low_cost

architecture:
  layer_target: Governance Monitoring
  module: boundary_audit
  module_owner: governance
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: this batch only scans closure evidence and does not implement runtime semantics.
  reason: produce a scan-stage evidence ledger before screen/verify stages.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1121.yaml
    - bash -lc 'test -f docs/audit/boundary/six_clause_closure_recheck_scan_2026-04-06.md && rg -n "Clause-1|Clause-2|Clause-3|Clause-4|Clause-5|Clause-6" docs/audit/boundary/six_clause_closure_recheck_scan_2026-04-06.md'
    - make verify.controller.boundary.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - docs/audit/boundary/six_clause_closure_recheck_scan_2026-04-06.md

rollback:
  - git restore docs/audit/boundary/six_clause_closure_recheck_scan_2026-04-06.md
  - git restore agent_ops/tasks/ITER-2026-04-05-1121.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1121.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1121.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1120
