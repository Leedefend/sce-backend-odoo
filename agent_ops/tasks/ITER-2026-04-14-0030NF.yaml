architecture:
  layer_target: Intent Handler Compatibility
  module: smart_core load_view legacy proxy
  module_owner: addons/smart_core/handlers
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene-orchestration layer
  backend_sub_layer_reason: >
    The batch only normalizes handler result envelope shape for an existing
    compatibility proxy. It does not change business facts.
  reason: >
    load_view calls LoadContractHandler.handle() directly, bypassing
    BaseIntentHandler.run() result adaptation. The proxied result can therefore
    be IntentExecutionResult instead of dict.

