task_id: ITER-2026-03-29-225
title: Polish generic detail hierarchy presentation
type: product_task
status: pending
priority: high

goal: Strengthen the visible hierarchy of generic detail containers so the existing `detail shell -> grouped sections -> fields` structure reads more clearly like a native form body.
user_visible_outcome:
  - detail pages show stronger primary/secondary visual hierarchy
  - grouped sections feel embedded within the main body container instead of looking like another flat card list

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail hierarchy presentation
  reason: The container hierarchy is now present, but the implementation layer still lacks enough visual separation for the body to read like a native form. The next low-risk gain is presentation polish, not new behavior.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-225.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-225.yaml frontend/apps/web/src/pages/ContractFormPage.vue docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-225.md agent_ops/state/task_results/ITER-2026-03-29-225.json

depends_on:
  - ITER-2026-03-29-224

notes: "Keep the batch generic to record-detail routes; do not add model-specific detail templates."
