task_id: ITER-2026-03-30-300
title: Introduce role-split execution model for continuous iteration
type: governance
status: in_progress
priority: high

goal: >
  Make continuous iteration enforceable by splitting responsibilities into
  executor, reporter, and stop-guard roles, even when one agent performs all
  roles sequentially.

user_visible_outcome:
  - continuous iteration no longer depends on one mixed-mode decision path
  - execution and reporting stop stepping on each other
  - stop conditions become the only path to terminal close-out

scope:
  allowed_paths:
    - AGENTS.md
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - governance only
  - no product code changes
  - do not weaken stop conditions or approvals
  - define a sequential role model without requiring multiple physical agents

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Governance Layer
  module: codex continuous-iteration operating model
  module_owner: repo governance
  kernel_or_scenario: kernel
  reason: >
    The remaining failure mode comes from mixing execution, reporting, and stop
    judgment in one behavior loop. A role-split operating model makes the rules
    enforceable.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-300.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - governance_rule_conflicts_with_existing_stop_logic
  - acceptance_failed

deliverables:
  - role_split_execution_model
  - iteration_report

rollback:
  - git restore AGENTS.md docs/ops/codex_workspace_execution_rules.md
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/tasks/ITER-2026-03-30-300.yaml

depends_on:
  - ITER-2026-03-30-298

notes: >
  The model should define executor, reporter, and stop-guard responsibilities,
  and require that terminal close-out is only available through stop-guard.
