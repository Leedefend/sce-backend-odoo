task_id: ITER-2026-03-29-160
title: Drive smart_scene identity from workflow and validation semantics
type: governance_task
status: pending
priority: high

goal: Make smart_scene derive form-like scene identity from canonical workflow_surface and validation_surface when parser view hints are absent.
user_visible_outcome:
  - scene contracts now resolve form-oriented scenes from workflow and validation semantics, not only from parser view_type
  - scene engine now exposes form view_type for workflow/validation-driven scenes when parser hints are missing

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_resolver + scene_engine
  reason: smart_scene already consumes search and permission semantics for identity, but workflow_surface and validation_surface still do not drive core scene identity decisions. This iteration turns those canonical surfaces into form-oriented scene/view decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-160.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-160.yaml addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-159

notes: "Batch acceleration: group workflow and validation semantic identity consumption into one smart_scene resolver iteration."
