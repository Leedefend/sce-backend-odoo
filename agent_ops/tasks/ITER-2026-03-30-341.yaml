task_id: ITER-2026-03-30-341
title: Expose stable and native-preview release-nav metadata for sidebar consumer
type: code
status: in_progress
priority: high

goal: >
  Follow the new native-preview sidebar release mechanism by exposing explicit
  delivery-engine metadata for stable groups and native preview groups, so the
  frontend sidebar can distinguish formal releases from pre-release native
  publication without inferring from labels.

user_visible_outcome:
  - backend release navigation exposes explicit stable versus native-preview metadata
  - frontend consumers can render release groups with clear product semantics
  - no stable menu semantics or permission boundaries change

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/delivery/**
    - addons/smart_core/handlers/**
    - addons/smart_core/tests/**
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - frontend/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

change_rules:
  - backend release-navigation metadata only
  - preserve current additive native-preview publication behavior
  - no permission model change
  - no business fact or financial semantic changes

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Platform Layer
  module: smart_core delivery metadata surface
  module_owner: addons/smart_core/delivery addons/smart_core/handlers
  kernel_or_scenario: kernel
  reason: >
    Native preview publication is now additive in release navigation. The next
    low-risk backend step is to surface explicit group and leaf counts so the
    sidebar consumer can present stable releases and pre-release native menus
    without label-based heuristics.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-341.yaml
    - python3 -m unittest discover -s addons/smart_core/tests -p 'test_delivery_menu_service_native_preview.py'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - release_navigation_meta_regresses

deliverables:
  - explicit release-navigation metadata for stable and native-preview publication
  - updated targeted tests for metadata semantics
  - report and task result artifacts for ITER-2026-03-30-341

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-341.yaml
  - git restore addons/smart_core/delivery/menu_service.py
  - git restore addons/smart_core/delivery/delivery_engine.py
  - git restore addons/smart_core/handlers/system_init.py
  - git restore addons/smart_core/tests/test_delivery_menu_service_native_preview.py
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-341.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-341.json

depends_on:
  - ITER-2026-03-30-340

notes: >
  The metadata must describe publication semantics explicitly and should not
  require any frontend consumer to infer stable versus preview state from group
  labels.
