task_id: ITER-2026-03-30-332
title: Consume optimization composition batch 1 in list toolbar frontend
type: code
status: in_progress
priority: high

goal: >
  Make the frontend list toolbar consume backend optimization composition batch 1
  so section hierarchy and filter prioritization come from backend contract
  instead of fixed frontend templates.

user_visible_outcome:
  - list toolbar section order follows backend toolbar_sections
  - current conditions are rendered through backend active_conditions
  - quick filters follow backend high_frequency_filters
  - advanced filters aggregate remaining filters based on backend advanced_filters

scope:
  allowed_paths:
    - frontend/apps/web/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - consume backend optimization composition batch 1 only
  - no batch action composition changes
  - no guidance changes

context:
  branch: codex/next-round
  baseline_sha: 03bd2ef

architecture:
  layer_target: Frontend Layer
  module: list toolbar contract consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    Backend now exposes optimization_composition batch 1. Frontend must consume
    it so toolbar hierarchy and filter prioritization stop being frontend-owned
    structure.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-332.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - frontend_starts_reinventing_contract_semantics

deliverables:
  - frontend consumption of optimization_composition batch 1
  - updated report and task result artifacts

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-332.yaml
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore frontend/apps/web/src/pages/ListPage.vue
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue

depends_on:
  - ITER-2026-03-30-331

notes: >
  This batch must only consume toolbar_sections, active_conditions,
  high_frequency_filters, and advanced_filters. It must not implement
  batch_actions or guidance.
