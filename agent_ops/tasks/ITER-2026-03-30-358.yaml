title: Move my_work scene-key payload ownership behind smart_construction_scene
type: code
status: in_progress
priority: high

goal: >
  Continue the residual fact-layer cleanup by removing scene-key ownership from
  my_work summary and aggregate payloads in smart_construction_core, letting the
  scene layer interpret or attach scene targets while core keeps only business
  counters, rows, and source facts.

