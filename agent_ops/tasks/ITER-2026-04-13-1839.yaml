task_id: ITER-2026-04-13-1839
title: Contract mapping dry-run and safe slice v1
status: in_progress
type: migration-mapping-dry-run
priority: high
mode: execute

goal: >
  Run a read-only contract mapping dry-run based on tmp/raw/contract/contract.csv,
  existing project migration artifacts, and partner baseline data. Produce a
  conservative first-round safe-slice recommendation without importing data.

user_visible_outcome:
  - "合同数据映射干跑与首轮安全切片建议完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1839.yaml
    - scripts/migration/contract_mapping_dry_run.py
    - artifacts/migration/contract_mapping_dry_run_result_v1.json
    - artifacts/migration/contract_partner_baseline_v1.json
    - docs/migration_alignment/contract_mapping_dry_run_master_v1.md
    - docs/migration_alignment/contract_mapping_project_partner_v1.md
    - docs/migration_alignment/contract_safe_import_slice_proposal_v1.md
    - docs/migration_alignment/contract_mapping_dry_run_report_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1839.md
    - agent_ops/state/task_results/ITER-2026-04-13-1839.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/contract/contract.csv
    - tmp/raw/project/project.csv
    - data/migration_samples/project_sample_v1.csv
    - artifacts/migration/project_create_only_expand_post_write_snapshot_v1.csv
    - artifacts/migration/contract_partner_baseline_v1.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 11
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - read-only-dry-run
  - no-db-write
  - no-orm
  - no-import
  - no-model-view-menu-acl-change
  - no-formal-import-script

context:
  branch: codex/next-round
  baseline_sha: d243d59
  source_file: tmp/raw/contract/contract.csv
  target_model: construction.contract
  project_relation_key: XMID
  partner_text_fields: FBF, CBF

architecture:
  layer_target: Migration Mapping Dry-Run
  module: construction.contract mapping readiness
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Contract mapping concerns business facts: project relation, partner relation,
    contract direction, status, dates, and amount semantics.
  reason: >
    ITER-2026-04-13-1838 blocked direct contract import. This batch provides a
    bounded dry-run to decide whether a small safe contract skeleton slice is
    possible.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1839.yaml
    - python3 -m py_compile scripts/migration/contract_mapping_dry_run.py
    - python3 scripts/migration/contract_mapping_dry_run.py
    - python3 -m json.tool artifacts/migration/contract_mapping_dry_run_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1839.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - orm_used
  - import_script_created
  - direct_import_recommended

deliverables:
  - task contract
  - dry-run script
  - dry-run result artifact
  - mapping master document
  - project and partner mapping document
  - safe import slice proposal
  - dry-run report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1838

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1839.yaml
  - git restore scripts/migration/contract_mapping_dry_run.py
  - git restore artifacts/migration/contract_mapping_dry_run_result_v1.json
  - git restore artifacts/migration/contract_partner_baseline_v1.json
  - git restore docs/migration_alignment/contract_mapping_dry_run_master_v1.md
  - git restore docs/migration_alignment/contract_mapping_project_partner_v1.md
  - git restore docs/migration_alignment/contract_safe_import_slice_proposal_v1.md
  - git restore docs/migration_alignment/contract_mapping_dry_run_report_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1839.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1839.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
