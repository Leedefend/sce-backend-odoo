task_id: ITER-2026-04-05-1143
title: Connect contribution providers to full capability metadata and verify query-path parity
type: implementation
status: active
priority: high
mode: execute

goal: >
  Connect real contribution providers to emit full platformized capability
  metadata (ownership/binding/release/policy/runtime/audit) while keeping legacy
  compatibility path, then verify parity between v1/v2 capability capture paths.

user_visible_outcome:
  - "行业 contribution 已输出完整平台能力元数据，且 v1/v2 查询路径结果对齐"

scope:
  allowed_paths:
    - addons/smart_construction_core/core_extension.py
    - addons/smart_core/core/capability_contribution_loader.py
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - artifacts/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 10
  max_candidates: 12
  max_output_lines: 320
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - additive_provider_mapping
  - keep_legacy_compatibility

context:
  branch: codex/next-round
  baseline_sha: da08944
  explicit_user_authorization: true
  input_from: user_approved_1143
  priority_lane: platformization

architecture:
  layer_target: Platform Layer
  module: capability_contribution_pipeline
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: unify capability semantic supply and runtime query path behavior.
  reason: bridge provider output to new model while preserving stable runtime path.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1143.yaml
    - python3 -m py_compile addons/smart_construction_core/core_extension.py addons/smart_core/core/capability_contribution_loader.py
    - rg -n "ownership|binding|permission|release|lifecycle|runtime|audit" addons/smart_construction_core/core_extension.py
    - rg -n "identity|ownership|binding" addons/smart_core/core/capability_contribution_loader.py
    - E2E_BASE_URL=http://127.0.0.1:18069 E2E_DB=sc_prod_sim E2E_LOGIN=admin E2E_PASSWORD=admin python3 scripts/verify/capability_payload_real_env_capture.py --out-dir artifacts/capability_payload_capture_1143 --request-timeout-sec 8 --require-lane-ready
    - python3 -c "import json; p='artifacts/capability_payload_capture_1143/latest/capture_report.json'; o=json.load(open(p,'r',encoding='utf-8')); assert o.get('env_status')=='trusted'; diff=json.load(open(o['diff_report'],'r',encoding='utf-8')); assert diff.get('summary',{}).get('v1_count',0)>=1; assert diff.get('summary',{}).get('v1_count',0)==diff.get('summary',{}).get('v2_count',0); print('parity_ok', diff.get('summary'))"
    - make verify.controller.boundary.guard

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_construction_core/core_extension.py
  - addons/smart_core/core/capability_contribution_loader.py

rollback:
  - git restore addons/smart_construction_core/core_extension.py
  - git restore addons/smart_core/core/capability_contribution_loader.py
  - git restore agent_ops/tasks/ITER-2026-04-05-1143.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1143.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1143.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1142
