    - frontend/apps/web/src/components/template/DetailShellLayout.vue
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1781.md
    - agent_ops/state/task_results/ITER-2026-04-10-1781.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

