goal: >
  当用户仍感知不到页面结构时，强制显示分组/页签标题与分区边界，
  确保 form 结构可视化可感知。

user_visible_outcome:
  - "详情页可见分组标题（含兜底标题）"
  - "页签标签稳定可见（含兜底编号）"
  - "结构分区边界可见，不再整页平铺"

scope:
