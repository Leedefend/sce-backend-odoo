task_id: ITER-2026-03-30-285
title: Deduplicate list search metadata toolbar hints
type: feature
status: in_progress
priority: medium

goal: >
  Reduce duplicate metadata noise on the list toolbar by preventing searchable-field
  hints from repeating dimensions that are already represented by native searchpanel
  facets.

user_visible_outcome:
  - list toolbar stays informative without becoming repetitive
  - search metadata display is more compact and readable

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only refinement
  - no backend contract changes
  - prefer deduplication over new UI blocks

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: list metadata consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Recent list metadata batches surfaced more native facts, but some dimensions may
    now appear twice across searchpanel and searchable-field hints.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-285.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - metadata_dedup_rule_unclear

deliverables:
  - deduplicated_list_metadata_hints
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-285.yaml
  - git restore frontend/apps/web/src/views/ActionView.vue

depends_on:
  - ITER-2026-03-30-284

notes: >
  Dedup based on field keys first, then label text, while preserving searchpanel
  visibility as the stronger native faceted signal.
