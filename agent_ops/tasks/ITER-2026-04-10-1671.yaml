task_id: ITER-2026-04-10-1671
title: v2 intent migration freeze guard

type: governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  冻结当前阶段 v2 intent 迁移面，阻止新增迁移继续扩散，
  将主线强制切换到双轨对比与场景装配。

user_visible_outcome:
  - "新增 v2 intent 迁移将被门禁直接拦截并给出冻结提示"

scope:
  allowed_paths:
    - scripts/verify/v2_intent_migration_freeze_audit.py
    - artifacts/v2/v2_intent_migration_freeze_v1.json
    - scripts/verify/v2_app_governance_gate_audit.py
    - artifacts/v2/v2_app_governance_output_schema_v1.json
    - docs/ops/v2_app_governance_gate_usage_v1.md
    - Makefile
    - agent_ops/tasks/ITER-2026-04-10-1671.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1671.md
    - agent_ops/state/task_results/ITER-2026-04-10-1671.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 10
  max_output_lines: 1200

change_rules:
  - freeze guard only, no new v2 intent migration
  - keep historical migrated intents as baseline, only block newly added ones
  - stage focus intents are session.bootstrap/meta.describe_model/ui.contract

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel independent rebuild layer
  module: smart_core v2 migration freeze governance
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只治理迁移节奏和门禁策略，不改变业务事实模型或权限语义。
  reason: >
    避免 Codex 持续无脑扩 intent，确保研发节奏回到双轨对比主线。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1671.yaml"
    - "python3 scripts/verify/v2_intent_migration_freeze_audit.py --json"
    - "python3 scripts/verify/v2_app_governance_gate_audit.py --json"
    - "python3 scripts/verify/v2_app_governance_output_schema_audit.py --json"
    - "python3 -m py_compile scripts/verify/v2_intent_migration_freeze_audit.py scripts/verify/v2_app_governance_gate_audit.py"
    - 'rg -n "v2_intent_migration_freeze_audit.py|verify.v2.intent_migration_freeze" scripts/verify/v2_app_governance_gate_audit.py artifacts/v2/v2_app_governance_output_schema_v1.json docs/ops/v2_app_governance_gate_usage_v1.md Makefile'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - v2 intent migration freeze guard integrated into governance chain

rollback:
  - git restore scripts/verify/v2_intent_migration_freeze_audit.py artifacts/v2/v2_intent_migration_freeze_v1.json scripts/verify/v2_app_governance_gate_audit.py artifacts/v2/v2_app_governance_output_schema_v1.json docs/ops/v2_app_governance_gate_usage_v1.md Makefile

depends_on:
  - ITER-2026-04-10-1670
