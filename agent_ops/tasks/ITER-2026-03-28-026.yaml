task_id: ITER-2026-03-28-026
title: Classify and submit current autonomous iteration changes in grouped commits
type: governance_task
status: pending
priority: medium

goal: Reduce current worktree sprawl by grouping reviewed autonomous-iteration changes into coherent local commits with clear rollback boundaries.
user_visible_outcome:
  - agent_ops governance system is committed as an isolated baseline
  - runtime/mainline convergence code is committed separately from governance scaffolding
  - verification and architecture alignment artifacts are committed with clear semantic grouping

scope:
  allowed_paths:
    - AGENTS.md
    - Makefile
    - addons/smart_core/**
    - agent_ops/**
    - docs/architecture/**
    - docs/ops/iterations/**
    - docs/ops/releases/archive/temp/**
    - docs/product/construction_enterprise_management_system_product_design_v2.md
    - scripts/verify/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance Layer
  module: agent_ops commit grouping and submission
  reason: Submit the reviewed continuous-iteration work in bounded commits before opening the next baseline-governance slice.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-026.yaml
    - git status --short
    - git log --oneline -n 5

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git revert --no-edit HEAD~2..HEAD

depends_on:
  - ITER-2026-03-28-025
notes: "Only commit reviewed iteration files; leave unrelated local scratch files uncommitted."
