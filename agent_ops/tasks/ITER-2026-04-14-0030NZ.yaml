task_id: ITER-2026-04-14-0030NZ
title: Project member duplicate-relation neutral bounded write v1
status: completed
type: migration-neutral-carrier-bounded-write
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030NY

goal: >
  Write the 500-row duplicate-relation evidence slice into
  sc.project.member.staging as neutral migration evidence only.

user_visible_outcome:
  - "将 500 行重复 project/user 历史成员证据安全写入 neutral carrier，保持责任和权限语义不变"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030NZ.yaml
    - scripts/migration/project_member_duplicate_relation_neutral_500_write.py
    - artifacts/migration/project_member_duplicate_relation_500_pre_visibility_v1.json
    - artifacts/migration/project_member_duplicate_relation_500_post_visibility_v1.json
    - artifacts/migration/project_member_duplicate_relation_500_write_result_v1.json
    - artifacts/migration/project_member_duplicate_relation_500_rollback_targets_v1.csv
    - docs/migration_alignment/project_member_duplicate_relation_500_write_report_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030NZ.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030NZ.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_duplicate_relation_write_gate_v1.json
    - artifacts/migration/project_member_neutral_expansion_duplicate_relation_evidence_slice_v1.csv
    - artifacts/migration/project_member_duplicate_relation_rollback_plan_v1.csv
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 10
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - bounded-write
  - neutral-carrier-only
  - no-model-change
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - duplicate-relation-evidence-only
  - rollback-target-required

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: project_member
  upstream_tasks:
    - ITER-2026-04-14-0030N
    - ITER-2026-04-14-0030NX
    - ITER-2026-04-14-0030NY
  execution_authorization: "user granted migration authorization; 0030NY gate passed for 500-row duplicate evidence slice"

architecture:
  layer_target: Project Member Neutral Migration Carrier Bounded Write
  module: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  module_owner: migration importer execution
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The write stores legacy duplicate relation evidence as neutral migration
    facts. It does not create responsibility, permission, approval, or UI
    semantics.
  reason: >
    0030NY validated the 500-row duplicate relation evidence slice and rollback
    plan. Bounded write can now preserve these legacy facts in the neutral
    carrier without touching project.responsibility.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030NZ.yaml
    - python3 -m py_compile scripts/migration/project_member_duplicate_relation_neutral_500_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_duplicate_relation_neutral_500_write.py
    - python3 -m json.tool artifacts/migration/project_member_duplicate_relation_500_write_result_v1.json
    - test -s artifacts/migration/project_member_duplicate_relation_500_rollback_targets_v1.csv

risk:
  level: medium
  manual_approval_required: false

rollback:
  - "Delete only sc.project.member.staging rows with import_batch = ITER-2026-04-14-0030NZ and neutral_id in project_member_duplicate_relation_500_rollback_targets_v1.csv."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - project_responsibility_write_attempted
  - role_key_fabrication_attempted
  - project_visibility_changed
  - rollback_target_missing
  - neutral_carrier_wired_to_business_logic

deliverables:
  - task contract
  - bounded write script
  - visibility snapshots
  - write result json
  - rollback target csv
  - write report doc
  - iteration report
