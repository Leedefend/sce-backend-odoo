task_id: ITER-2026-04-01-519
title: Select and audit the first representative config-admin governance family
type: permission-governance
status: active
priority: medium

goal: >
  Start the new config-admin governance objective by selecting the first
  representative low-risk platform-governance family, then classify its
  repository/runtime boundary.

user_visible_outcome:
  - "打开 config_admin / 平台治理面 主线"
  - "选出第一条代表性平台治理家族"
  - "明确该家族的菜单、action 与模型权限边界是否 clean"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first governance batch
  - implementation changes are out of scope unless a later narrow batch is opened
  - prefer a platform-governance family with clear config-admin ownership and no financial side effects

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Platform Governance Acceptance
  module: first representative config-admin family audit
  module_owner: platform governance surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-518 closed the delivered-role secondary-family objective
    and the owner redirected the work to the config-admin governance surface.
    The next safe step is to select the first representative platform-governance family.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-519.yaml
    - "repository audit identifies the first representative config-admin family and its role boundaries"
    - "runtime audit classifies at least one representative governance entrypoint without high-risk side effects"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - candidate_family_requires_acl_or_manifest_changes
  - runtime_cannot_classify_the_candidate_with_confidence
  - selected_family_crosses_into_financial_domain

deliverables:
  - first representative config-admin family classification
  - governance/report artifacts for ITER-2026-04-01-519

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-519.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-519.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-519.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-518
