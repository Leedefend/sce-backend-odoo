task_id: ITER-2026-03-31-388
title: Audit consistency between business facts and custom frontend surfaces
type: audit
status: in_progress
priority: high

goal: >
  Verify that the currently accepted custom frontend supplement surfaces are
  semantically consistent with the underlying industry business-fact layer,
  including source facts, route targets, labels, and minimal user-visible
  workflow meaning.

user_visible_outcome:
  - "明确哪些自定义前端页面已经与业务事实一致"
  - "明确哪些页面仍存在事实-前端语义偏差或跳转偏差"
  - "输出下一步应修的最小不一致项"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit only; do not modify frontend or backend code in this batch
  - judge consistency using business fact source, scene/publication anchor, and custom frontend surface together
  - evaluate only the currently active custom supplement surfaces:
    - workbench
    - lifecycle dashboard
    - capability matrix

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Governance Audit
  module: fact to custom frontend consistency
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The previous chain only confirmed that custom surfaces exist and are usable.
    The next low-risk step is to verify whether those surfaces are still aligned
    with the underlying business-fact layer rather than drifting into pure UI
    substitutes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-388.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - consistency_scope_unclear
  - business_fact_anchor_unverifiable

deliverables:
  - explicit consistency decision for each active custom supplement surface
  - report and task result artifacts for ITER-2026-03-31-388
  - delivery log checkpoint with the next active line

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-388.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-388.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-388.json

depends_on:
  - ITER-2026-03-30-387
