task_id: ITER-2026-03-28-013
title: Select representative slice for runtime mainline convergence
type: governance_task
status: pending
priority: high

goal: Select the first representative runtime slice for code convergence and record the choice, rationale, risks, and verification entrypoints.
user_visible_outcome:
