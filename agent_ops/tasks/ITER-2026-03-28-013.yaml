    - docs/architecture/**
    - agent_ops/tasks/**
    - agent_ops/queue/**
    - docs/ops/iterations/**
    - docs/ops/releases/archive/temp/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Platform Layer
  module: docs/architecture representative slice selection
  reason: Freeze the first runtime-mainline convergence slice so the next batch can move from planning into a narrow implementation target.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-013.yaml
    - test -f docs/architecture/runtime_representative_slice_selection_v1.md
    - rg -n "Selected Slice|Why This Slice|Risks|Verification Entry Points" docs/architecture/runtime_representative_slice_selection_v1.md

risk:
  level: low
  manual_approval_required: false

