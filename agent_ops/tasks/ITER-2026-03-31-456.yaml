task_id: ITER-2026-03-31-456
title: Align Sichuan Baosheng customer user default language to zh_CN via install-time data upgrade
type: implementation
status: active
priority: medium

goal: >
  Ensure the Sichuan Baosheng customer users provisioned by
  smart_construction_custom default to Chinese by fixing the install-time data
  loading path and upgrading sc_odoo so the user language is reproducible by
  module data rather than manual edits.

user_visible_outcome:
  - "四川保盛客户用户默认语言统一为中文"
  - "通过升级 smart_construction_custom 即可重复修正语言"
  - "语言设置继续由模块数据文件承载"

scope:
  allowed_paths:
    - addons/smart_construction_custom/__manifest__.py
    - addons/smart_construction_custom/data/**
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/smart_construction_core/security/**
    - addons/smart_enterprise_base/security/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive changes only
  - keep customer user language sourced from install-time XML data
  - do not modify ACL, record rules, or financial semantics

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
  layer_target: Customer Delivery Seed Reproducibility
  module: smart_construction_custom
  module_owner: customer delivery chain
  kernel_or_scenario: scenario
  reason: >
    The user reported that the current default language for the Sichuan
    Baosheng users does not match reality. The correction must remain in the
    module data files so that future upgrades and fresh installs reproduce the
    Chinese default language automatically.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-456.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo
    - runtime SQL audit confirms Sichuan Baosheng customer users default to zh_CN in sc_odoo

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - customer_user_language_cannot_be_corrected_with_certainty
  - smart_construction_custom_upgrade_fails_on_sc_odoo

deliverables:
  - corrected install-time language data behavior for Sichuan Baosheng users
  - implementation/report/result artifacts for ITER-2026-03-31-456

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo`
  - git restore addons/smart_construction_custom/__manifest__.py
  - git restore addons/smart_construction_custom/data
  - git restore addons/smart_construction_custom/README.md
  - git restore agent_ops/tasks/ITER-2026-03-31-456.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-456.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-456.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-455
