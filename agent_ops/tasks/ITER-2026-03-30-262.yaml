task_id: ITER-2026-03-30-262
title: Restore in-page list-kanban switch on project action route
type: feature
status: in_progress
priority: high

goal: Restore the native-feeling list/kanban switch on the actual product list path by fixing ActionView's view-mode filtering on the menu->action route.
user_visible_outcome:
  - project list page shows `列表 / 看板` switch inside the page
  - sidebar remains unchanged
  - change targets the real menu->action render chain instead of scene-only paths

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - frontend/apps/web/src/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend_only
  - no_sidebar_nav_change
  - no_backend_contract_change
  - target_real_action_route

architecture:
  layer_target: frontend layer
  module: ActionView view-mode filtering on product list action route
  reason: Live action 449 already exposes tree+kanban, but ActionView filters tree out when native runtime is recommended, collapsing the visible switch to a single mode.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-262.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - action_route_switch_still_collapses
  - acceptance_failed

deliverables:
  - action_view_list_kanban_switch_fix
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-262.yaml
  - git restore frontend/apps/web/src/views/ActionView.vue

depends_on:
  - ITER-2026-03-29-260
  - ITER-2026-03-29-261

notes: "Fix the real product path: MenuView redirects to ActionView, so the switch must remain visible there when tree and kanban are both available."
