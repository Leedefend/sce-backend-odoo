task_id: ITER-2026-04-18-SETTLEMENT-OPTIONAL-BACKEND-IMPLEMENTATION
title: Settlement optional backend implementation
type: high-risk-business-logic-implementation
status: pass_with_risk
priority: high

goal: >
  Implement owner-approved optional settlement semantics: payment requests may
  proceed without settlement when the user does not select a settlement order,
  while all settlement checks remain strict when settlement is selected.

user_visible_outcome:
  - "Payment can continue daily operation with or without settlement according to actual business facts."

scope:
  allowed_paths:
    - addons/smart_construction_core/models/core/payment_request.py
    - addons/smart_construction_core/models/core/payment_ledger.py
    - addons/smart_construction_core/models/core/settlement_order.py
    - addons/smart_construction_core/tools/validator/rule_3way_link_integrity.py
    - addons/smart_construction_core/tests/test_smoke_validator.py
    - docs/ops/business_continuity/settlement_optional_backend_implementation_v1.md
    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BACKEND-IMPLEMENTATION.yaml
  forbidden_paths:
    - security/**
    - record_rules/**
    - ir.model.access.csv
    - __manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**
    - addons/**/models/**/*account*

context:
  branch: codex/next-round
  baseline_sha: 8ebfd01
  prior_task: ITER-2026-04-18-SETTLEMENT-OPTIONAL-BUSINESS-LOGIC-DECISION
  user_authorization: >
    User explicitly agreed with the optional settlement judgment and requested
    immediate execution. User then explicitly authorized this high-risk
    payment/settlement semantics modification.

architecture:
  layer_target: Business Fact Layer
  module: smart_construction_core payment and settlement lifecycle
  module_owner: construction industry business flow
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Optional settlement is business truth. It changes payment/settlement
    lifecycle validation semantics and must remain in backend business logic.
  reason: >
    Legacy and current business facts prove settlement orders are not always a
    real prerequisite. The new system must support user-selected settlement
    linkage without weakening settlement checks when selected.

change_rules:
  - keep settlement strict when settlement_id exists
  - allow payment submit/approval without settlement_id when other payment facts pass
  - allow ledger registration for approved payment requests without settlement_id
  - scope settlement submit/approve validation to target settlement records
  - do not change accounting, ACL, record rules, manifests, frontend, or migrations

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BACKEND-IMPLEMENTATION.yaml
    - python3 - <<'PY' temp py_compile into /tmp/codex_py_compile_optional_settlement PY
    - targeted rollback-only optional settlement Odoo shell verification
    - DB_NAME=sc_demo make odoo.shell.exec
    - DB_NAME=sc_demo make verify.payment_fact_consistency.v1
    - DB_NAME=sc_demo make verify.settlement_evidence_guard

risk:
  level: high
  manual_approval_required: true
  explicit_user_authorization: >
    User explicitly authorized this dedicated high-risk optional-settlement
    payment/settlement semantics batch.

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - scope_expands_beyond_optional_settlement_semantics

deliverables:
  - optional settlement backend implementation
  - rollback-only daily payment flow verification with no settlement
  - rollback-only settlement-selected flow verification
  - environment gate risk classification

rollback:
  - git restore addons/smart_construction_core/models/core/payment_request.py addons/smart_construction_core/models/core/payment_ledger.py addons/smart_construction_core/models/core/settlement_order.py addons/smart_construction_core/tools/validator/rule_3way_link_integrity.py docs/ops/business_continuity/settlement_optional_backend_implementation_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BACKEND-IMPLEMENTATION.yaml

