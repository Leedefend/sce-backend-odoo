task_id: ITER-2026-04-14-0030ZB
title: Project member consolidated pair readonly projection v1
status: completed
type: migration-readonly-projection
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030ZA

goal: >
  Build a readonly consolidated project/user pair projection from the current
  project_member neutral carrier evidence rows for human review and future
  responsibility promotion decisions.

user_visible_outcome:
  - "将 534 条 evidence rows 转化为 362 条可审阅、可判断、可治理的 project-user pair"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030ZB.yaml
    - scripts/migration/project_member_consolidated_pair_projection.py
    - artifacts/migration/project_member_consolidated_pairs_v1.json
    - artifacts/migration/project_member_consolidated_pairs_v1.csv
    - artifacts/migration/project_member_consolidated_summary_v1.json
    - docs/migration_alignment/project_member_consolidated_pair_projection_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030ZB.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030ZB.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_neutral_pair_consolidation_profile_v1.json
    - docs/migration_alignment/project_member_neutral_pair_consolidation_v1.md
    - docs/migration_alignment/project_member_neutral_to_responsibility_promotion_gate_v1.md
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-projection-only
  - no-db-write
  - no-neutral-evidence-write
  - no-neutral-evidence-delete
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication

architecture:
  layer_target: Migration Evidence Consolidated Pair Projection
  module: project_member neutral carrier consolidated pair projection
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch derives readonly governance data from neutral membership evidence.
    It does not create responsibility, permission, approval, or UI semantics.
  reason: >
    0030ZA froze pair consolidation rules. 0030ZB materializes those rules as
    JSON and CSV artifacts for review and later promotion candidate screening.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030ZB.yaml
    - python3 -m py_compile scripts/migration/project_member_consolidated_pair_projection.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_consolidated_pair_projection.py
    - python3 -m json.tool artifacts/migration/project_member_consolidated_pairs_v1.json
    - python3 -m json.tool artifacts/migration/project_member_consolidated_summary_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

rollback:
  - "No database rollback required because this batch is readonly."
  - "Delete generated 0030ZB JSON/CSV artifacts if the projection must be regenerated."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_detected
  - pair_count_not_362
  - missing_required_projection_field
  - project_responsibility_or_record_rule_change_required

deliverables:
  - task contract
  - readonly consolidated pair projection script
  - consolidated pair json
  - consolidated pair csv
  - consolidated summary json
  - projection documentation
  - iteration report
  - task result json
