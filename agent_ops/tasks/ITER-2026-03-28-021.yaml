task_id: ITER-2026-03-28-021
title: Serialize run_iteration state writes with repository lock
type: bugfix_task
status: pending
priority: medium

goal: Prevent concurrent run_iteration executions from racing on shared state files such as last_run.json and iteration_cursor.json by adding a repository-scoped execution lock.
user_visible_outcome:
  - concurrent run_iteration invocations no longer corrupt shared iteration state
  - continuous queue execution is safer after the observed 016 to 018 race
  - iteration state remains deterministic even if operators start overlapping runs by mistake

scope:
  allowed_paths:
    - agent_ops/scripts/**
    - agent_ops/tasks/**
    - agent_ops/queue/**
    - docs/ops/iterations/**
    - docs/ops/releases/archive/temp/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: agent_ops execution control
  reason: Harden the continuous iteration executor after observing that parallel run_iteration invocations can race on shared state files and produce inconsistent task classification/report evidence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-021.yaml
    - bash -n agent_ops/scripts/run_iteration.sh
    - rg -n "run_iteration.lock|flock" agent_ops/scripts/run_iteration.sh

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/scripts/run_iteration.sh agent_ops/tasks/ITER-2026-03-28-021.yaml agent_ops/queue/platform_kernel_refactor_prep_queue.yaml docs/ops/iterations/delivery_context_switch_log_v1.md docs/ops/releases/archive/temp/TEMP_agent_ops_continuous_iteration_status_20260328.md

depends_on:
  - ITER-2026-03-28-020
notes: "Execution-control hardening after the observed shared-state race."
