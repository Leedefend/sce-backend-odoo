scope:
  allowed_paths:
    - artifacts/architecture/envelope_consistency_audit_v1.json
    - artifacts/architecture/envelope_candidate_screen_v1.json
    - docs/architecture/envelope_candidate_screen_v1.md
    - agent_ops/tasks/ITER-2026-04-09-1538.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1538.md
    - agent_ops/state/task_results/ITER-2026-04-09-1538.json
