    仅做治理分类，不改变业务事实和运行时代码。
  reason: >
    PASS_WITH_RISK 后必须先 screen 分类再实施，避免跨阶段推理。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1538.yaml"
    - "python3 - <<'PY'\nimport json\nobj=json.load(open('artifacts/architecture/envelope_candidate_screen_v1.json','r',encoding='utf-8'))\nassert obj['status']=='PASS'\nassert obj['summary']['candidate_count']==9\nprint('screen artifact PASS')\nPY"
    - "rg -n \"Tier-1|Tier-2|Tier-3|next_batch\" docs/architecture/envelope_candidate_screen_v1.md"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - classification_uncertainty

deliverables:
  - envelope candidate screen classification

rollback:
  - git restore artifacts/architecture/envelope_candidate_screen_v1.json docs/architecture/envelope_candidate_screen_v1.md

depends_on:
  - ITER-2026-04-09-1537
