  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 7
  max_output_lines: 320

change_rules:
  - screen stage only
  - classify from existing audit artifact only
  - no repository re-scan
  - no implementation changes

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
