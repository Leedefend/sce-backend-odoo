task_id: ITER-2026-03-30-275
title: Clarify full execution authorization on allowed branches
type: governance
status: in_progress
priority: high

goal: >
  Clarify that inside repository-allowed feature branches, Codex may execute the full
  low-risk continuous-iteration workflow without repeatedly pausing for redundant
  authorization, while still respecting architecture, path, and verification stop gates.

user_visible_outcome:
  - execution authorization is explicit on allowed branches
  - continuous iteration no longer stalls on repeated redundant pauses
  - safety boundaries remain unchanged and auditable

scope:
  allowed_paths:
    - AGENTS.md
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - docs and governance only
  - no product code changes
  - no contract shape changes
  - authorization wording must stay scoped to allowed branches and allowed tasks
  - stop conditions and safety gates must remain stronger than autonomy wording

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Governance Layer
  module: codex execution policy
  module_owner: repo governance
  kernel_or_scenario: kernel
  reason: >
    Continuous iteration still loses efficiency when authorization boundaries are implied
    instead of explicitly codified for legal branches.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-275.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - authorization_scope_expands_beyond_allowed_branches
  - safety_gates_weakened
  - acceptance_failed

deliverables:
  - updated_governance_rules
  - iteration_report

rollback:
  - git restore AGENTS.md docs/ops/codex_execution_allowlist.md docs/ops/codex_workspace_execution_rules.md
  - git restore agent_ops/tasks/ITER-2026-03-30-275.yaml

depends_on:
  - ITER-2026-03-30-274

notes: >
  "Full authorization" here means full low-risk execution authority inside allowed
  branches and task boundaries, not bypassing approvals for forbidden, destructive, or
  out-of-scope actions.
