task_id: ITER-2026-04-01-571
title: Align primary-toolbar search rendering with optimization visibility under P1 usability priority
type: frontend
status: active
priority: high

goal: >
  Align primary-toolbar search rendering with optimization composition visibility
  so the native list toolbar does not present a misleading search affordance
  when the search section is intentionally hidden.

user_visible_outcome:
  - "search section 被隐藏时，主工具栏不再错误展示搜索输入"
  - "search 与 sort 的显隐语义保持一致"
  - "继续聚焦 native list 主链可用性，而不是显示层润色"

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/PageToolbar.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/api/**
    - frontend/apps/web/src/stores/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - bounded P1 usability implementation
  - no backend contract change
  - limit changes to primary-toolbar search visibility gating

context:
  branch: codex/next-round
  baseline_sha: ed77101
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-570
  priority_lane: P1_core_usability

architecture:
  layer_target: Frontend Layer
  module: primary-toolbar search visibility gating
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Search affordance is part of the list mainline. If optimization composition
    hides the search section but the toolbar still renders a search input, the
    user receives a misleading continuation path.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-571.yaml
    - pnpm -C frontend/apps/web typecheck:strict
    - make verify.portal.v0_5.container

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - trusted_container_verify_failed
  - search_visibility_fix_requires_broader_toolbar_redesign

deliverables:
  - bounded_primary_toolbar_search_visibility_fix
  - governance/report artifacts for ITER-2026-04-01-571

