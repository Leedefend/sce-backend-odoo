    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Platform Layer
  module: smart_core load_contract mainline entry context
  reason: Reduce transitional handler-owned menu/action parsing by moving model and default view inference into a reusable platform helper ahead of further load_contract mainline convergence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-031.yaml
