task_id: ITER-2026-04-02-858
title: Remove raw business semantic literals from frontend sources
type: frontend
status: active
priority: high
mode: implement

goal: >
  Eliminate raw business semantic string literals from frontend sources by
  routing them through baseline constants, preserving generic frontend boundary.

user_visible_outcome:
  - "前端零业务语义门禁恢复通过"
  - "创建到管理闭环发布准备门禁可持续通过"

scope:
