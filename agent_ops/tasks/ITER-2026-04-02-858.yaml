  - git restore frontend/apps/web/src/router/index.ts
  - git restore frontend/apps/web/src/views/ProjectManagementDashboardView.vue
  - git restore frontend/apps/web/src/views/ReleaseProductEntryView.vue
  - git restore agent_ops/tasks/ITER-2026-04-02-858.yaml
  - git restore agent_ops/reports/2026-04-02/report.ITER-2026-04-02-858.md
  - git restore agent_ops/state/task_results/ITER-2026-04-02-858.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-02-857
