    - frontend/apps/web/src/app/projectCreationBaseline.ts
    - frontend/apps/web/src/router/index.ts
    - frontend/apps/web/src/views/ProjectManagementDashboardView.vue
    - frontend/apps/web/src/views/ReleaseProductEntryView.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - additive_only
  - frontend_contract_consumer_only
  - no_frontend_business_semantic_inference

context:
  branch: codex/next-round
  baseline_sha: 8cbe195
  explicit_user_authorization: true
  input_from: ITER-2026-04-02-857
  priority_lane: usability_verification_mainline
  usability_battlefield: cross_stack_custom_frontend

architecture:
  layer_target: Frontend Contract Consumer
  module: router and dashboard/release entry views
  module_owner: frontend web app
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Frontend should consume backend semantics through centralized constants and
    contract shapes, not raw business literals.
  reason: >
    Enforce architecture boundary and unblock release prepared gate.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-02-858.yaml
    - make verify.frontend.zero_business_semantics
    - make verify.release.second_slice_prepared

risk:
  level: low
  manual_approval_required: false

stop_conditions:
