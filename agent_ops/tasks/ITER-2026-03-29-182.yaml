task_id: ITER-2026-03-29-182
title: Add frontend verify gate with fail-fast preflight
type: governance_task
status: pending
priority: high

goal: Provide a single frontend verify gate that runs the eslint environment preflight first and returns PASS or BLOCKED quickly, so later product tasks can reuse one stable command.
user_visible_outcome:
  - frontend iterations get one reusable verify command instead of ad-hoc preflight + lint probes
  - known Node/ESLint blockers return BLOCKED immediately without spending time on hanging lint commands

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: governance layer
  module: agent_ops frontend verify gate
  reason: frontend productization batches need a reusable command that fails fast on known environment blockers instead of manually repeating probes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-182.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_eslint_preflight.py agent_ops/scripts/frontend_verify_gate.py
    - python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status BLOCKED

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-182.yaml agent_ops/scripts/frontend_eslint_preflight.py agent_ops/scripts/frontend_verify_gate.py

depends_on:
  - ITER-2026-03-29-181

notes: "Governance acceleration batch: unify frontend preflight and verify command."
