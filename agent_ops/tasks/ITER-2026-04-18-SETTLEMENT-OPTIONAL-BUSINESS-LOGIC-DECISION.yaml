task_id: ITER-2026-04-18-SETTLEMENT-OPTIONAL-BUSINESS-LOGIC-DECISION
title: Settlement optional business logic decision
type: business-logic-decision
status: active
priority: high

goal: >
  Freeze the owner-approved business decision that settlement orders are an
  optional business carrier, not a mandatory prerequisite for every payment
  request, because legacy business facts contain payment and ledger evidence
  but no settlement facts.

user_visible_outcome:
  - "Define the implementation boundary for making settlement optional while preserving strict checks when settlement is selected."

scope:
  allowed_paths:
    - docs/ops/business_continuity/settlement_optional_business_logic_decision_v1.md
    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BUSINESS-LOGIC-DECISION.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**
    - migrations/**
    - deploy/**

context:
  branch: codex/next-round
  baseline_sha: 06f9df2
  prior_task: ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN

architecture:
  layer_target: Business Logic Decision
  module: payment settlement optionality policy
  module_owner: construction industry business flow
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Whether settlement is mandatory is business truth. It must be decided in
    backend business logic and not patched by frontend behavior.
  reason: >
    Old business data proves that payment and ledger facts can exist without
    settlement facts. The current mandatory settlement assumption blocks daily
    operation and does not match the user's real business facts.

change_rules:
  - decision and implementation boundary only
  - do not modify payment, settlement, account, ACL, frontend, or script code
  - stop before implementation because code changes touch high-risk payment and settlement semantics

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BUSINESS-LOGIC-DECISION.yaml
    - git diff --check -- docs/ops/business_continuity/settlement_optional_business_logic_decision_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md

risk:
  level: high
  manual_approval_required: true

stop_conditions:
  - forbidden_path_touched
  - implementation_required_in_payment_or_settlement_code
  - acceptance_failed

deliverables:
  - owner decision record
  - implementation boundary for a later high-risk backend batch

rollback:
  - git restore docs/ops/business_continuity/settlement_optional_business_logic_decision_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-18-SETTLEMENT-OPTIONAL-BUSINESS-LOGIC-DECISION.yaml

depends_on:
  - ITER-2026-04-18-LEGACY-NO-SETTLEMENT-MODEL-LOGIC-SCREEN
