task_id: ITER-2026-04-14-0030S
title: Project member placeholder screening and no-placeholder safe slice v1
status: in_progress
type: migration-permission-sensitive-screen
priority: high
mode: verify

goal: >
  Screen the 14001 placeholder-user classifications from the project_member
  dry-run and generate a no-placeholder safe slice from rows with mapped
  projects and mapped users, without writing project_member records.

user_visible_outcome:
  - "project_member placeholder-user 筛选完成，并生成 no-placeholder safe slice"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030S.yaml
    - scripts/migration/project_member_safe_slice_screen.py
    - artifacts/migration/project_member_placeholder_screen_result_v1.json
    - artifacts/migration/project_member_no_placeholder_safe_slice_v1.csv
    - docs/migration_alignment/project_member_placeholder_screening_v1.md
    - docs/migration_alignment/project_member_no_placeholder_safe_slice_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030S.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030S.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_source_shadow_v1.csv
    - artifacts/migration/project_member_dry_run_result_v1.json
    - docs/migration_alignment/project_member_mapping_strategy_v1.md
    - docs/migration_alignment/project_member_permission_impact_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - readonly-odoo-shell-only
  - no-user-create
  - no-project-member-create
  - no-record-rule-change
  - no-acl-security-change
  - no-payment-settlement-account-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: project_member
  importer_level: L2 safe-slice screen
  upstream_task: ITER-2026-04-14-0030R
  execution_authorization: "user said 同意 执行"

architecture:
  layer_target: Project Member Migration Safe-Slice Screen
  module: project_member placeholder-user policy and safe-slice selection
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch screens legacy project-member business facts and authority impact
    without creating records or emitting presentation semantics.
  reason: >
    ITER-2026-04-14-0030R mapped all project rows but classified 14001 rows as
    placeholder_user. A no-placeholder safe slice is required before any L3
    project_member write can be considered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030S.yaml
    - python3 -m py_compile scripts/migration/project_member_safe_slice_screen.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_safe_slice_screen.py
    - python3 -m json.tool artifacts/migration/project_member_placeholder_screen_result_v1.json
    - test -s artifacts/migration/project_member_no_placeholder_safe_slice_v1.csv
    - test -s docs/migration_alignment/project_member_placeholder_screening_v1.md
    - test -s docs/migration_alignment/project_member_no_placeholder_safe_slice_v1.md
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0030S.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - user_create_attempted
  - project_member_create_attempted
  - record_rule_or_acl_change_attempted
  - no_safe_slice_candidates

deliverables:
  - task contract
  - safe-slice screen script
  - placeholder screening result json
  - no-placeholder safe slice csv
  - placeholder screening document
  - no-placeholder safe slice document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0030R

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0030S.yaml
  - git restore scripts/migration/project_member_safe_slice_screen.py
  - git restore artifacts/migration/project_member_placeholder_screen_result_v1.json
  - git restore artifacts/migration/project_member_no_placeholder_safe_slice_v1.csv
  - git restore docs/migration_alignment/project_member_placeholder_screening_v1.md
  - git restore docs/migration_alignment/project_member_no_placeholder_safe_slice_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030S.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0030S.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
