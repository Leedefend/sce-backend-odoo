task_id: ITER-2026-03-30-288
title: Forbid implicit waits after non-blocking questions in continuous iteration
type: governance
status: in_progress
priority: high

goal: >
  Prevent continuous iteration from silently pausing after a non-blocking
  question or judgment by requiring the agent to derive and execute the next
  low-risk step from repository rules and active task context.

user_visible_outcome:
  - continuous iteration no longer pauses just because the agent asked or judged something midstream
  - non-blocking questions become commentary instead of hidden wait states
  - the next low-risk step is resolved from repo rules and task chain automatically

scope:
  allowed_paths:
    - AGENTS.md
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - governance only
  - no product code changes
  - do not weaken stop conditions, approval gates, or branch guards
  - encode continuation behavior as mandatory execution behavior, not only reporting wording

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Governance Layer
  module: codex continuous-iteration execution policy
  module_owner: repo governance
  kernel_or_scenario: kernel
  reason: >
    Prior rule updates constrained wording and reporting semantics, but still
    allowed a practical pause when the agent asked a non-blocking question and
    then waited. The execution policy must require self-directed continuation.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-288.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - governance_rule_conflicts_with_existing_stop_logic
  - acceptance_failed

deliverables:
  - non_blocking_question_continuation_rule
  - delivery_log_entry
  - iteration_report

rollback:
  - git restore AGENTS.md docs/ops/codex_workspace_execution_rules.md
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/tasks/ITER-2026-03-30-288.yaml

depends_on:
  - ITER-2026-03-30-283

notes: >
  The new rule must explicitly prevent the agent from converting its own
  non-blocking question or judgment into an implicit waiting state during an
  active continuous-iteration chain.
