task_id: ITER-2026-03-30-340
title: Publish native sidebar navigation as pre-release release-nav entries
type: code
status: in_progress
priority: high

goal: >
  Accelerate backend navigation productization by projecting all user-reachable
  native scene navigation leaves into the release navigation contract as a
  pre-release group, while keeping the existing stable released groups and
  permission pruning unchanged.

user_visible_outcome:
  - sidebar release navigation exposes all currently reachable native menus as pre-release entries
  - existing stable released products remain visible and unchanged
  - release navigation becomes usable-first without changing ACL or business semantics

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/delivery/**
    - addons/smart_core/handlers/**
    - addons/smart_core/tests/**
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - frontend/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

change_rules:
  - backend navigation publication only
  - preserve current stable release groups
  - no permission model change
  - no financial domain semantic changes
  - additive projection from native scene nav into release nav only

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Platform Layer
  module: smart_core delivery and release navigation runtime
  module_owner: addons/smart_core/delivery addons/smart_core/core addons/smart_core/handlers
  kernel_or_scenario: kernel
  reason: >
    The backend already builds role-pruned native scene navigation. To satisfy
    usable-first productization, release navigation should publish those native
    entries as pre-release menus instead of waiting for every function to be
    formalized as a stable product release.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-340.yaml
    - python3 -m unittest discover -s addons/smart_core/tests -p 'test_delivery_menu_service_native_preview.py'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - stable_release_groups_regress
  - native_preview_projection_breaks_role_pruning

deliverables:
  - native navigation to release-navigation preview projection in smart_core
  - targeted tests for native preview menu publication
  - report and task result artifacts for ITER-2026-03-30-340

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-340.yaml
  - git restore addons/smart_core/delivery/menu_service.py
  - git restore addons/smart_core/delivery/delivery_engine.py
  - git restore addons/smart_core/tests/test_delivery_menu_service_native_preview.py
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-340.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-340.json

depends_on:
  - ITER-2026-03-30-339

notes: >
  Native preview projection must be derived from already role-pruned scene nav
  leaves so the release navigation remains permission-safe and additive.
