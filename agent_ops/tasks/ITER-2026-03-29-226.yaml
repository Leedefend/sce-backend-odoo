task_id: ITER-2026-03-29-226
title: Align generic detail command bar to native-first form
type: product_task
status: pending
priority: high

goal: Make generic record-detail routes present status steps and contract actions through a single command bar so the top interaction area reads more like an Odoo-native form body.
user_visible_outcome:
  - detail pages show a clearer top command band for status and actions
  - status progression and actions stop reading like unrelated strips

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail command bar
  reason: Detail hierarchy is now visible, but the top interaction area still reads as separate strips. The next low-risk usability gain is to align status and actions into a single native-first command bar.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-226.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-226.yaml frontend/apps/web/src/pages/ContractFormPage.vue docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-226.md agent_ops/state/task_results/ITER-2026-03-29-226.json

depends_on:
  - ITER-2026-03-29-225

notes: "Keep the batch generic to record-detail routes; do not add project-specific command bars."
