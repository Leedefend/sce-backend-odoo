task_id: ITER-2026-03-28-007
title: Promote approved architecture and governance artifacts into dirty baseline
type: governance_task
status: pending
priority: high

goal: Update the canonical repo dirty baseline through a dedicated governance task so continuous iterations can proceed without being blocked by already reviewed architecture and governance artifacts.
user_visible_outcome:
  - canonical dirty baseline includes the approved architecture alignment artifacts
  - baseline review summary records the approved delta and rationale
  - refactor-prep queue can run on a stabilized repo baseline

scope:
  allowed_paths:
    - agent_ops/policies/**
    - agent_ops/tasks/**
    - agent_ops/queue/**
    - docs/ops/releases/archive/temp/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: agent_ops baseline governance + docs/ops temp review + queue bootstrap
  reason: Canonicalize reviewed repo dirtiness so autonomous queue execution is not blocked by previously accepted architecture-doc changes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-007.yaml
    - test -f docs/ops/releases/archive/temp/TEMP_repo_dirty_baseline_review_20260328.md
    - rg -n "approved delta|approved_paths" docs/ops/releases/archive/temp/TEMP_repo_dirty_baseline_review_20260328.md
    - rg -n "docs/architecture/enterprise_pm_paas_target_architecture_v1.md" agent_ops/policies/repo_dirty_baseline.yaml
    - test -f agent_ops/queue/platform_kernel_refactor_prep_queue.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/policies/repo_dirty_baseline.yaml agent_ops/tasks/ITER-2026-03-28-007.yaml agent_ops/queue/platform_kernel_refactor_prep_queue.yaml docs/ops/releases/archive/temp/TEMP_repo_dirty_baseline_review_20260328.md docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on: []
notes: "Dedicated baseline governance task required before continuous refactor-prep queue execution."

baseline_governance:
  candidate_required: true
  review_summary_required: true
  canonical_update_requires_dedicated_task: true
