task_id: ITER-2026-03-30-346
title: Project native preview routes for scene-only menu fallbacks
type: code
status: in_progress
priority: high

goal: >
  Close the last preview menu usability gap by preserving raw native menu routes
  in release_navigation_v1 and letting the frontend shell use that route when a
  preview menu has no usable action_id but still has a concrete native target.

user_visible_outcome:
  - scene-only preview menus no longer fall back to workbench with CONTRACT_CONTEXT_MISSING
  - demo PM can open the remaining preview cockpit entry from the sidebar
  - preview menu usability smoke reaches full PASS for all published preview menus

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/delivery/**
    - addons/smart_core/tests/**
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/app/resolvers/**
    - scripts/verify/**
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

change_rules:
  - preserve existing preview publication semantics
  - add native route passthrough only
  - frontend may consume backend-provided route but must not infer new business semantics

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Platform Layer + Frontend Layer
  module: native preview route fallback
  module_owner: smart_core delivery + frontend shell
  kernel_or_scenario: scenario
  reason: >
    After the previous batch, 20 of 21 preview menus are usable. The remaining
    scene-only preview menu still lacks action_id, so the frontend needs the raw
    native route preserved from the preview projection to open the target.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-346.yaml
    - python3 -m unittest discover -s addons/smart_core/tests -p 'test_delivery_menu_service_native_preview.py'
    - pnpm -C frontend/apps/web typecheck:strict
    - node scripts/verify/release_navigation_preview_menu_usability_smoke.mjs

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - preview_route_passthrough_missing

deliverables:
  - preview release-navigation metadata that preserves raw native route values
  - frontend route fallback for scene-only preview menu resolution
  - updated usability smoke showing all published preview menus are reachable

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-346.yaml
  - git restore addons/smart_core/core/delivery_menu_defaults.py
  - git restore addons/smart_core/delivery/menu_service.py
  - git restore addons/smart_core/tests/test_delivery_menu_service_native_preview.py
  - git restore frontend/apps/web/src/app/resolvers/menuResolver.ts
  - git restore frontend/apps/web/src/app/resolvers/menuResolverCore.js
  - git restore frontend/apps/web/src/views/MenuView.vue
  - git restore scripts/verify/release_navigation_preview_menu_usability_smoke.mjs
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-346.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-346.json

depends_on:
  - ITER-2026-03-30-345

notes: >
  The route fallback must consume backend-provided native route metadata. Do not
  hard-code scene_key to route mappings in the frontend.
