  module: smart_core.controllers
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: remove duplicated industry controller hosts after platform migration.
  reason: avoid dual-source regression by deleting orphan industry controller files.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1106.yaml
    - bash -lc '! rg -n "smart_construction_core\.controllers\.(ops_controller|pack_controller|scene_template_controller|preference_controller|insight_controller|scene_controller|capability_catalog_controller)" addons/smart_core/controllers'
    - python3 -m py_compile addons/smart_core/controllers/platform_ops_logic.py addons/smart_core/controllers/platform_packs_logic.py addons/smart_core/controllers/platform_scene_template_logic.py addons/smart_core/controllers/platform_preference_logic.py addons/smart_core/controllers/platform_insight_logic.py addons/smart_core/controllers/platform_scene_logic.py addons/smart_core/controllers/platform_capability_catalog_logic.py addons/smart_core/controllers/platform_ops_api.py addons/smart_core/controllers/platform_packs_api.py addons/smart_core/controllers/platform_scene_template_api.py addons/smart_core/controllers/platform_preference_insight_api.py addons/smart_core/controllers/platform_scenes_api.py addons/smart_core/controllers/platform_capability_catalog_api.py
    - make verify.controller.allowlist.routes.guard
    - make verify.controller.route.policy.guard
    - make verify.controller.delegate.guard

