task_id: ITER-2026-04-05-1106
title: Retire orphan smart_construction_core controllers after platform ownership migration
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Remove orphan controller files in `smart_construction_core` whose runtime
  ownership has already migrated into `smart_core.controllers` logic hosts.

user_visible_outcome:
  - "已迁移控制器不再在行业模块保留重复宿主文件"

scope:
  allowed_paths:
    - addons/smart_construction_core/controllers/ops_controller.py
    - addons/smart_construction_core/controllers/pack_controller.py
    - addons/smart_construction_core/controllers/scene_template_controller.py
    - addons/smart_construction_core/controllers/preference_controller.py
    - addons/smart_construction_core/controllers/insight_controller.py
    - addons/smart_construction_core/controllers/scene_controller.py
    - addons/smart_construction_core/controllers/capability_catalog_controller.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 12
  max_candidates: 20
  max_output_lines: 420
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
