task_id: ITER-2026-03-29-170
title: Project smart_scene runtime semantic state into contract diagnostics
type: governance_task
status: pending
priority: high

goal: Make smart_scene preserve unified runtime semantic state in final contract diagnostics so downstream consumers and audits can reuse the same runtime snapshot.
user_visible_outcome:
  - scene contracts now expose unified runtime semantic state in diagnostics
  - scene_contract_v1 diagnostics and parser semantic diagnostics now carry the same runtime semantic snapshot

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_contract_builder + scene_parser_semantic_bridge
  reason: smart_scene already computes a unified runtime semantic state in scene_engine, but final contract output still does not preserve that snapshot as a first-class diagnostics artifact. This iteration projects runtime semantic state into contract diagnostics and scene_contract_v1 diagnostics for stable downstream consumption.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-170.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/core/scene_parser_semantic_bridge.py addons/smart_scene/tests/test_scene_parser_semantic_bridge.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_parser_semantic_bridge.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-170.yaml addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/core/scene_parser_semantic_bridge.py addons/smart_scene/tests/test_scene_parser_semantic_bridge.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-169

notes: "Batch acceleration: project unified runtime semantic state into final contract diagnostics."
