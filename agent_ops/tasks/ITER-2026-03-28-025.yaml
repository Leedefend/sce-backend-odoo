title: Converge load_view compatibility proxy onto shared load_contract payload builder
type: refactor_task
status: pending
priority: medium

goal: Reduce compatibility drift between load_view and load_contract by moving legacy proxy payload shaping into a shared core helper, making the handler use the framework-standard handle() entrypoint, and fixing standard-model existence detection in the canonical load_contract path.
