task_id: ITER-2026-04-14-L3-ROLE-KEY-AUDIT-MAPPED-WRITE
title: Project member L3 role-key audit and mapped first-3 write v1
status: completed
type: migration-responsibility-role-key-audit-mapped-write
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-L3-SAMPLE-FORCED-WRITE

goal: >
  Audit project.responsibility.role_key field definition, legal selection values,
  and existing data distribution; freeze the business semantic to model encoding
  mapping; then write exactly the first three L3 checklist rows with a real
  legal role_key.

user_visible_outcome:
  - "停止猜测 role_key，按模型合法值和现有分布冻结映射后写入前 3 条 L3 样本"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-L3-ROLE-KEY-AUDIT-MAPPED-WRITE.yaml
    - scripts/migration/project_member_l3_role_key_audit_mapped_write.py
    - artifacts/migration/project_member_l3_role_key_audit_v1.json
    - artifacts/migration/project_member_l3_role_key_mapping_rule_v1.json
    - artifacts/migration/project_member_l3_mapped_write_result_v1.json
    - artifacts/migration/project_member_l3_mapped_write_post_audit_v1.json
    - artifacts/migration/project_member_l3_mapped_write_rollback_targets_v1.csv
    - docs/migration_alignment/project_member_l3_role_key_mapping_rule_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-L3-ROLE-KEY-AUDIT-MAPPED-WRITE.md
    - agent_ops/state/task_results/ITER-2026-04-14-L3-ROLE-KEY-AUDIT-MAPPED-WRITE.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_l3_business_review_checklist_v1.csv
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_sample_rows: 3
  forbid_repo_wide_scan: true

change_rules:
  - audit-model-selection-before-write
  - freeze-business-semantic-to-model-code-mapping
  - write-exactly-first-three-l3-checklist-rows
  - use-existing-legal-role-key-only
  - no-sample-expansion
  - no-acl-security-change
  - no-record-rule-change
  - no-model-or-selection-change

architecture:
  layer_target: Migration Responsibility Role-Key Audit and Mapped Write
  module: project_member L3 first-3 legal role write
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch writes responsibility business facts using an audited legal
    target role_key and must not change authority or model definitions.
  reason: >
    The previous forced write failed because project_member is not a legal
    project.responsibility.role_key. This batch audits the target model and
    existing distribution before freezing a valid mapping and writing 3 rows.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-L3-ROLE-KEY-AUDIT-MAPPED-WRITE.yaml
    - python3 -m py_compile scripts/migration/project_member_l3_role_key_audit_mapped_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_l3_role_key_audit_mapped_write.py
    - python3 -m json.tool artifacts/migration/project_member_l3_role_key_audit_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_role_key_mapping_rule_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_mapped_write_result_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_mapped_write_post_audit_v1.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: true
  write_scope: "exactly first three L3 checklist rows"

rollback:
  - "Use artifacts/migration/project_member_l3_mapped_write_rollback_targets_v1.csv to rollback created project.responsibility rows."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - acl_or_record_rule_touched
  - more_than_three_rows_selected
  - existing_project_responsibility_conflict
  - zero_db_writes

deliverables:
  - task contract
  - audit and mapped write script
  - role-key audit json
  - mapping rule json
  - write result json
  - post audit json
  - rollback target csv
  - mapping rule documentation
  - iteration report
  - task result json
