task_id: ITER-2026-04-03-893
title: Prioritize backend semantic route over root scene-key fallback in host entry smoke
type: backend
status: active
priority: high
mode: implement

goal: >
  Keep host primary-entry smoke on backend-provided semantic route first, and
  use root-level scene-key URL only as fallback to avoid native shell takeover
  during dashboard entry verification.

user_visible_outcome:
  - "主入口验证优先使用后端语义路由，避免根路径误入原生壳层"
  - "自定义前端链路验证结果更贴近真实场景入口"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - semantic_route_priority_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-892
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host semantic entry route ordering governance
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch only aligns semantic route consumption order for entry
    orchestration and does not alter business facts.
  reason: >
    Current host smoke accepts root scene-key URL first and can land on native
    Odoo shell; backend semantic route must be preferred to keep verification on
    custom frontend surface.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-893.yaml
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - host semantic entry URL candidate order prefers backend route
  - updated usability gate evidence for route-order fix

rollback:
  - git restore scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
  - git restore agent_ops/tasks/ITER-2026-04-03-893.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-893.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-893.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-892
