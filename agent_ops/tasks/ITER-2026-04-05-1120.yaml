task_id: ITER-2026-04-05-1120
title: Decouple heavy workspace collections from system.init startup payload
type: implementation
status: active
priority: high
mode: execute

goal: >
  Keep workspace heavy collections out of `system.init` startup main payload,
  while preserving runtime-fetch collection availability through explicit
  merge mode control.

user_visible_outcome:
  - "startup 主链不再注入 task/payment/risk/project 重列表，runtime_fetch 仍可获取"

scope:
  allowed_paths:
    - addons/smart_core/core/system_init_extension_fact_merger.py
    - addons/smart_core/handlers/system_init.py
    - addons/smart_core/core/runtime_fetch_bootstrap_helper.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 10
  max_candidates: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - startup_payload_lightweight_only
  - runtime_fetch_collection_path_preserved

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: six_clause_closure_item6
  priority_lane: boundary_closure

architecture:
  layer_target: Platform Layer
  module: smart_core.system_init
  module_owner: platform
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: startup payload should carry summary facts; heavy collections should be runtime fetched.
  reason: close governance clause #6.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1120.yaml
    - python3 -m py_compile addons/smart_core/core/system_init_extension_fact_merger.py addons/smart_core/handlers/system_init.py addons/smart_core/core/runtime_fetch_bootstrap_helper.py
    - bash -lc 'rg -n "merge_extension_facts\(data, include_workspace_collections=False\)" addons/smart_core/handlers/system_init.py && rg -n "merge_extension_facts_fn\(data, include_workspace_collections=True\)" addons/smart_core/core/runtime_fetch_bootstrap_helper.py'
    - make verify.controller.boundary.guard

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_core/core/system_init_extension_fact_merger.py
  - addons/smart_core/handlers/system_init.py
  - addons/smart_core/core/runtime_fetch_bootstrap_helper.py

rollback:
  - git restore addons/smart_core/core/system_init_extension_fact_merger.py
  - git restore addons/smart_core/handlers/system_init.py
  - git restore addons/smart_core/core/runtime_fetch_bootstrap_helper.py
  - git restore agent_ops/tasks/ITER-2026-04-05-1120.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1120.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1120.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1119
