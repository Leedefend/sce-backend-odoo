task_id: ITER-2026-03-28-008
title: Build smart_core and smart_scene platform inventory baseline
type: governance_task
status: pending
priority: high

goal: Create a compact implementation inventory for smart_core and smart_scene so platform-kernel refactor batches can target concrete assets instead of abstract layers.
user_visible_outcome:
  - a platform inventory document exists for smart_core and smart_scene
  - the inventory highlights kernel assets, scene assets, overlap risks, and first extraction targets
  - the refactor-prep queue has a concrete first architecture planning artifact

scope:
  allowed_paths:
    - docs/architecture/**
    - agent_ops/tasks/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Platform Layer
  module: docs/architecture smart_core + smart_scene inventory baseline
  reason: Turn the new implementation architecture baseline into a concrete inventory artifact that can drive platform-kernel refactor task slicing.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-008.yaml
    - test -f docs/architecture/platform_kernel_inventory_baseline_v1.md
    - rg -n "smart_core|smart_scene|overlap risk|first extraction target" docs/architecture/platform_kernel_inventory_baseline_v1.md

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore docs/architecture/platform_kernel_inventory_baseline_v1.md agent_ops/tasks/ITER-2026-03-28-008.yaml docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-28-007
notes: "First low-risk architecture planning artifact after baseline normalization."
