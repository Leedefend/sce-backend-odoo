task_id: ITER-2026-04-06-1180
title: Screen and sequence seven native audit outcomes for business-fact mainline
type: governance-optimization
status: completed
priority: high
mode: screen

goal: >
  Convert the seven native audit deliverables into an ordered, low-risk execution
  chain for business-fact mainline, explicitly marking stop-gates for forbidden
  high-risk paths before implementation.

user_visible_outcome:
  - "7份原生审计结果形成可执行顺序清单"
  - "每一项明确 low-risk 可继续或 high-risk 需单独授权"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-06-1180.yaml
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/audit/native/native_foundation_execution_sequence_v1.md
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - record_rules/**
    - migrations/**

limits:
  max_files: 8
  max_candidates: 12
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage execution only
  - do not mix scan and verify responsibilities
  - screen stage may classify only existing scan outputs
  - no implementation in forbidden or high-risk paths
  - backend usability tasks remain backend-semantic-first

context:
  branch: codex/next-round
  baseline_sha: a2d0e90
  explicit_user_authorization: true
  input_from: user_confirmed_sequential_native_audit_execution
  usability_battlefield: backend

architecture:
  layer_target: Governance Monitoring
  module: native business-fact audit sequencing
  module_owner: platform
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This stage only organizes execution semantics and stop-gates based on
    existing audit outputs, without changing business facts.
  reason: >
    User requested sequential execution based on the seven agreed audit outcomes;
    screen stage is required to safely choose next low-risk batch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-06-1180.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - stage_boundary_broken
  - high_risk_path_selected_without_dedicated_contract

deliverables:
  - ordered execution sequence from seven audit outputs
  - explicit stop-gates for security/acl/record-rule high-risk work

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-06-1180.yaml
  - git restore docs/audit/native/native_foundation_execution_sequence_v1.md
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1178
  - ITER-2026-04-05-1179
