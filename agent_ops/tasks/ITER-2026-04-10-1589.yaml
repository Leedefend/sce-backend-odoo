task_id: ITER-2026-04-10-1589
title: backend refactor v2 migrate meta.intent_catalog readonly intent
type: governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  迁移 legacy 的 meta.intent_catalog 到 v2 并行只读意图，继续提升迁移覆盖率并完善 meta 链路。

user_visible_outcome:
  - "v2 具备 intent catalog 元信息查询能力"

scope:
  allowed_paths:
    - addons/smart_core/v2/**
    - scripts/verify/v2_*audit.py
    - docs/architecture/backend_core_refactor_blueprint_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1589.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1589.md
    - agent_ops/state/task_results/ITER-2026-04-10-1589.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 16
  max_output_lines: 640

change_rules:
  - v2 additive migration only
  - readonly scope only
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel shadow refactor layer
  module: smart_core v2 meta intent catalog migration
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批迁移只读元信息意图，不涉及业务事实变更。
  reason: >
    连续重建中按 legacy-v2 等价迁移策略推进 meta 关键意图覆盖。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1589.yaml"
    - "python3 -m py_compile addons/smart_core/v2/handlers/meta/intent_catalog.py addons/smart_core/v2/services/meta_service.py addons/smart_core/v2/builders/meta_builder.py addons/smart_core/v2/intents/registry.py"
    - "python3 scripts/verify/v2_intent_comparison_audit.py --json"
    - 'rg -n "intent_name = \"meta.intent_catalog\"|def build_intent_catalog_contract|def build_intent_catalog" addons/smart_core/v2'
    - "rg -n \"v2 meta.intent_catalog migration batch\" docs/architecture/backend_core_refactor_blueprint_v1.md"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - v2 meta.intent_catalog readonly migration

rollback:
  - git restore addons/smart_core/v2 scripts/verify/v2_intent_comparison_audit.py docs/architecture/backend_core_refactor_blueprint_v1.md

depends_on:
  - ITER-2026-04-10-1588
