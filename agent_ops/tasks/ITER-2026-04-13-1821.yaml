task_id: ITER-2026-04-13-1821
title: Project skeleton small-sample update-path dry-run v1
status: completed
type: implementation
priority: high
mode: execute

goal: >
  Run a no-database-write, no-ORM update-path dry run for the existing project
  safe-slice sample by using an external legacy_project_id identity snapshot.

user_visible_outcome:
  - "项目骨架小样本 dry-run 覆盖 create/update 混合分类，不写数据库"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1821.yaml
    - data/migration_samples/project_existing_identity_snapshot_v1.csv
    - artifacts/migration/project_dry_run_update_path_result_v1.json
    - docs/migration_alignment/project_dry_run_update_path_report_v1.md
    - docs/migration_alignment/project_import_go_no_go_v2.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1821.md
    - agent_ops/state/task_results/ITER-2026-04-13-1821.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - dry-run-only
  - no-database-write
  - no-orm-call
  - no-full-import
  - no-field-expansion
  - safe-slice-fields-only
  - external-identity-snapshot-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  explicit_user_authorization: true
  sample_csv: data/migration_samples/project_sample_v1.csv
  importer: scripts/migration/project_dry_run_importer.py
  depends_on_dry_run: ITER-2026-04-13-1820

architecture:
  layer_target: Migration Dry-Run Tooling
  module: project.project safe skeleton update-path dry-run
  module_owner: docs/migration_alignment + data/migration_samples + artifacts/migration
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The dry-run validates project skeleton identity classification using an
    external fact snapshot, without fabricating runtime database state.
  reason: >
    The previous sample dry-run proved create classification only. This batch
    adds a bounded identity snapshot to prove update classification while
    preserving no-DB and no-ORM constraints.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1821.yaml
    - python3 scripts/migration/project_dry_run_importer.py --input data/migration_samples/project_sample_v1.csv --existing-identities data/migration_samples/project_existing_identity_snapshot_v1.csv --output artifacts/migration/project_dry_run_update_path_result_v1.json
    - python3 -m json.tool artifacts/migration/project_dry_run_update_path_result_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - database_write_attempted
  - orm_call_introduced
  - full_import_attempted
  - unsafe_field_in_sample

deliverables:
  - external identity snapshot
  - update-path dry-run result artifact
  - update-path dry-run report
  - go/no-go v2 document
  - iteration report

depends_on:
  - ITER-2026-04-13-1820

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1821.yaml
  - git restore data/migration_samples/project_existing_identity_snapshot_v1.csv
  - git restore artifacts/migration/project_dry_run_update_path_result_v1.json
  - git restore docs/migration_alignment/project_dry_run_update_path_report_v1.md
  - git restore docs/migration_alignment/project_import_go_no_go_v2.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1821.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1821.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
