task_id: ITER-2026-03-30-363
title: Improve execution-structure first-success path from preview menu
type: code
status: in_progress
priority: high

goal: >
  Improve the first-success path for the published `执行结构` preview menu by
  turning the current always-warn-then-list behavior into a fact-driven entry
  bridge: direct open when exactly one reachable project context exists, and a
  filtered project-selection fallback when multiple project choices exist.

user_visible_outcome:
  - demo PM users can reach execution structure faster from the published preview menu
  - the `执行结构` menu becomes a practical native business entry instead of a dead-end warning
  - the usability repair stays inside the original model/action/menu chain

scope:
  allowed_paths:
    - addons/smart_construction_core/actions/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - keep the repair inside original menu/action behavior; do not introduce scene semantics back into the fact layer
  - prefer additive first-success improvements over structural rewrites
  - no ACL, manifest, frontend, or financial-domain changes

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Scenario Product Layer
  module: execution structure entry usability bridge
  module_owner: addons/smart_construction_core
  kernel_or_scenario: scenario
  reason: >
    The fact-chain audit showed that `执行结构` is the narrowest remaining native
    usability gap: the business chain is valid, but menu success still depends
    on project-context selection. This batch repairs that bridge without mixing
    portal or scene fulfillment back into the industry fact layer.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-363.yaml
    - make verify.smart_core

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - execution_structure_entry_behavior_regresses
  - verify_command_failed

deliverables:
  - improved execution-structure entry behavior for the published preview menu
  - report and task result artifacts for ITER-2026-03-30-363
  - delivery log checkpoint for the next fact-driven repair or custom-frontend batch

rollback:
