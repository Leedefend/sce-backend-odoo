task_id: ITER-2026-04-14-0015
title: Project next 200 create-only dry-run v4
status: in_progress
type: migration-dry-run
priority: high
mode: scan

goal: >
  Build the next non-overlapping 200-row project create-only candidate after
  excluding the already materialized project identities, and validate it without
  DB access.

user_visible_outcome:
  - "下一组 project 200 条 create-only 候选生成完成，且不写入数据库"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0015.yaml
    - scripts/migration/project_next_200_create_only_dry_run_v4.py
    - artifacts/migration/project_next_200_candidate_v4.csv
    - artifacts/migration/project_next_200_dry_run_result_v4.json
    - docs/migration_alignment/project_next_200_create_only_dry_run_v4.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0015.md
    - agent_ops/state/task_results/ITER-2026-04-14-0015.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/project/project.csv
    - artifacts/migration/project_create_only_post_write_snapshot_v1.csv
    - artifacts/migration/project_create_only_expand_post_write_snapshot_v1.csv
    - artifacts/migration/project_v2_100_post_write_snapshot.csv
    - artifacts/migration/project_v3_100_post_write_snapshot.csv
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - no-db-access
  - create-only-candidate
  - increased-batch-size
  - no-update
  - no-unlink
  - no-workflow-replay
  - no-acl-security-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: none
  upstream_task: ITER-2026-04-14-0014
  batch_size: 200
  batch_size_reason: "User requested larger batches; doubled project candidate size after post-write review passed."

architecture:
  layer_target: Project Migration Dry Run
  module: project.project next 200-row create-only candidate v4
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch prepares project business fact payload rows only; it does not
    supply frontend presentation semantics.
  reason: >
    The previous v3 100-row write and post-write review passed. The user asked
    to increase batch size, so the next low-risk step is a 200-row no-DB dry-run.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0015.yaml
    - python3 -m py_compile scripts/migration/project_next_200_create_only_dry_run_v4.py
    - python3 scripts/migration/project_next_200_create_only_dry_run_v4.py
    - python3 -m json.tool artifacts/migration/project_next_200_dry_run_result_v4.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0015.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_access_attempted
  - update_attempted
  - unlink_attempted
  - workflow_replay_attempted
  - acl_or_security_change_attempted

deliverables:
  - task contract
  - dry-run script
  - candidate csv
  - dry-run result json
  - dry-run report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0014

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0015.yaml
  - git restore scripts/migration/project_next_200_create_only_dry_run_v4.py
  - git restore artifacts/migration/project_next_200_candidate_v4.csv
  - git restore artifacts/migration/project_next_200_dry_run_result_v4.json
  - git restore docs/migration_alignment/project_next_200_create_only_dry_run_v4.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0015.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0015.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
