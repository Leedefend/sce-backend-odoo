  - git restore docs/ops/contract_runtime_gap_list_v1.md
  - git restore agent_ops/reports/2026-04-07/report.ITER-2026-04-07-1311.md
  - git restore agent_ops/state/task_results/ITER-2026-04-07-1311.json
