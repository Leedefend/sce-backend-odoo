    - frontend/**

limits:
  max_files: 6
  max_output_lines: 360
  forbid_repo_wide_scan: true

change_rules:
  - low-cost-mode
  - batch-d-publication-only
  - no-business-logic-change
  - no-frontend-permission-patch

