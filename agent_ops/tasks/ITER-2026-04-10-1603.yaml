    本批只增强治理输出语义，不涉及业务事实层。
  reason: >
    连续重构中需提高门禁失败定位速度，减少迭代诊断成本。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1603.yaml"
    - "python3 scripts/verify/v2_app_governance_gate_audit.py --json"
    - "python3 scripts/verify/v2_app_verify_all.py --json"
    - 'rg -n "summary|failure_reasons|total_checks|pass_checks|fail_checks" scripts/verify/v2_app_governance_gate_audit.py'
    - 'rg -n "summary|failure_reasons" docs/ops/v2_app_governance_gate_usage_v1.md'
    - 'rg -n "app governance diagnostics batch" docs/architecture/backend_core_refactor_blueprint_v1.md'

