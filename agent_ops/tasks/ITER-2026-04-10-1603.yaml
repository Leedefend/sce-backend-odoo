  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 9
  max_output_lines: 700

change_rules:
  - v2 independent rebuild only
  - additive diagnostics enhancement
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
