task_id: ITER-2026-04-05-973
title: Align sc_prod_sim by removing demo module and importing customer users
type: backend
status: active
priority: high
mode: implement

goal: >
  Remove demo runtime module footprint from sc_prod_sim and align user data to
  customer-delivery baseline by reloading smart_construction_custom seed users.

user_visible_outcome:
  - "模拟生产环境不再带 demo 模块语义，用户数据与交付基线一致"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 5
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_data_alignment_only
  - no_repository_source_change

context:
  branch: codex/next-round
  baseline_sha: 7de445f
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-972
  priority_lane: delivery_simulation_alignment

architecture:
  layer_target: Delivery Simulation Runtime Alignment
  module: prod-sim module footprint and customer user baseline
  module_owner: operations_runtime
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact
  backend_sub_layer_reason: >
    Objective is runtime business truth alignment (installed modules + actual
    user records) for customer-delivery simulation.
  reason: >
    User explicitly requested removing demo module in simulated production and
    importing designated customer users to match delivery-state rehearsal.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-973.yaml
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make restart
    - docker exec sc-backend-odoo-prod-sim-db-1 psql -U odoo -d sc_prod_sim -c "select name,state from ir_module_module where name in ('smart_construction_demo','smart_construction_custom') order by name;"
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim MODULE=smart_construction_custom DB_NAME=sc_prod_sim CUSTOMER_SEED_EXTERNAL_ID_GUARD=strict make mod.upgrade
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make guard.customer_seed_external_ids.strict
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost API_BASE_URL=http://127.0.0.1:18069 DB_NAME=sc_prod_sim E2E_LOGIN=svc_e2e_smoke E2E_PASSWORD=demo make verify.release.execution_protocol.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - uncertain_runtime_scope

deliverables:
  - sc_prod_sim_demo_module_removed
  - sc_prod_sim_customer_user_baseline_aligned

rollback:
  - restore sc_prod_sim from latest DB snapshot before uninstall operation
  - reinstall module only if rollback approved: MODULE=smart_construction_demo make mod.install DB_NAME=sc_prod_sim
  - git restore agent_ops/tasks/ITER-2026-04-05-973.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-973.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-973.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-972
