task_id: ITER-2026-03-31-476
title: Fix project-form object-button runtime ACL failures for delivered roles
type: permission-governance
status: active
priority: high

goal: >
  Fix the object-button runtime failures found in ITER-2026-03-31-475 so the
  delivered roles no longer hit ir.actions.act_window.view ACL errors on
  project-form buttons, and the currently broken stage-requirements entry is no
  longer exposed to delivered roles until a dedicated wizard-access strategy is
  approved.

user_visible_outcome:
  - "PM/管理层/业务系统管理员点击项目表单关键按钮时不再撞 action-view ACL"
  - "当前不可用的阶段要求入口不再暴露给交付角色"
  - "不新增 ACL，不扩大任何角色权力"

scope:
  allowed_paths:
    - addons/smart_construction_core/models/core/project_core.py
    - addons/smart_construction_core/models/core/project_project_financial.py
    - addons/smart_construction_core/views/core/project_overview_views.xml
    - addons/smart_construction_core/models/support/project_stage_requirements.py
    - addons/smart_construction_core/tests/**
    - addons/smart_construction_custom/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - narrowing-only or runtime-safe implementation changes
  - no ACL or record-rule edits in this batch
  - fix action-definition reads without expanding role authority
  - hide or narrow the broken stage-requirements entry rather than introducing new wizard ACL
  - keep already-correct representative action visibility unchanged

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance + Permission Surface Fix
  module: project-form object-button runtime alignment
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-475 found real runtime failures in project-form object
    button methods. The next narrow implementation batch is to fix action
    metadata reads for the delivered roles and stop exposing the currently
    broken stage-requirements entry.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-476.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - runtime audit confirms PM/executive/business-admin no longer hit action-view ACL on the fixed object buttons, and the broken stage-requirements entry is no longer exposed to delivered roles

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - object_button_fix_requires_acl_changes
  - representative_action_visibility_regresses
  - verify_smart_core_fails
  - runtime_method_targets_remain_broken

deliverables:
  - fixed project-form object-button methods and narrowed broken entry exposure
  - regression coverage for object-button runtime alignment
  - governance/report artifacts for ITER-2026-03-31-476

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/models/core/project_core.py
  - git restore addons/smart_construction_core/models/core/project_project_financial.py
  - git restore addons/smart_construction_core/views/core/project_overview_views.xml
  - git restore addons/smart_construction_core/models/support/project_stage_requirements.py
  - git restore addons/smart_construction_core/tests
  - git restore addons/smart_construction_custom/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-476.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-476.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-476.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-475
