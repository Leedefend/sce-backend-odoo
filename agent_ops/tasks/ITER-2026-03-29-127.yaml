task_id: ITER-2026-03-29-127
title: Normalize scene ready search surface semantics
type: governance_task
status: pending
priority: high

goal: Make scene ready contract normalization preserve full search surface semantics instead of only default_sort and filters.
user_visible_outcome:
  - scene ready contracts keep canonical search fields, group_by, searchpanel, and mode during normalization

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: backend orchestration
  module: smart_core scene_ready_contract_builder
  reason: Scene ready builder still normalizes search surfaces with a legacy subset, so canonical semantic fields depend on later bridges. This iteration makes normalization itself preserve the full search surface contract.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-127.yaml
    - python3 -m py_compile addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_search_surface_normalization.py
    - python3 addons/smart_core/tests/test_scene_ready_search_surface_normalization.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-127.yaml addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_search_surface_normalization.py

depends_on:
  - ITER-2026-03-29-126

notes: "Batch-3 continuation: canonical scene_ready search surface should preserve full semantic shape before later bridges run."
