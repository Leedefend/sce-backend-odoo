task_id: ITER-2026-03-29-174
title: Add stable consumer runtime alias in scene_contract_v1 diagnostics
type: governance_task
status: pending
priority: high

goal: Make scene_contract_v1 expose a flatter consumer runtime diagnostics alias so downstream consumers do not need to know nested consumer_semantics paths.
user_visible_outcome:
  - scene_contract_v1.diagnostics.consumer_runtime now provides a stable runtime diagnostics alias
  - downstream consumers can read runtime status and alignment flags from one flat, versioned diagnostics path

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_contract_builder
  reason: scene contracts already project consumer-facing runtime diagnostics under diagnostics.consumer_semantics.runtime, but consumers of scene_contract_v1 still need to know that nested structure. This iteration adds a flatter consumer_runtime alias under scene_contract_v1 diagnostics.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-174.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_builder.py
    - python3 addons/smart_scene/tests/test_scene_contract_builder.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-174.yaml addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_builder.py

depends_on:
  - ITER-2026-03-29-173

notes: "Batch acceleration: add flat consumer runtime alias under scene_contract_v1 diagnostics."
