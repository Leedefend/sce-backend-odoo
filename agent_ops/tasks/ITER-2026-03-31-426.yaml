task_id: ITER-2026-03-31-426
title: Implement multi-post platform extension and bootstrap deferred extra posts
type: implementation
status: active
priority: high

goal: >
  Extend the platform-level 岗位 carrier from one primary post to one primary
  post plus additive extra posts, then attach the previously deferred workbook
  extra-post semantics to customer users.

user_visible_outcome:
  - "用户可维护主岗位 + 附加岗位"
  - "岗位管理能看到主岗位或附加岗位关联用户"
  - "此前 deferred 的 workbook extra posts 真正落库"

scope:
  allowed_paths:
    - addons/smart_enterprise_base/models/**
    - addons/smart_enterprise_base/views/**
    - addons/smart_construction_custom/models/**
    - addons/smart_construction_custom/data/**
    - addons/smart_construction_custom/tests/**
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive only
  - reuse existing sc.enterprise.post model
  - keep one primary post field and add extra-post carrier separately
  - no ACL changes
  - no record rule changes

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Platform Master Data Implementation
  module: smart_enterprise_base / smart_construction_custom
  module_owner: enterprise base master data + customer bootstrap
  kernel_or_scenario: kernel
  reason: >
    The customer explicitly wants multi-post closure. The platform already owns
    the post carrier, and deferred workbook extra posts can now be attached
    without touching ACL or manifest boundaries.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-426.yaml

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - extra_post_carrier_requires_acl_change
  - company_consistency_for_extra_posts_cannot_be_enforced
  - non_additive_post_write_required

deliverables:
