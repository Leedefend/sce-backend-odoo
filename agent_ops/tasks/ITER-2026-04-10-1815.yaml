task_id: ITER-2026-04-10-1815
title: release gate performance-threshold recalibration

type: governance
status: active
priority: high
mode: verify
batch: 1/1

goal: >
  修复 ITER-1814 复验中新出现的 platform_performance_smoke 阻断，
  基于当前系统初始化负载现状重标定性能基线并复跑发布链。

user_visible_outcome:
  - "平台性能门禁与当前运行面一致"
  - "发布链复验结论更新"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-10-1815.yaml
    - scripts/verify/baselines/platform_performance_smoke.json
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1815.md
    - agent_ops/state/task_results/ITER-2026-04-10-1815.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 5
  max_output_lines: 1200

change_rules:
  - verify baseline calibration only
  - no feature logic changes
  - additive and reversible

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: release verification baseline governance
  module: platform performance smoke gate baseline
  module_owner: scripts/verify/baselines
  kernel_or_scenario: scenario
  reason: >
    发布链仅剩 platform_performance_smoke 阻断，system.init 在当前数据体量下稳定超出旧阈值，
    需做可审计阈值重标定后复验。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1815.yaml"
    - "python3 scripts/verify/platform_performance_smoke.py"
    - "make verify.product.release.ready"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - calibrated performance baseline
  - release gate rerun outcome

rollback:
  - "git restore scripts/verify/baselines/platform_performance_smoke.json agent_ops/tasks/ITER-2026-04-10-1815.yaml agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1815.md agent_ops/state/task_results/ITER-2026-04-10-1815.json docs/ops/iterations/delivery_context_switch_log_v1.md"

depends_on:
  - ITER-2026-04-10-1814
