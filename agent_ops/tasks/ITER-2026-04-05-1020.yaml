task_id: ITER-2026-04-05-1020
title: P2 migrate ops write endpoints route-shell ownership to smart_core
type: backend
status: active
priority: medium
mode: implement

goal: >
  Move `/api/ops/subscription/set`, `/api/ops/packs/batch_upgrade`, and
  `/api/ops/packs/batch_rollback` route-shell ownership to smart_core.

user_visible_outcome:
  - "ops 写接口入口壳归平台，写链行为保持兼容"

scope:
