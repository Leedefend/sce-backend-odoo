  max_candidates: 20
  max_output_lines: 180
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - p2_boundary_restoration_only
  - platform_route_shell_ownership
  - preserve_existing_contract_behavior
  - no_acl_or_financial_change

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-1019
  priority_lane: smart_construction_core_boundary_remediation_ops_p2

architecture:
