    - addons/smart_core/controllers/**
    - addons/smart_construction_core/controllers/ops_controller.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
