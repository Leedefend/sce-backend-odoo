task_id: ITER-2026-03-29-227
title: Refactor generic detail renderer into reusable components
type: product_task
status: pending
priority: high

goal: Split the generic detail renderer into reusable frontend components so the page shell, command bar, and layout containers stop accumulating implementation detail inside `ContractFormPage`.
user_visible_outcome:
  - detail-page behavior remains stable while the renderer becomes easier to evolve
  - subsequent detail iterations can target smaller components instead of a single overloaded page file

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail renderer
  reason: Backend facts are already sufficient, but `ContractFormPage` has become an overloaded implementation surface. The next efficient step is to extract reusable detail-renderer pieces without changing the generic contract-driven path.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-227.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-227.yaml frontend/apps/web/src/pages/ContractFormPage.vue frontend/apps/web/src/components/template/DetailCommandBar.vue frontend/apps/web/src/components/template/DetailShellLayout.vue frontend/apps/web/src/components/template/detailLayout.types.ts docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-227.md agent_ops/state/task_results/ITER-2026-03-29-227.json

depends_on:
  - ITER-2026-03-29-226

notes: "Keep the refactor generic and behavior-preserving; do not add project-specific renderer branches."
