task_id: ITER-2026-04-09-1464
title: permission-governance release admin baseline provisioning
type: permission-governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  在 sc_demo 运行态补齐平台级发布管理员基线（仅平台 admin 用户），
  使 release guards 从 SKIP_ENV 进入可执行 PASS 校验。

user_visible_outcome:
  - "release guards 在平台 admin 基线下可执行并通过"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-09-1464.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1464.md
    - agent_ops/state/task_results/ITER-2026-04-09-1464.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**

limits:
  max_files: 4
  max_output_lines: 220

change_rules:
  - runtime baseline provisioning only
  - release privilege must stay platform-admin-only
  - no industry user role grant (including demo_pm)

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true

architecture:
  layer_target: Platform permission baseline
  module: release admin runtime baseline
  module_owner: smart_core permission governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: business_fact
  backend_sub_layer_reason: >
    本批仅补齐平台管理员与发布权限事实映射，不改解释层或前端逻辑。
  reason: >
    用户已明确发布权限仅限平台级 admin，当前 guard 为 SKIP_ENV 需补齐运行态基线。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1464.yaml"
    - "cat <<'PY' | make odoo.shell.exec DB_NAME=sc_demo\nadmin_group = env.ref('smart_core.group_smart_core_admin', raise_if_not_found=False)\nbase_admin = env.ref('base.user_admin', raise_if_not_found=False)\nprint({'admin_group': bool(admin_group), 'base_admin': bool(base_admin), 'base_admin_in_group': bool(admin_group and base_admin and admin_group in base_admin.groups_id)})\nPY"
    - "DB_NAME=sc_demo make verify.release.operator_orchestration_guard"
    - "DB_NAME=sc_demo make verify.release.operator_write_model_guard"

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - acceptance_command_failed
  - platform_admin_only_constraint_broken
  - unauthorized_role_grant_detected

deliverables:
  - runtime admin baseline evidence
  - release guard verification evidence

rollback:
  - "cat <<'PY' | make odoo.shell.exec DB_NAME=sc_demo\nadmin_group = env.ref('smart_core.group_smart_core_admin', raise_if_not_found=False)\nbase_admin = env.ref('base.user_admin', raise_if_not_found=False)\nif admin_group and base_admin and admin_group in base_admin.groups_id:\n    base_admin.write({'groups_id': [(3, admin_group.id)]})\nprint('rollback_done')\nPY"
  - git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1464.md
  - git restore agent_ops/state/task_results/ITER-2026-04-09-1464.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-09-1463
