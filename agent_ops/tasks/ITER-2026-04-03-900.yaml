task_id: ITER-2026-04-03-900
title: Bind host preflight to explicit custom-frontend gateway origins
type: backend
status: active
priority: high
mode: implement

goal: >
  Constrain host preflight and diagnostics to explicit gateway origin candidates
  to avoid noisy non-gateway fallback families.

user_visible_outcome:
  - "主入口预检可显式绑定网关 origin 集合"
  - "验证聚焦网关链路，减少无效回退探测开销"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - explicit_gateway_binding_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-899
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host preflight gateway origin contract
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch only changes verification endpoint selection policy and does not
    alter business facts.
  reason: >
    Current fallback origin expansion introduces noisy non-gateway probes;
    explicit gateway-origin binding is required for deterministic host gating.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-900.yaml
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - gateway origin allowlist contract in host preflight script
  - host-gate evidence under explicit gateway binding mode

rollback:
  - git restore scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
  - git restore agent_ops/tasks/ITER-2026-04-03-900.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-900.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-900.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-899
