task_id: ITER-2026-04-14-0012
title: Project v3 100-row write authorization packet
status: in_progress
type: migration-authorization-gate
priority: high
mode: screen

goal: >
  Generate a no-DB authorization packet for the project v3 100-row create-only
  candidate without treating the packet as real DB write authorization.

user_visible_outcome:
  - "project v3 100 条写入授权包生成完成，真实写入仍需单独明确授权"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0012.yaml
    - scripts/migration/project_v3_100_write_authorization_packet.py
    - artifacts/migration/project_v3_100_write_authorization_packet.json
    - docs/migration_alignment/project_v3_100_write_authorization_packet.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0012.md
    - agent_ops/state/task_results/ITER-2026-04-14-0012.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_next_100_candidate_v3.csv
    - artifacts/migration/project_next_100_dry_run_result_v3.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 7
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - no-db-access
  - authorization-packet-only
  - no-write-authorization-implicit-grant
  - no-update
  - no-unlink
  - no-workflow-replay
  - no-acl-security-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: none
  upstream_task: ITER-2026-04-14-0011

architecture:
  layer_target: Project Migration Authorization Gate
  module: project.project v3 100-row write authorization packet
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch gates project business fact materialization and does not add
    frontend presentation semantics.
  reason: >
    The v3 100-row dry-run passed, so the next low-risk step is a no-DB write
    authorization packet.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0012.yaml
    - python3 -m py_compile scripts/migration/project_v3_100_write_authorization_packet.py
    - python3 scripts/migration/project_v3_100_write_authorization_packet.py
    - python3 -m json.tool artifacts/migration/project_v3_100_write_authorization_packet.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0012.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false
  remaining_gate: "explicit project v3 100-row DB write authorization"

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_access_attempted
  - write_authorization_implied
  - acl_or_security_change_attempted

deliverables:
  - task contract
  - authorization packet script
  - authorization packet json
  - authorization packet report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0011

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0012.yaml
  - git restore scripts/migration/project_v3_100_write_authorization_packet.py
  - git restore artifacts/migration/project_v3_100_write_authorization_packet.json
  - git restore docs/migration_alignment/project_v3_100_write_authorization_packet.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0012.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0012.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
