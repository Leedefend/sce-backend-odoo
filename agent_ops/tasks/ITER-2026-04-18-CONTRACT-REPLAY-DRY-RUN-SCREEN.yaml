architecture:
  layer_target: Business Fact Screening
  module: imported payment contract replay candidates
  module_owner: construction industry business continuity
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Whether an imported payment may inherit a contract_id is a business fact
    derived from exact old-system source evidence. This dry-run must not provide
    UI semantics or fabricate missing contract facts.
  reason: >
    Prior screens proved the residual unresolved legacy contract ID group is not
    replay-eligible, while earlier exact-one contract evidence remains a
    possible dedicated high-risk replay scope. The candidate set must be rebuilt
    read-only before any write batch.

change_rules:
  - screen only; no database writes
  - do not modify payment, contract, settlement, account, ACL, manifest, frontend, or migration data
  - only count candidates whose exact target contract_id is already resolved
  - exclude residual unresolved legacy contract ID values from replay eligibility

acceptance:
