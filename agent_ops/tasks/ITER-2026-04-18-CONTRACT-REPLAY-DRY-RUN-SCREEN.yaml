    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-18-CONTRACT-REPLAY-DRY-RUN-SCREEN.yaml
    - read-only Odoo shell dry-run for deterministic contract replay candidates

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - database_write_attempted
  - candidate_rule_unclear
  - replay_count_drift_not_explained

deliverables:
  - dry-run screen document with candidate counts and high-risk replay boundary

verification_result:
