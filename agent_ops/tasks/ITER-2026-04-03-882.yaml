task_id: ITER-2026-04-03-882
title: Release-grade usability proof for real-user publish decision
type: backend
status: active
priority: high
mode: verify

goal: >
  Prove real-user usability readiness for release by executing release-grade
  end-to-end and browser-entry convergence gates. If any critical gate fails,
  classify as not publishable.

user_visible_outcome:
  - "给出是否可发布的明确结论"
  - "以真实用户路径门禁作为发布依据而非轻量回归"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 4
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - verify-only
  - no_business_code_change

context:
  branch: codex/next-round
  baseline_sha: a59dd24
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-881
  priority_lane: usability_release_proof
  usability_battlefield: backend_plus_cross_stack

architecture:
  layer_target: Product Release Usability Proof
  module: real-user release-grade verification
  module_owner: verify chain
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Release decision is determined by backend-owned user-journey execution and
    host/browser entry convergence facts.
  reason: >
    Raise proof strength from regression confidence to publish decision evidence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-882.yaml
    - make verify.e2e.scene_admin
    - make verify.product.main_entry_convergence.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - release-grade usability proof result
  - publishability decision (publishable | not_publishable)
  - governance/report artifacts for ITER-2026-04-03-882

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-03-882.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-882.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-882.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-881
