task_id: ITER-2026-04-02-667
title: Convergence screen for current project lifecycle low-risk lane
type: backend
status: active
priority: high
mode: screen

goal: >
  Determine whether the current low-risk project lifecycle usability lane is
  stabilized and should converge to a new objective line.

user_visible_outcome:
  - "当前低风险线是否收敛有明确结论"
  - "后续调度方向更聚焦"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 5
  max_candidates: 2
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - screen stage only
  - no implementation
  - convergence decision only

context:
  branch: codex/next-round
  baseline_sha: fff06de
  explicit_user_authorization: true
  input_from: ITER-2026-04-02-666
  priority_lane: P1_project_lifecycle_usability
  usability_battlefield: backend

architecture:
  layer_target: Agent Governance
  module: low-risk lane convergence decision
  module_owner: agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business_fact
  backend_sub_layer_reason: >
    Evaluate convergence after business-fact usability and guard hardening batches.
  reason: >
    Avoid over-optimizing the same lane once acceptance + guard are stable.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-02-667.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - no_backend_semantic_candidate_remains

deliverables:
  - convergence_decision_for_current_low_risk_lane
  - governance/report artifacts for ITER-2026-04-02-667

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-02-667.yaml
  - git restore agent_ops/reports/2026-04-02/report.ITER-2026-04-02-667.md
  - git restore agent_ops/state/task_results/ITER-2026-04-02-667.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-02-666
