task_id: ITER-2026-03-31-417
title: Implement business-system admin authority path
type: implementation
status: active
priority: critical

goal: >
  Introduce a new business-system-admin authority path for customer delivery so
  workbook `管理员角色` can map to the highest business-system authority without
  implying platform-level settings authority.

user_visible_outcome:
  - "新增业务系统管理员权限路径"
  - "管理员角色可映射到企业业务系统最高权限"
  - "该权限路径不 implied base.group_system"

scope:
  allowed_paths:
    - addons/smart_construction_core/security/**
    - addons/smart_construction_core/models/support/**
    - addons/smart_construction_custom/security/**
    - addons/smart_construction_custom/models/**
    - addons/smart_construction_custom/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - frontend/**
    - migrations/**
    - deploy/**
    - addons/**/__manifest__.py
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

change_rules:
  - high-risk permission-governance batch
  - additive changes only
  - do not reuse any group that implies base.group_system
  - preserve existing ordinary business-role carriers
  - required verification must pass before batch can continue

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Permission Governance
  module: smart_construction_custom / smart_construction_core
  module_owner: customer-specific delivery customization with core role carrier alignment
  kernel_or_scenario: scenario
  reason: >
    The customer-defined business-system admin boundary cannot be satisfied by
    current executive/config-admin/super-admin carriers because they imply
    base.group_system. A dedicated permission-governance batch is now required.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-417.yaml

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - new_authority_path_still_implies_base_group_system
  - verify_failed
  - contract_uncertainty_detected

deliverables:
  - task contract for the dedicated high-risk implementation batch
  - follow-up implementation/report/result artifacts if execution proceeds safely

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-417.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-417.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-417.json

depends_on:
  - ITER-2026-03-31-416
