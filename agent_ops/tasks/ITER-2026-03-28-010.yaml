task_id: ITER-2026-03-28-010
title: Build runtime mainline convergence plan baseline
type: governance_task
status: pending
priority: high

goal: Convert the platform-kernel inventory into an executable runtime-mainline convergence plan that can drive the first backend refactor slices.
user_visible_outcome:
  - a runtime mainline convergence plan document exists
  - the plan defines current gaps, target chain, phased slices, and verification gates
  - the next backend refactor batch has a stable planning baseline

scope:
  allowed_paths:
    - docs/architecture/**
    - agent_ops/tasks/**
    - agent_ops/queue/**
    - docs/ops/iterations/**
    - docs/ops/releases/archive/temp/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Platform Layer
  module: docs/architecture runtime-mainline planning
  reason: Define the first concrete refactor axis for backend platform-kernel evolution around intent -> base contract -> scene orchestrator -> scene-ready contract convergence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-010.yaml
    - test -f docs/architecture/runtime_mainline_convergence_plan_v1.md
    - rg -n "Current Gaps|Target Runtime Chain|Phase 1|Verification Gates" docs/architecture/runtime_mainline_convergence_plan_v1.md

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore docs/architecture/runtime_mainline_convergence_plan_v1.md agent_ops/tasks/ITER-2026-03-28-010.yaml agent_ops/queue/platform_kernel_refactor_prep_queue.yaml docs/ops/iterations/delivery_context_switch_log_v1.md docs/ops/releases/archive/temp/TEMP_agent_ops_continuous_iteration_status_20260328.md

depends_on:
  - ITER-2026-03-28-008
notes: "First post-bootstrap refactor planning task after queue completion."
