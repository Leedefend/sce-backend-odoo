task_id: ITER-2026-04-01-502
title: Normalize execution-structure entry context after safe action retrieval
type: permission-governance
status: active
priority: high

goal: >
  Close the remaining execution-structure entry residual from ITER-2026-04-01-501
  by normalizing string action contexts inside the server action follow-through.

user_visible_outcome:
  - "execution structure 入口可由已交付角色正常打开"
  - "不再因 context 字符串归一化缺口报 ValueError"
  - "不改 ACL、不改 manifest、不扩展范围"

scope:
  allowed_paths:
    - addons/smart_construction_core/actions/execution_structure_actions_base.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - ultra-narrow implementation batch
  - only normalize action context handling in action_exec_structure_entry
  - no ACL, manifest, financial, or broader execution-surface changes

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: execution-structure entry context normalization
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-501 removed the ir.actions.act_window.view ACL failure for
    execution structure entry, but runtime now fails on direct dict() calls
    against string action contexts returned by safe action retrieval.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-502.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - "runtime audit confirms action_exec_structure_entry.run() works for representative delivered roles without act_window.view ACL or context ValueError failures"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - module_upgrade_fails
  - runtime_still_fails_on_exec_structure_entry
  - the_fix_requires_scope_expansion

deliverables:
  - execution-structure entry context normalization fix
  - regression coverage for safe context handling
  - governance/report artifacts for ITER-2026-04-01-502

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/actions/execution_structure_actions_base.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-04-01-502.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-502.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-502.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-501
