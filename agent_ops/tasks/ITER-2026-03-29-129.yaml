task_id: ITER-2026-03-29-129
title: Carry searchpanel through scene dsl base search fallback
type: governance_task
status: pending
priority: high

goal: Make scene dsl compiler carry searchpanel semantics from ui_base_contract.search during base search fallback.
user_visible_outcome:
  - parser-derived faceted searchpanel data now survives the earliest scene compile stage instead of only appearing in later orchestration bridges

scope:
  allowed_paths:
    - addons/smart_core/core/**
    - addons/smart_core/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: backend orchestration
  module: smart_core scene_dsl_compiler
  reason: Scene dsl compiler still falls back from ui_base_contract.search with a legacy subset that ignores searchpanel, so faceted search semantics can be lost before later backend orchestration stages run.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-129.yaml
    - python3 -m py_compile addons/smart_core/core/scene_dsl_compiler.py addons/smart_core/tests/test_scene_dsl_compiler_searchpanel_fallback.py
    - python3 addons/smart_core/tests/test_scene_dsl_compiler_searchpanel_fallback.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-129.yaml addons/smart_core/core/scene_dsl_compiler.py addons/smart_core/tests/test_scene_dsl_compiler_searchpanel_fallback.py

depends_on:
  - ITER-2026-03-29-128

notes: "Batch-3 continuation: faceted search semantics should exist from scene compile onward, not only after later bridges."
