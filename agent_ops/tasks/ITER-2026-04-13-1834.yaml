task_id: ITER-2026-04-13-1834
title: Project state create-only expansion gate v1
status: completed
type: migration-gate
priority: high
mode: execute

goal: >
  Prepare and validate a bounded create-only expansion candidate after project
  state write-side and read-side closures passed. This task must not write
  additional project records.

user_visible_outcome:
  - "项目状态 create-only 扩样准入完成，明确是否可以进入下一张真实写入授权批次"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1834.yaml
    - data/migration_samples/project_expand_candidate_v1.csv
    - artifacts/migration/project_expand_dry_run_result_v1.json
    - docs/migration_alignment/project_state_create_only_expand_validation_v1.md
    - docs/ops/verification/project_state_expand_sample_matrix_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1834.md
    - agent_ops/state/task_results/ITER-2026-04-13-1834.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/project/project.csv
    - artifacts/migration/project_create_only_write_result_v1.json
    - artifacts/migration/project_rollback_dry_run_result_v1.json
    - docs/migration_alignment/project_state_closure_expand_readiness_v1.md
    - agent_ops/state/task_results/ITER-2026-04-13-1833.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - gate-only
  - no-code-change
  - no-importer-change
  - no-database-write
  - no-orm-call
  - no-sample-write-import
  - no-update-upsert
  - safe-slice-fields-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  prior_write_trial: ITER-2026-04-13-1825
  write_side_closure: ITER-2026-04-13-1832
  read_side_closure: ITER-2026-04-13-1833
  target_candidate_size: 100

architecture:
  layer_target: Migration Gate Documentation
  module: project.project create-only expansion readiness
  module_owner: docs/migration_alignment + data/migration_samples + artifacts/migration + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The gate validates that project skeleton expansion will preserve lifecycle
    truth and stage projection without writing new data in this batch.
  reason: >
    State write-side and read-side closures passed. Before any new create-only
    write batch, candidate rows must be selected, dry-run classified, and gated
    as create-only with no update/upsert.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1834.yaml
    - python3 -m json.tool artifacts/migration/project_expand_dry_run_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1834.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - database_write_attempted
  - orm_call_attempted
  - update_or_upsert_detected
  - unsafe_field_detected
  - candidate_overlaps_existing_30

deliverables:
  - expansion candidate CSV
  - expansion dry-run result
  - expansion validation document
  - expansion sample matrix
  - iteration report

depends_on:
  - ITER-2026-04-13-1832
  - ITER-2026-04-13-1833

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1834.yaml
  - git restore data/migration_samples/project_expand_candidate_v1.csv
  - git restore artifacts/migration/project_expand_dry_run_result_v1.json
  - git restore docs/migration_alignment/project_state_create_only_expand_validation_v1.md
  - git restore docs/ops/verification/project_state_expand_sample_matrix_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1834.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1834.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
