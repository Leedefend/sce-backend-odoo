task_id: ITER-2026-04-05-977
title: Install smart_scene and smart_construction_scene then re-check publishability
type: backend
status: active
priority: high
mode: implement

goal: >
  Install both scene modules in sc_prod_sim runtime and re-verify release
  publishability under the current custom-frontend baseline.

user_visible_outcome:
  - "两个场景模块已安装，并给出是否满足发布条件的明确结论"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

limits:
  max_files: 5
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_install_and_verification_only
  - no_repository_source_change

context:
  branch: codex/next-round
  baseline_sha: f4bccf7
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-976
  priority_lane: delivery_simulation_alignment

architecture:
  layer_target: Delivery Simulation Runtime Alignment
  module: scene module runtime footprint
  module_owner: operations_runtime
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact
  backend_sub_layer_reason: >
    Module installation state is runtime business truth in target database.
  reason: >
    User explicitly requested installing both scene modules before final
    publish-condition judgment.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-977.yaml
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim MODULE=smart_scene DB_NAME=sc_prod_sim make mod.install
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim MODULE=smart_construction_scene DB_NAME=sc_prod_sim make mod.install
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make restart
    - docker exec sc-backend-odoo-prod-sim-db-1 psql -U odoo -d sc_prod_sim -c "select name,state from ir_module_module where name in ('smart_scene','smart_construction_scene') order by name;"
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make verify.extension_modules.guard
    - ARTIFACTS_DIR=artifacts ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost API_BASE_URL=http://127.0.0.1:18069 DB_NAME=sc_prod_sim E2E_LOGIN=wutao E2E_PASSWORD=demo make verify.release.execution_protocol.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed

deliverables:
  - scene_modules_installed_and_publish_verdict

rollback:
  - uninstall runtime modules if needed via Odoo Apps in sc_prod_sim
  - restore sc_prod_sim from snapshot if installation causes regression
  - git restore agent_ops/tasks/ITER-2026-04-05-977.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-977.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-977.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-976
