task_id: ITER-2026-03-31-463
title: Upgrade the customer-facing permission strategy for full internal read, PM cost-read, and full business executive authority
type: permission-governance
status: active
priority: high

goal: >
  Upgrade the delivered business permission strategy so all internal users gain
  read-only access across business domains, PM gains cost read without cost
  operation/approval, executive gains full business authority without platform
  leakage, and menu/action visibility aligns with that policy.

user_visible_outcome:
  - "内部用户获得全业务域只读"
  - "项目管理获得成本只读，不获得成本经办/审批"
  - "管理层获得完整业务权限，但不越到平台级"
  - "只读菜单/动作与角色策略对齐"

scope:
  allowed_paths:
    - addons/smart_construction_custom/security/role_matrix_groups.xml
    - addons/smart_construction_core/security/action_groups_patch.xml
    - addons/smart_construction_core/views/menu.xml
    - addons/smart_construction_core/views/menu_finance_center.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive or narrowing-only permission changes
  - no ACL or record-rule edits in this batch
  - keep business operation and approval ownership unchanged for non-executive roles
  - internal-user read expansion must use existing read groups where available
  - executive must remain off platform-level groups

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
  layer_target: Customer Permission Governance Implementation
  module: delivered role strategy + menu/action alignment
  module_owner: customer delivery chain + industry permission surface
  kernel_or_scenario: scenario
  reason: >
    The user requested a complete permission-strategy upgrade: all internal
    users should have read-only access across business domains, PM should gain
    cost read without cost operation/approval, executive should hold full
    business authority without platform leakage, and read-only navigation should
    align with those policy changes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-463.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo
    - runtime SQL audit confirms Sichuan Baosheng internal users gain expanded read coverage, PM gains cost read without cost manager/user, and executive gains full business authority without platform leakage

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - read_expansion_requires_acl_changes
  - executive_platform_leak_reappears
  - verify_smart_core_fails
  - runtime_authority_matrix_becomes_ambiguous

deliverables:
  - upgraded delivered role matrix for customer roles
  - aligned read-only menu/action visibility for the first business domains
  - governance/report artifacts for ITER-2026-03-31-463

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo`
  - git restore addons/smart_construction_custom/security/role_matrix_groups.xml
  - git restore addons/smart_construction_core/security/action_groups_patch.xml
  - git restore addons/smart_construction_core/views/menu.xml
  - git restore addons/smart_construction_core/views/menu_finance_center.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-463.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-463.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-463.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

