task_id: ITER-2026-04-01-501
title: Fix execution-side secondary entry dispatch to avoid act_window.view ACL failures
type: permission-governance
status: active
priority: high

goal: >
  Remove the remaining ir.actions.act_window.view ACL dependence from the
  execution-side secondary entrypoints discovered in ITER-2026-04-01-500,
  without changing ACL policy or broader BOQ/execution semantics.

user_visible_outcome:
  - "project progress entry 和 execution structure 入口可由已交付角色正常打开"
  - "secondary execution entrypoints 不再因 ir.actions.act_window.view ACL 失败"
  - "不改 ACL、不改 manifest、不扩展到 payment/settlement/account"

scope:
  allowed_paths:
    - addons/smart_construction_core/models/core/project_core.py
    - addons/smart_construction_core/actions/execution_structure_actions_base.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - narrow implementation batch for execution-side action dispatch only
  - no ACL, manifest, bootstrap, or financial semantic changes
  - only fix runtime action retrieval/follow-through so delivered roles stop hitting ir.actions.act_window.view ACL

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: execution-side secondary entry dispatch fix
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-500 proved that action_open_project_progress_entry() and
    action_exec_structure_entry.run() are group-visible but fail at runtime for
    delivered roles because of ir.actions.act_window.view ACL dependence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-501.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - "runtime audit confirms project progress entry and execution structure entry both execute without ir.actions.act_window.view ACL failures for representative delivered roles"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - module_upgrade_fails
  - runtime_still_hits_ir_actions_act_window_view_acl
  - the_fix_requires_acl_or_manifest_changes

deliverables:
  - execution-side action dispatch fix
  - regression coverage for progress-entry and exec-structure entrypoints
  - governance/report artifacts for ITER-2026-04-01-501

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/models/core/project_core.py
  - git restore addons/smart_construction_core/actions/execution_structure_actions_base.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-04-01-501.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-501.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-501.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-500
