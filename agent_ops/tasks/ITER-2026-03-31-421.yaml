task_id: ITER-2026-03-31-421
title: Freeze platform-level carrier for customer workbook posts
type: governance
status: active
priority: high

goal: >
  Freeze an implementation-ready platform-level carrier for customer workbook
  岗位 so the next batch can extend repository-backed user master data without
  guessing where posts belong.

user_visible_outcome:
  - "冻结岗位主数据的推荐承载模型"
  - "冻结用户与岗位的推荐关联方式"
  - "明确哪些内容属于平台主数据扩展，哪些不属于权限角色"

scope:
  allowed_paths:
    - addons/smart_enterprise_base/models/**
    - addons/smart_enterprise_base/views/**
    - addons/smart_enterprise_base/data/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - governance and audit only
  - no model field implementation in this batch
  - no ACL changes
  - no record rule changes
  - freeze ownership before implementation

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Platform Master Data Governance
  module: smart_enterprise_base
  module_owner: enterprise base master data
  kernel_or_scenario: kernel
  reason: >
    Workbook 岗位 must move into a real repository-backed carrier, but the
    carrier has to be frozen first so the next implementation batch does not
    mix customer-specific semantics into role governance.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-421.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - no_clear_platform_carrier_found
  - implementation_required_to_resolve_uncertainty
  - ownership_boundary_becomes_unclear

deliverables:
  - task/report/result artifacts for ITER-2026-03-31-421

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-421.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-421.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-421.json

depends_on:
  - ITER-2026-03-31-420
