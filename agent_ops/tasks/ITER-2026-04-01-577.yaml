task_id: ITER-2026-04-01-577
title: Add explicit record-open affordance guidance to the native list surface
type: frontend
status: active
priority: high

goal: >
  Make the list-to-record continuation path more explicit by adding concise
  guidance that rows can be opened for details from the native list surface.

user_visible_outcome:
  - "用户能更清楚地知道点击列表行会进入详情"
  - "减少列表到详情主链的猜测成本"
  - "不改变行点击行为本身"

scope:
