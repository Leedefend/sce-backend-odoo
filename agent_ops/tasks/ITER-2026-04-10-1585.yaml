task_id: ITER-2026-04-10-1585
title: backend refactor v2 large-batch rebuild skeleton and governance guards
type: governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  在不切换旧运行时的前提下，一次性完善 smart_core v2 的完整分层骨架（intents/dispatcher/validators/policies/handlers/services/parsers/orchestrators/builders/contracts）
  并补齐重建治理文档与边界审计脚本，进入可持续迁移状态。

user_visible_outcome:
  - "v2 模块具备完整可扩展架构骨架与边界守卫，可连续迁移直至替换旧模块"

scope:
  allowed_paths:
    - addons/smart_core/v2/**
    - scripts/verify/v2_*audit.py
    - docs/architecture/backend_core_refactor_blueprint_v1.md
    - docs/architecture/backend_core_v2_rebuild_spec_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1585.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1585.md
    - agent_ops/state/task_results/ITER-2026-04-10-1585.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 30
  max_output_lines: 900

change_rules:
  - v2 shadow module only
  - additive scaffold and governance only
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel shadow refactor layer
  module: smart_core v2 complete skeleton
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅完善 v2 架构骨架与治理守卫，不改业务事实层。
  reason: >
    用户明确要求一口气推进重建，当前批次采用大切片方式完成 v2 可迁移基础设施。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1585.yaml"
    - "python3 -m py_compile addons/smart_core/v2/dispatcher.py addons/smart_core/v2/intents/registry.py addons/smart_core/v2/handlers/base.py addons/smart_core/v2/validators/base.py addons/smart_core/v2/policies/permission_policy.py addons/smart_core/v2/parsers/base.py addons/smart_core/v2/orchestrators/base.py addons/smart_core/v2/contracts/envelope.py"
    - 'python3 scripts/verify/v2_boundary_audit.py --json'
    - 'rg -n "class BaseParserV2|class BaseOrchestratorV2|class IntentExecutionResultV2|def assert_v2_boundaries" addons/smart_core/v2 scripts/verify/v2_boundary_audit.py'
    - "rg -n \"v2 large-batch rebuild skeleton\" docs/architecture/backend_core_refactor_blueprint_v1.md"
    - "rg -n \"迁移原则|职责边界|切换策略\" docs/architecture/backend_core_v2_rebuild_spec_v1.md"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - v2 complete layered skeleton and governance guards

rollback:
  - git restore addons/smart_core/v2 scripts/verify/v2_boundary_audit.py docs/architecture/backend_core_refactor_blueprint_v1.md docs/architecture/backend_core_v2_rebuild_spec_v1.md

depends_on:
  - ITER-2026-04-10-1584
