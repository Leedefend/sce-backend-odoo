task_id: ITER-2026-03-30-374
title: Move capability and scene seeds from core data to scene ownership
type: code
status: in_progress
priority: medium

goal: >
  Move the remaining orchestration-oriented seeds out of
  `smart_construction_core/data` by relocating capability-group and capability
  seed definitions into `smart_construction_scene`, while keeping compatibility
  through existing prefixed-XMLID patterns and without changing any manifest.

user_visible_outcome:
  - scene/capability seed ownership shifts away from industry core
  - no manifest change is required
  - module upgrade and smart-core verification remain green

scope:
  allowed_paths:
    - addons/smart_construction_core/data/sc_capability_group_seed.xml
    - addons/smart_construction_core/data/sc_scene_seed.xml
    - addons/smart_construction_scene/data/sc_scene_orchestration.xml
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - do not modify any manifest
  - keep compatibility via prefixed XMLIDs where needed
  - limit this batch to capability-group and capability seed ownership only

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Scene Layer
  module: capability and scene seed ownership migration
  module_owner: smart_construction_scene
  kernel_or_scenario: scenario
  reason: >
    After the ownership audit, the next low-risk cleanup target is the pair of
    orchestration-oriented seed files still parked in core data. These belong
    closer to scene ownership than to industry domain core.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-374.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_scene DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - xmlid_compatibility_breaks_upgrade

deliverables:
  - capability-group and capability seeds moved to scene-owned data loading
  - report and task result artifacts for ITER-2026-03-30-374
  - delivery log checkpoint for the next bootstrap cleanup line

rollback:
  - git restore addons/smart_construction_core/data/sc_capability_group_seed.xml
  - git restore addons/smart_construction_core/data/sc_scene_seed.xml
  - git restore addons/smart_construction_scene/data/sc_scene_orchestration.xml
  - git restore agent_ops/tasks/ITER-2026-03-30-374.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-374.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-374.json

depends_on:
  - ITER-2026-03-30-373
