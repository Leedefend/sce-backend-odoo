task_id: ITER-2026-04-14-0004
title: Contract 12-row create-only write v1
status: in_progress
type: migration-db-write
priority: high
mode: execute

goal: >
  Execute the explicitly authorized 12-row construction.contract create-only
  write using the frozen authorization payload. Capture pre/post snapshots and
  rollback targets in the same batch.

user_visible_outcome:
  - "12 条合同 create-only 写入完成，并输出写后复核与 rollback target"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0004.yaml
    - scripts/migration/contract_12_row_create_only_write.py
    - artifacts/migration/contract_12_row_pre_write_snapshot_v1.csv
    - artifacts/migration/contract_12_row_post_write_snapshot_v1.csv
    - artifacts/migration/contract_12_row_write_result_v1.json
    - artifacts/migration/contract_12_row_rollback_target_list_v1.csv
    - docs/migration_alignment/contract_12_row_create_only_write_report_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0004.md
    - agent_ops/state/task_results/ITER-2026-04-14-0004.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/contract_12_row_write_authorization_payload_v1.csv
    - artifacts/migration/contract_12_row_write_authorization_packet_v1.json
    - docs/migration_alignment/contract_12_row_write_authorization_packet_v1.md
    - docs/migration_alignment/contract_12_row_post_write_review_rollback_lock_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 10
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - authorized-db-write
  - create-only
  - no-update
  - no-unlink
  - no-workflow-replay
  - no-contract-lines
  - no-payment-linkage
  - no-settlement-linkage

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-14-0003
  user_authorization: "同意授权"
  authorization_payload: artifacts/migration/contract_12_row_write_authorization_payload_v1.csv

architecture:
  layer_target: Contract Migration Write Batch
  module: construction.contract 12-row create-only write
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch materializes explicitly authorized contract business facts from
    the frozen migration payload, without adding presentation semantics.
  reason: >
    The user explicitly authorized proceeding after the authorization packet and
    rollback-lock design passed.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0004.yaml
    - python3 -m py_compile scripts/migration/contract_12_row_create_only_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/contract_12_row_create_only_write.py
    - python3 -m json.tool artifacts/migration/contract_12_row_write_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0004.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: true
  manual_approval_received: "同意授权"

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - update_attempted
  - unlink_attempted
  - workflow_replay_attempted
  - contract_line_created
  - payment_or_settlement_linkage_created

deliverables:
  - task contract
  - authorized write script
  - pre-write snapshot
  - post-write snapshot
  - write result json
  - rollback target list
  - write report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0003

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0004.yaml
  - git restore scripts/migration/contract_12_row_create_only_write.py
  - git restore artifacts/migration/contract_12_row_pre_write_snapshot_v1.csv
  - git restore artifacts/migration/contract_12_row_post_write_snapshot_v1.csv
  - git restore artifacts/migration/contract_12_row_write_result_v1.json
  - git restore artifacts/migration/contract_12_row_rollback_target_list_v1.csv
  - git restore docs/migration_alignment/contract_12_row_create_only_write_report_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0004.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0004.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
