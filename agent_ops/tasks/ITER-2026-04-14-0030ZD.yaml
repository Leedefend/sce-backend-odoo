task_id: ITER-2026-04-14-0030ZD
title: Project member L3 candidate role-source review packet v1
status: completed
type: migration-role-source-review-packet
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030ZC2

goal: >
  Build a readonly manual review packet for L3 project_member responsibility
  candidates so business reviewers can supply verified role facts before any
  project.responsibility write.

user_visible_outcome:
  - "将 10 个 L3 优先候选整理成人工补角色审阅包，不写责任模型"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030ZD.yaml
    - scripts/migration/project_member_l3_role_source_review_packet.py
    - artifacts/migration/project_member_l3_role_source_review_packet_v1.json
    - artifacts/migration/project_member_l3_role_source_review_packet_v1.csv
    - artifacts/migration/project_member_l3_role_source_review_summary_v1.json
    - docs/migration_alignment/project_member_l3_role_source_review_packet_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030ZD.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030ZD.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_responsibility_candidates_v1.json
    - artifacts/migration/project_member_responsibility_candidate_summary_v1.json
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - readonly-review-packet-only
  - no-db-write
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - no-promotion-execution

architecture:
  layer_target: Migration Role Source Review Packet
  module: project_member L3 candidate role-source review
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch prepares a review packet for missing business role facts. It does
    not create responsibility facts or permission semantics.
  reason: >
    0030ZC2 found 10 L3 candidates by evidence strength but all 362 pairs still
    require role sources. A review packet is needed before any responsibility
    write can be safely considered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030ZD.yaml
    - python3 -m py_compile scripts/migration/project_member_l3_role_source_review_packet.py
    - python3 scripts/migration/project_member_l3_role_source_review_packet.py
    - python3 -m json.tool artifacts/migration/project_member_l3_role_source_review_packet_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_role_source_review_summary_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

rollback:
  - "No database rollback required because this batch is readonly and artifact-only."
  - "Delete generated 0030ZD review packet artifacts if the packet must be regenerated."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_detected
  - project_responsibility_write_attempted
  - role_key_fabrication_attempted
  - l3_count_not_10

deliverables:
  - task contract
  - readonly L3 review packet script
  - review packet json
  - review packet csv
  - review packet summary json
  - review packet documentation
  - iteration report
  - task result json
