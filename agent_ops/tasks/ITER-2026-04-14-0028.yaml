task_id: ITER-2026-04-14-0028
title: Partner rebuild importer no-DB dry-run gate v1
status: in_progress
type: migration-importer-dry-run
priority: high
mode: execute

goal: >
  Build the first full-rebuild-grade partner importer dry-run template by
  reconciling the 7864-row company primary source with the 3041-row supplier
  supplemental source, producing deterministic deduplication results and a
  clean safe slice without writing to the database.

user_visible_outcome:
  - "partner L1 dry-run 完成，生成去重统计、merge strategy 与 50~100 条 safe slice"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0028.yaml
    - scripts/migration/partner_rebuild_dry_run.py
    - artifacts/migration/partner_dry_run_result_v1.json
    - artifacts/migration/partner_safe_slice_v1.csv
    - docs/migration_alignment/partner_mapping_strategy_v1.md
    - docs/migration_alignment/partner_dedup_strategy_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0028.md
    - agent_ops/state/task_results/ITER-2026-04-14-0028.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - docs/migration_alignment/migration_master_plan_v1.md
    - docs/migration_alignment/importer_promotion_gate_v1.md
    - docs/migration_alignment/lane_promotion_sequence_v1.md
    - tmp/raw/partner/company.csv
    - tmp/raw/partner/supplier.csv
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 360
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - no-odoo-shell
  - no-addon-change
  - no-acl-security-change
  - no-payment-settlement-account-change
  - dry-run-output-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_lane: partner
  importer_level: L1 dry-run
  upstream_task: ITER-2026-04-14-0027
  primary_source_rows: 7864
  supplier_source_rows: 3041

architecture:
  layer_target: Partner Migration Importer Dry Run
  module: res.partner rebuild importer mapping
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch maps legacy partner business facts and classifies dedup/merge
    groups without emitting frontend or presentation semantics.
  reason: >
    ITER-2026-04-14-0027 froze partner as the next lane after project. This
    batch establishes partner L1 dry-run evidence before any safe-slice write
    can be considered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0028.yaml
    - python3 -m py_compile scripts/migration/partner_rebuild_dry_run.py
    - python3 scripts/migration/partner_rebuild_dry_run.py
    - python3 -m json.tool artifacts/migration/partner_dry_run_result_v1.json
    - test -s artifacts/migration/partner_safe_slice_v1.csv
    - test -s docs/migration_alignment/partner_mapping_strategy_v1.md
    - test -s docs/migration_alignment/partner_dedup_strategy_v1.md
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0028.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - odoo_shell_attempted
  - addon_change_attempted
  - acl_or_security_change_attempted
  - payment_settlement_account_change_attempted
  - source_shape_uncertain

deliverables:
  - task contract
  - partner dry-run script
  - dry-run result json
  - partner safe slice csv
  - partner mapping strategy doc
  - partner dedup strategy doc
  - iteration report
  - task result json
  - delivery context log update

depends_on:
  - ITER-2026-04-14-0027

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0028.yaml
  - git restore scripts/migration/partner_rebuild_dry_run.py
  - git restore artifacts/migration/partner_dry_run_result_v1.json
  - git restore artifacts/migration/partner_safe_slice_v1.csv
  - git restore docs/migration_alignment/partner_mapping_strategy_v1.md
  - git restore docs/migration_alignment/partner_dedup_strategy_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0028.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0028.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
