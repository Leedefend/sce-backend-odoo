task_id: ITER-2026-03-31-448
title: Recover fresh runtime install order by deferring enterprise business-full ACL and menu grants to smart_construction_core
type: implementation
status: active
priority: high

goal: >
  Fix the fresh non-demo install chain so smart_enterprise_base can load before
  smart_construction_core without referencing industry groups that do not exist
  yet, while preserving the final business-admin ownership after the industry
  module finishes loading.

user_visible_outcome:
  - "fresh 平台库可以继续安装 smart_construction_core"
  - "企业维护最终仍由业务管理员路径持有"
  - "平台基座不再前置依赖行业组"

scope:
  allowed_paths:
    - AGENTS.md
    - addons/smart_enterprise_base/security/ir.model.access.csv
    - addons/smart_enterprise_base/views/menu_enterprise_base.xml
    - addons/smart_construction_core/security/ir.model.access.csv
    - addons/smart_construction_core/security/action_groups_patch.xml
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive recovery batch
  - keep smart_enterprise_base self-contained before smart_construction_core loads
  - defer business-full ACL and menu/action grants to smart_construction_core late patch files
  - preserve final business-admin ownership semantics after smart_construction_core install
  - no manifest changes
  - no financial-domain changes

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo

architecture:
  layer_target: Fresh Runtime Recovery
  module: smart_enterprise_base + smart_construction_core
  module_owner: platform/industry install-order chain
  kernel_or_scenario: kernel
  reason: >
    The fresh non-demo runtime stopped because smart_enterprise_base now
    references smart_construction_core.group_sc_business_full in ACL and menu
    data before the industry module has loaded. The clean recovery path is to
    restore platform self-sufficiency and re-apply the business-full grants from
    smart_construction_core after its groups exist.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-448.yaml
    - make db.reset DB=sc_odoo
    - make verify.platform_baseline DB_NAME=sc_odoo
    - make mod.install MODULE=smart_construction_core DB_NAME=sc_odoo

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - fresh_install_chain_still_references_unloaded_industry_groups
  - business_admin_ownership_cannot_be_restored_after_core_install
  - any_manifest_or_record_rule_change_becomes_required

deliverables:
  - implementation/report/result artifacts for ITER-2026-03-31-448

rollback:
  - git restore AGENTS.md
  - git restore addons/smart_enterprise_base/security/ir.model.access.csv
  - git restore addons/smart_enterprise_base/views/menu_enterprise_base.xml
  - git restore addons/smart_construction_core/security/ir.model.access.csv
  - git restore addons/smart_construction_core/security/action_groups_patch.xml
  - git restore agent_ops/tasks/ITER-2026-03-31-448.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-448.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-448.json

depends_on:
  - ITER-2026-03-31-446
