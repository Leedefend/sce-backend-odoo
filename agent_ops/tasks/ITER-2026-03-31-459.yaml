task_id: ITER-2026-03-31-459
title: Govern a non-platform executive authority path for customer delivery users
type: governance
status: active
priority: high

goal: >
  Define a safe permission-governance batch that separates the customer-facing
  executive authority path from platform-level authority, so management users
  can later be assigned without crossing the platform governance boundary.

user_visible_outcome:
  - "明确管理层权限为何当前不能直接发放"
  - "明确新的客户侧管理层权限路径应具备什么边界"
  - "为后续实现批次冻结可执行治理目标"

scope:
