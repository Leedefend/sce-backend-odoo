  - no implementation changes in this batch
  - freeze the target boundary before any security-path implementation

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
