task_id: ITER-2026-03-30-311
title: Close list toolbar route-preset display and deduplication gaps
type: frontend
status: in_progress
priority: high

goal: >
  Close the remaining list-toolbar presentation gaps by preventing preset-filter
  route state from polluting the search box and by resolving route-preset raw
  keys into user-readable metadata labels.

user_visible_outcome:
  - route preset no longer duplicates itself as a fake search term
  - route preset labels become user-readable instead of raw technical keys
  - the list toolbar reads as one coherent business-facing interaction surface

scope:
  allowed_paths:
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/app/runtime/**
    - frontend/apps/web/src/components/page/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - interaction closeout batch
  - no backend changes
  - reuse existing route state and metadata chips only

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The list toolbar contract surface is functionally complete, but route preset
    state still leaks as a raw technical token and duplicates itself as search.
    This batch closes the remaining presentation and state-consumption gaps.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-311.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - route_preset_cleanup_requires_new_backend_semantics

deliverables:
  - deduped_route_preset_and_search_display
  - human_readable_route_preset_labels
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore frontend/apps/web/src/app/runtime/actionViewRoutePresetRuntime.ts
  - git restore agent_ops/tasks/ITER-2026-03-30-311.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-310

notes: >
  Eliminate the preset-filter to search-term leakage and prefer human-readable
  labels by resolving against already available quick-filter, saved-filter, and
  group-by metadata.
