task_id: ITER-2026-04-01-562
title: Screen the next display-only toolbar candidate from the fresh bounded scan
type: frontend
status: active
priority: medium
mode: screen

goal: >
  Consume the fresh bounded toolbar scan and select the cleanest next
  display-only or bounded-structure candidate for implementation.

user_visible_outcome:
  - "从 fresh scan 中收敛出下一条 toolbar 可用性实现族"
  - "保持 screen 只做归类，不重扫仓库"
  - "为后续单文件实现批次提供短上下文输入"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 3
  max_candidates: 5
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost screen stage only
  - read only the scan result from ITER-2026-04-01-561
  - do not read new product files in this batch
  - do not implement in this batch

context:
  branch: codex/next-round
  baseline_sha: 8992446
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-561
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar screen
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The fresh bounded scan has produced the next toolbar candidate set. This
    screen batch must select only one clean follow-up family before any code
    change happens.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-562.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - screen_reads_new_product_files
  - screen_reopens_repo_scan
  - no_low_risk_candidate_remains

deliverables:
  - selected_next_toolbar_candidate_family
  - governance/report artifacts for ITER-2026-04-01-562

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-562.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-562.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-562.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-561
