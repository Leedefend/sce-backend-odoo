task_id: ITER-2026-03-30-354
title: Migrate active runtime scene semantics from smart_construction_core to the scene layer
type: code
status: in_progress
priority: high

goal: >
  Continue the fact-layer cleanup by moving active runtime scene semantics out
  of `smart_construction_core/core_extension.py` and into the scene layer,
  instead of leaving scene maps and scene-oriented role metadata inside the
  industry core module.

user_visible_outcome:
  - runtime scene ownership moves toward the scene layer
  - industry core stops being the long-term owner of scene mapping hooks
  - existing scene-driven navigation remains functional during the migration

scope:
  allowed_paths:
    - addons/smart_construction_core/__init__.py
    - addons/smart_construction_core/core_extension.py
    - addons/smart_construction_core/data/sc_extension_params.xml
    - addons/smart_construction_scene/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - migrate active scene semantics instead of hard-deleting them
  - keep existing navigation/scene resolution functional
  - do not touch ACL, manifests, or financial domain logic

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Scene Layer Migration
  module: runtime scene hook ownership
  module_owner: addons/smart_construction_scene + addons/smart_construction_core
  kernel_or_scenario: scenario
  reason: >
    Direct scene seed records have been removed from the industry fact file.
    The remaining boundary violation is the active runtime scene semantics still
    owned by smart_construction_core/core_extension.py.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-354.yaml

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - scene_layer_hook_cannot_replace_core_hook_safely
  - runtime_nav_resolution_regression_detected

deliverables:
  - migrated runtime scene semantics into the scene layer or a proven-safe ownership split
  - report and task result artifacts for ITER-2026-03-30-354
  - delivery log checkpoint for the migration line

rollback:
  - git restore addons/smart_construction_core/core_extension.py
  - git restore addons/smart_construction_scene
  - git restore agent_ops/tasks/ITER-2026-03-30-354.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-354.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-354.json

depends_on:
  - ITER-2026-03-30-353

notes: >
  The primary candidates are `smart_core_nav_scene_maps`, scene-oriented
  landing metadata, and ext-fact scene metadata currently emitted from
  smart_construction_core/core_extension.py`.
