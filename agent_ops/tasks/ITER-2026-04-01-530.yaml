task_id: ITER-2026-04-01-530
title: Resume native list route-preset verification on the trusted container lane
type: frontend
status: active
priority: medium
mode: verify

goal: >
  Resume the product-usability verify line after the smoke compatibility repair
  and confirm the native list toolbar remains stable on the trusted container
  lane after route-preset deduplication.

user_visible_outcome:
  - "确认推荐筛选去重后的 list toolbar 在可信验证链路下仍可用"
  - "确认当前产品改动仍是纯显示层收口"
  - "恢复产品可用性连续迭代的 verify 节奏"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 4
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
    - reporter
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost verify stage only
  - bounded role-parallel execution is allowed inside this verify stage
  - do not modify product code in this batch
  - do not reopen repository scans
  - verify only against the trusted container lane and current frontend typecheck gate

context:
  branch: codex/next-round
  baseline_sha: 2a02eb6
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-529
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar verification
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The prior verify batch stopped on an environment/tooling mismatch rather
    than a product issue. After restoring the smoke chain, the next safe step
    is to rerun the usability verification on the trusted container lane.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-530.yaml
    - pnpm -C frontend/apps/web typecheck:strict
    - make verify.portal.v0_5.container

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - verify_command_failed
  - trusted_container_verify_failed
  - role_parallel_conflict_detected
  - verification_requires_product_code_changes

deliverables:
  - resumed verify verdict for route-preset deduplication
  - code result and gate result on the trusted container lane
  - governance/report artifacts for ITER-2026-04-01-530

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-530.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-530.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-530.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-529
