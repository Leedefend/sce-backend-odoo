task_id: ITER-2026-03-30-303
title: Surface native default markers for saved filters and group-by chips
type: frontend
status: in_progress
priority: medium

goal: >
  Improve list usability by exposing which saved filters and group-by entries are
  marked as default in the native contract metadata.

user_visible_outcome:
  - users can distinguish default saved filters from optional ones
  - users can distinguish default group-by entries from optional ones
  - no new interaction or backend behavior is introduced

scope:
  allowed_paths:
    - frontend/apps/web/src/app/action_runtime/**
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/components/page/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/pages/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - use existing contract metadata only
  - no backend changes
  - no new interaction semantics

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Saved filters and group-by chips already carry native default metadata in
    the runtime layer. Exposing it improves list usability without inventing new
    behaviors.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-303.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - default_marker_display_requires_backend_change

deliverables:
  - default_marker_labeling_for_saved_filters_and_groupby
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewFilterComputedRuntime.ts
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-303.yaml

depends_on:
  - ITER-2026-03-30-302

notes: >
  The display should be derived from existing isDefault metadata only, with no
  change to selection behavior.
