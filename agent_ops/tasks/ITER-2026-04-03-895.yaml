task_id: ITER-2026-04-03-895
title: Add HTTP fallback probe for host login preflight connectivity
type: backend
status: active
priority: high
mode: implement

goal: >
  Improve host preflight robustness by adding a bounded HTTP-module fallback
  probe when runtime fetch cannot reach login routes.

