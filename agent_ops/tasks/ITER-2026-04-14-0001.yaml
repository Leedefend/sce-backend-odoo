task_id: ITER-2026-04-14-0001
title: Contract header 12-row readonly DB precheck v1
status: in_progress
type: migration-readonly-db-precheck
priority: high
mode: execute

goal: >
  Validate the 12 contract header dry-run rows against the target DB using
  readonly checks only. Confirm anchors, uniqueness, default tax availability,
  and sequence availability before any contract write authorization request.

user_visible_outcome:
  - "12 条合同 header 候选完成只读 DB 预检；不创建或更新合同"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0001.yaml
    - scripts/migration/contract_header_12_row_readonly_db_precheck.py
    - artifacts/migration/contract_header_12_row_readonly_db_precheck_v1.json
    - docs/migration_alignment/contract_header_12_row_readonly_db_precheck_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0001.md
    - agent_ops/state/task_results/ITER-2026-04-14-0001.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/contract_header_12_row_dry_run_rows_v1.csv
    - artifacts/migration/contract_header_12_row_dry_run_result_v1.json
    - docs/migration_alignment/contract_header_12_row_dry_run_v1.md
    - addons/smart_construction_core/models/support/contract_center.py
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 7
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-db-precheck
  - no-db-write
  - no-orm-create
  - no-orm-write
  - no-contract-create
  - no-contract-update
  - no-tax-create
  - no-tax-update
  - no-sequence-update
  - preserve-contract-write-block

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-13-1863
  dry_run_input: artifacts/migration/contract_header_12_row_dry_run_rows_v1.csv

architecture:
  layer_target: Contract Migration Readonly DB Precheck
  module: construction.contract header candidate DB gates
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch validates DB-side business facts required by contract creation,
    including target anchors, uniqueness, sequence availability, and default
    tax availability, without changing those facts.
  reason: >
    The 12-row dry-run passed locally. The next safe step is readonly DB
    precheck, not contract write, because no explicit contract write
    authorization exists.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0001.yaml
    - python3 -m py_compile scripts/migration/contract_header_12_row_readonly_db_precheck.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/contract_header_12_row_readonly_db_precheck.py
    - python3 -m json.tool artifacts/migration/contract_header_12_row_readonly_db_precheck_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0001.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - contract_create_attempted
  - contract_update_attempted
  - tax_create_or_update_attempted
  - contract_write_authorization_required

deliverables:
  - task contract
  - readonly DB precheck script
  - readonly DB precheck result json
  - precheck document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1863

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0001.yaml
  - git restore scripts/migration/contract_header_12_row_readonly_db_precheck.py
  - git restore artifacts/migration/contract_header_12_row_readonly_db_precheck_v1.json
  - git restore docs/migration_alignment/contract_header_12_row_readonly_db_precheck_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0001.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0001.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
