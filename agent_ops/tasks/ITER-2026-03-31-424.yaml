task_id: ITER-2026-03-31-424
title: Freeze workbook primary-post mapping for customer users
type: governance
status: active
priority: high

goal: >
  Freeze a deterministic primary-post mapping from the customer workbook onto
  the new `res.users.sc_post_id` carrier so the next bootstrap batch does not
  guess user 岗位 ownership.

user_visible_outcome:
  - "冻结 workbook 用户到主岗位的映射"
  - "明确多岗位用户的主岗位规则"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
    - tmp/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - governance and audit only
  - freeze one primary post per user
  - preserve extra posts as deferred semantics only

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Customer Bootstrap Governance
  module: smart_construction_custom workbook mapping
  module_owner: customer-specific delivery customization
  kernel_or_scenario: scenario
  reason: >
    The platform carrier now exists. The next low-risk step is to freeze which
    workbook 岗位 value becomes the primary post for each affected user.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-424.yaml

