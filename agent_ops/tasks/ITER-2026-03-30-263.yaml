task_id: ITER-2026-03-30-263
title: Stabilize dev rebuild and frontend hot-reload runtime
type: fix
status: in_progress
priority: high

goal: Make the development rebuild path repeatable by removing the duplicate extension-module parameter write during demo reset, and add a Makefile-driven frontend dev reset entrypoint that restarts Vite on a stable port with hot reload preserved.
user_visible_outcome:
  - "make dev.rebuild no longer fails on duplicate sc.core.extension_modules"
  - frontend dev server can be restarted through Makefile onto a stable hot-reload port
  - backend rebuild and frontend runtime reset stop depending on ad hoc manual restarts

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - Makefile
    - scripts/**
    - addons/smart_construction_core/data/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

change_rules:
  - additive_or_minimal_fix_only
  - no_manifest_change
  - no_business_semantic_change
  - makefile_first_for_dev_runtime

architecture:
  layer_target: platform layer + frontend dev runtime
  module: demo reset bootstrap path and frontend Vite dev entrypoint
  kernel_or_scenario: kernel
  reason: Full dev rebuild currently fails because smart_construction_core writes the same extension-module parameter through both XML record creation and runtime sync, and frontend hot reload lacks a stable Makefile-managed restart path.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-263.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'
    - bash -n scripts/dev/frontend_dev_reset.sh
    - CODEX_MODE=main make demo.reset DB=sc_demo

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - demo_reset_still_fails
  - frontend_dev_reset_not_stable
  - acceptance_failed

deliverables:
  - demo_reset_duplicate_param_fix
  - makefile_frontend_dev_reset_entrypoint
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-263.yaml
  - git restore Makefile
  - git restore scripts/dev/frontend_dev_reset.sh
  - git restore addons/smart_construction_core/data/sc_extension_params.xml

depends_on:
  - ITER-2026-03-30-262

notes: "Keep Vite as the dev runtime for hot update. The goal is a repeatable dev reset path, not a frontend build-mode swap."
