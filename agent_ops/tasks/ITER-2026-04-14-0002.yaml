task_id: ITER-2026-04-14-0002
title: Contract 12-row write authorization packet v1
status: in_progress
type: migration-write-authorization-packet
priority: high
mode: execute

goal: >
  Build a no-DB authorization packet for the 12 prechecked contract header rows.
  The packet must preserve the contract write block until separate explicit
  authorization is granted.

user_visible_outcome:
  - "12 条合同写入授权包已生成；真实合同写入仍等待单独授权"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0002.yaml
    - scripts/migration/contract_12_row_write_authorization_packet.py
    - artifacts/migration/contract_12_row_write_authorization_payload_v1.csv
    - artifacts/migration/contract_12_row_write_authorization_packet_v1.json
    - docs/migration_alignment/contract_12_row_write_authorization_packet_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0002.md
    - agent_ops/state/task_results/ITER-2026-04-14-0002.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/contract_header_12_row_dry_run_rows_v1.csv
    - artifacts/migration/contract_header_12_row_readonly_db_precheck_v1.json
    - docs/migration_alignment/contract_header_12_row_readonly_db_precheck_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - no-orm
  - no-contract-create
  - no-contract-update
  - authorization-packet-only
  - preserve-contract-write-block

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-14-0001
  dry_run_input: artifacts/migration/contract_header_12_row_dry_run_rows_v1.csv
  precheck_input: artifacts/migration/contract_header_12_row_readonly_db_precheck_v1.json

architecture:
  layer_target: Contract Migration Authorization Gate
  module: construction.contract 12-row write authorization packet
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The packet freezes the contract business facts that would be materialized in
    a later write batch, but does not perform that materialization.
  reason: >
    The readonly DB precheck passed for all 12 rows. Before any write, the
    exact payload and authorization boundary must be locked in a no-DB packet.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0002.yaml
    - python3 -m py_compile scripts/migration/contract_12_row_write_authorization_packet.py
    - python3 scripts/migration/contract_12_row_write_authorization_packet.py
    - python3 -m json.tool artifacts/migration/contract_12_row_write_authorization_packet_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0002.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - contract_create_attempted
  - contract_update_attempted
  - contract_write_authorization_required

deliverables:
  - task contract
  - authorization packet script
  - authorization payload csv
  - authorization packet json
  - authorization packet document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0001

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0002.yaml
  - git restore scripts/migration/contract_12_row_write_authorization_packet.py
  - git restore artifacts/migration/contract_12_row_write_authorization_payload_v1.csv
  - git restore artifacts/migration/contract_12_row_write_authorization_packet_v1.json
  - git restore docs/migration_alignment/contract_12_row_write_authorization_packet_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0002.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0002.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
