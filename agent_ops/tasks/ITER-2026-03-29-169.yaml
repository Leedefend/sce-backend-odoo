task_id: ITER-2026-03-29-169
title: Unify smart_scene runtime semantic state derivation
type: governance_task
status: pending
priority: high

goal: Make smart_scene derive a single runtime semantic state snapshot and reuse it across page status resolution, record state summary projection, and action gating.
user_visible_outcome:
  - scene page_status and permissions.record_state_summary now come from the same runtime semantic state snapshot
  - smart_scene reduces drift between resolver page_status decisions and engine-side workflow/validation summaries

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_engine + scene_resolver
  reason: smart_scene currently recomputes workflow/validation/closed-state facts separately for record_state_summary, disabled_actions, and page_status. This iteration extracts a unified runtime semantic state snapshot in scene_engine and lets scene_resolver consume that snapshot directly.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-169.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_engine.py addons/smart_scene/core/scene_resolver.py addons/smart_scene/tests/test_scene_engine_semantics.py addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-169.yaml addons/smart_scene/core/scene_engine.py addons/smart_scene/core/scene_resolver.py addons/smart_scene/tests/test_scene_engine_semantics.py addons/smart_scene/tests/test_scene_resolver_semantics.py

depends_on:
  - ITER-2026-03-29-168

notes: "Batch acceleration: unify runtime semantic state for resolver status, summary projection, and action gating."
