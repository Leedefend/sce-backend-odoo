task_id: ITER-2026-04-01-507
title: Split tender into read-only query surface and execution surface
type: permission-governance
status: active
priority: high

goal: >
  Align the tender family with the confirmed business policy: related roles may
  query tender data read-only, while execution roles keep create/write/execute
  ownership for actual tender work.

user_visible_outcome:
  - "tender 查询面与执行面边界一致"
  - "project_read 相关角色可以只读查询 tender"
  - "执行角色继续保留 tender 维护能力"
  - "不触碰 payment/settlement/account"

scope:
  allowed_paths:
    - addons/smart_construction_core/security/ir.model.access.csv
    - addons/smart_construction_core/security/action_groups_patch.xml
    - addons/smart_construction_core/views/support/tender_views.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - dedicated high-risk tender authority-governance batch
  - additive ACL changes only for tender query-read semantics
  - execution ownership must remain on existing project_user/project_manager tender path
  - do not expand into record rules, manifests, or financial domains

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: tender query-vs-execution authority split
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    The business policy is now explicit: tender belongs to an execution domain,
    but related roles still need read-only query access. ITER-2026-04-01-506
    proved the current runtime exposes the action to project_read while denying
    model read. This batch only aligns the tender authority surface with that
    policy.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-507.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - "runtime audit confirms project_read sample can read tender models but cannot write/create/unlink, while execution-role samples retain tender write capabilities"

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - module_upgrade_fails
  - tender_read_surface_leaks_write_capability
  - tender_execution_surface_loses_existing_write_capability
  - the_fix_requires_record_rule_or_manifest_expansion

deliverables:
  - tender ACL and action/view alignment
  - regression coverage for tender read-only vs execution separation
  - governance/report artifacts for ITER-2026-04-01-507

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/security/ir.model.access.csv
  - git restore addons/smart_construction_core/security/action_groups_patch.xml
  - git restore addons/smart_construction_core/views/support/tender_views.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-04-01-507.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-507.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-507.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-506
