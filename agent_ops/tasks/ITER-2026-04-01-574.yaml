task_id: ITER-2026-04-01-574
title: Remove misleading sort summary fallback when explicit sort metadata is absent
type: frontend
status: active
priority: high

goal: >
  Prevent the native list toolbar from showing a misleading sort summary when
  there are no sort controls and no explicit sort metadata to explain the
  current ordering.

user_visible_outcome:
  - "没有明确排序信息时，不再显示误导性的默认排序摘要"
  - "保留有真实排序信息时的排序上下文"
  - "继续收敛 native list 主链可用性"

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/PageToolbar.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/api/**
    - frontend/apps/web/src/stores/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - bounded P1 usability implementation
  - no backend contract change
  - limit changes to sort summary visibility and fallback labeling

context:
  branch: codex/next-round
  baseline_sha: 5af85a3
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-573
  priority_lane: P1_core_usability

architecture:
  layer_target: Frontend Layer
  module: sort summary fallback semantics
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    Sort feedback is part of list continuation context. If the toolbar claims a
    sort state without explicit evidence, users are misled about why the list
    is ordered the way it is.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-574.yaml
    - pnpm -C frontend/apps/web typecheck:strict
    - make verify.portal.v0_5.container

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - trusted_container_verify_failed
  - sort_summary_fix_requires_backend_contract_change

deliverables:
  - bounded_sort_summary_fallback_fix
  - governance/report artifacts for ITER-2026-04-01-574

rollback:
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore agent_ops/tasks/ITER-2026-04-01-574.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-574.md
