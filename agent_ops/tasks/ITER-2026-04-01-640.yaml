  module: lifecycle semantic regression guard screen
  module_owner: scripts/verify + Makefile governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Guard scene-entry semantic continuity through automated verification.
  reason: >
    Project handler semantic gaps are mostly closed; best low-risk next step is anti-regression guard.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-640.yaml

