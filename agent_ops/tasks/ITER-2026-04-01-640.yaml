  max_candidates: 2
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - screen stage only
  - no implementation
  - verify-guard candidate selection only

context:
  branch: codex/next-round
  baseline_sha: 0ed3e9f
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-639
  priority_lane: P1_project_lifecycle_usability
