task_id: ITER-2026-04-10-1688
title: frontend delivery recovery after v2 usability gate pass

type: implementation
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  在 v2_primary 关键链路与治理门禁通过后，恢复前端交付节奏：
  完成登录-初始化-菜单-动作-表单主链的用户可见稳定性增强与回归验证。

user_visible_outcome:
  - "自定义前端从登录到菜单进入页面稳定可用"
  - "动作页与表单页可渲染，关键错误提示可诊断"
  - "前端交付恢复具备可追溯验证证据"

scope:
  allowed_paths:
    - frontend/apps/web/src/**
    - frontend/apps/web/vite.config.ts
    - scripts/verify/**
    - agent_ops/tasks/ITER-2026-04-10-1688.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1688.md
    - agent_ops/state/task_results/ITER-2026-04-10-1688.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 12
  max_output_lines: 1000

change_rules:
  - frontend contract-consumer alignment only
  - no new intent definitions
  - no business model/schema changes
  - no scene architecture migration

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Frontend contract-consumer runtime
  module: web delivery chain recovery
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    前端仅消费现有后端语义；若出现语义缺口，记录并回传后端语义供应任务，不做前端业务特判。
  reason: >
    1686/1687 已恢复治理绿灯，当前需要将“可运行”提升到“可交付”。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1688.yaml"
    - "make frontend.restart"
    - "python3 scripts/verify/v2_app_governance_gate_audit.py --json"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty
  - backend_semantic_gap_requires_new_task

deliverables:
  - frontend delivery recovery patch set
  - verification evidence and iteration report

rollback:
  - "git restore frontend/apps/web/src"
  - "git restore frontend/apps/web/vite.config.ts"

depends_on:
  - ITER-2026-04-10-1687
