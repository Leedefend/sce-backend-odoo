task_id: ITER-2026-04-13-1856
title: Partner supplier supplement screening v1
status: in_progress
type: migration-supplement-screen
priority: high
mode: execute

goal: >
  Screen the supplier source role for the partner rebuild pipeline using
  existing no-DB artifacts. Do not rescan raw files and do not create partners.

user_visible_outcome:
  - "supplier 补充来源筛选规则冻结"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1856.yaml
    - docs/migration_alignment/partner_supplier_supplement_screening_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1856.md
    - agent_ops/state/task_results/ITER-2026-04-13-1856.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/partner_source_baseline_v1.json
    - artifacts/migration/partner_candidate_confirmation_summary_v1.json
    - artifacts/migration/partner_candidate_confirmation_v1.csv
    - docs/migration_alignment/partner_source_inventory_v1.md
    - docs/migration_alignment/partner_contract_counterparty_coverage_v1.md
    - docs/migration_alignment/full_rebuild_promotion_queue_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - scripts/**
    - artifacts/**
    - tmp/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 5
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - docs-only
  - screen-only
  - no-raw-rescan
  - no-db-write
  - no-orm
  - no-partner-create
  - no-contract-import

context:
  branch: codex/next-round
  baseline_sha: d243d59
  source_baseline: artifacts/migration/partner_source_baseline_v1.json
  candidate_summary: artifacts/migration/partner_candidate_confirmation_summary_v1.json

architecture:
  layer_target: Partner Supplement Source Screening
  module: supplier source role in res.partner rebuild pipeline
  module_owner: docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The screening decides whether supplier-source business facts can supplement
    partner records, without fabricating primary partner identity facts.
  reason: >
    ITER-2026-04-13-1854/1855 prepared the first partner primary-source write
    gate but real writes still require authorization. The next no-DB step is to
    freeze supplier as a supplemental role line, not a parallel primary create
    stream.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1856.yaml
    - python3 -m json.tool artifacts/migration/partner_source_baseline_v1.json
    - python3 -m json.tool artifacts/migration/partner_candidate_confirmation_summary_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1856.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - raw_rescan_attempted
  - db_write_attempted
  - partner_create_attempted
  - contract_import_attempted

deliverables:
  - task contract
  - supplier supplement screening document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1842
  - ITER-2026-04-13-1843
  - ITER-2026-04-13-1855

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1856.yaml
  - git restore docs/migration_alignment/partner_supplier_supplement_screening_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1856.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1856.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
