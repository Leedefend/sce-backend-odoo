task_id: ITER-2026-03-30-324
title: Complete backend native search composition truth for scene-ready contracts
type: code
status: in_progress
priority: high

goal: >
  Complete the backend-native search composition truth by unifying
  filters/group_by/searchpanel rows and exposing a stable default_state inside
  search_surface, so frontend can consume native search facts without deriving
  them.

user_visible_outcome:
  - scene-ready search_surface exposes normalized native search rows
  - scene-ready search_surface includes default_state for default filters/group_by/searchpanel
  - system.init payload preserves the new native search truth fields

scope:
