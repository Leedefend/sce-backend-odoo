    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/__manifest__.py

change_rules:
  - backend only
  - native extraction truth only
  - no optimization composition
  - no frontend changes

context:
  branch: codex/next-round
  baseline_sha: a99fe49

architecture:
  layer_target: Platform Layer
  module: smart_core search surface native extraction
  module_owner: addons/smart_core
  kernel_or_scenario: kernel
  reason: >
    Before introducing any optimization composition contract, backend must
    fully expose native search composition truth from Odoo actions/views/search
    metadata, including normalized rows and default native state.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-324.yaml
