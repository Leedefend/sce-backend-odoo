task_id: ITER-2026-03-29-181
title: Add fail-fast frontend eslint environment preflight
type: governance_task
status: pending
priority: high

goal: Detect known frontend eslint environment blockers before running slow or hanging lint commands, so product iterations can fail fast and choose a safer verification path.
user_visible_outcome:
  - frontend verification can report Node/ESLint incompatibility in seconds instead of timing out
  - later productization iterations get a stable preflight signal before attempting frontend lint gates

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: governance layer
  module: agent_ops frontend verify preflight
  reason: current environment hangs on eslint startup; the delivery loop needs a fast preflight that identifies Node/ESLint incompatibility before frontend product tasks attempt lint gates.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-181.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_eslint_preflight.py
    - python3 agent_ops/scripts/frontend_eslint_preflight.py --frontend-dir frontend/apps/web

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-181.yaml agent_ops/scripts/frontend_eslint_preflight.py

depends_on:
  - ITER-2026-03-29-179

notes: "Governance acceleration batch: fail fast on known frontend eslint environment blockers."
