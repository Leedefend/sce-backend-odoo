task_id: ITER-2026-03-30-273
title: Remove duplicated outer filter blocks from native list surface
type: implementation_task
status: in_progress
priority: high

goal: Continue the Odoo-native metadata usability line by letting the native list toolbar own filter/group controls and removing duplicated outer contract blocks on the same list surface.
user_visible_outcome:
  - project list page shows one clear metadata-driven filter area instead of duplicated controls
  - list surface becomes visually closer to a native single-surface interaction model
  - generic list behavior stays contract-driven

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - frontend/apps/web/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**
    - frontend/**/package.json

change_rules:
  - frontend_contract_consumer_only
  - no_backend_contract_change
  - no_model_specific_hardcode
  - prefer_single_surface_controls

architecture:
  layer_target: frontend layer
  module: action/list surface metadata control ownership
  module_ownership: frontend/apps/web
  kernel_or_scenario: kernel
  reason: After moving contract filters into the native list toolbar, the next low-risk step is to prevent duplicated controls by making the toolbar the single owner on list surfaces.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-273.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - surface_ownership_uncertain
  - typecheck_failed

deliverables:
  - single_surface_filter_ownership
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-273.yaml
  - git restore frontend/apps/web/src/views/ActionView.vue

depends_on:
  - ITER-2026-03-30-272

notes: "Only remove duplicate outer controls on list surfaces. Keep non-list surfaces unchanged."
