task_id: ITER-2026-03-29-171
title: Validate smart_scene runtime semantic state in contract shape
type: governance_task
status: pending
priority: high

goal: Make smart_scene contract schema and shape validation explicitly validate diagnostics.semantic_runtime_state as an object.
user_visible_outcome:
  - final scene contracts now have an explicit contract-level guard for diagnostics.semantic_runtime_state
  - invalid runtime semantic diagnostics payloads are caught by schema and builder shape validation

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/schemas/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene contract schema + scene_contract_builder
  reason: smart_scene now projects semantic_runtime_state into final diagnostics, but contract validation still does not explicitly guard that payload. This iteration adds low-risk validation that semantic_runtime_state must be an object in both schema and builder shape checks.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-171.yaml
    - python3 -m py_compile addons/smart_scene/schemas/scene_contract_schema.py addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_schema.py
    - python3 addons/smart_scene/tests/test_scene_contract_schema.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-171.yaml addons/smart_scene/schemas/scene_contract_schema.py addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_schema.py

depends_on:
  - ITER-2026-03-29-170

notes: "Batch acceleration: validate diagnostics.semantic_runtime_state in schema and shape guards."
