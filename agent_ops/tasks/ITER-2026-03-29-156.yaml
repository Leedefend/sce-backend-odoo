task_id: ITER-2026-03-29-156
title: Drive smart_scene readonly decisions from permission surface
type: governance_task
status: pending
priority: high

goal: Make smart_scene distinguish readonly versus restricted scene access from canonical permission_surface and project disabled action reasons into scene contract permissions.
user_visible_outcome:
  - scene contracts now expose readonly versus restricted page status correctly from permission semantics
  - scene permissions now include disabled_actions when permission semantics block editing

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_resolver + scene_engine
  reason: smart_scene already receives canonical permission_surface and uses it for a coarse restricted status, but still collapses readonly access into the same path and drops disabled action reasons. This iteration turns that semantic surface into more accurate scene-layer access decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-156.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-156.yaml addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-155

notes: "Batch acceleration: continue smart_scene real-consumption work by distinguishing readonly versus restricted permission semantics and projecting disabled action reasons."
