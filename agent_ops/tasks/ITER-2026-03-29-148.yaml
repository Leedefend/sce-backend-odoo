  module: smart_core scene_ready_contract_builder
  reason: workflow and validation hit counting still uses older ad-hoc nonempty checks. This iteration aligns them with the explicit canonical helper-based semantics already introduced for other scene_ready surfaces.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-148.yaml
    - python3 -m py_compile addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_consumption_metrics.py
    - python3 addons/smart_core/tests/test_scene_ready_consumption_metrics.py

