task_id: ITER-2026-04-01-525
title: Screen the next low-risk product usability batch from the native-metadata list scan
type: frontend
status: active
priority: medium
mode: screen

goal: >
  Read only the ITER-2026-04-01-524 scan output and select the next single
  low-risk product usability batch on the native-metadata list line.

user_visible_outcome:
  - "从扫描候选里选出下一张产品可用性小批次"
  - "保持单阶段 screen，不重新扫描前端文件"
  - "给出明确的下一张低风险实现目标"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 3
  max_candidates: 5
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - low-cost screen stage only
  - read only the 524 scan report and task result
  - do not rescan repository files
  - do not implement frontend changes
  - output only the next candidate family and rationale

context:
  branch: codex/next-round
  baseline_sha: 2a02eb6
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-524
  use_new_session: true
  carry_long_context: false

architecture:
  layer_target: Frontend Layer
  module: native metadata list usability screen
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The scan stage already narrowed the current list-surface usability
    candidates. The next safe step is to pick one low-risk batch without
    reopening repository reads.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-525.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - screen_attempts_repo_rescan
  - screen_output_exceeds_limits
  - no_single_low_risk_candidate_can_be_selected

deliverables:
  - next_candidate_family
  - family_scope
  - reason
  - governance/report artifacts for ITER-2026-04-01-525

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-525.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-525.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-525.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-524
