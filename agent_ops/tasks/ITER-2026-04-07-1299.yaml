task_id: ITER-2026-04-07-1299
title: Frontend alignment acceptance v1 Batch B-1 project-slice contract
status: active
type: implementation
priority: high
mode: execute

goal: >
  Complete project-slice frontend alignment against native baseline by consuming
  backend contracts only, with no frontend permission patching and no backend truth changes.

user_visible_outcome:
  - "project-slice 场景下前端列表/表单/创建/编辑与原生基线一致"
  - "project-slice 场景下不可见/不可写处理口径与原生一致"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-07-1299.yaml
    - frontend/apps/web/src/router/index.ts
    - frontend/apps/web/src/views/ProjectsIntakeView.vue
    - frontend/apps/web/src/views/ActionView.vue
    - frontend/apps/web/src/pages/ContractFormPage.vue
    - frontend/apps/web/src/layouts/AppShell.vue
    - frontend/apps/web/src/views/MyWorkView.vue
    - frontend/apps/web/src/app/action_runtime/useActionViewNavigationRuntime.ts
    - docs/ops/frontend_native_alignment_matrix_v1.md
    - agent_ops/reports/2026-04-07/report.ITER-2026-04-07-1299.md
    - agent_ops/state/task_results/ITER-2026-04-07-1299.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - scripts/**

limits:
  max_files: 10
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - frontend-consumer-only
  - no-permission-patch
  - no-business-fact-change
  - no-generic-refactor-beyond-project-scope
  - no-model-specific-branching-added

context:
  branch: codex/next-round
  explicit_user_authorization: true

architecture:
  layer_target: Frontend Consumer Alignment
  module: project-slice frontend contract alignment
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene-orchestration layer
  backend_sub_layer_reason: >
    Frontend should consume existing semantics and must not redefine backend facts or permission behavior.
  reason: >
    Execute Batch B in declared priority order, starting from project-slice contract evidence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-07-1299.yaml
    - "project-slice contract list alignment evidence captured (entry, visible rows, deny handling)"
    - "project-slice contract form alignment evidence captured (load, readonly/edit mode, error surface)"
    - "project-slice contract create alignment evidence captured (create path and success/failure handling)"
    - "project-slice contract edit alignment evidence captured (write path and save feedback handling)"
    - "project-slice contract deny-path alignment evidence captured (not visible/not writable in frontend behavior)"
    - "no-op is allowed only with per-item evidence for list/form/create/edit/deny"
    - "no new model-specific frontend branch introduced in this batch"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - frontend_permission_patch_detected
  - project_alignment_evidence_missing
  - model_specific_frontend_branching_detected

deliverables:
  - project frontend alignment closure evidence
  - project frontend delta assessment
  - updated frontend alignment matrix (project row and priority notes)

depends_on:
  - ITER-2026-04-07-1298

rollback:
  - git restore frontend/apps/web/src
  - git restore docs/ops/frontend_native_alignment_matrix_v1.md
  - git restore agent_ops/reports/2026-04-07/report.ITER-2026-04-07-1299.md
  - git restore agent_ops/state/task_results/ITER-2026-04-07-1299.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
