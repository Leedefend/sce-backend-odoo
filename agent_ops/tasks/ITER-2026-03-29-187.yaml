task_id: ITER-2026-03-29-187
title: Apply page contract action gating to workbench and placeholder views
type: product_task
status: pending
priority: high

goal: Extend the page-contract disabled action consumption pattern from SceneView to other low-risk global-action pages, so frontend product behavior stays consistent across fallback and placeholder surfaces.
user_visible_outcome:
  - Workbench and Placeholder header actions obey contract disabled state
  - disabled action reason codes are exposed before users click unsupported actions

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: page contract consumer chain
  reason: the contract-gated action behavior already exists in SceneView and should be propagated to other global-action pages to keep product interaction semantics aligned.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-187.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-187.yaml frontend/apps/web/src/views/WorkbenchView.vue frontend/apps/web/src/views/PlaceholderView.vue

depends_on:
  - ITER-2026-03-29-186

notes: "Productization batch: propagate contract-gated header action behavior to additional low-risk pages."
