task_id: ITER-2026-03-30-355
title: Migrate scene-oriented workspace action metadata out of smart_construction_core
type: code
status: in_progress
priority: high

goal: >
  Continue the scene-boundary cleanup by moving scene-oriented workspace action
  metadata such as `scene_key` and scene routes out of
  `smart_construction_core/core_extension.py`, leaving business action facts in
  the industry core and scene semantics in the scene layer.

user_visible_outcome:
  - workspace business rows in smart_construction_core stop carrying direct scene semantics
  - scene-layer ownership becomes consistent beyond hook migration
  - later product batches can consume workspace facts without hidden scene coupling

scope:
  allowed_paths:
    - addons/smart_construction_core/core_extension.py
    - addons/smart_construction_scene/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - migrate scene semantics, keep business action facts
  - preserve current usable workspace behavior
  - no ACL or financial domain changes

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Scene Layer Migration
  module: workspace action fact cleanup
  module_owner: addons/smart_construction_scene + addons/smart_construction_core
  kernel_or_scenario: scenario
  reason: >
    Active scene hooks have been moved to the scene layer, but workspace action
    rows in smart_construction_core still embed scene_key and scene-route
    semantics. That remaining coupling must also be migrated.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-355.yaml

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - workspace_action_semantics_cannot_be_split_safely
  - runtime_workspace_behavior_regresses

deliverables:
  - migrated workspace action scene semantics or a proven-safe ownership split
  - report and task result artifacts for ITER-2026-03-30-355
  - delivery log checkpoint for the next cleanup slice

rollback:
  - git restore addons/smart_construction_core/core_extension.py
  - git restore addons/smart_construction_scene
  - git restore agent_ops/tasks/ITER-2026-03-30-355.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-355.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-355.json

depends_on:
  - ITER-2026-03-30-354
