task_id: ITER-2026-03-30-370
title: Determine treasury-ledger ownership from production and test evidence
type: audit
status: in_progress
priority: medium

goal: >
  Determine which upstream business action or ownership boundary is supposed to
  produce `sc.treasury.ledger`, using production code, tests, and live facts,
  without changing any finance logic.

user_visible_outcome:
  - explicit ownership judgment for treasury-ledger generation
  - clear statement on whether current tests encode a behavior that production does not implement
  - a narrowed corrective decision that can be handed to a later finance-governed batch

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit only; do not edit finance code or tests in this batch
  - use test files as evidence, not as implementation instructions
  - keep the conclusion anchored in ownership and trigger semantics

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Governance Audit
  module: treasury-ledger ownership audit
  module_owner: agent_ops
  kernel_or_scenario: scenario
  reason: >
    After the prerequisite audit identified a trigger-gap, the next low-risk
    step is to determine whether treasury-ledger generation is meant to belong
    to payment completion, settlement completion, or an explicitly deferred flow.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-370.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - audit_scope_spills_into_code_changes

deliverables:
  - treasury-ledger ownership audit report
  - task result artifact for ITER-2026-03-30-370
  - delivery log checkpoint with the next governance recommendation

