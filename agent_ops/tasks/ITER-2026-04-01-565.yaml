task_id: ITER-2026-04-01-565
title: Re-screen the remaining fresh toolbar candidates after count-alignment closure
type: frontend
status: active
priority: medium
mode: screen

goal: >
  Re-screen the remaining candidates from ITER-2026-04-01-561 and decide
  whether another family still qualifies for a bounded low-risk follow-up.

user_visible_outcome:
  - "判断 fresh toolbar 候选里是否还有下一条低风险可执行族"
  - "保持 screen 只消费既有 scan，不重扫仓库"
  - "如果剩余都越过边界，立即在治理层 STOP"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 3
  max_candidates: 3
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost screen stage only
  - read only the existing scan and report artifacts
  - do not reopen product-file scanning in this batch
  - do not implement in this batch

context:
  branch: codex/next-round
  baseline_sha: 8992446
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-561
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar screen
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The display-only count candidate has already been closed in ITER-2026-04-01-563/564.
    The remaining fresh candidates must be screened again before any additional
    implementation is considered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-565.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - screen_reads_new_product_files
  - screen_reopens_repo_scan
  - no_low_risk_candidate_remains

deliverables:
  - followup_decision_for_remaining_toolbar_candidates
  - governance/report artifacts for ITER-2026-04-01-565

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-565.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-565.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-565.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-564
