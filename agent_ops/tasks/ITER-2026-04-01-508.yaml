task_id: ITER-2026-04-01-508
title: Diagnose tender effective group leakage before further authority edits
type: permission-governance
status: active
priority: high

goal: >
  Diagnose why ITER-2026-04-01-507 runtime verification showed tender write
  capability on a supposed project_read sample and why the tender form still
  resolved to the clickable statusbar branch.

user_visible_outcome:
  - "厘清 tender 有效权限泄漏的真实来源"
  - "判断是样本用户污染、group 继承、还是视图 groups 分支语义问题"
  - "在未确诊前不继续扩大 ACL 改动"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only high-risk diagnosis batch
  - no further ACL or view changes
  - use fresh runtime samples and effective-group introspection only

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: tender effective group and view-branch diagnosis
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-507 failed at runtime, but the failure may be caused by
    polluted sample users or view-branch resolution rather than by the intended
    tender read-vs-execution split itself. The next safe step is diagnosis only.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-508.yaml
    - "runtime diagnosis identifies whether the tender write leakage came from sample-user pollution, implied-group inheritance, or another effective-role source"
    - "runtime diagnosis identifies why the tender form still matched the clickable statusbar branch"

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - diagnosis_cannot_explain_effective_group_leakage_with_confidence
  - diagnosis_requires_more_acl_or_view_edits
  - runtime_environment_cannot_be_inspected_reliably

deliverables:
  - tender leakage diagnosis result
  - governance/report artifacts for ITER-2026-04-01-508

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-508.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-508.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-508.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-507
