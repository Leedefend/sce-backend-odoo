task_id: ITER-2026-04-14-0005
title: Contract 12-row post-write readonly review v1
status: in_progress
type: migration-post-write-readonly-review
priority: high
mode: execute

goal: >
  Run the immediate readonly post-write review for the 12 contract rows created
  by ITER-2026-04-14-0004 and confirm rollback eligibility.

user_visible_outcome:
  - "12 条合同写后只读复核完成，rollback eligibility 已确认"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0005.yaml
    - scripts/migration/contract_12_row_post_write_review.py
    - artifacts/migration/contract_12_row_post_write_review_result_v1.json
    - docs/migration_alignment/contract_12_row_post_write_review_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0005.md
    - agent_ops/state/task_results/ITER-2026-04-14-0005.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/contract_12_row_rollback_target_list_v1.csv
    - artifacts/migration/contract_12_row_write_result_v1.json
    - docs/migration_alignment/contract_12_row_create_only_write_report_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 7
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-db-review
  - no-db-write
  - no-orm-create
  - no-orm-write
  - no-unlink
  - no-workflow-replay

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  upstream_task: ITER-2026-04-14-0004
  rollback_target_list: artifacts/migration/contract_12_row_rollback_target_list_v1.csv

architecture:
  layer_target: Contract Migration Post-Write Review
  module: construction.contract 12-row rollback eligibility
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The review validates written contract facts and rollback eligibility without
    adding presentation semantics or changing records.
  reason: >
    A high-risk create-only write just passed; immediate readonly review is
    required before any broader contract import or downstream linkage work.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0005.yaml
    - python3 -m py_compile scripts/migration/contract_12_row_post_write_review.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/contract_12_row_post_write_review.py
    - python3 -m json.tool artifacts/migration/contract_12_row_post_write_review_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0005.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - rollback_not_eligible
  - duplicate_legacy_contract_identity

deliverables:
  - task contract
  - readonly review script
  - readonly review result json
  - review document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0004

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0005.yaml
  - git restore scripts/migration/contract_12_row_post_write_review.py
  - git restore artifacts/migration/contract_12_row_post_write_review_result_v1.json
  - git restore docs/migration_alignment/contract_12_row_post_write_review_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0005.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0005.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
