    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend changes
  - no new interactions

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
