task_id: ITER-2026-03-30-307
title: Show total searchable-field count instead of preview count
type: frontend
status: in_progress
priority: medium

goal: >
  Correct the searchable-field section count so it reflects the total native
  searchable field count rather than only the truncated preview chip count.

user_visible_outcome:
  - users can see the true searchable-field count from native metadata
  - the preview chip list stays truncated for readability without undercounting
  - no search behavior or backend semantics change

scope:
