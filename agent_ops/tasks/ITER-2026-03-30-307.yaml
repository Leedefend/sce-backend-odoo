  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The searchable-field preview intentionally truncates chips for readability,
    but the section count should still reflect the total native metadata count.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-307.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
