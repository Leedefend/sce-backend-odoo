task_id: ITER-2026-04-03-966
title: Unify user-facing menu strategy and remove release visibility
type: backend
status: active
priority: high
mode: implement

goal: >
  Make release strategy invisible on user side by providing unified system menu
  projection, merging released slices into native groups, and removing duplicate
  entries.

user_visible_outcome:
  - "用户侧不再看到正式/预发布标识，菜单统一为系统入口并去重"

scope:
  allowed_paths:
    - addons/smart_core/delivery/menu_service.py
    - addons/smart_core/tests/test_delivery_menu_service_native_preview.py
    - frontend/apps/web/src/layouts/AppShell.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 7
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - unified_system_menu_projection_only
  - no_business_fact_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-965
  priority_lane: usability_release_proof

architecture:
  layer_target: Product Release Usability Proof
  module: user-facing menu projection strategy
  module_owner: scene_orchestration
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Change supplies unified navigation semantics; frontend remains generic
    consumer without release-strategy exposure.
  reason: >
    User requires release strategy fully hidden and unified system-menu entry
    surface with merged deduplicated content.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-966.yaml
    - python3 addons/smart_core/tests/test_delivery_menu_service_native_preview.py
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make restart
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost DB_NAME=sc_prod_sim E2E_LOGIN=svc_e2e_smoke E2E_PASSWORD=demo make verify.portal.login_browser_smoke.host
    - 'LATEST=$(ls -dt artifacts/codex/login-browser-smoke/* | head -n1); ! rg -n "正式发布|原生预发布|group:native_preview" "$LATEST/case_login_success.json"'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - unified_system_menu_runtime_projection

rollback:
  - git restore addons/smart_core/delivery/menu_service.py
  - git restore addons/smart_core/tests/test_delivery_menu_service_native_preview.py
  - git restore frontend/apps/web/src/layouts/AppShell.vue
  - git restore agent_ops/tasks/ITER-2026-04-03-966.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-966.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-966.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-965
