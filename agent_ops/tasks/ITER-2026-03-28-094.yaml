    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: platform core contract integration
  module: smart_core load_view compatibility proxy
  reason: Connect the parser-semantic milestone back into the real handler path instead of leaving it isolated in parser-only internals.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-094.yaml
    - python3 -m py_compile addons/smart_core/handlers/load_view.py addons/smart_core/tests/test_load_view_handler.py
    - python3 addons/smart_core/tests/test_load_view_handler.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-28-094.yaml addons/smart_core/handlers/load_view.py addons/smart_core/tests/test_load_view_handler.py

