task_id: ITER-2026-03-29-215
title: Align project form action surfaces to live contract
type: product_task
status: pending
priority: high

goal: Make `project.project` detail forms prefer the live form contract button facts and suppress duplicate scene-ready, workflow, and body action surfaces so the page reflects the backend truth.
user_visible_outcome:
  - project detail pages stop showing duplicated action clusters
  - visible project form actions align with the live backend contract button facts

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: project form action surfaces
  reason: The backend form button facts have been cleaned, but the project detail page still shows duplicated action surfaces because the frontend prefers scene-ready overlays and extra workflow/body action sections.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-215.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-215.yaml frontend/apps/web/src/pages/ContractFormPage.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-215.md agent_ops/state/task_results/ITER-2026-03-29-215.json

depends_on:
  - ITER-2026-03-29-214

notes: "Project detail pages should prefer the governed live contract buttons and avoid rendering duplicate scene-ready and workflow action surfaces."
