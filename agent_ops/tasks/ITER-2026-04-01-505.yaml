task_id: ITER-2026-04-01-505
title: Select and audit the third representative non-first-batch flow family
type: permission-governance
status: active
priority: medium

goal: >
  Continue the non-first-batch objective by selecting the next low-risk
  representative secondary-flow family after material-plan and BOQ/execution-side,
  then classify its repository/runtime boundary.

user_visible_outcome:
  - "选出第三个代表性非首批流程家族"
  - "明确该家族的入口、角色边界与是否存在新的 runtime residual"
  - "不改 ACL、不改 manifest、不触碰 financial 语义"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first batch for the next representative secondary-flow family
  - implementation changes are out of scope unless a later narrow batch is opened
  - prefer a family whose runtime audit can be completed without high-risk side effects

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: third representative non-first-batch family audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    After ITER-2026-04-01-499 and ITER-2026-04-01-504, the next eligible
    low-risk step is to continue broadening non-first-batch coverage with a
    third representative family.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-505.yaml
    - "repository audit identifies the next representative family and role boundaries"
    - "runtime audit classifies at least one representative entrypoint without high-risk side effects"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - candidate_family_requires_high_risk_side_effects
  - runtime_cannot_classify_the_next_family_with_confidence
  - audit_requires_acl_or_manifest_changes

deliverables:
  - third representative non-first-batch family classification
  - governance/report artifacts for ITER-2026-04-01-505

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-505.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-505.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-505.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-499
  - ITER-2026-04-01-504
