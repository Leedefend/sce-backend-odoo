task_id: ITER-2026-04-14-0029
title: Partner safe-slice create-only bounded write v1
status: in_progress
type: migration-write
priority: high
mode: execute

goal: >
  Execute the uniformly authorized partner 100-row safe-slice create-only write
  in sc_demo, verify uniqueness and rollback eligibility, and freeze rollback
  targets for the first partner L3 bounded-write importer validation.

user_visible_outcome:
  - "partner safe-slice 100 条 create-only 写入完成，并生成 write result 与 rollback target list"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0029.yaml
    - scripts/migration/partner_safe_slice_create_only_write.py
    - artifacts/migration/partner_safe_slice_pre_write_snapshot_v1.csv
    - artifacts/migration/partner_safe_slice_post_write_snapshot_v1.csv
    - artifacts/migration/partner_write_result_v1.json
    - artifacts/migration/partner_rollback_targets_v1.csv
    - scripts/migration/partner_safe_slice_post_write_review.py
    - artifacts/migration/partner_safe_slice_post_write_review_result_v1.json
    - docs/migration_alignment/partner_safe_slice_write_report_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0029.md
    - agent_ops/state/task_results/ITER-2026-04-14-0029.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/partner_safe_slice_v1.csv
    - artifacts/migration/partner_dry_run_result_v1.json
    - docs/migration_alignment/partner_mapping_strategy_v1.md
    - docs/migration_alignment/partner_dedup_strategy_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 12
  max_output_lines: 360
  forbid_repo_wide_scan: true

change_rules:
  - create-only
  - sc-demo-only
  - partner-safe-slice-only
  - no-update-upsert
  - no-unlink
  - no-contract-import
  - no-project-member-import
  - no-payment-settlement-account-write
  - no-model-view-menu-acl-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: partner
  importer_level: L3 bounded-write
  upstream_task: ITER-2026-04-14-0028
  write_authorization: "user explicitly said 迁移任务统一授权"
  sample_rows: 100
  rollback_key: legacy_partner_source + legacy_partner_id

architecture:
  layer_target: Partner Migration Bounded Write
  module: res.partner safe-slice create-only write
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch materializes bounded partner business facts using stable legacy
    identity and does not emit frontend/presentation semantics.
  reason: >
    ITER-2026-04-14-0028 produced a 100-row conflict-free partner safe slice.
    The user provided unified migration authorization, allowing this bounded
    L3 write while preserving single-lane scope and rollback targets.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0029.yaml
    - python3 -m py_compile scripts/migration/partner_safe_slice_create_only_write.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/partner_safe_slice_create_only_write.py
    - python3 -m py_compile scripts/migration/partner_safe_slice_post_write_review.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/partner_safe_slice_post_write_review.py
    - python3 -m json.tool artifacts/migration/partner_safe_slice_post_write_review_result_v1.json
    - python3 -m json.tool artifacts/migration/partner_write_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0029.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: true
  manual_approval_evidence: "迁移任务统一授权"

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_name_not_sc_demo
  - target_identity_not_empty_before_write
  - update_or_upsert_detected
  - unsafe_field_detected
  - rollback_key_not_unique
  - partner_create_count_not_100

deliverables:
  - task contract
  - safe-slice create-only write script
  - pre-write snapshot
  - post-write snapshot
  - write result json
  - rollback target list
  - post-write readonly review result
  - write report
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0028

rollback:
  - "真实数据回滚必须另开授权批次，通过 legacy_partner_source + legacy_partner_id 精确删除本批 100 条"
  - git restore agent_ops/tasks/ITER-2026-04-14-0029.yaml
  - git restore scripts/migration/partner_safe_slice_create_only_write.py
  - git restore artifacts/migration/partner_safe_slice_pre_write_snapshot_v1.csv
  - git restore artifacts/migration/partner_safe_slice_post_write_snapshot_v1.csv
  - git restore artifacts/migration/partner_write_result_v1.json
  - git restore artifacts/migration/partner_rollback_targets_v1.csv
  - git restore scripts/migration/partner_safe_slice_post_write_review.py
  - git restore artifacts/migration/partner_safe_slice_post_write_review_result_v1.json
  - git restore docs/migration_alignment/partner_safe_slice_write_report_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0029.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0029.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
