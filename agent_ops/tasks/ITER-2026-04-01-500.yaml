task_id: ITER-2026-04-01-500
title: Audit BOQ and execution-side secondary flows after material-plan classification
type: permission-governance
status: active
priority: high

goal: >
  Continue the non-first-batch objective by auditing a second representative
  family: BOQ import, task-from-BOQ, execution-structure, and progress-entry
  secondary flows.

user_visible_outcome:
  - "明确 BOQ / execution-side 次级流程的入口与角色边界"
  - "识别这些 secondary execution entrypoints 是否还有 runtime 残差"
  - "不改 ACL、不改 payment/settlement/account 语义"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first batch for a secondary execution family
  - no implementation changes unless a later dedicated narrow batch is opened
  - only classify repository/runtime facts for BOQ and execution-side entrypoints

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: BOQ and execution-side secondary flow audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-499 classified material-plan as the first representative
    non-first-batch family. The next low-risk family is the BOQ/import/
    execution-side entry surface.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-500.yaml
    - "repository audit identifies BOQ/import/execution-side entrypoints and role boundaries"
    - "runtime audit samples at least one representative BOQ or execution-side entrypoint without high-risk side effects"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - audit_requires_acl_or_manifest_changes
  - representative_boq_or_execution_family_cannot_be_classified_with_confidence
  - runtime_audit_requires_high_risk_side_effect_expansion

deliverables:
  - second-round non-first-batch family audit
  - representative runtime audit result
  - governance/report artifacts for ITER-2026-04-01-500

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-500.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-500.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-500.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-499
