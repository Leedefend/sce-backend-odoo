task_id: ITER-2026-03-28-029
title: Normalize canonical dirty baseline to the clean post-submission worktree
type: governance_task
status: pending
priority: medium

goal: Update the canonical dirty baseline so it matches the current clean repository state after the grouped local submissions and cleanup commits.
user_visible_outcome:
  - canonical dirty baseline no longer carries stale reviewed paths
  - baseline candidate and canonical baseline both reflect an empty current dirty set
  - continuous iteration can resume without legacy baseline noise

scope:
  allowed_paths:
    - agent_ops/policies/repo_dirty_baseline.yaml
    - agent_ops/policies/repo_dirty_baseline.candidate.yaml
    - agent_ops/tasks/**
    - docs/ops/iterations/**
    - docs/ops/releases/archive/temp/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance Layer
  module: repo dirty baseline canonicalization
  reason: The repository is now clean after grouped submissions, so the canonical baseline must be reduced to match the actual dirty set instead of carrying stale historical paths.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-029.yaml
    - python3 agent_ops/scripts/generate_dirty_baseline_candidate.py
    - python3 agent_ops/scripts/risk_scan.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops/policies/repo_dirty_baseline.yaml agent_ops/policies/repo_dirty_baseline.candidate.yaml agent_ops/tasks/ITER-2026-03-28-029.yaml docs/ops/iterations/delivery_context_switch_log_v1.md docs/ops/releases/archive/temp/TEMP_agent_ops_continuous_iteration_status_20260328.md docs/ops/releases/archive/temp/TEMP_post_submission_baseline_review_20260328.md

depends_on:
  - ITER-2026-03-28-028
notes: "Canonical baseline should collapse to the current clean-state candidate after reviewed grouped submissions."
