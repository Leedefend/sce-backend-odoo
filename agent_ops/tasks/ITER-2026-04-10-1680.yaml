    - 'rg -n "smoke FAIL|diff P0/P1|rollback FAIL|v2_primary_minimum_business_smoke.py|v2_focus_intent_diff_audit.py|v2_rollback_readiness_recheck.py" scripts/verify/v2_app_governance_gate_audit.py docs/ops/ITER-1680-business-usability-validation.md'

