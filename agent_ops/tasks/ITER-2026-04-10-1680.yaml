    - scripts/verify/v2_app_governance_gate_audit.py
    - artifacts/v2/v2_primary_minimum_business_smoke_v1.json
    - artifacts/v2/v1_v2_focus_intent_diff_report_v1.json
    - artifacts/v2/v2_rollback_readiness_recheck_v1.json
    - docs/ops/ITER-1680-business-usability-validation.md
    - agent_ops/tasks/ITER-2026-04-10-1680.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1680.md
    - agent_ops/state/task_results/ITER-2026-04-10-1680.json
