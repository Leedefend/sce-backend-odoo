  module: smart_core focus-intent business usability verification
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只做运行可用性观测与漂移清单输出，不更改业务事实和权限。
  reason: >
    1679 已确认治理门禁通过，但需要补齐用户可用性生死线：可用、可解释差异、可回滚。

acceptance:
