  branch: codex/next-round
  baseline_sha: d243d59
  input_result: artifacts/migration/partner_rebuild_importer_result_v1.json
  input_rows: artifacts/migration/partner_rebuild_importer_rows_v1.csv

architecture:
  layer_target: Migration Write-Mode Gate
  module: res.partner controlled rebuild write gate
  module_owner: docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The gate defines when partner business facts may be written and how they
    remain repeatable, idempotent, and rollbackable.
  reason: >
    ITER-2026-04-13-1851 validated the no-DB rebuild importer shape. Before any
    partner creation, the write-mode authority, sample size, idempotency key,
    and rollback policy must be frozen.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1852.yaml
    - python3 -m json.tool artifacts/migration/partner_rebuild_importer_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1852.json
    - make verify.native.business_fact.static

risk:
