task_id: ITER-2026-03-31-482
title: Normalize next-action rule expressions for stable safe_eval
type: permission-governance
status: active
priority: high

goal: >
  Fix the recommendation-layer residual found in ITER-2026-03-31-481 by
  normalizing next-action rule expressions before safe_eval, so multiline XML
  expressions do not fail on indentation.

user_visible_outcome:
  - "draft 阶段的提交立项推荐不再因为表达式缩进被漏判"
  - "next-action rule 的多行 condition_expr 能稳定评估"
  - "不新增 ACL，不改变既有推荐语义"

scope:
  allowed_paths:
    - addons/smart_construction_core/services/project_next_action_service.py
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - normalization-only or runtime-safe implementation
  - no ACL, record-rule, manifest, or schema changes
  - preserve existing rule semantics while removing formatting sensitivity
  - keep 480 dispatcher fixes unchanged

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance + Permission Surface Fix
  module: next-action rule expression normalization
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-481 found that the draft-stage submit-project rule is
    suppressed by condition_expr indentation before execution is reached. The
    next narrow implementation batch is to normalize expressions at evaluation
    time.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-482.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - runtime audit confirms draft-stage representative next-action evaluation includes the submit-project recommendation when its business condition is met

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - expression_normalization_changes_rule_semantics
  - verify_smart_core_fails
  - runtime_rule_eval_residual_remains

deliverables:
  - normalized next-action expression evaluation
  - regression coverage for multiline condition_expr evaluation
  - governance/report artifacts for ITER-2026-03-31-482

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/services/project_next_action_service.py
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-482.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-482.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-482.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-481
