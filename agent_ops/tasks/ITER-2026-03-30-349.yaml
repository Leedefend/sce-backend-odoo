task_id: ITER-2026-03-30-349
title: Formalize preview publication policy into native-fact and custom-frontend lanes
type: code
status: in_progress
priority: high

goal: >
  Convert the clarified product boundary into an explicit governance contract:
  the business fact layer only needs concrete model/menu/action facts, while
  portal-like and special-rendering entries are fulfilled by the custom
  frontend instead of the abandoned native frontend.

user_visible_outcome:
  - preview publication policy is explicit instead of implicit
  - native business-fact entries and custom-frontend supplement entries are no longer mixed in one usability target
  - the next implementation batch can focus on the custom frontend without re-litigating native portal semantics

