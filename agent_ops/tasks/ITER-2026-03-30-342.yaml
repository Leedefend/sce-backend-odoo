title: Consume release-nav stable and native-preview metadata in sidebar
type: code
status: in_progress
priority: high

goal: >
  Continue the sidebar navigation productization line by consuming the explicit
  backend release-navigation metadata in the frontend shell, so stable release
  groups and native preview groups are presented distinctly without relying on
  label heuristics.

