task_id: ITER-2026-03-29-183
title: Add frontend verify route selection output
type: governance_task
status: pending
priority: high

goal: Extend the frontend verify gate so it emits a machine-readable verification route and next-step guidance, allowing productization batches to consume one stable decision surface instead of manually interpreting BLOCKED states.
user_visible_outcome:
  - frontend productization iterations can read one verify payload and know whether to run local verify or stop for toolchain alignment
  - current Node24 and ESLint8 blocker returns explicit route metadata instead of only a raw reason code

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: governance layer
  module: agent_ops frontend verify routing
  reason: frontend productization now needs a stable machine-readable gate decision that tells later batches whether local verify is usable or toolchain alignment is required.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-183.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_eslint_preflight.py agent_ops/scripts/frontend_verify_gate.py
    - python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status BLOCKED --expect-route toolchain_alignment_required

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-183.yaml agent_ops/scripts/frontend_eslint_preflight.py agent_ops/scripts/frontend_verify_gate.py

depends_on:
  - ITER-2026-03-29-182

notes: "Governance acceleration batch: turn frontend verify preflight into a machine-readable route selector for productization work."
