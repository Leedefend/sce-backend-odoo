task_id: ITER-2026-03-29-206
title: Consume expression field modifiers on project form page
type: product_task
status: pending
priority: high

goal: "Make the frontend project form consume simple expression-style `views.form.field_modifiers` such as `readonly: \"not active\"` so live contract behavior becomes visible on the current project form page."
user_visible_outcome:
  - project form fields react to simple expression modifiers from the backend contract
  - fields like `user_id` can become readonly from runtime contract state instead of remaining interactive

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: project form expression modifiers consumption
  reason: "Live project form contract already includes field modifiers on visible layout fields, but one key modifier is expression-shaped (`readonly: \"not active\"`), so the frontend must evaluate that contract form instead of leaving it inert."

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-206.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-206.yaml frontend/apps/web/src/app/modifierEngine.ts agent_ops/reports/2026-03-29/report.ITER-2026-03-29-206.md agent_ops/state/task_results/ITER-2026-03-29-206.json

depends_on:
  - ITER-2026-03-29-205

notes: "Frontend-only batch: evaluate simple expression modifiers from live project form contract, starting with the currently observed `not active` path."
