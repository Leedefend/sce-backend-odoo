task_id: ITER-2026-03-31-492
title: Fix overview task in-progress count semantics for next-action recommendations
type: permission-governance
status: active
priority: high

goal: >
  Repair the task in-progress counter mismatch found in ITER-2026-03-31-491 so
  sc.project.overview.service counts project.task.sc_state = in_progress
  consistently with runtime task transitions and the 推进任务执行 recommendation rule.

user_visible_outcome:
  - "overview.task.in_progress 与真实 project.task.sc_state 对齐"
  - "推进任务执行 recommendation 恢复可命中"
  - "不改 ACL，不改 recommendation 业务语义"

scope:
  allowed_paths:
    - addons/smart_construction_core/services/project_overview_service.py
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - narrow implementation batch
  - no ACL, record-rule, manifest, schema, or seed data changes
  - preserve existing next-action rule semantics except for the incorrect task in-progress counter source

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: overview task in-progress count alignment
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-491 showed that runtime task transitions write sc_state,
    but overview currently reads project.task.state for in-progress counting.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-492.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - "runtime audit confirms a scratch task in sc_state=in_progress increments overview.task.in_progress and emits 推进任务执行 before cleanup"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - runtime_task_in_progress_mismatch_remains
  - the_fix_requires_task_rule_or_acl_changes

deliverables:
  - fixed overview task in-progress count extraction
  - regression coverage for task in-progress recommendation support
  - governance/report artifacts for ITER-2026-03-31-492

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/services/project_overview_service.py
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-492.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-492.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-492.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-491
