task_id: ITER-2026-04-05-1144
title: Promote CapabilityQueryService as default runtime path with explicit legacy safety toggle
type: implementation
status: active
priority: high
mode: execute

goal: >
  Make CapabilityQueryService the default runtime capability query path and keep
  legacy contribution/model fallback available only behind explicit safety toggle.

user_visible_outcome:
  - "能力查询默认走平台 CapabilityQueryService，legacy fallback 仅显式开关可用"

scope:
  allowed_paths:
    - addons/smart_core/core/capability_provider.py
    - docs/ops/iterations/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - artifacts/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 10
  max_output_lines: 260
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_path_switch
  - explicit_fallback_toggle_only

context:
  branch: codex/next-round
  baseline_sha: da08944
  explicit_user_authorization: true
  input_from: user_approved_1144
  priority_lane: platformization

architecture:
  layer_target: Platform Layer
  module: smart_core.capability_provider
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: keep semantic query ownership in platform registry service.
  reason: complete default-path promotion after model/provider platformization.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1144.yaml
    - python3 -m py_compile addons/smart_core/core/capability_provider.py
    - rg -n "capability_legacy_fallback_enabled|CapabilityQueryService|return runtime_caps" addons/smart_core/core/capability_provider.py
    - E2E_BASE_URL=http://127.0.0.1:18069 E2E_DB=sc_prod_sim E2E_LOGIN=admin E2E_PASSWORD=admin python3 scripts/verify/capability_payload_real_env_capture.py --out-dir artifacts/capability_payload_capture_1144 --request-timeout-sec 8 --require-lane-ready
    - python3 -c "import json; p='artifacts/capability_payload_capture_1144/latest/capture_report.json'; o=json.load(open(p,'r',encoding='utf-8')); assert o.get('env_status')=='trusted'; print('trusted', o.get('v1_count'), o.get('v2_count'))"
    - make verify.controller.boundary.guard

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_core/core/capability_provider.py

rollback:
  - git restore addons/smart_core/core/capability_provider.py
  - git restore agent_ops/tasks/ITER-2026-04-05-1144.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1144.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1144.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1143
