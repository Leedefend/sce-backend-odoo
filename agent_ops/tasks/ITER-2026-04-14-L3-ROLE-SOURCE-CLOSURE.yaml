task_id: ITER-2026-04-14-L3-ROLE-SOURCE-CLOSURE
title: Project member L3 role-source closure approved-only sample apply v1
status: blocked
type: migration-responsibility-approval-gated-write
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030ZD

goal: >
  Export the L3 business review checklist, freeze role-source rules, implement
  an approved-only apply script, and run the 3-row sample dry-run/apply/audit
  gate without expanding or bypassing approval.

user_visible_outcome:
  - "L3 候选进入 approved-only 写入闭环；无审批时正式写入必须被阻断"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-L3-ROLE-SOURCE-CLOSURE.yaml
    - scripts/migration/project_member_l3_role_source_closure.py
    - artifacts/migration/project_member_l3_business_review_checklist_v1.csv
    - artifacts/migration/project_member_l3_business_review_checklist_v1.json
    - artifacts/migration/project_member_l3_role_source_rule_v1.json
    - artifacts/migration/project_member_l3_apply_dry_run_result_v1.json
    - artifacts/migration/project_member_l3_apply_write_result_v1.json
    - artifacts/migration/project_member_l3_post_write_audit_result_v1.json
    - artifacts/migration/project_member_l3_responsibility_rollback_targets_v1.csv
    - docs/migration_alignment/project_member_l3_role_source_closure_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-L3-ROLE-SOURCE-CLOSURE.md
    - agent_ops/state/task_results/ITER-2026-04-14-L3-ROLE-SOURCE-CLOSURE.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_l3_role_source_review_packet_v1.json
    - artifacts/migration/project_member_l3_role_source_review_packet_v1.csv
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 13
  max_sample_rows: 3
  forbid_repo_wide_scan: true

change_rules:
  - approved-only-project-responsibility-write
  - no-approval-no-write
  - no-sample-expansion
  - no-role-key-fabrication
  - no-acl-security-change
  - no-record-rule-change

architecture:
  layer_target: Migration Responsibility Closure Gate
  module: project_member L3 role-source closure
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Responsibility role assignment is a business fact. This batch may only
    write when the business role source has been explicitly approved.
  reason: >
    0030ZD produced 10 L3 review candidates but all remain pending. The closure
    gate must enforce approval before any project.responsibility write.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-L3-ROLE-SOURCE-CLOSURE.yaml
    - python3 -m py_compile scripts/migration/project_member_l3_role_source_closure.py
    - PM_L3_ROLE_SOURCE_MODE=checklist python3 scripts/migration/project_member_l3_role_source_closure.py
    - PM_L3_ROLE_SOURCE_MODE=dry-run python3 scripts/migration/project_member_l3_role_source_closure.py
    - sed "s/os.environ.get(\"PM_L3_ROLE_SOURCE_MODE\") or \"checklist\"/os.environ.get(\"PM_L3_ROLE_SOURCE_MODE\") or \"apply\"/" scripts/migration/project_member_l3_role_source_closure.py | DB_NAME=sc_demo make odoo.shell.exec
    - sed "s/os.environ.get(\"PM_L3_ROLE_SOURCE_MODE\") or \"checklist\"/os.environ.get(\"PM_L3_ROLE_SOURCE_MODE\") or \"audit\"/" scripts/migration/project_member_l3_role_source_closure.py | DB_NAME=sc_demo make odoo.shell.exec
    - python3 -m json.tool artifacts/migration/project_member_l3_apply_dry_run_result_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_apply_write_result_v1.json
    - python3 -m json.tool artifacts/migration/project_member_l3_post_write_audit_result_v1.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: true
  write_gate: "Only rows with business_decision=approved, valid proposed_role_key, role_source_evidence, and business_reviewer may write."

rollback:
  - "Use artifacts/migration/project_member_l3_responsibility_rollback_targets_v1.csv for any created project.responsibility rows."
  - "If no rows are approved, no database rollback is required because no write occurs."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - acl_or_record_rule_touched
  - more_than_three_rows_selected
  - unapproved_row_write_attempted
  - missing_role_source_evidence
  - invalid_role_key

deliverables:
  - task contract
  - approved-only closure script
  - business review checklist
  - role-source rule artifact
  - dry-run result
  - apply result
  - post-write audit result
  - rollback target list
  - closure documentation
  - iteration report
  - task result json
