task_id: ITER-2026-03-30-292
title: Surface native sort source in list toolbar
type: frontend
status: in_progress
priority: medium

goal: >
  Clarify whether the current list sort is coming from native default metadata
  or an active runtime sort state, using existing runtime values only.

user_visible_outcome:
  - list pages explain the current sort source more clearly
  - users can tell when the list is following native default sort
  - no new sort interaction is introduced

scope:
  allowed_paths:
    - frontend/apps/web/src/app/action_runtime/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/components/page/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - read existing runtime state only
  - no backend changes
  - no invented sort controls

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The toolbar already shows sort state, but it does not explain whether that
    state comes from native default metadata. A passive source label is the next
    safe metadata-driven enhancement.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-292.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - sort_source_requires_new_backend_semantics

deliverables:
  - native_sort_source_label
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewSurfaceDisplayRuntime.ts
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore frontend/apps/web/src/pages/ListPage.vue
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-292.yaml

depends_on:
  - ITER-2026-03-30-290

notes: >
  The source label should be computed only from current sort value and existing
  native default sort metadata already present in runtime state.
