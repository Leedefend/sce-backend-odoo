task_id: ITER-2026-04-05-1113
title: Migrate non-forbidden orchestration services to extension-provider adapter
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Decouple five non-forbidden smart_core orchestrators from direct
  `smart_construction_core.services.*` imports by introducing a platform
  orchestration service adapter backed by extension hooks.

user_visible_outcome:
  - "5 个非禁改 orchestrator 去除 direct industry service import，改为协议注入"

scope:
  allowed_paths:
    - addons/smart_core/core/industry_orchestration_service_adapter.py
    - addons/smart_core/orchestration/project_execution_scene_orchestrator.py
    - addons/smart_core/orchestration/project_dashboard_scene_orchestrator.py
    - addons/smart_core/orchestration/project_plan_bootstrap_scene_orchestrator.py
    - addons/smart_core/orchestration/project_dashboard_contract_orchestrator.py
    - addons/smart_core/orchestration/cost_tracking_contract_orchestrator.py
    - addons/smart_construction_core/core_extension.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**
    - addons/smart_core/orchestration/payment_slice_contract_orchestrator.py
    - addons/smart_core/orchestration/settlement_slice_contract_orchestrator.py

limits:
  max_files: 14
  max_candidates: 12
  max_output_lines: 280
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
