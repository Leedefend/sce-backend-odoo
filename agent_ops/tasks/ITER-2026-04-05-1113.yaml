  module_owner: platform
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: orchestration layer should consume extension protocol providers instead of direct industry service imports.
  reason: migrate 5 allowed hotspots from 1112 audit while respecting stop-condition exclusions.

