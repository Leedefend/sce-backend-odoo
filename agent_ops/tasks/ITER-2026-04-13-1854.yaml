task_id: ITER-2026-04-13-1854
title: Partner 30-row create-only sample authorization packet v1
status: in_progress
type: migration-write-authorization-gate
priority: high
mode: execute

goal: >
  Lock the first 30-row create-only partner sample and produce the write
  authorization packet for the next batch. This batch does not create partners.

user_visible_outcome:
  - "partner 30 行 create-only 写入前样本锁定与授权包完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1854.yaml
    - artifacts/migration/partner_30_row_create_only_sample_v1.csv
    - docs/migration_alignment/partner_30_row_write_authorization_packet_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1854.md
    - agent_ops/state/task_results/ITER-2026-04-13-1854.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/partner_rebuild_importer_result_v1.json
    - artifacts/migration/partner_rebuild_importer_rows_v1.csv
    - docs/migration_alignment/partner_write_mode_gate_v1.md
    - docs/migration_alignment/full_rebuild_importer_promotion_standard_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - scripts/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 6
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - no-orm
  - no-partner-create
  - no-contract-import
  - sample-lock-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  input_result: artifacts/migration/partner_rebuild_importer_result_v1.json
  input_rows: artifacts/migration/partner_rebuild_importer_rows_v1.csv

architecture:
  layer_target: Migration Write Authorization Gate
  module: res.partner 30-row create-only sample gate
  module_owner: artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The gate locks which partner business facts may enter the first controlled
    write batch and how the write remains identity-based and rollbackable.
  reason: >
    ITER-2026-04-13-1852 froze write-mode criteria and ITER-2026-04-13-1853
    froze the importer promotion standard. Before any real res.partner create,
    the exact 30-row sample and authorization terms must be locked.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1854.yaml
    - python3 -m json.tool artifacts/migration/partner_rebuild_importer_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1854.json
    - python3 -c "import csv; rows=list(csv.DictReader(open('artifacts/migration/partner_30_row_create_only_sample_v1.csv', encoding='utf-8'))); assert len(rows) == 30 and all(r['dry_run_action'] == 'create_candidate' for r in rows)"
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - partner_create_attempted
  - contract_import_attempted

deliverables:
  - task contract
  - 30-row sample csv
  - write authorization packet
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1852
  - ITER-2026-04-13-1853

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1854.yaml
  - git restore artifacts/migration/partner_30_row_create_only_sample_v1.csv
  - git restore docs/migration_alignment/partner_30_row_write_authorization_packet_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1854.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1854.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
