task_id: ITER-2026-04-01-545
title: Screen the next family from the fresh bounded native list toolbar scan
type: frontend
status: active
priority: medium
mode: screen

goal: >
  Select the next low-risk usability family from the fresh bounded native list
  toolbar scan without reopening source-file scanning.

user_visible_outcome:
  - "确定 fresh scan 后的下一条 toolbar 可用性家族"
  - "保持 screen 阶段只做归类和优先级判断"
  - "为下一张实现合同提供单一目标"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - frontend/**
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 3
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - reporter
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost screen stage only
  - only read ITER-2026-04-01-544 scan results
  - do not read new frontend files
  - do not implement code in this batch

context:
  branch: codex/next-round
  baseline_sha: 8194c19
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-544
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar screen
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The fresh bounded scan is complete. The next low-cost step is to select one
    candidate family for implementation without mixing in new scanning or code changes.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-545.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - screen_requires_new_scan
  - candidate_selection_uncertain
  - screen_output_exceeds_limit

deliverables:
  - next_candidate_family
  - family_scope
  - reason
  - governance/report artifacts for ITER-2026-04-01-545

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-545.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-545.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-545.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-544
