task_id: ITER-2026-04-10-1682
title: frontend login unblock via api proxy target correction

type: implementation
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  修复自定义前端登录请求卡住问题，将 dev server /api 代理默认目标与当前后端端口对齐，
  使 login intent 能返回。

user_visible_outcome:
  - "自定义前端登录不再卡住，能收到 login intent 响应"

scope:
  allowed_paths:
    - frontend/apps/web/vite.config.ts
    - agent_ops/tasks/ITER-2026-04-10-1682.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1682.md
    - agent_ops/state/task_results/ITER-2026-04-10-1682.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 5
  max_output_lines: 600

change_rules:
  - frontend runtime config fix only
  - no backend behavior changes

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Frontend contract-consumer runtime
  module: web vite dev proxy
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅修正前端到后端的连通配置，不改业务事实与契约语义。
  reason: >
    当前 dev proxy 指向 8070，实际后端在 8069，导致 /api intent 登录链路卡住。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1682.yaml"
    - 'rg -n "VITE_API_PROXY_TARGET|localhost:8069" frontend/apps/web/vite.config.ts'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - frontend dev proxy default aligned to backend runtime port

rollback:
  - git restore frontend/apps/web/vite.config.ts

depends_on:
  - ITER-2026-04-10-1681
