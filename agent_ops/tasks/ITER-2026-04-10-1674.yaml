  提供 v1/v2 双轨对比证据（可观测，非硬阻断）。

user_visible_outcome:
  - "三条主链 compare 结果可审计、可回归、可快照"

scope:
  allowed_paths:
    - artifacts/v2/v2_focus_intent_compare_snapshot_v1.json
    - scripts/verify/v2_session_bootstrap_compare_audit.py
    - scripts/verify/v2_meta_describe_model_compare_audit.py
    - scripts/verify/v2_ui_contract_compare_audit.py
    - scripts/verify/v2_focus_intent_compare_summary.py
    - docs/menu/menu_target_interpreter_audit_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1674.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1674.md
    - agent_ops/state/task_results/ITER-2026-04-10-1674.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 10
  max_output_lines: 1200

change_rules:
  - compare observability only
  - do not add compare checks into hard blocking gate in this batch
  - no new intent migration

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel independent rebuild layer
  module: smart_core focus-intent compare observability
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只补 compare 证据与快照，不改变运行决策和业务事实。
  reason: >
    支撑双轨升级/回退判断，避免靠人工感觉判断一致性。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1674.yaml"
    - "python3 scripts/verify/v2_session_bootstrap_compare_audit.py --json"
    - "python3 scripts/verify/v2_meta_describe_model_compare_audit.py --json"
    - "python3 scripts/verify/v2_ui_contract_compare_audit.py --json"
    - "python3 scripts/verify/v2_focus_intent_compare_summary.py --json"
    - "python3 -m py_compile scripts/verify/v2_session_bootstrap_compare_audit.py scripts/verify/v2_meta_describe_model_compare_audit.py scripts/verify/v2_ui_contract_compare_audit.py scripts/verify/v2_focus_intent_compare_summary.py"
    - 'rg -n "same_shape|same_reason_code|diff_summary|session.bootstrap|meta.describe_model|ui.contract" artifacts/v2/v2_focus_intent_compare_snapshot_v1.json scripts/verify/v2_session_bootstrap_compare_audit.py scripts/verify/v2_meta_describe_model_compare_audit.py scripts/verify/v2_ui_contract_compare_audit.py scripts/verify/v2_focus_intent_compare_summary.py'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - focus intent compare audits + summary + snapshot

rollback:
  - git restore artifacts/v2/v2_focus_intent_compare_snapshot_v1.json scripts/verify/v2_session_bootstrap_compare_audit.py scripts/verify/v2_meta_describe_model_compare_audit.py scripts/verify/v2_ui_contract_compare_audit.py scripts/verify/v2_focus_intent_compare_summary.py docs/menu/menu_target_interpreter_audit_v1.md

