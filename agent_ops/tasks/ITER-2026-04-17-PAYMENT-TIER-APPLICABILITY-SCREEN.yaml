task_id: ITER-2026-04-17-PAYMENT-TIER-APPLICABILITY-SCREEN
title: Payment tier definition applicability screen
type: approval-config-screen
status: active
priority: high

goal: >
  Screen tier-validation configuration for payment.request to explain why submit
  creates no tier.review records and blocks approval/completion.

user_visible_outcome:
  - "Identify whether payment approval tiers are missing, inactive, or condition-mismatched."

scope:
  allowed_paths:
    - docs/ops/business_continuity/payment_tier_applicability_screen_v1.md
    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-17-PAYMENT-TIER-APPLICABILITY-SCREEN.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**
    - migrations/**
    - deploy/**

context:
  branch: codex/next-round
  baseline_sha: 5eddce2
  prior_task: ITER-2026-04-17-PAYMENT-APPROVAL-LIFECYCLE-OPERABILITY-SCREEN

architecture:
  layer_target: Approval Configuration
  module: base_tier_validation / payment.request
  module_owner: approval workflow configuration surface
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Tier definitions and generated tier.review records are approval workflow
    facts. They determine whether payment approval can proceed.
  reason: >
    Payment submit succeeds but no tier.review is generated, leaving
    validation_status=no and blocking approval/done.

change_rules:
  - screen only
  - do not write tier definitions or business records
  - do not modify addons, frontend, ACL, payment, settlement, or account code

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-17-PAYMENT-TIER-APPLICABILITY-SCREEN.yaml
    - DB_NAME=sc_demo make odoo.shell.exec

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - screen_writes_business_data
  - acceptance_failed

deliverables:
  - tier definition applicability result
  - next implementation recommendation

rollback:
  - git restore docs/ops/business_continuity/payment_tier_applicability_screen_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-17-PAYMENT-TIER-APPLICABILITY-SCREEN.yaml

depends_on:
  - ITER-2026-04-17-PAYMENT-APPROVAL-LIFECYCLE-OPERABILITY-SCREEN
