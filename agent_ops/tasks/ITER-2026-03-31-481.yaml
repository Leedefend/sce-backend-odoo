status: active
priority: medium

goal: >
  Audit whether representative next-action recommendations now align end to end
  across recommendation output, dispatcher execution, and downstream target
  reachability on the corrected 480 baseline.

user_visible_outcome:
  - "确认 representative next-action 从推荐到执行是否已经整体一致"
