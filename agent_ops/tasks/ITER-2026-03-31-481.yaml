  module: representative next-action alignment audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-480 closed the dispatcher residual. The next low-risk step
    is to audit whether representative next-action recommendation and execution
    now align end to end.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-481.yaml
    - repository and runtime audit classify representative next-action recommendation/execution alignment as PASS or PASS_WITH_RISK

