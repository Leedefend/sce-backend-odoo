task_id: ITER-2026-04-01-514
title: Select another uncovered low-risk non-first-batch flow family after dictionary closure
type: permission-governance
status: active
priority: medium

goal: >
  Continue broadening the non-first-batch objective after dictionary/quota
  closure by selecting another uncovered low-risk representative secondary-flow
  family that does not directly require financial-domain implementation.

user_visible_outcome:
  - "继续扩展非首批流程覆盖面"
  - "选出下一条尚未覆盖的低风险 secondary family"
  - "避免直接落入 payment / settlement / account 实现面"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first family selection batch
  - implementation changes are out of scope unless a later narrow batch is opened
  - avoid reopening already-closed material, execution-side, document, tender, contract, and dictionary/quota families

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: next uncovered low-risk non-first-batch family audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    Six representative non-first-batch families are now closed. The next safe
    step is to select another uncovered family while staying out of direct
    financial-domain implementation.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-514.yaml
    - "repository audit identifies another uncovered low-risk family and role boundaries"
    - "runtime audit classifies at least one representative entrypoint without high-risk side effects"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - candidate_family_requires_scope_expansion_into_financial_domain
  - runtime_cannot_classify_the_next_family_with_confidence
  - audit_requires_acl_or_manifest_changes

deliverables:
  - another uncovered low-risk non-first-batch family classification
  - governance/report artifacts for ITER-2026-04-01-514

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-514.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-514.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-514.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-513
