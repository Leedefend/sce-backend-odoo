task_id: ITER-2026-03-29-162
title: Drive smart_scene page status from record-aware semantics
type: governance_task
status: pending
priority: high

goal: Make smart_scene derive page_status from record-aware workflow and validation semantics instead of relying only on permission semantics.
user_visible_outcome:
  - scene contracts now mark form-like scenes as ready when record-aware workflow and validation conditions are satisfied
  - scene contracts now mark validation-driven empty records as empty instead of leaving page status blank

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_engine + scene_resolver
  reason: smart_scene already derives permissions and identity from workflow and validation surfaces, but page_status still only reflects permission semantics. This iteration turns record-aware workflow and validation signals into page_status decisions using existing scene contract vocabulary.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-162.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-162.yaml addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-161

notes: "Batch acceleration: make page_status record-aware from workflow and validation semantics."
