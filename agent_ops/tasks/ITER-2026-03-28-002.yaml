task_id: ITER-2026-03-28-002
title: Validate queue stop on pass-with-risk
type: governance_task
status: pending
priority: high

goal: Prove that the queue stops and records evidence when an iteration completes with PASS_WITH_RISK.
user_visible_outcome:
  - queue stop-on-risk branch is exercised
  - iteration report captures triggered stop conditions
  - queue state records the risk stop event

scope:
  allowed_paths:
    - agent_ops/**
    - Makefile
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: agent_ops queue + reports + docs/ops/iterations
  reason: Validate the stop-on-risk control path without touching any business module.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-002.yaml
    - python3 -m py_compile agent_ops/scripts/common.py agent_ops/scripts/validate_task.py agent_ops/scripts/risk_scan.py agent_ops/scripts/classify_result.py agent_ops/scripts/build_report.py agent_ops/scripts/pick_next_task.py agent_ops/scripts/run_queue.py

risk:
  level: medium
  manual_approval_required: false
  threshold_overrides:
    max_changed_files: 5
    max_added_lines: 300
    max_removed_lines: 50

stop_conditions:
  - too_many_files_changed
  - diff_too_large
  - verify_failed
  - scope_overreach

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops Makefile docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-28-001
notes: "Intentional PASS_WITH_RISK sample task for queue stop validation."
