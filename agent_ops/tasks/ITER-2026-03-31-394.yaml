task_id: ITER-2026-03-31-394
title: Audit workbench fidelity gaps against native portal dashboard capability
type: audit
status: completed
priority: high

goal: >
  Isolate the exact fidelity gaps between the native `portal.dashboard`
  capability and the current custom `工作台`, so the repository can decide
  whether to accept those gaps as intentional product behavior or open a later
  repair batch with a precise scope.

user_visible_outcome:
  - "明确工作台相对原生 portal.dashboard 具体偏离了什么"
  - "明确哪些偏离是入口扩展，哪些是渲染语义变化，哪些是交付逻辑变化"
  - "给出是否需要修复，以及最小修复范围建议"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit only; no code changes
  - compare only native `portal.dashboard` capability and current custom `工作台`
  - do not broaden scope back to all custom frontend surfaces
  - separate fidelity gaps into entry, render, and delivery categories

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Governance Audit
  module: workbench native fidelity gaps
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The previous audit reduced the active native-to-custom alignment issue to
    workbench only. The next low-risk step is to decompose that semantic shift
    into exact fidelity gaps before deciding whether a repair batch is
    warranted.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-394.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - workbench_fidelity_gap_scope_unclear

deliverables:
  - explicit workbench fidelity gap matrix vs native portal dashboard
  - recommendation to accept-as-product-behavior or open repair batch
  - report and task result artifacts for ITER-2026-03-31-394
  - delivery log checkpoint with next suggestion

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-394.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-394.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-394.json

depends_on:
  - ITER-2026-03-31-393
