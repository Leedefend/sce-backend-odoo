task_id: ITER-2026-03-30-305
title: Reorder list active-condition summary for user reading flow
type: frontend
status: in_progress
priority: medium

goal: >
  Improve readability by ordering active-condition chips according to a more
  natural user reading flow: search, quick filter, saved filter, group-by, then
  sort.

user_visible_outcome:
  - current-condition summary reads in a more natural left-to-right order
  - sort no longer dominates the first chip position
  - no behavior or backend semantics change

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/pages/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend changes
  - no new interactions

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The active-condition summary is complete, but its current ordering is not
    optimal for scanability. A small display-only reorder improves readability.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-305.yaml
    - pnpm -C frontend/apps/web typecheck:strict

