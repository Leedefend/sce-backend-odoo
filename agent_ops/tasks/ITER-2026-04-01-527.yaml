task_id: ITER-2026-04-01-527
title: Allow bounded role-parallel execution in low-cost iteration mode
type: governance-optimization
status: active
priority: high

goal: >
  Extend the low-cost iteration governance so low-risk tasks may use bounded
  role-parallel execution when explicitly declared, while preserving
  single-stage, short-context, and forbidden-path protections.

user_visible_outcome:
  - "低风险任务可按角色并行执行"
  - "并行执行仍保持单阶段和短上下文约束"
  - "模板、规则和脚本对角色并行有统一约束"

scope:
  allowed_paths:
    - AGENTS.md
    - agent_ops/tasks/**
    - agent_ops/templates/**
    - agent_ops/scripts/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**
    - security/**

change_rules:
  - governance-only batch
  - no product code changes
  - preserve low-cost single-stage boundaries
  - allow role-parallelism only for explicitly declared low-risk tasks

context:
  branch: codex/next-round
  baseline_sha: 2a02eb6
  explicit_user_authorization: true

architecture:
  layer_target: Agent Governance
  module: low-cost role-parallel policy
  module_owner: agent_ops governance surface
  kernel_or_scenario: scenario
  reason: >
    The repository now has low-cost staged execution, but it still lacks a
    formal rule for bounded role-parallelism on low-risk tasks. This batch adds
    that governance capability without weakening stage isolation.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-527.yaml
    - python3 agent_ops/scripts/split_task.py agent_ops/tasks/ITER-2026-04-01-522.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - role_parallel_rule_weakens_single_stage_boundaries
  - governance_change_requires_product_path_edits
  - low_cost_parallel_contract_cannot_be_enforced_with_confidence

deliverables:
  - low-cost role-parallel policy updates
  - task template support for role-parallel low-risk tasks
  - split-task propagation for role-parallel settings

rollback:
  - git restore AGENTS.md
  - git restore agent_ops/tasks/ITER-2026-04-01-527.yaml
  - git restore agent_ops/templates/task_low_cost.yaml
  - git restore agent_ops/scripts/split_task.py
  - git restore docs/ops/codex_low_cost_iteration_policy_v1.md

depends_on:
  - ITER-2026-04-01-523
