task_id: ITER-2026-03-30-314
title: Split raw list sort order from display sort label
type: frontend
status: in_progress
priority: high

goal: >
  Fix the list-page regression where a user-readable sort label was reused as
  the backend order token, causing api.data requests to send invalid Odoo
  order syntax like "id 升序".

user_visible_outcome:
  - the list page loads without INTERNAL_ERROR
  - readable sort wording remains visible in the UI
  - backend requests keep using valid raw order tokens

scope:
  allowed_paths:
    - frontend/apps/web/src/app/action_runtime/**
    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - preserve current readable sort display
  - restore raw order tokens for all request paths
  - no backend changes

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: action view list sort runtime
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The list surface currently conflates display sort text with raw Odoo order
    syntax. This batch splits the two concerns so UI copy stays readable while
    request payloads remain valid.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-314.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - sort_runtime_fix_requires_backend_change

deliverables:
  - sort_runtime_split
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewSurfaceDisplayRuntime.ts
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewDisplayComputedRuntime.ts
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-314.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-313

notes: >
  Keep all network and runtime request paths on raw order tokens. Only subtitle,
  toolbar summary, and active-condition display should use the localized sort
  wording.
