task_id: ITER-2026-03-30-347
title: Audit preview menus against business model/view/action/permission facts
type: code
status: in_progress
priority: high

goal: >
  Shift the release-navigation verification line from frontend openability to
  business-fact audit by tracing each published preview menu to its underlying
  model, native action, native views, menu groups, and minimum data/permission
  prerequisites for the demo PM user.

user_visible_outcome:
  - each preview menu has an auditable fact sheet grounded in business models and native actions
  - real blockers are classified as model/view/action/permission/data issues instead of frontend guesses
  - follow-up fixes can target business-fact breakpoints in priority order

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit and verification only
  - no business-model or frontend behavior changes in this batch
  - evidence must come from real menu/action/view/group/model facts

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Domain Layer Governance
  module: business fact audit for preview menus
  module_owner: scripts/verify + agent_ops
  kernel_or_scenario: scenario
  reason: >
    Preview menus are now openable, but the next productization risk sits in
    the underlying industry business facts: model bindings, native views,
    action targets, menu permissions, and minimum data prerequisites.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-347.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - fact_chain_cannot_be_resolved
  - audit_evidence_missing

deliverables:
  - preview menu fact-layer audit matrix
  - explicit blocker classification by model/view/action/permission/data
  - report and task result artifacts for ITER-2026-03-30-347

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-347.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-347.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-347.json

depends_on:
  - ITER-2026-03-30-346

notes: >
  “事实层”在本批中明确指行业业务模型、原生视图、菜单动作和权限事实，
  不再以平台 contract 或前端渲染结果作为主审计对象。
