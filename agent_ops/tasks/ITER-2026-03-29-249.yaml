task_id: ITER-2026-03-29-249
title: Thin UiContractHandler repeated model dispatch paths
type: refactor_task
status: in_progress
priority: high

goal: Reduce duplicated model/view/action-form dispatch code inside UiContractHandler by extracting shared helper methods, while keeping the current backend architecture, endpoints, and contract outputs unchanged.
user_visible_outcome:
  - backend ui contract handler becomes easier to reason about
  - repeated model/form contract assembly paths are reduced
  - later boundary cleanup can focus on protocol vs routing more safely

scope:
  allowed_paths:
    - addons/smart_core/handlers/**
    - addons/smart_core/tests/**
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

change_rules:
  - additive_or_refactor_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change
  - preserve_endpoint_behavior

architecture:
  layer_target: platform layer
  module: ui contract handler
  reason: The previous audit and ITER-2026-03-29-248 showed that the next low-risk cleanup point is repeated model/view/action-form dispatch packaging inside UiContractHandler. Extracting helpers will clarify boundaries without changing the architecture.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-249.yaml
    - python3 addons/smart_core/tests/test_ui_contract_projection.py
    - make verify.smart_core

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_command_failed
  - output_contract_changed_unintentionally
  - helper_extraction_starts_changing_business_semantics

deliverables:
  - ui_contract_shared_dispatch_helper
  - handler_duplication_reduction
  - regression_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-249.yaml docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore addons/smart_core/handlers/ui_contract.py addons/smart_core/tests/test_ui_contract_projection.py

depends_on:
  - ITER-2026-03-29-248

notes: "Focus only on UiContractHandler internal helper extraction. Do not touch parser, governance rules, or frontend."
