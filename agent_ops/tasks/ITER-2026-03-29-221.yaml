task_id: ITER-2026-03-29-221
title: Slim generic list shell to native-first core
type: product_task
status: pending
priority: high

goal: Make generic list routes in `ActionView` render primarily through the existing `ListPage` core by suppressing non-essential pre-table contract blocks, so list pages feel closer to Odoo-native usage first.
user_visible_outcome:
  - list pages lead with header, toolbar, summary, table, pagination, and row-click
  - non-essential pre-table contract sections stop overwhelming the list experience

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic list shell
  reason: Backend list facts are already sufficient. The fastest path to basic usability is to let `ListPage` own list routes while shrinking ActionView's generic pre-table surfaces.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-221.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-221.yaml frontend/apps/web/src/views/ActionView.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-221.md agent_ops/state/task_results/ITER-2026-03-29-221.json

depends_on:
  - ITER-2026-03-29-220

notes: "Keep the batch generic to all list routes; project.project is only the first validation sample."
