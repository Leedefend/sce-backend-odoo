task_id: ITER-2026-03-31-480
title: Fix sc_execute_next_action follow-through dispatcher residuals
type: permission-governance
status: active
priority: high

goal: >
  Fix the follow-through execution residuals found in ITER-2026-03-31-479 so
  sc_execute_next_action() safely executes act_window_xmlid and object_method
  branches for delivered roles without adding ACLs or changing record rules.

user_visible_outcome:
  - "next-action 执行层不再因为 action-view ACL 或错误的 method dispatch 失败"
  - "字符串形式的 action context 能被安全归一化"
  - "不新增 ACL，不扩大任何角色权力"

scope:
  allowed_paths:
    - addons/smart_construction_core/models/core/project_core.py
    - addons/smart_construction_core/tests/**
    - addons/smart_construction_custom/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - narrowing-only or runtime-safe implementation changes
  - no ACL, record-rule, manifest, or schema changes
  - act_window execution must use safe action metadata access and context normalization
  - object_method execution must dispatch on the recordset, not on a Python bound function
  - keep 476 and 478 visibility fixes unchanged

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance + Permission Surface Fix
  module: next-action follow-through dispatcher alignment
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-479 found real execution-layer residuals inside
    sc_execute_next_action(). The next narrow implementation batch is to fix
    that dispatcher without widening authority.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-480.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - runtime audit confirms delivered roles can execute representative sc_execute_next_action act_window/object_method branches without dispatcher-layer ACL or method errors

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - dispatcher_fix_requires_acl_changes
  - verify_smart_core_fails
  - runtime_dispatcher_residual_remains

deliverables:
  - fixed sc_execute_next_action dispatcher
  - regression coverage for follow-through act_window and object_method execution
  - governance/report artifacts for ITER-2026-03-31-480

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/models/core/project_core.py
  - git restore addons/smart_construction_core/tests
  - git restore addons/smart_construction_custom/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-480.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-480.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-480.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

