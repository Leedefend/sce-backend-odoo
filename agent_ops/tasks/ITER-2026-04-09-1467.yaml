task_id: ITER-2026-04-09-1467
title: low-cost screen for native parity candidate families
type: governance-optimization
status: active
priority: high
mode: screen

goal: >
  仅基于 1466 scan 输出对候选进行家族分类，
  选择下一个可执行实现家族。

user_visible_outcome:
  - "明确下一实现家族与边界范围"

scope:
  allowed_paths:
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1466.md
    - agent_ops/tasks/ITER-2026-04-09-1467.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1467.md
    - agent_ops/state/task_results/ITER-2026-04-09-1467.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**

limits:
  max_files: 5
  max_candidates: 15
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage screen only
  - only consume scan output
  - no repository rescan
  - no implementation changes

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true

architecture:
  layer_target: Native-view parity governance
  module: parity candidate family classification
  module_owner: frontend contract consumer + backend contract assembler
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只做候选分类，不改业务事实与契约载荷。
  reason: >
    1466 已产出候选，需要先 screen 再进入实现。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1467.yaml"
    - 'rg -n "Candidate output \(scan-only\)|page_assembler|ActionView|ListPage|ContractFormPage|native_business_admin_config_center_intent_parity_verify" agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1466.md'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - stage_boundary_broken
  - forbidden_path_touched
  - rescan_detected

deliverables:
  - family classification result
  - next implementation family

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-09-1467.yaml
  - git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1467.md
  - git restore agent_ops/state/task_results/ITER-2026-04-09-1467.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-09-1466
