task_id: ITER-2026-04-17-FUNDING-CARRIER-FACT-SYNC
title: Replay funding carrier facts for imported contract-backed projects
type: business-fact-replay
status: active
priority: high

goal: >
  Materialize replayable funding carrier facts for imported contract-backed
  projects whose non-cancelled contract final amounts provide deterministic
  positive funding baselines.

user_visible_outcome:
  - "Imported contract-backed projects with positive contract sums can pass the funding carrier prerequisite for new payment handling."

scope:
  allowed_paths:
    - scripts/migration/funding_carrier_fact_sync.py
    - docs/ops/business_continuity/funding_carrier_fact_sync_v1.md
    - docs/ops/iterations/delivery_context_switch_log_v1.md
    - agent_ops/tasks/ITER-2026-04-17-FUNDING-CARRIER-FACT-SYNC.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

context:
  branch: codex/next-round
  baseline_sha: d644984
  prior_task: ITER-2026-04-17-FUNDING-CARRIER-FACT-OPERABILITY-SCREEN

architecture:
  layer_target: Business Fact Layer
  module: smart_construction_core migration replay
  module_owner: construction industry business facts
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Funding carrier readiness is enforced by project.funding_enabled and
    project.funding.baseline. These are persisted business facts required by the
    payment workflow, not frontend or scene orchestration semantics.
  reason: >
    Read-only screening found 642 imported contract-backed projects with
    positive contract sums and no active funding baseline. These can be replayed
    deterministically from existing contract facts.

change_rules:
  - provide check/write replay modes
  - write only deterministic positive contract-sum projects
  - skip projects with existing active baselines
  - skip zero-amount projects
  - write rollback evidence before any data mutation
  - do not change payment, settlement, account, ACL, approval, or model code

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-17-FUNDING-CARRIER-FACT-SYNC.yaml
    - python3 -m py_compile scripts/migration/funding_carrier_fact_sync.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/funding_carrier_fact_sync.py
    - DB_NAME=sc_demo make odoo.shell.exec with os.environ["SYNC_MODE"]="write" wrapper
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/funding_carrier_fact_sync.py

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - target_count_drift
  - zero_amount_project_included
  - rollback_evidence_missing
  - acceptance_failed

deliverables:
  - replay script with check/write modes
  - snapshot and rollback evidence under artifacts/migration
  - sync documentation and delivery log checkpoint

rollback:
  - use artifacts/migration/funding_carrier_fact_sync_rollback_v1.csv to restore funding_enabled and remove created active baselines
  - git restore scripts/migration/funding_carrier_fact_sync.py docs/ops/business_continuity/funding_carrier_fact_sync_v1.md docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/tasks/ITER-2026-04-17-FUNDING-CARRIER-FACT-SYNC.yaml

depends_on:
  - ITER-2026-04-17-FUNDING-CARRIER-FACT-OPERABILITY-SCREEN
