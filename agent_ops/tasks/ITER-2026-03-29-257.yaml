  - parse_output_drift_detected
  - verification_failed

deliverables:
  - fallback_form_helper_extraction
  - iteration_report

rollback:
  - git restore addons/smart_core/app_config_engine/models/app_view_config.py
  - git restore agent_ops/tasks/ITER-2026-03-29-257.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-29-256

notes: "Limit the change to helper extraction inside AppViewConfig. Do not alter fetch, versioning, hashing, fragment, variant, or runtime-filter behavior."
