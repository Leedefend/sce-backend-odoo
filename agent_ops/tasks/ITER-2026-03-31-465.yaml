task_id: ITER-2026-03-31-465
title: Validate Sichuan Baosheng first-batch business flows against the upgraded permission baseline
type: delivery-audit
status: active
priority: high

goal: >
  Validate the first-batch Sichuan Baosheng business flows against the upgraded
  customer permission baseline, confirming whether PM, finance, executive, and
  business-admin users can actually access and use the expected workflow entry
  points without finance leakage or menu/action mismatch.

user_visible_outcome:
  - "明确 PM / 财务 / 管理层 / 业务系统管理员首批业务流程是否真实可用"
  - "识别菜单、动作、权限之间仍存在的实际不一致"
  - "给出下一步应修的最小业务闭环缺口"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - read-only audit only
  - no code changes in product modules
  - runtime verification may use existing shell/verify wrappers
  - findings must be tied to concrete user-role and menu/action/flow evidence

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
  layer_target: Customer Business Flow Validation
  module: Sichuan Baosheng delivered role-to-flow surface audit
  module_owner: customer delivery chain + industry workflow surface
  kernel_or_scenario: scenario
  reason: >
    After the upgraded customer permission baseline was applied, the next
    efficient step is to verify whether the first delivered business flows are
    actually usable by PM, finance, executive, and business-admin users under
    the Sichuan Baosheng delivery setup.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-465.yaml
    - runtime audit confirms first-batch workflow menu/action visibility and role-to-flow alignment for PM, finance, executive, and business-admin users on sc_odoo

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - runtime_flow_surface_becomes_ambiguous
  - verification_requires_acl_or_manifest_changes
  - customer_flow_ownership_cannot_be_determined

deliverables:
  - audited first-batch customer business-flow availability matrix
  - concrete mismatch list if any remain
  - governance/report artifacts for ITER-2026-03-31-465

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-465.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-465.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-465.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-464
