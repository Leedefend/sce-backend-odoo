task_id: ITER-2026-04-03-892
title: Rebind host smoke custom-login contract to effective route set
type: backend
status: active
priority: high
mode: implement

goal: >
  Fix host smoke login-entry preflight false negatives by binding custom-login
  contract to effective route candidates (`/web/login` + `/login`) and selecting
  the first valid custom login surface.

user_visible_outcome:
  - "主入口验证优先命中真实可用的自定义登录入口"
  - "减少因单一路由假设导致的阻塞"

scope:
  allowed_paths:
    - scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - login_entry_contract_binding_only
  - custom_frontend_only_guard
  - no_business_model_change

context:
  branch: codex/next-round
  baseline_sha: b2a6165
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-891
  priority_lane: usability_release_proof
  usability_battlefield: cross_stack_verification

architecture:
  layer_target: Product Release Usability Proof
  module: host login route contract binding
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Verification runtime should bind to backend-compatible custom login routes
    instead of a single hard-coded path assumption.
  reason: >
    Current preflight requires `/login` only and blocks when actual custom login
    entry is exposed through alternate route.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-892.yaml
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

