task_id: ITER-2026-04-13-1825
title: Project skeleton 30-row create-only write trial v1
status: completed
type: implementation
priority: critical
mode: execute

goal: >
  Execute the explicitly authorized 30-row create-only project skeleton write
  trial into sc_demo, after rechecking target identities and dry-run results.

user_visible_outcome:
  - "30 条项目骨架样本按 create-only 模式写入 sc_demo，并输出写入结果与复核报告"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1825.yaml
    - scripts/migration/project_create_only_write_trial.py
    - artifacts/migration/project_sample_v1.csv
    - artifacts/migration/project_existing_identity_snapshot_pre_write_v1.csv
    - artifacts/migration/project_dry_run_pre_write_result_v1.json
    - artifacts/migration/project_create_only_pre_write_snapshot_v1.csv
    - artifacts/migration/project_create_only_write_result_v1.json
    - artifacts/migration/project_create_only_post_write_snapshot_v1.csv
    - docs/migration_alignment/project_create_only_write_trial_report_v1.md
    - docs/migration_alignment/project_import_go_no_go_v5.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1825.md
    - agent_ops/state/task_results/ITER-2026-04-13-1825.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 13
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - explicit-database-write-authorized
  - create-only
  - sample-30-rows-only
  - safe-slice-fields-only
  - no-update
  - no-upsert
  - no-full-import
  - no-field-expansion
  - no-contract-payment-supplier-import

context:
  branch: codex/next-round
  baseline_sha: d243d59
  explicit_user_authorization: true
  user_authorization_message: "同意写入"
  target_database: sc_demo
  sample_csv: data/migration_samples/project_sample_v1.csv
  depends_on_write_gate: ITER-2026-04-13-1824

architecture:
  layer_target: Migration Write Trial Tooling
  module: project.project 30-row create-only write trial
  module_owner: scripts/migration + docs/migration_alignment + artifacts/migration
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The batch writes approved project skeleton business facts only, without
    changing runtime models or frontend behavior.
  reason: >
    The create-only gate passed and the user explicitly authorized database
    write. The write trial remains constrained to the 30-row safe slice and
    blocks update/upsert behavior.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1825.yaml
    - cp data/migration_samples/project_sample_v1.csv artifacts/migration/project_sample_v1.csv
    - ENV=dev DB_NAME=sc_demo make odoo.shell.exec
    - python3 -m json.tool artifacts/migration/project_create_only_write_result_v1.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: true
  explicit_user_authorized: true

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - target_identity_not_empty_before_write
  - dry_run_not_create_only
  - sample_not_30_rows
  - unsafe_field_in_sample
  - update_or_upsert_attempted
  - forbidden_relation_write_requested

deliverables:
  - create-only write script
  - pre-write target identity snapshot
  - pre-write dry-run result
  - write result artifact
  - post-write target identity snapshot
  - write trial report
  - go/no-go v5 document
  - iteration report

depends_on:
  - ITER-2026-04-13-1824

rollback:
  - ENV=dev DB_NAME=sc_demo make odoo.shell.exec
  - git restore agent_ops/tasks/ITER-2026-04-13-1825.yaml
  - git restore scripts/migration/project_create_only_write_trial.py
  - git restore docs/migration_alignment/project_create_only_write_trial_report_v1.md
  - git restore docs/migration_alignment/project_import_go_no_go_v5.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1825.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1825.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
