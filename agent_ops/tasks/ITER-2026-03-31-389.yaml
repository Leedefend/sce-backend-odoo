    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - keep the fix additive and minimal
  - modify only scene publication metadata; do not redesign page blocks or providers
  - do not touch payment, settlement, account, ACL, or manifest paths

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Scene Layer
  module: portal capability matrix publication target
  module_owner: smart_construction_scene
  kernel_or_scenario: scenario
  reason: >
    The consistency audit proved that the capability-matrix custom frontend page
    is fact-backed but the backend scene publication target still points to the
    project-management route. This batch aligns scene facts to the SPA-owned
    route without changing business logic.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-389.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_scene DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

