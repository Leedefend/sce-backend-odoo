task_id: ITER-2026-03-31-389
title: Align portal capability matrix scene target with SPA-owned route
type: code
status: in_progress
priority: high

goal: >
  Repair the explicit consistency drift identified in ITER-2026-03-31-388 by
  aligning the backend scene publication target for `portal.capability_matrix`
  with the SPA-owned custom frontend route.

user_visible_outcome:
  - "`portal.capability_matrix` scene facts now point to the same route the SPA owns"
  - "能力矩阵 的后端场景发布目标与自定义前端落点一致"

scope:
  allowed_paths:
    - addons/smart_construction_scene/data/**
