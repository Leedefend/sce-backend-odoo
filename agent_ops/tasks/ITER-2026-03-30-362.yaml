task_id: ITER-2026-03-30-362
title: Audit industry business fact-chain usability after scene cleanup
type: audit
status: in_progress
priority: high

goal: >
  Re-anchor the active line on industry business facts instead of scene cleanup
  by auditing the currently published preview menus against their real
  model/menu/action/view/permission/data-prerequisite chains, so the next
  implementation slices can fix concrete usability gaps rather than continue
  semantic boundary work.

user_visible_outcome:
  - the 21 published preview menus are classified by real business usability rather than by frontend behavior
  - the team gets an executable matrix for which entries are already usable, which depend on seed/demo data, and which require custom frontend takeover
  - the next implementation batch can fix the highest-value fact-chain gaps first

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
    - artifacts/codex/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit existing facts first; do not mutate business models or runtime behavior in this batch
  - classify each preview menu by real fact-chain readiness: native usable, data-dependent, or custom-frontend-required
  - preserve the corrected architecture boundary: scene semantics stay out of the industry fact layer
  - no ACL, manifest, security, financial semantic, or frontend edits in this batch

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

