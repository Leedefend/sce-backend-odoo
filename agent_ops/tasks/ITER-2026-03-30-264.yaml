task_id: ITER-2026-03-30-264
title: Fix project list action install-time view references
type: fix
status: in_progress
priority: high

goal: Unblock demo reset by removing install-order-sensitive explicit view references from the early-loaded project list action, while keeping the action's list/kanban/form behavior intact for later runtime consumption.
user_visible_outcome:
  - "make demo.reset DB=sc_demo completes past project list action installation"
  - project list action still exposes tree, kanban, and form modes
  - no sidebar or manifest changes are required

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
    - addons/smart_construction_core/actions/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

change_rules:
  - minimal_install_order_fix_only
  - no_manifest_change
  - no_sidebar_change
  - no_contract_shape_change

architecture:
  layer_target: domain layer delivery assets
  module: smart_construction_core project list action xml
  kernel_or_scenario: scenario
  reason: The action file loads before the referenced tree and search views, so explicit refs fail during demo reset even though the action only needs to expose view modes at install time.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-264.yaml
    - CODEX_MODE=main make demo.reset DB=sc_demo

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - demo_reset_still_fails_on_project_list_action
  - acceptance_failed

deliverables:
  - install_safe_project_list_action
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-264.yaml
  - git restore addons/smart_construction_core/actions/project_list_actions.xml

depends_on:
  - ITER-2026-03-30-263

notes: "Keep runtime view exposure intact, but avoid refs to views that are registered later in the module load order."
