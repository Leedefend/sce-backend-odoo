task_id: ITER-2026-03-29-190
title: Apply page contract action gating to remaining low-risk data views
type: product_task
status: pending
priority: high

goal: Extend the contract-gated action behavior to the remaining low-risk pageGlobalActions data views, leaving ActionView for a dedicated follow-up batch because it uses a different action pipeline.
user_visible_outcome:
  - Scene Packages, Record, and Usage Analytics buttons obey contract disabled state
  - disabled action reason codes are visible before click on these data views

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: page contract consumer chain
  reason: contract-based action gating has reached utility and entry pages, and the remaining low-risk pageGlobalActions consumers should now be closed out in one batch.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-190.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-190.yaml frontend/apps/web/src/views/ScenePackagesView.vue frontend/apps/web/src/views/RecordView.vue frontend/apps/web/src/views/UsageAnalyticsView.vue

depends_on:
  - ITER-2026-03-29-189

notes: "Productization batch: close low-risk pageGlobalActions consumers; ActionView remains a separate non-homogeneous follow-up."
