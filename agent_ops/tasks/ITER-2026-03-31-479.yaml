task_id: ITER-2026-03-31-479
title: Audit follow-through execution paths after next-action fallback alignment
type: customer-delivery-flow-acceptance
status: active
priority: medium

goal: >
  Audit follow-through execution paths such as sc_execute_next_action() and
  related secondary action dispatching to confirm the corrected visibility
  baseline does not still hide deeper action-metadata or ACL residuals.

user_visible_outcome:
  - "确认 next-action 执行层是否仍存在二跳 ACL 或 action metadata 残差"
  - "如果存在残差，明确定位到具体方法和角色组合"
  - "如果不存在残差，形成可继续扩面验收的稳定基线"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only batch unless a new explicitly authorized implementation task is opened
  - no ACL, record-rule, manifest, or schema changes
  - use repository facts plus runtime audit on sc_odoo
  - stop immediately if a newly found residual would require forbidden-path edits

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: follow-through execution residual audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-478 closed the next-action fallback exposure. The next
    low-risk step is to inspect deeper execution and dispatch paths on top of
    that corrected baseline.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-479.yaml
    - repository and runtime audit classify follow-through execution paths as PASS or PASS_WITH_RISK

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - newly_found_residual_requires_acl_or_record_rule_change
  - runtime_audit_cannot_classify_with_confidence

deliverables:
  - audit report for ITER-2026-03-31-479
  - result snapshot for ITER-2026-03-31-479
  - updated delivery context log

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-479.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-479.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-479.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-478
