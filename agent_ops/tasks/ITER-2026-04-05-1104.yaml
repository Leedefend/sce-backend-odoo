task_id: ITER-2026-04-05-1104
title: Remove smart_construction_core inheritance bridge from platform signup entry
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Decouple `smart_core` signup entry from
  `smart_construction_core.controllers.auth_signup` by moving signup logic host
  into `smart_core.controllers` and removing industry-module controller loading.

user_visible_outcome:
  - "平台模块独立承接 /web/signup 与 /sc/auth/activate/* 入口逻辑"

scope:
  allowed_paths:
    - addons/smart_core/controllers/platform_auth_signup_logic.py
    - addons/smart_core/controllers/platform_auth_signup_web.py
    - addons/smart_construction_core/controllers/__init__.py
    - addons/smart_construction_core/controllers/auth_signup.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 20
  max_output_lines: 380
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - additive_or_minimal_replacement_only
  - preserve_existing_signup_behavior

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: controller_ownership_recovery_phase2
  priority_lane: controller_boundary_recovery

architecture:
  layer_target: Platform Layer
  module: smart_core.controllers
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: recover platform auth entry ownership while preserving auth semantics.
  reason: eliminate smart_core -> smart_construction_core controller inheritance dependency.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1104.yaml
    - python3 -m py_compile addons/smart_core/controllers/platform_auth_signup_logic.py addons/smart_core/controllers/platform_auth_signup_web.py addons/smart_construction_core/controllers/__init__.py
    - bash -lc '! rg -n "smart_construction_core\\.controllers\\.auth_signup" addons'
    - make verify.controller.allowlist.routes.guard
    - make verify.controller.route.policy.guard
    - make verify.controller.delegate.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_core/controllers/platform_auth_signup_logic.py
  - addons/smart_core/controllers/platform_auth_signup_web.py
  - addons/smart_construction_core/controllers/__init__.py

rollback:
  - git restore addons/smart_core/controllers/platform_auth_signup_logic.py
  - git restore addons/smart_core/controllers/platform_auth_signup_web.py
  - git restore addons/smart_construction_core/controllers/__init__.py
  - git restore addons/smart_construction_core/controllers/auth_signup.py
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1104.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1104.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1103
