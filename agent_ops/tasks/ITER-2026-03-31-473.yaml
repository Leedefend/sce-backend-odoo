task_id: ITER-2026-03-31-473
title: Narrow representative action visibility to match actual write ownership
type: permission-governance
status: active
priority: high

goal: >
  Narrow the two representative first-batch actions whose visibility is still
  wider than real write ownership on sc_odoo, so PM no longer sees the payment
  write entry and finance no longer sees the progress-entry write entry unless
  the underlying model authority exists.

user_visible_outcome:
  - "PM 不再看到不具备写权的付款申请写入口"
  - "财务不再看到不具备进度录入权限的写入口"
  - "管理层与业务系统管理员现有代表性写/审路径不回退"

scope:
  allowed_paths:
    - addons/smart_construction_core/security/action_groups_patch.xml
    - addons/smart_construction_core/tests/**
    - addons/smart_construction_custom/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - narrowing-only permission and action-visibility changes
  - no ACL or record-rule edits in this batch
  - only align representative action visibility with already-frozen model authority
  - do not expand any role authority
  - executive and business-admin representative write paths must remain intact

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Permission Governance Implementation
  module: representative action visibility alignment
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-472 proved that write ownership is mostly correct, but
    PM still sees payment_request_my without payment write rights and finance
    still sees project_progress_entry without progress-entry access. The next
    safe step is a narrow permission-governance implementation batch that
    aligns those representative actions with the already-frozen write boundary.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-473.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - runtime audit confirms PM loses representative payment-write entry visibility while finance loses representative progress-write entry visibility, with executive/business-admin remaining intact

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - representative_action_alignment_requires_acl_changes
  - executive_or_business_admin_write_surface_regresses
  - verify_smart_core_fails
  - runtime_action_visibility_remains_ambiguous

deliverables:
  - narrowed representative action visibility patch
  - regression tests covering the two representative action alignments
  - governance/report artifacts for ITER-2026-03-31-473

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/security/action_groups_patch.xml
  - git restore addons/smart_construction_core/tests
  - git restore addons/smart_construction_custom/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-473.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-473.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-473.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-472
