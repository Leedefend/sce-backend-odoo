task_id: ITER-2026-04-13-1837
title: Project create-only 100-row business usability manual review v1
status: in_progress
type: migration-usability-review
priority: high
mode: execute

goal: >
  Run read-only business usability checks for the 100-row create-only project
  sample locked by ITER-2026-04-13-1836, covering native page readability,
  lifecycle label consistency, project read-side payloads, and basic flow entry
  generation.

user_visible_outcome:
  - "100 行 create-only 项目样本人工业务可用性抽检完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1837.yaml
    - scripts/migration/project_create_only_expand_usability_review.py
    - artifacts/migration/project_create_only_expand_manual_review_result_v1.json
    - docs/migration_alignment/project_create_only_expand_business_usability_review_v1.md
    - docs/ops/verification/project_create_only_expand_manual_checklist_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1837.md
    - agent_ops/state/task_results/ITER-2026-04-13-1837.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_create_only_expand_post_write_snapshot_v1.csv
    - artifacts/migration/project_expand_rollback_dry_run_result_v1.json
    - docs/migration_alignment/project_create_only_expand_post_write_review_v1.md
    - docs/migration_alignment/project_create_only_expand_rollback_dry_run_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - read-only-review
  - no-db-write
  - no-create-write-unlink
  - no-rollback
  - no-sample-expansion
  - no-model-view-menu-acl-change
  - use-1836-locked-targets-only

context:
  branch: codex/next-round
  baseline_sha: d243d59
  source_write_batch: ITER-2026-04-13-1835
  source_lock_batch: ITER-2026-04-13-1836
  target_db: sc_demo
  locked_target_rows: 100
  deep_review_rows: 10
  quick_review_rows: 20
  rollback_key: legacy_project_id

architecture:
  layer_target: Business Usability Validation
  module: smart_construction_core project.project create-only controlled sample review
  module_owner: docs/migration_alignment + docs/ops/verification + artifacts/migration + scripts/migration + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The review validates user-facing readability of materialized project
    skeleton business facts and lifecycle-derived labels without changing data.
  reason: >
    ITER-2026-04-13-1836 confirmed 100 locked create-only sample rows are
    rollback-ready. Before deciding whether to keep or roll them back, the
    sample must be checked for real business usability in native views and
    read-side outputs.

prerequisites:
  - ITER-2026-04-13-1832
  - ITER-2026-04-13-1833
  - ITER-2026-04-13-1836

input_artifacts:
  - artifacts/migration/project_create_only_expand_post_write_snapshot_v1.csv
  - artifacts/migration/project_expand_rollback_dry_run_result_v1.json

review_sample_strategy:
  deep_review: "10 deterministic rows selected from the locked 100-row snapshot"
  quick_review: "20 deterministic rows selected from the locked 100-row snapshot"
  background_evidence: "Reuse ITER-2026-04-13-1836 100-row rollback dry-run result"

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1837.yaml
    - python3 -m py_compile scripts/migration/project_create_only_expand_usability_review.py
    - DB_NAME=sc_demo make odoo.shell.exec
    - python3 -m json.tool artifacts/migration/project_create_only_expand_manual_review_result_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1837.json
    - make verify.native.business_fact.static
    - make restart

acceptance_criteria:
  - 10-row deep review completed
  - 20-row quick page review completed
  - all reviewed rows come from ITER-2026-04-13-1836 locked targets
  - native form/list/kanban server-side view readability checks have no blocking errors
  - stage_name/stage_label/current_stage semantics are lifecycle-derived and consistent
  - payload/context/explain/insight/header outputs are readable
  - flow_map/next_actions are generated without write-side execution
  - final decision recommends either keep-for-observation or rollback-authorization path

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - create_write_unlink_attempted
  - real_rollback_attempted
  - sample_not_from_1836_locked_targets
  - blocking_native_page_error
  - lifecycle_label_systemic_mismatch
  - flow_map_or_next_actions_generation_blocked

deliverables:
  - task contract
  - read-only usability review script
  - manual review result artifact
  - business usability review report
  - manual checklist
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1836

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1837.yaml
  - git restore scripts/migration/project_create_only_expand_usability_review.py
  - git restore artifacts/migration/project_create_only_expand_manual_review_result_v1.json
  - git restore docs/migration_alignment/project_create_only_expand_business_usability_review_v1.md
  - git restore docs/ops/verification/project_create_only_expand_manual_checklist_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1837.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1837.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
