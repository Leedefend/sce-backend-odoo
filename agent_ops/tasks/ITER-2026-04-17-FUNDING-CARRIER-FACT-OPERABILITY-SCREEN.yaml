context:
  branch: codex/next-round
  baseline_sha: 1a7688a
  prior_task: ITER-2026-04-17-FINANCE-PROJECT-VISIBILITY-PERMISSION-GOVERNANCE

architecture:
  layer_target: Business Fact Layer
  module: smart_construction_core payment/project continuity
  module_owner: construction industry business facts
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The blocking condition is enforced by project.is_funding_ready() and
    project.funding.baseline. These are business truth fields and records, not
    scene organization or frontend interaction semantics.
  reason: >
    Finance permission now reaches normal payment submit logic, where imported
    projects without funding carrier facts fail the payment funding gate.

