task_id: ITER-2026-03-31-446
title: Rebuild platform DB and install industry modules without demo for usability validation
type: implementation
status: active
priority: high

goal: >
  Rebuild a clean platform database, install industry modules without the demo
  module, and verify both platform baseline and non-demo industry usability.

user_visible_outcome:
  - "重建一个不带 demo 的平台/行业可用库"
  - "完成平台基线验证"
  - "完成行业模块无 demo 可用性验证"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - execution-only batch
  - no repository code changes
  - use existing reset/install/verify commands only

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo

architecture:
  layer_target: Platform And Industry Runtime Validation
  module: platform baseline + smart_construction_core + smart_construction_seed
  module_owner: runtime validation chain
  kernel_or_scenario: kernel
  reason: >
    The user explicitly requested a rebuilt non-demo runtime so the next step is
    to validate platform baseline and industry usability on a clean database
    without installing the demo module.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-446.yaml
    - make db.reset DB=sc_odoo
    - make verify.platform_baseline DB_NAME=sc_odoo
    - make mod.install MODULE=smart_construction_core DB_NAME=sc_odoo
    - SC_SEED_ENABLED=1 SC_BOOTSTRAP_MODE=prod make mod.install MODULE=smart_construction_seed DB_NAME=sc_odoo
    - DB_NAME=sc_odoo SC_LOGIN_ENV_EXPECTED=prod bash scripts/verify/p0_base.sh

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - platform_baseline_reset_fails
  - non_demo_industry_install_or_verification_fails

deliverables:
  - implementation/report/result artifacts for ITER-2026-03-31-446

rollback:
  - no repository rollback needed; rerun database rebuild if required
  - git restore agent_ops/tasks/ITER-2026-03-31-446.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-446.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-446.json

depends_on:
  - ITER-2026-03-31-445
