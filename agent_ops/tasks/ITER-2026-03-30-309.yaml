task_id: ITER-2026-03-30-309
title: Enrich list toolbar metadata section labels in one batch
type: frontend
status: in_progress
priority: medium

goal: >
  Improve the list toolbar metadata labels in one batch by surfacing more of
  the native metadata summary directly in section headers without changing any
  interactions.

user_visible_outcome:
  - saved filters expose default-count information
  - group-by options expose default-count information
  - facet sections expose single-vs-multi metadata counts
  - no list behavior or backend semantics change

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only enhancement
  - no backend changes
  - no new interactions

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The list toolbar already consumes native filter and search metadata, but
    its section headers still hide useful summary facts such as default counts
    and single-vs-multi facet composition.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-309.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - metadata_label_enrichment_requires_behavior_change

deliverables:
  - enriched_toolbar_metadata_headers
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore frontend/apps/web/src/pages/ListPage.vue
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-309.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-308

notes: >
  Keep all controls and callbacks unchanged. Only enrich section labels using
  already available metadata.
