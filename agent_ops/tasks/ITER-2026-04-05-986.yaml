  module: frontend runtime dependency mapping
  module_owner: governance_audit
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch maps runtime dependency evidence only and does not change facts
    or orchestration semantics.
  reason: >
    User requires evidence to separate repository presence from actual main
    runtime chain usage.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-986.yaml

risk:
  level: low
  manual_approval_required: false

