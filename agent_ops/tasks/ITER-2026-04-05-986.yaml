task_id: ITER-2026-04-05-986
title: Scan frontend runtime dependency chains for boundary audit Phase F-1
type: governance
status: active
priority: high
mode: scan

goal: >
  Build a fact-only mapping of frontend/runtime call chains to `/api/...` and
  intent endpoints for login, init, menu, scene open, page/block fetch, and
  action execute flows.

user_visible_outcome:
  - "形成前端真实调用链依赖清单（主链映射）"

scope:
  allowed_paths:
    - frontend/**
    - addons/smart_construction_core/static/**
    - addons/smart_construction_core/controllers/**
    - addons/smart_core/**
    - docs/audit/boundary/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 14
  max_candidates: 90
  max_output_lines: 280
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage execution only
  - scan_stage_only
  - fact_collection_without_solution_design
  - no_cross_stage_reasoning

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-985
  priority_lane: smart_construction_core_boundary_phase_f_runtime_scan

architecture:
