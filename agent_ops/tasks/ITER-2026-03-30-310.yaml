task_id: ITER-2026-03-30-310
title: Complete list toolbar route-preset contract consumption
type: frontend
status: in_progress
priority: high

goal: >
  Complete the remaining list-toolbar contract consumption by bringing the
  existing route-preset state and clear action into the native list surface.

user_visible_outcome:
  - route preset state is visible in the list toolbar
  - current-condition summary includes the applied route preset
  - reset and clear actions cover route preset alongside the other active list conditions
  - no backend changes are required

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/**
    - frontend/apps/web/src/pages/**
    - frontend/apps/web/src/views/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - contract consumer completion batch
  - no backend changes
  - reuse existing route preset runtime and callbacks only

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The list path already consumes filters, saved filters, group-by, search
    panel, searchable fields, and sort metadata. The remaining real contract
    gap is route-preset state, which already exists in ActionView but is not
    yet surfaced inside the list toolbar.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-310.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - route_preset_consumption_requires_new_backend_semantics

deliverables:
  - route_preset_toolbar_surface
  - route_preset_active_condition_summary
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue
  - git restore frontend/apps/web/src/pages/ListPage.vue
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore agent_ops/tasks/ITER-2026-03-30-310.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-309

notes: >
  Reuse the existing route-preset label/source and clear callback from
  ActionView. Do not invent new routing semantics.
