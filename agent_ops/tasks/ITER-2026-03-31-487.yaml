  - no code, ACL, record-rule, manifest, schema, or seed data changes
  - first discover whether representative runtime samples exist for each remaining branch
  - stop immediately if a new recommendation correctness residual is found

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: uncovered recommendation branch audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-486 closed several representative branches, but pending
    payment, task in progress, and create task were still uncovered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-487.yaml
    - runtime audit either validates the remaining branches against representative samples or proves that the current runtime lacks suitable samples for one or more branches

risk:
