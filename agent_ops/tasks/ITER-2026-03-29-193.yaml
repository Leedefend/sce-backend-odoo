task_id: ITER-2026-03-29-193
title: Audit frontend action-gating behavior consistency
type: governance_task
status: pending
priority: high

goal: Extend the frontend action-gating audit so it verifies behavior consistency across the already-covered contract consumers, especially disabled reason exposure and execute-path blocking.
user_visible_outcome:
  - frontend action gating behavior becomes consistency-auditable
  - future regressions where actions look disabled but still execute, or hide the reason, can be detected automatically

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: action-gating behavior consistency audit
  reason: Coverage is already frozen for the major contract-driven consumers, so the next low-risk step is to audit that those consumers all expose disabled reasons and block execution consistently instead of only checking file presence.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-193.yaml
    - python3 -m py_compile agent_ops/scripts/frontend_action_gating_audit.py
    - python3 agent_ops/scripts/frontend_action_gating_audit.py --frontend-dir frontend/apps/web --mode consistency --expect-status PASS --expect-consistent-count 12

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - audit_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-193.yaml agent_ops/scripts/frontend_action_gating_audit.py docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-193.md agent_ops/state/task_results/ITER-2026-03-29-193.json

depends_on:
  - ITER-2026-03-29-192

notes: "Governance batch: freeze disabled-reason exposure and execute-path blocking as the next frontend productization audit invariant."
