task_id: ITER-2026-04-13-1853
title: Full rebuild importer promotion standard v1
status: in_progress
type: migration-governance-standard
priority: high
mode: execute

goal: >
  Freeze a repository-level promotion standard for migration importers in the
  full new-database rebuild pipeline. This batch is docs-only and does not
  import data.

user_visible_outcome:
  - "完整重建 importer 晋级门禁标准冻结"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1853.yaml
    - docs/migration_alignment/full_rebuild_importer_promotion_standard_v1.md
    - docs/migration_alignment/full_rebuild_promotion_queue_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1853.md
    - agent_ops/state/task_results/ITER-2026-04-13-1853.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - docs/migration_alignment/full_rebuild_migration_blueprint_v1.md
    - docs/migration_alignment/full_rebuild_migration_execution_plan_v1.md
    - docs/migration_alignment/partner_rebuild_importer_design_v1.md
    - docs/migration_alignment/partner_write_mode_gate_v1.md
    - docs/migration_alignment/migration_rebuild_objective_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - scripts/**
    - artifacts/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 6
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - docs-only
  - no-db-write
  - no-orm
  - no-import-execution
  - no-model-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  blueprint: docs/migration_alignment/full_rebuild_migration_blueprint_v1.md
  partner_importer_example: docs/migration_alignment/partner_rebuild_importer_design_v1.md

architecture:
  layer_target: Migration Governance Standard
  module: full rebuild importer promotion gate
  module_owner: docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The standard governs when business-fact importers can move from probes to
    repeatable rebuild components.
  reason: >
    ITER-2026-04-13-1850 established the full rebuild blueprint, and
    ITER-2026-04-13-1851/1852 made partner the first importer candidate. A
    shared promotion standard is needed before more importers are added.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1853.yaml
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1853.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - import_execution_attempted
  - model_change_attempted

deliverables:
  - task contract
  - importer promotion standard
  - full rebuild promotion queue
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1850
  - ITER-2026-04-13-1851
  - ITER-2026-04-13-1852

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1853.yaml
  - git restore docs/migration_alignment/full_rebuild_importer_promotion_standard_v1.md
  - git restore docs/migration_alignment/full_rebuild_promotion_queue_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1853.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1853.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
