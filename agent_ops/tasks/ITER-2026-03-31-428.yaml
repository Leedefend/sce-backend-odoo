task_id: ITER-2026-03-31-428
title: Implement multi-department platform extension and bootstrap deferred extra departments
type: implementation
status: active
priority: high

goal: >
  Extend the platform-level department carrier from one primary department to
  one primary department plus additive extra departments, then attach the
  deferred workbook extra-department semantics to customer users.

user_visible_outcome:
  - "用户可维护主部门 + 附加部门"
  - "部门 drill-down 能看到主部门或附加部门关联用户"
  - "此前 deferred 的 workbook extra_departments 真正落库"

scope:
  allowed_paths:
    - addons/smart_enterprise_base/models/**
    - addons/smart_enterprise_base/views/**
    - addons/smart_construction_custom/models/**
    - addons/smart_construction_custom/data/**
    - addons/smart_construction_custom/tests/**
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive only
  - reuse existing hr.department model
  - keep one primary department field and add extra-department carrier separately
  - no ACL changes
  - no record rule changes

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Platform Master Data Implementation
  module: smart_enterprise_base / smart_construction_custom
  module_owner: enterprise base master data + customer bootstrap
  kernel_or_scenario: kernel
  reason: >
    The customer explicitly accepted multi-department closure, and the deferred
    workbook extra_departments already have a frozen source set.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-428.yaml

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - extra_department_carrier_requires_acl_change
  - company_consistency_for_extra_departments_cannot_be_enforced
  - non_additive_department_write_required

deliverables:
  - implementation/report/result artifacts for ITER-2026-03-31-428

rollback:
  - git restore addons/smart_enterprise_base/models/**
  - git restore addons/smart_enterprise_base/views/**
  - git restore addons/smart_construction_custom/models/security_policy.py
  - git restore addons/smart_construction_custom/data/security_policy_actions.xml
  - git restore addons/smart_construction_custom/tests/test_business_admin_authority_path.py
  - git restore agent_ops/tasks/ITER-2026-03-31-428.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-428.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-428.json

depends_on:
  - ITER-2026-03-31-427
