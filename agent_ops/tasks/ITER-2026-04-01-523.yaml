task_id: ITER-2026-04-01-523
title: Land low-cost staged iteration governance for Codex execution
type: governance-optimization
status: active
priority: high

goal: >
  Introduce a low-cost staged iteration policy and supporting tooling so Codex
  can execute scan/screen/verify batches with short context, bounded outputs,
  template-driven prompts, and compatibility with the existing agent_ops flow.

user_visible_outcome:
  - "仓库具备低消耗 scan/screen/verify 迭代规范"
  - "任务可自动拆成 A/B/C 单阶段批次"
  - "可通过 Makefile 运行低消耗拆分与执行流程"

scope:
  allowed_paths:
    - AGENTS.md
    - Makefile
    - agent_ops/tasks/**
    - agent_ops/templates/**
    - agent_ops/scripts/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

change_rules:
  - policy-and-tooling-only governance batch
  - preserve compatibility with existing agent_ops task validation and execution flow
  - prefer additive templates and scripts over changes to business execution paths
  - demo artifacts must stay inside agent_ops and docs/ops governance paths

context:
  branch: codex/next-round
  baseline_sha: 33751e6
  target_db: sc_odoo
  explicit_user_authorization: true

architecture:
  layer_target: Agent Governance
  module: low-cost staged iteration policy and tooling
  module_owner: agent_ops governance surface
  kernel_or_scenario: scenario
  reason: >
    The repository needs a low-consumption execution mode that constrains Codex
    to short-context single-stage tasks without breaking the existing task
    contract and reporting model.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-523.yaml
    - python3 agent_ops/scripts/split_task.py agent_ops/tasks/ITER-2026-04-01-522.yaml
    - make task.validate.low_cost TASK=agent_ops/tasks/ITER-2026-04-01-522-A.yaml
    - make task.validate.low_cost TASK=agent_ops/tasks/ITER-2026-04-01-522-B.yaml
    - make task.validate.low_cost TASK=agent_ops/tasks/ITER-2026-04-01-522-C.yaml
    - make task.run.low_cost TASK=ITER-2026-04-01-522

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - low_cost_governance_requires_addons_or_security_changes
  - task_contract_extension_breaks_existing_validation_flow
  - staged_iteration_rules_cannot_be_enforced_with_confidence

deliverables:
  - low-cost iteration governance policy
  - task and prompt templates for scan screen verify stages
  - split and runner tooling for low-cost batches
  - 522 staged demo tasks and migration note

rollback:
  - git restore AGENTS.md
  - git restore Makefile
  - git restore agent_ops/tasks/ITER-2026-04-01-523.yaml
  - git restore --staged agent_ops/templates agent_ops/scripts docs/ops
  - git restore agent_ops/templates agent_ops/scripts docs/ops

depends_on:
  - ITER-2026-04-01-522
