task_id: ITER-2026-04-01-499
title: Audit representative non-first-batch flows after next-action closure
type: permission-governance
status: active
priority: high

goal: >
  Start a new objective line for representative non-first-batch business flows,
  focusing on secondary process entrypoints that were outside the first-batch
  recommendation correctness closure.

user_visible_outcome:
  - "明确非首批流程的首轮审计范围与样本集合"
  - "识别 secondary flows / quick actions / approval-adjacent entrypoints 是否仍有 runtime 残差"
  - "不改 ACL、不改财务语义、不改 manifest"

scope:
  allowed_paths:
    - addons/smart_construction_core/**
    - addons/smart_construction_custom/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-first batch for a new objective line
  - no implementation changes unless a later dedicated narrow batch is opened
  - only classify representative non-first-batch flows, samples, and runtime facts

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: non-first-batch flow audit
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-498 closed the first-batch recommendation correctness line.
    The next explicit objective is to classify representative secondary flows
    that were intentionally out of scope for the first-batch chain.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-499.yaml
    - "repository audit identifies the candidate non-first-batch flow set and their entrypoints"
    - "runtime audit samples at least one representative non-first-batch flow family without side-effect expansion"

