task_id: ITER-2026-03-31-466
title: Decouple finance from owner project-facing operator path while preserving cross-domain read
type: permission-governance
status: active
priority: high

goal: >
  Decouple the Sichuan Baosheng finance role from the owner/project-facing
  operator path so finance retains finance operation/approval and cross-domain
  read-only visibility, but no longer inherits project/contract/cost/material/
  purchase operator authority.

user_visible_outcome:
  - "财务改为财务专属 + 跨域只读"
  - "财务不再继承项目口经办面"
  - "PM/管理层/业务系统管理员现有口径不回退"

scope:
  allowed_paths:
    - addons/smart_construction_custom/security/role_matrix_groups.xml
    - addons/smart_construction_custom/data/customer_user_authorization.xml
    - addons/smart_construction_core/tests/**
    - addons/smart_construction_custom/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive or narrowing-only permission changes
  - no ACL or record-rule edits in this batch
  - finance must keep finance operation and approval
  - finance may keep cross-domain read only
  - finance must not inherit project/contract/cost/material/purchase user or manager authority
  - executive must remain off platform-level groups
  - customer authorization data may remove direct owner grants from finance users

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom

architecture:
  layer_target: Customer Permission Governance Implementation
  module: finance role matrix narrowing
  module_owner: customer delivery chain + industry permission surface
  kernel_or_scenario: scenario
  reason: >
    Business-flow validation showed finance still inherits the owner/project-facing
    operator path. The user decided finance should instead become a finance-only
    role with cross-domain read visibility.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-466.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo
    - runtime audit confirms finance keeps finance manager authority and cross-domain read, but loses contract/cost/material/purchase user authority

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - finance_narrowing_requires_acl_changes
  - finance_operation_or_approval_regresses
  - executive_platform_leak_reappears
  - verify_smart_core_fails

deliverables:
  - narrowed finance role matrix
  - updated role-profile tests and customer authority tests
  - governance/report artifacts for ITER-2026-03-31-466

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_odoo`
  - git restore addons/smart_construction_custom/security/role_matrix_groups.xml
  - git restore addons/smart_construction_core/tests
  - git restore addons/smart_construction_custom/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-466.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-466.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-466.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-465
