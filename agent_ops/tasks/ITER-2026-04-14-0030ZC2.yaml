task_id: ITER-2026-04-14-0030ZC2
title: Project member responsibility candidate strength selection v1
status: completed
type: migration-responsibility-candidate-selection
priority: high
mode: execute
depends_on:
  - ITER-2026-04-14-0030ZB
  - ITER-2026-04-14-0030ZC

goal: >
  Classify all 362 consolidated project/user pairs into L0/L1/L2/L3
  responsibility candidate strength levels without writing project.responsibility
  or changing permission semantics.

user_visible_outcome:
  - "生成项目成员责任潜力地图，区分基础、弱、强、优先候选，但不执行 responsibility 写入"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030ZC2.yaml
    - scripts/migration/project_member_responsibility_candidate_selection.py
    - artifacts/migration/project_member_responsibility_candidates_v1.json
    - artifacts/migration/project_member_responsibility_candidates_v1.csv
    - artifacts/migration/project_member_responsibility_candidate_summary_v1.json
    - docs/migration_alignment/project_member_responsibility_candidate_selection_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030ZC2.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030ZC2.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/project_member_consolidated_pairs_v1.json
    - artifacts/migration/project_member_consolidated_summary_v1.json
    - artifacts/migration/project_member_responsibility_promotion_screen_summary_v1.json
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - migrations/**
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - readonly-selection-only
  - no-db-write
  - no-project-responsibility-write
  - no-record-rule-change
  - no-acl-security-change
  - no-role-key-fabrication
  - no-promotion-execution

architecture:
  layer_target: Migration Responsibility Candidate Strength Selection
  module: project_member consolidated pair candidate selection
  module_owner: scripts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch computes evidence-strength classifications over readonly
    consolidated pairs. It does not create responsibility facts or permission
    semantics.
  reason: >
    0030ZB made pair evidence visible and 0030ZC confirmed none are promotion
    ready without role facts. This batch ranks the pairs by evidence strength
    for later role-source repair and manual review.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030ZC2.yaml
    - python3 -m py_compile scripts/migration/project_member_responsibility_candidate_selection.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_responsibility_candidate_selection.py
    - python3 -m json.tool artifacts/migration/project_member_responsibility_candidates_v1.json
    - python3 -m json.tool artifacts/migration/project_member_responsibility_candidate_summary_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

rollback:
  - "No database rollback required because this batch is readonly."
  - "Delete generated 0030ZC2 candidate artifacts if the selection must be regenerated."

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_detected
  - project_responsibility_write_attempted
  - role_key_fabrication_attempted
  - pair_count_not_362

deliverables:
  - task contract
  - readonly candidate selection script
  - candidate json
  - candidate csv
  - candidate summary json
  - selection documentation
  - iteration report
  - task result json
