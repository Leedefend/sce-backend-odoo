  module: frontend-native alignment matrix
  module_owner: docs/ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene-orchestration layer
  backend_sub_layer_reason: >
    This batch only evaluates frontend consumption alignment with existing backend semantics,
