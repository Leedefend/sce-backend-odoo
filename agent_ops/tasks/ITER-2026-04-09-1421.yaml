task_id: ITER-2026-04-09-1421
title: verify frontend rebuild then redeploy for user validation
status: active
type: governance
priority: high
mode: verify
batch: 1/1

goal: >
  严格按顺序执行前端重构构建（build）后再部署（dev reset），用于用户即时验收。

user_visible_outcome:
  - "前端先完成构建，再完成部署并可访问"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-09-1421.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1421.md
    - agent_ops/state/task_results/ITER-2026-04-09-1421.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 4
  max_output_lines: 180
  forbid_repo_wide_scan: true

change_rules:
  - verify stage executes declared checks only
  - no implementation code change in this batch

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true

architecture:
  layer_target: Runtime deployment verification
  module: frontend build + vite runtime
  module_owner: frontend dev scripts
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只做前端构建与运行时部署，不改后端语义。
  reason: >
    用户明确要求先重构前端再部署，修正执行顺序。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1421.yaml"
    - "pnpm -C frontend/apps/web build"
    - "FRONTEND_PROFILE=daily bash scripts/dev/frontend_dev_reset.sh"
    - "curl -fsI http://127.0.0.1:5174/"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_command_failed
  - forbidden_path_touched

deliverables:
  - frontend rebuild and redeploy evidence

depends_on:
  - ITER-2026-04-09-1420

rollback:
  - "pkill -f \"pnpm -C frontend/apps/web dev\" || true"
  - "git restore agent_ops/tasks/ITER-2026-04-09-1421.yaml"
  - "git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1421.md"
  - "git restore agent_ops/state/task_results/ITER-2026-04-09-1421.json"
  - "git restore docs/ops/iterations/delivery_context_switch_log_v1.md"
