task_id: ITER-2026-04-01-551
title: Re-screen the remaining fresh toolbar candidates for low-risk eligibility
type: frontend
status: active
priority: medium
mode: screen

goal: >
  Re-evaluate the remaining fresh toolbar candidates and decide whether one
  still qualifies as a low-risk display-only slice before implementation.

user_visible_outcome:
  - "判断剩余 fresh candidates 是否仍适合低风险推进"
  - "保持 screen 阶段只做归类和风险判断"
  - "为下一张实现合同或 stop 结论提供依据"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - frontend/**
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 3
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - reporter
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost screen stage only
  - only read ITER-2026-04-01-544 scan results and latest verify outcome
  - do not read new frontend files
  - do not implement code in this batch

context:
  branch: codex/next-round
  baseline_sha: 8194c19
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-550
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar screen
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The low-risk display-only families from the fresh scan have been partially
    consumed. The next low-cost step is to re-screen the remaining candidates
    before deciding whether to continue implementation or stop.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-551.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - screen_requires_new_scan
  - candidate_selection_uncertain
  - screen_output_exceeds_limit

deliverables:
  - next_candidate_family_or_stop
  - family_scope
  - reason
  - governance/report artifacts for ITER-2026-04-01-551

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-551.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-551.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-551.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-544
  - ITER-2026-04-01-550
