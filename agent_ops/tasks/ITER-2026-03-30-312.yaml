task_id: ITER-2026-03-30-312
title: Render native sort labels in user-readable form
type: frontend
status: in_progress
priority: high

goal: >
  Replace raw native sort tokens such as `write_date desc` with user-readable
  labels derived from existing column metadata and sort direction semantics.

user_visible_outcome:
  - native default sort no longer shows raw field tokens
  - subtitle, toolbar summary, and current-condition chips all share readable sort labels
  - no sorting behavior or backend semantics change

scope:
  allowed_paths:
    - frontend/apps/web/src/views/**
    - frontend/apps/web/src/app/action_runtime/**
    - agent_ops/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - display-only cleanup
  - no backend changes
  - reuse existing contract column labels only

context:
  branch: codex/next-round
  baseline_sha: 57f41c7

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The remaining raw UX leak is native sort text like `write_date desc`. The
    frontend already has contract column labels, so this batch maps sort fields
    to readable labels and directions without touching sort execution.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-312.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - typecheck_failed
  - readable_sort_label_requires_behavior_change

deliverables:
  - readable_native_sort_labels
  - iteration_report

rollback:
  - git restore frontend/apps/web/src/views/ActionView.vue
  - git restore frontend/apps/web/src/app/action_runtime/useActionViewSurfaceDisplayRuntime.ts
  - git restore agent_ops/tasks/ITER-2026-03-30-312.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-30-311

notes: >
  Only transform the displayed sort label. Do not change route state, request
  payloads, or ordering behavior.
