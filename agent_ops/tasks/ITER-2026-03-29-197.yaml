task_id: ITER-2026-03-29-197
title: Refine project form page identity and action density
type: product_task
status: pending
priority: high

goal: Fix project form page identity so detail pages never inherit list-page titling and reduce top action density to a clearer business-page hierarchy.
user_visible_outcome:
  - project detail pages show a stable project-centric title instead of leaking list action titles
  - top action area becomes less crowded and closer to business-page expectations

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: project form page identity and action strip
  reason: After the first page-shell parity batch, the main remaining product gap is incorrect page identity and over-dense top actions on project detail pages.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-197.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-197.yaml frontend/apps/web/src/pages/ContractFormPage.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-197.md agent_ops/state/task_results/ITER-2026-03-29-197.json

depends_on:
  - ITER-2026-03-29-196

notes: "Productization follow-up: tighten project form title source and declutter top action strip."
