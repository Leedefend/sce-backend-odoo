    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - do not modify any manifest
  - keep compatibility through no-op core shims if needed
  - limit this batch to extension bootstrap ownership only

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Platform Runtime Bootstrap
  module: extension bootstrap ownership migration
  module_owner: smart_enterprise_base
  kernel_or_scenario: kernel
