task_id: ITER-2026-03-30-376
title: Move extension bootstrap data from construction core to enterprise runtime owner
type: code
status: in_progress
priority: medium

goal: >
  Move the extension bootstrap records out of `smart_construction_core/data`
  into the existing enterprise runtime bootstrap loading path, while preserving
  compatibility and avoiding any manifest changes.

user_visible_outcome:
