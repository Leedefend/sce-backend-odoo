task_id: ITER-2026-04-05-978
title: Repair missing capability-group external-id mapping for scene module install
type: backend
status: active
priority: high
mode: implement

goal: >
  Repair runtime dependency mapping missing in sc_prod_sim so
  smart_construction_scene can be installed successfully, then re-check
  publishability gates.

user_visible_outcome:
  - "smart_construction_scene 可安装且发布门禁可复核"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

limits:
  max_files: 5
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - runtime_data_link_repair_only
  - no_repository_source_change

context:
  branch: codex/next-round
  baseline_sha: f4bccf7
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-977
  priority_lane: delivery_simulation_alignment

architecture:
  layer_target: Delivery Simulation Runtime Alignment
  module: scene installation dependency mapping
  module_owner: operations_runtime
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact
  backend_sub_layer_reason: >
    Missing ir.model.data linkage is concrete runtime business truth required
    for module data import dependency resolution.
  reason: >
    smart_construction_scene installation failed because expected external-id
    smart_construction_core.sc_cap_group_project_management is missing.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-978.yaml
    - docker exec sc-backend-odoo-prod-sim-db-1 psql -U odoo -d sc_prod_sim -c "select id,key,label from sc_capability_group where key='project_management';"
    - docker exec -i sc-backend-odoo-prod-sim-odoo-1 odoo shell -d sc_prod_sim -c /var/lib/odoo/odoo.conf
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim MODULE=smart_construction_scene DB_NAME=sc_prod_sim make mod.install
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make restart
    - docker exec sc-backend-odoo-prod-sim-db-1 psql -U odoo -d sc_prod_sim -c "select name,state from ir_module_module where name in ('smart_scene','smart_construction_scene') order by name;"
    - ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make verify.extension_modules.guard
    - ARTIFACTS_DIR=artifacts ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim BASE_URL=http://localhost API_BASE_URL=http://127.0.0.1:18069 DB_NAME=sc_prod_sim E2E_LOGIN=wutao E2E_PASSWORD=demo make verify.release.execution_protocol.v1

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - uncertain_runtime_scope

deliverables:
  - scene_dependency_mapping_repaired
  - dual_scene_install_and_publish_verdict

rollback:
  - remove inserted ir.model.data mapping if needed
  - restore sc_prod_sim from snapshot if runtime side effects appear
  - git restore agent_ops/tasks/ITER-2026-04-05-978.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-978.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-978.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-977
