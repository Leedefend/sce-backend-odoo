task_id: ITER-2026-03-31-449
title: Restore fresh-db CNY bootstrap by reattaching shim post-init hook
type: implementation
status: active
priority: high

goal: >
  Restore the fresh database reset chain so installing the compatibility shim
  smart_construction_bootstrap actually executes its currency bootstrap hook and
  returns sc_odoo to the expected CNY platform baseline.

user_visible_outcome:
  - "fresh sc_odoo 重建后公司币种自动落为 CNY"
  - "verify.platform_baseline 重新通过"
  - "无需依赖 baseline autofix 才能通过 fresh 平台验证"

scope:
  allowed_paths:
    - addons/smart_construction_bootstrap/__manifest__.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive bootstrap recovery batch
  - restore shim post_init_hook declaration only
  - do not redesign bootstrap ownership in this batch
  - no financial-domain changes beyond fresh-db currency bootstrap

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo

architecture:
  layer_target: Fresh Runtime Recovery
  module: smart_construction_bootstrap
  module_owner: bootstrap compatibility chain
  kernel_or_scenario: kernel
  reason: >
    Fresh sc_odoo resets still fail the CNY baseline because the compatibility
    shim manifest no longer declares the post_init_hook that owns fresh-db
    currency initialization. The minimal recovery is to reattach that hook in
    the shim manifest.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-449.yaml
    - make db.reset DB=sc_odoo
    - make verify.platform_baseline DB_NAME=sc_odoo

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - fresh_db_currency_still_missing_after_shim_hook_restore
  - additional_bootstrap_redesign_becomes_required

deliverables:
  - implementation/report/result artifacts for ITER-2026-03-31-449

rollback:
  - git restore addons/smart_construction_bootstrap/__manifest__.py
  - git restore agent_ops/tasks/ITER-2026-03-31-449.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-449.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-449.json

depends_on:
  - ITER-2026-03-31-448
