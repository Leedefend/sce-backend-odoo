    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - runtime-mutation batch with same-batch cleanup
  - no code, ACL, record-rule, manifest, schema, or seed data changes
  - only bounded scratch project/task samples may be created
  - cleanup of scratch tasks and scratch projects is mandatory before batch close

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: task-based recommendation acceptance sample execution
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-490 closed the pending-payment branch, so the remaining
    uncovered recommendation branches are task in progress and create task.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-491.yaml
    - "runtime audit confirms representative scratch samples emit 推进任务执行 and 创建任务 as expected before cleanup"
