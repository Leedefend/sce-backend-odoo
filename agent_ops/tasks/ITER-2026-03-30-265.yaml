task_id: ITER-2026-03-30-265
title: Clean non-current runtime environments and keep active dev runtime only
type: chore
status: in_progress
priority: high

goal: Remove all non-current local runtime environments while preserving the current sc-backend-odoo-dev backend stack and the active frontend hot-reload instance.
user_visible_outcome:
  - only the current dev docker stack remains running
  - stale local runtime containers are stopped and removed
  - active frontend hot-reload entry remains available for ongoing development

scope:
  allowed_paths:
    - agent_ops/**
    - docs/ops/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - runtime_cleanup_only
  - keep_current_dev_stack
  - no_code_change_outside_reporting

architecture:
  layer_target: platform ops runtime
  module: local docker runtimes and frontend dev process hygiene
  kernel_or_scenario: kernel
  reason: The user requested a clean local environment with only the current development runtime kept alive.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-265.yaml
    - docker ps --format '{{.Names}}'

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - current_dev_stack_removed
  - runtime_cleanup_failed
  - acceptance_failed

deliverables:
  - cleaned_runtime_environment
  - iteration_report

rollback:
  - rerun the relevant make up target for any stack that should be restored

depends_on:
  - ITER-2026-03-30-264

notes: "Keep sc-backend-odoo-dev containers and the current frontend hot-reload runtime. Clean only non-current local runtimes."
