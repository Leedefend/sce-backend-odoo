  max_files: 9
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - read-only-dry-run
  - no-db-write
  - no-orm
  - no-partner-create
  - no-contract-import
  - no-model-view-menu-acl-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  company_source: tmp/raw/partner/company.csv
  supplier_source: tmp/raw/partner/supplier.csv
  contract_counterparty_artifact: artifacts/migration/contract_partner_match_recompute_v1.json

architecture:
  layer_target: Partner Migration Source Baseline
  module: res.partner migration readiness for contract counterparty coverage
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    Partner source coverage determines whether contract counterparty business
    facts can be safely materialized before any contract write batch.
  reason: >
    ITER-2026-04-13-1841 left contract write blocked by unresolved partner
    master data. This batch profiles the newly supplied company and supplier
    raw exports and checks whether they can cover contract counterparties.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1842.yaml
    - python3 -m py_compile scripts/migration/partner_source_baseline.py
    - python3 scripts/migration/partner_source_baseline.py
    - python3 -m json.tool artifacts/migration/partner_source_baseline_v1.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1842.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - orm_used
  - partner_create_attempted
  - contract_import_attempted

deliverables:
