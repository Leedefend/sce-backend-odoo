task_id: ITER-2026-04-13-1842
title: Partner source baseline and contract counterparty coverage v1
status: PASS_WITH_IMPORT_BLOCKED
type: migration-source-baseline
priority: high
mode: execute

goal: >
  Profile tmp/raw/partner/company.csv and tmp/raw/partner/supplier.csv, then
  compare their name coverage against the unresolved contract counterparties
  from ITER-2026-04-13-1841. Do not create partners or import data.

user_visible_outcome:
  - "公司/供应商源数据基线与合同相对方覆盖关系完成"

scope:
