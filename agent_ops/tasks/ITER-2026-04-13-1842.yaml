    - agent_ops/tasks/ITER-2026-04-13-1842.yaml
    - scripts/migration/partner_source_baseline.py
    - artifacts/migration/partner_source_baseline_v1.json
    - docs/migration_alignment/partner_source_inventory_v1.md
    - docs/migration_alignment/partner_contract_counterparty_coverage_v1.md
    - docs/migration_alignment/partner_import_initial_gate_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1842.md
    - agent_ops/state/task_results/ITER-2026-04-13-1842.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/partner/company.csv
    - tmp/raw/partner/supplier.csv
    - tmp/raw/contract/contract.csv
    - artifacts/migration/contract_partner_match_recompute_v1.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

