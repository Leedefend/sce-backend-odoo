task_id: ITER-2026-03-30-283
title: Enforce working-mode checkpoints during active continuous iteration
type: governance
status: in_progress
priority: high

goal: >
  Prevent continuous iteration from feeling paused by requiring ordinary PASS
  checkpoints to remain in working-mode progress updates rather than summary-style
  terminal responses.

user_visible_outcome:
  - active continuous iteration feels continuous instead of stop-and-go
  - ordinary PASS checkpoints no longer read like finished-turn summaries
  - only true stop states may use terminal close-out semantics

scope:
  allowed_paths:
    - AGENTS.md
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - governance only
  - no product code changes
  - do not weaken stop or approval gates
  - make reporting-channel expectations explicit

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Governance Layer
  module: codex execution/reporting policy
  module_owner: repo governance
  kernel_or_scenario: kernel
  reason: >
    Users still perceive pauses because ordinary PASS summaries are too close to
    terminal responses. The rule must constrain reporting mode, not only wording.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-283.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - reporting_mode_rule_conflicts_with_stop_logic
  - acceptance_failed

deliverables:
  - stronger_working_mode_reporting_rule
  - iteration_report

rollback:
  - git restore AGENTS.md docs/ops/codex_workspace_execution_rules.md
  - git restore agent_ops/tasks/ITER-2026-03-30-283.yaml

depends_on:
  - ITER-2026-03-30-279

notes: >
  The new rule should treat working-mode progress updates as the default expression
  for ordinary PASS checkpoints during an active continuous-iteration chain.
