task_id: ITER-2026-03-29-195
title: Project scene contract runtime permissions into ContractFormPage
type: product_task
status: pending
priority: high

goal: Make ContractFormPage visibly and interactively respect backend scene contract runtime permissions so readonly/create/edit restrictions and disabled save reasons are expressed in the frontend without semantic guesswork.
user_visible_outcome:
  - form pages show clear readonly/runtime restriction hints from backend contract
  - save/create actions become disabled when scene contract marks the page as readonly or denies write/create
  - disabled reasons are visible to users instead of only existing in backend diagnostics

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: contract form runtime permission consumption
  reason: Backend page parsing and semantic runtime output have already been enhanced; the highest-value next step is to make the main contract-driven form page visibly obey those runtime permissions and disabled-action reasons.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-195.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-195.yaml frontend/apps/web/src/pages/ContractFormPage.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-195.md agent_ops/state/task_results/ITER-2026-03-29-195.json

depends_on:
  - ITER-2026-03-29-194

notes: "Productization batch: prioritize backend contract runtime permission expression on the main form page before broader scene orchestration/governance work."
