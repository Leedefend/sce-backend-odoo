task_id: ITER-2026-03-31-412
title: Implement customer user bootstrap with primary department only
type: implementation
status: completed
priority: high

goal: >
  Implement a manual customer user bootstrap entry in smart_construction_custom
  that writes user baseline data with company and primary-department assignment
  only, using the first confirmed department as the primary department for
  accepted multi-department users.

user_visible_outcome:
  - "模块内可手动执行客户用户 baseline bootstrap"
  - "20 名有效用户可按当前规则落主部门"
  - "多部门用户按第一个部门先落地，不伪造附加部门能力"

scope:
  allowed_paths:
    - addons/smart_construction_custom/models/security_policy.py
    - addons/smart_construction_custom/data/security_policy_actions.xml
    - addons/smart_construction_custom/README.md
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/smart_construction_custom/security/**
    - addons/smart_construction_custom/hooks.py
    - addons/smart_construction_custom/__manifest__.py
    - addons/**/security/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/smart_enterprise_base/models/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive changes only
  - manual bootstrap only; no install-time user mutation
  - write only user baseline, company, and primary department
  - do not implement additional-department persistence in this batch
  - for accepted multi-department users, use the first confirmed department as primary
  - do not touch group ACL definitions in this batch

context:
  branch: codex/next-round
  baseline_sha: c23f8b2

architecture:
  layer_target: Scenario Delivery Bootstrap
  module: smart_construction_custom
  module_owner: customer-specific delivery customization
  kernel_or_scenario: scenario
  reason: >
    The customer baseline is frozen, and the user confirmed that multi-
    department users should land with the first department as primary for now.
    The next valid low-risk step is to implement baseline user bootstrap within
    the current model capability.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-412.yaml
    - python3 -m py_compile addons/smart_construction_custom/models/security_policy.py addons/smart_construction_custom/hooks.py
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_custom DB_NAME=sc_demo
    - make verify.smart_core

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - user_baseline_mapping_unclear
  - user_write_requires_security_change
  - verify_command_failed

deliverables:
  - updated customer user bootstrap implementation in addons/smart_construction_custom/models/security_policy.py
  - updated server action exposure in addons/smart_construction_custom/data/security_policy_actions.xml
  - updated implementation note in addons/smart_construction_custom/README.md
  - report and task result artifacts for ITER-2026-03-31-412
  - delivery log checkpoint with next suggestion

rollback:
  - git restore addons/smart_construction_custom/models/security_policy.py
  - git restore addons/smart_construction_custom/data/security_policy_actions.xml
  - git restore addons/smart_construction_custom/README.md
  - git restore agent_ops/tasks/ITER-2026-03-31-412.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-412.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-412.json

depends_on:
  - ITER-2026-03-31-411
