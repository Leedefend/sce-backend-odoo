task_id: ITER-2026-03-30-269
title: Classify and commit residual iteration changes
type: chore
status: in_progress
priority: high

goal: Classify the remaining uncommitted iteration changes into coherent commit batches, supplement any missing iteration evidence files, and leave the repository in a clean state.
user_visible_outcome:
  - residual frontend, backend, dev-runtime, and audit changes are grouped into intentional commits
  - missing iteration evidence files are filled in before commit
  - repository returns to a clean working tree after classification

scope:
  allowed_paths:
    - agent_ops/**
    - docs/**
    - Makefile
    - scripts/dev/**
    - frontend/apps/web/**
    - addons/smart_core/**
    - addons/smart_construction_core/actions/**
    - addons/smart_construction_core/data/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/__manifest__.py
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

change_rules:
  - classify_existing_changes_only
  - supplement_missing_iteration_evidence_only
  - no_new_business_semantic_expansion
  - keep_commit_boundaries_explainable

architecture:
  layer_target: governance and delivery hygiene
  module: residual iteration cleanup and commit classification
  module_ownership: cross-module iteration outputs already present in worktree
  kernel_or_scenario: kernel
  reason: The user requested that all remaining changes be classified and committed so the repository returns to a clean baseline before the next workstream.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-269.yaml
    - git status --short

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - commit_boundary_uncertain
  - repository_still_dirty_after_classification

deliverables:
  - classified_commit_chain
  - clean_worktree

rollback:
  - git reset --soft HEAD~1

depends_on:
  - 57f41c7

notes: "Prefer small thematic commits. If evidence files are missing for an already executed iteration, add them before committing that batch."
