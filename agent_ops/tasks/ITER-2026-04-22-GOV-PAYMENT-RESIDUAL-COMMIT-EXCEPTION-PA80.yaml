task_id: ITER-2026-04-22-GOV-PAYMENT-RESIDUAL-COMMIT-EXCEPTION-PA80
title: Authorize bounded payment residual commit exception
type: governance-optimization
status: active
priority: high
mode: scan

goal: >
  Add one bounded repository exception that allows committing the final
  payment-related residual files already implemented on this branch, without
  widening authority to unrelated payment, settlement, accounting, or runtime
  rule changes.

user_visible_outcome:
  - "A dedicated repository exception authorizes only the final payment residual commit batch."

scope:
  allowed_paths:
    - AGENTS.md
    - agent_ops/tasks/ITER-2026-04-22-GOV-PAYMENT-RESIDUAL-COMMIT-EXCEPTION-PA80.yaml
  forbidden_paths:
    - addons/**
    - frontend/**
    - scripts/**
    - docs/**
    - security/**
    - record_rules/**

limits:
  max_files: 2
  max_candidates: 2
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage execution only
  - add only one narrow high-risk exception for the exact residual file set
  - do not widen authority beyond the declared residual paths
  - do not modify implementation files in this governance batch

context:
  branch: codex/next-round
  baseline_sha: b94407f
  explicit_user_authorization: true
  usability_battlefield: backend

architecture:
  layer_target: Agent Governance
  module: payment residual commit exception
  module_owner: repository governance surface
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    This batch changes repository governance only. It authorizes a bounded
    residual commit for already-implemented payment summary and approval
    governance artifacts without changing payment business rules.
  reason: >
    The current repository exceptions do not cover the final residual payment
    summary and approval governance file set, so a dedicated exact-path
    exception is required before those files can be committed.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-22-GOV-PAYMENT-RESIDUAL-COMMIT-EXCEPTION-PA80.yaml
    - git diff --check -- AGENTS.md

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - exception_scope_not_exact
  - governance_change_authorizes_unrelated_payment_paths

deliverables:
  - exact-path repository exception for the residual payment commit batch

rollback:
  - git restore --staged AGENTS.md

depends_on: []
