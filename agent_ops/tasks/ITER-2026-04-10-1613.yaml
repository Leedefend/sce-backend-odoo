  形成统一一键门禁视图。

user_visible_outcome:
  - "单次 governance gate 可见 app 与 core v2 cross-audit 全量状态"

scope:
  allowed_paths:
    - scripts/verify/v2_app_governance_gate_audit.py
    - scripts/verify/v2_app_verify_all.py
    - docs/ops/v2_app_governance_gate_usage_v1.md
    - docs/architecture/backend_core_refactor_blueprint_v1.md
    - docs/architecture/backend_core_v2_rebuild_spec_v1.md
    - agent_ops/tasks/ITER-2026-04-10-1613.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1613.md
    - agent_ops/state/task_results/ITER-2026-04-10-1613.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 10
  max_output_lines: 760

change_rules:
  - v2 independent rebuild only
  - additive governance coverage extension
  - no legacy runtime cutover

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Platform kernel independent rebuild layer
  module: smart_core v2 governance gate detail chain
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批仅增强治理门禁聚合范围，不涉及业务事实。
  reason: >
    连续重构中将 cross-audit 统一纳入主门禁，降低多入口验证碎片化。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1613.yaml"
    - "python3 scripts/verify/v2_app_governance_gate_audit.py --json"
    - "python3 scripts/verify/v2_app_verify_all.py --json"
    - 'rg -n "v2_boundary_audit.py|v2_rebuild_audit.py|v2_intent_comparison_audit.py" scripts/verify/v2_app_governance_gate_audit.py docs/ops/v2_app_governance_gate_usage_v1.md'
    - 'rg -n "cross-audit integrated into governance gate batch" docs/architecture/backend_core_refactor_blueprint_v1.md'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - governance gate detail chain includes cross-audit checks

rollback:
  - git restore scripts/verify/v2_app_governance_gate_audit.py scripts/verify/v2_app_verify_all.py docs/ops/v2_app_governance_gate_usage_v1.md docs/architecture/backend_core_refactor_blueprint_v1.md docs/architecture/backend_core_v2_rebuild_spec_v1.md

depends_on:
