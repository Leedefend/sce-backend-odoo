task_id: ITER-2026-04-10-1813
title: release full-chain readiness verification

type: governance
status: active
priority: high
mode: verify
batch: 1/1

goal: >
  启动一轮发布全链条门禁验证，输出可执行的发布就绪结论（GO/NO-GO）与失败矩阵，
  在不扩功能前提下验证当前主链路是否满足发布准备要求。

user_visible_outcome:
  - "形成发布就绪结论（GO/NO-GO）"
  - "给出完整门禁命令通过/失败矩阵"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-10-1813.yaml
    - agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1813.md
    - agent_ops/state/task_results/ITER-2026-04-10-1813.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 4
  max_output_lines: 1200

change_rules:
  - verification and reporting only
  - no feature expansion
  - additive and reversible

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Verification and release governance layer
  module: release readiness gate chain
  module_owner: agent_ops + make verification targets
  kernel_or_scenario: scenario
  reason: >
    用户要求立即启动发布全链路流程，需先跑发布门禁链并产出可审计结论。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-10-1813.yaml"
    - "make verify.product.release.ready"
    - "make verify.e2e.contract"
    - "make verify.smart_core"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - release verification command matrix
  - go/no-go decision with risk summary
  - rollback and next-step suggestion

rollback:
  - "git restore agent_ops/tasks/ITER-2026-04-10-1813.yaml agent_ops/reports/2026-04-10/report.ITER-2026-04-10-1813.md agent_ops/state/task_results/ITER-2026-04-10-1813.json docs/ops/iterations/delivery_context_switch_log_v1.md"

depends_on:
  - ITER-2026-04-10-1812
