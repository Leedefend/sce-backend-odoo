task_id: ITER-2026-03-29-228
title: Extract generic detail layout mappers from ContractFormPage
type: product_task
status: pending
priority: high

goal: Move generic detail layout assembly out of `ContractFormPage` into reusable app-layer helpers so the page keeps shrinking toward pure orchestration.
user_visible_outcome:
  - no visible regression on detail pages
  - future detail iterations can target layout mappers without reopening the page component

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend contract consumer
  module: generic detail layout mappers
  reason: After extracting renderer components, the next efficient refactor step is to remove pure layout-mapping logic from ContractFormPage and reuse it through app-layer helpers.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-228.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-228.yaml frontend/apps/web/src/pages/ContractFormPage.vue frontend/apps/web/src/app/runtime/detailLayoutRuntime.ts frontend/apps/web/src/components/template/detailLayout.types.ts docs/ops/iterations/delivery_context_switch_log_v1.md agent_ops/reports/2026-03-29/report.ITER-2026-03-29-228.md agent_ops/state/task_results/ITER-2026-03-29-228.json

depends_on:
  - ITER-2026-03-29-227

notes: "Keep the batch behavior-preserving and generic; extract mappers only, not model-specific logic."
