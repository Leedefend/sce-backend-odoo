task_id: ITER-2026-04-03-887
title: Align host primary-entry smoke with custom frontend token bootstrap flow
type: backend
status: active
priority: high
mode: implement

goal: >
  Switch host primary-entry browser smoke from native `/web/login` interaction to
  custom frontend token bootstrap entry, so usability verification follows the
  real custom-frontend chain.

user_visible_outcome:
  - "主入口验证使用自定义前端真实登录链路"
  - "避免原生登录路径造成的语义偏差假失败"

scope:
  allowed_paths:
    - scripts/verify/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 6
  max_candidates: 1
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - custom_frontend_flow_alignment_only
  - no_business_model_change
  - no_contract_field_change

context:
  branch: codex/next-round
  baseline_sha: d156083
  explicit_user_authorization: true
  input_from: ITER-2026-04-03-886
  priority_lane: usability_release_proof
  usability_battlefield: backend_plus_cross_stack

architecture:
  layer_target: Product Release Usability Proof
  module: host custom-frontend entry smoke chain
  module_owner: scene_orchestration_governance
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    Validate backend semantic entry contract through the actual custom-frontend
    bootstrap flow, not native web-login path.
  reason: >
    Current blocker is potentially inflated by native-login path mismatch; this
    batch aligns verification to real user journey.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-03-887.yaml
    - make verify.portal.project_dashboard_primary_entry_browser_smoke.host
    - make verify.product.main_entry_convergence.v1

