  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed

deliverables:
  - host primary-entry smoke aligned to custom frontend token bootstrap
  - updated release-grade verification evidence

rollback:
  - git restore scripts/verify/project_dashboard_primary_entry_browser_smoke.mjs
  - git restore agent_ops/tasks/ITER-2026-04-03-887.yaml
  - git restore agent_ops/reports/2026-04-03/report.ITER-2026-04-03-887.md
  - git restore agent_ops/state/task_results/ITER-2026-04-03-887.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-03-886
