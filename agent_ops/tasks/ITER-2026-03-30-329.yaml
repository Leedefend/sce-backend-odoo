  - no backend code changes
  - no frontend code changes
  - no contract schema changes

context:
  branch: codex/next-round
  baseline_sha: 03bd2ef

architecture:
  layer_target: Frontend Layer
  module: action and list consumer boundary audit
  module_owner: frontend/apps/web planning
  kernel_or_scenario: scenario
  reason: >
    Backend native truths are now present. Before implementing retraction, the
    frontend must be audited for remaining self-owned page composition so that
    the next batches remove only duplicated composition and preserve legitimate
    rendering responsibilities.

acceptance:
