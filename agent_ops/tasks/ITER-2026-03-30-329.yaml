task_id: ITER-2026-03-30-329
title: Audit frontend over-composition against completed native truths
type: analysis
status: in_progress
priority: high

goal: >
  Audit frontend list/detail consumers and identify where they still derive,
  regroup, or hardcode page composition that is already expressible by backend
  native truths, so the next implementation batch can retract frontend-owned
  composition cleanly.

user_visible_outcome:
  - repository contains a concrete frontend over-composition audit
  - each frontend-owned behavior is mapped back to native truths or to genuine optimization needs
  - next implementation can safely retract frontend composition without guesswork

