task_id: ITER-2026-03-31-488
title: Audit controlled sample recipes for uncovered next-action branches
type: permission-governance
status: active
priority: high

goal: >
  Turn the sample-coverage blocker from ITER-2026-03-31-487 into a concrete,
  reversible execution recipe by auditing the minimal runtime facts required to
  exercise pending-payment, task-in-progress, and create-task recommendation branches.

user_visible_outcome:
  - "明确剩余三条 recommendation 分支的最小造样条件"
  - "明确是否存在低副作用、可回滚的 runtime 验收样本方案"
  - "不给样本覆盖问题做模糊结论"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only batch
  - no code, ACL, record-rule, manifest, schema, or seed data changes
  - inspect model definitions, existing tests, and runtime sample availability only
  - produce an explicit reversible recipe or stop if no safe recipe can be stated with certainty

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: controlled sample recipe audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-487 proved that runtime sample coverage is the current blocker,
    so the next narrow step is to derive a controlled sample recipe before any
    runtime mutation batch is considered.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-488.yaml
    - "repository and runtime audit produce a concrete classification for each uncovered branch: pending payment, task in progress, and create task"

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - any_recipe_requires_uncertain_or_high-blast-radius_runtime_mutation
  - model_or_test_evidence_cannot_support_a_concrete_recipe

deliverables:
  - audited minimal sample recipe for the remaining recommendation branches
  - governance/report artifacts for ITER-2026-03-31-488

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-488.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-488.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-488.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-487
