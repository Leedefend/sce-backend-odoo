task_id: ITER-2026-04-01-552
title: Re-scan structural toolbar candidates into lower-risk executable slices
type: frontend
status: active
priority: medium
mode: scan

goal: >
  Decompose the remaining structural or behavior-adjacent toolbar candidates
  into smaller executable slices that can re-enter the low-cost iteration flow
  without crossing the current stop boundary.

user_visible_outcome:
  - "把剩余结构/行为候选拆成更小的可执行子问题"
  - "继续推进但不直接进入高风险实现"
  - "为下一张低风险 screen/implement 合同提供新的输入"

scope:
  allowed_paths:
    - frontend/apps/web/src/components/page/PageToolbar.vue
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/apps/web/src/api/**
    - frontend/apps/web/src/stores/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 2
  max_candidates: 10
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost scan stage only
  - do not modify product code in this batch
  - focus only on the two stopped candidate families from ITER-2026-04-01-551
  - decompose candidates into lower-risk sub-slices instead of selecting implementation directly

context:
  branch: codex/next-round
  baseline_sha: 8194c19
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-551
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar scan
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The previous low-risk display-only chain exhausted its safe candidates.
    The next valid move is a bounded re-scan that breaks the remaining
    structural/behavior candidates into smaller candidate slices.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-552.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - repo_wide_scan_attempted
  - scan_exceeds_declared_file_budget
  - decomposition_still_requires_behavior_change

deliverables:
  - decomposed candidate list for structural toolbar semantics
  - governance/report artifacts for ITER-2026-04-01-552

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-552.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-552.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-552.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-551
