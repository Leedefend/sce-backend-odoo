task_id: ITER-2026-03-29-216
title: Align project record shell title to detail identity
type: product_task
status: pending
priority: high

goal: Stop the shell header from showing list-scene identity on `project.project` record detail routes and align the visible title/breadcrumb to the record-detail context.
user_visible_outcome:
  - project detail pages no longer show `项目列表` in the shell headline
  - record-detail breadcrumbs and shell title align with project detail context

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**
    - frontend/**/package.json

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend shell identity
  module: project detail shell header
  reason: The current shell headline still resolves from `scene_key=projects.list` on record routes, so the user sees list-scene identity on a project detail page even after the form itself has been aligned.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-216.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code_patch
  - iteration_report
  - task_result

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-216.yaml frontend/apps/web/src/layouts/AppShell.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-216.md agent_ops/state/task_results/ITER-2026-03-29-216.json

depends_on:
  - ITER-2026-03-29-215

notes: "Scope this batch to shell title/breadcrumb identity for record routes; do not expand back into button cleanup."
