task_id: ITER-2026-03-30-298
title: Bind active continuous iteration to working-mode user update channel
type: governance
status: in_progress
priority: high

goal: >
  Remove the final mechanism gap by requiring active continuous-iteration user
  updates to use working-mode progress communication, and reserving terminal
  close-out replies for true stop/completion states only.

user_visible_outcome:
  - active continuous iteration no longer appears stopped due to reply-channel mismatch
  - terminal close-out becomes structurally unavailable during normal PASS checkpoints
  - visible updates match the actual execution state

scope:
  allowed_paths:
    - AGENTS.md
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - governance only
  - no product code changes
  - do not weaken stop conditions or approvals
  - define update-channel selection as an execution rule

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Governance Layer
  module: codex continuous-iteration communication mechanism
  module_owner: repo governance
  kernel_or_scenario: kernel
  reason: >
    The remaining mismatch comes from using a terminal-style reply channel during
    active continuous iteration. Channel selection itself must be constrained.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-298.yaml

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - governance_rule_conflicts_with_existing_stop_logic
  - acceptance_failed

deliverables:
  - working_mode_update_channel_rule
  - iteration_report

rollback:
  - git restore AGENTS.md docs/ops/codex_workspace_execution_rules.md
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/tasks/ITER-2026-03-30-298.yaml

depends_on:
  - ITER-2026-03-30-295

notes: >
  The rule should reserve terminal close-out replies for genuine stop conditions
  or actual completion only, and force active-chain updates into working-mode
  progress communication.
