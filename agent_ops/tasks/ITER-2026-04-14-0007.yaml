task_id: ITER-2026-04-14-0007
title: Project next 100-row create-only dry-run v2
status: in_progress
type: migration-dry-run
priority: high
mode: execute

goal: >
  Build and validate the next bounded 100-row project create-only candidate
  after the already materialized 130 project rows. Do not write database
  records.

user_visible_outcome:
  - "下一组 100 条 project create-only dry-run 完成，未写库"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0007.yaml
    - scripts/migration/project_next_100_create_only_dry_run.py
    - artifacts/migration/project_next_100_candidate_v2.csv
    - artifacts/migration/project_next_100_dry_run_result_v2.json
    - docs/migration_alignment/project_next_100_create_only_dry_run_v2.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0007.md
    - agent_ops/state/task_results/ITER-2026-04-14-0007.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/project/project.csv
    - artifacts/migration/project_create_only_post_write_snapshot_v1.csv
    - artifacts/migration/project_create_only_expand_post_write_snapshot_v1.csv
    - artifacts/migration/full_migration_scope_freeze_v1.json
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - no-orm
  - dry-run-only
  - create-only-candidate
  - no-update-candidate

context:
  branch: codex/next-round
  baseline_sha: d243d59
  upstream_task: ITER-2026-04-14-0006
  target_lane: project_expand

architecture:
  layer_target: Project Migration Dry Run
  module: project.project next 100-row create-only candidate
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch validates project business facts for the next bounded skeleton
    import slice without changing records.
  reason: >
    Full migration scope freeze selected project_expand as the next safe lane.
    The existing 100-row candidate was already materialized, so a fresh
    non-overlapping dry-run candidate is required.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0007.yaml
    - python3 -m py_compile scripts/migration/project_next_100_create_only_dry_run.py
    - python3 scripts/migration/project_next_100_create_only_dry_run.py
    - python3 -m json.tool artifacts/migration/project_next_100_dry_run_result_v2.json
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0007.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - update_candidate_detected
  - dry_run_error_detected

deliverables:
  - task contract
  - dry-run script
  - candidate csv
  - dry-run result json
  - dry-run document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0006

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0007.yaml
  - git restore scripts/migration/project_next_100_create_only_dry_run.py
  - git restore artifacts/migration/project_next_100_candidate_v2.csv
  - git restore artifacts/migration/project_next_100_dry_run_result_v2.json
  - git restore docs/migration_alignment/project_next_100_create_only_dry_run_v2.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0007.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0007.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
