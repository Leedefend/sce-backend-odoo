task_id: ITER-2026-04-09-1456
title: low-cost scan for release sudo boundary candidates
type: governance-optimization
status: active
priority: high
mode: scan

goal: >
  在发布执行链路中扫描解释层/编排层可能越界业务事实的 sudo 候选点，
  为下一阶段 screen 分类提供最小候选集。

user_visible_outcome:
  - "得到发布链路 sudo 候选清单（仅扫描、不下结论）"

scope:
  allowed_paths:
    - addons/smart_core/handlers/release_operator.py
    - addons/smart_core/delivery/release_orchestrator.py
    - addons/smart_core/delivery/release_operator_write_model_service.py
    - addons/smart_core/models/release_action.py
    - addons/smart_core/models/edition_release_snapshot.py
    - agent_ops/tasks/ITER-2026-04-09-1456.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1456.md
    - agent_ops/state/task_results/ITER-2026-04-09-1456.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/__manifest__.py
    - frontend/**
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 8
  max_candidates: 12
  max_output_lines: 120
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: false
  allowed_roles:
    - executor
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - single-stage scan only
  - must not conclude
  - must not run verify-stage reasoning
  - no code modification in scan stage

context:
  branch: codex/next-round
  baseline_sha: 9109f99
  explicit_user_authorization: true
  usability_battlefield: backend

architecture:
  layer_target: Backend semantic boundary governance
  module: smart_core release execution chain
  module_owner: smart_core backend contract stack
  kernel_or_scenario: scenario
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    本批只扫描发布执行编排链路中的 sudo 使用点，不改业务事实。
  reason: >
    用户要求立即执行并系统性根除“解释层越界业务事实”；按低成本治理先做 scan。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1456.yaml"
    - "rg -n \"sudo\\(|with_user\\(|check_access_rights|check_access_rule\" addons/smart_core/handlers/release_operator.py addons/smart_core/delivery/release_orchestrator.py addons/smart_core/delivery/release_operator_write_model_service.py addons/smart_core/models/release_action.py addons/smart_core/models/edition_release_snapshot.py"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - stage_boundary_broken
  - limit_exceeded

deliverables:
  - bounded scan candidate list
  - next screen-stage suggestion

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-09-1456.yaml
  - git restore agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1456.md
  - git restore agent_ops/state/task_results/ITER-2026-04-09-1456.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-09-1455
