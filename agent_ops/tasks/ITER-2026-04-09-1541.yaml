task_id: ITER-2026-04-09-1541
title: backend refactor E1 envelope audit scope align to api routes
type: governance
status: active
priority: high
mode: implement
batch: 1/1

goal: >
  将 envelope 一致性审计候选范围对齐到 API 路由，排除 website/non-api endpoint 的误报候选。

user_visible_outcome:
  - "envelope inconsistency candidate 列表仅包含 API 路由 controller"

scope:
  allowed_paths:
    - scripts/verify/envelope_consistency_audit.py
    - artifacts/architecture/envelope_consistency_audit_v1.json
    - agent_ops/tasks/ITER-2026-04-09-1541.yaml
    - agent_ops/reports/2026-04-09/report.ITER-2026-04-09-1541.md
    - agent_ops/state/task_results/ITER-2026-04-09-1541.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - security/**
    - record_rules/**
    - "**/__manifest__.py"
    - "**/*payment*"
    - "**/*settlement*"
    - "**/*account*"

limits:
  max_files: 6
  max_output_lines: 320

change_rules:
  - verify logic scope alignment only
  - no runtime controller/model changes

context:
  branch: codex/next-round
  baseline_sha: 0049675
  explicit_user_authorization: true

architecture:
  layer_target: Governance verification layer
  module: envelope_consistency_audit
  module_owner: scripts verify
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: >
    仅调整审计范围口径，不改变业务事实或接口行为。
  reason: >
    剩余候选为非 API 路由，应通过审计范围定义收口而非业务代码改造。

acceptance:
  commands:
    - "python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-09-1541.yaml"
    - "python3 -m py_compile scripts/verify/envelope_consistency_audit.py"
    - "python3 scripts/verify/envelope_consistency_audit.py"
    - "python3 - <<'PY'\nimport json\nobj=json.load(open('artifacts/architecture/envelope_consistency_audit_v1.json','r',encoding='utf-8'))\nassert obj['summary']['inconsistent_candidate_count']==0\nprint('api-scope candidate convergence PASS')\nPY"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_command_failed
  - contract_uncertainty

deliverables:
  - envelope audit scope aligned to api routes

rollback:
  - git restore scripts/verify/envelope_consistency_audit.py

depends_on:
  - ITER-2026-04-09-1540
