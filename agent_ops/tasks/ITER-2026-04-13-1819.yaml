  module: project.project safe import slice
  module_owner: docs/migration_alignment
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    This batch freezes which project business facts may be safely imported in a
    later project skeleton import. It does not change scene orchestration,
    frontend rendering, or platform kernel mechanisms.
  reason: >
    The dry-run found blockers for company, specialty, lifecycle/state, text
    matching, and contract/tax/account/cost/attachment fields. A narrower safe
    slice is required before a small project skeleton import can be designed.

acceptance:
