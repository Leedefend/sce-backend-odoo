title: Project master-data safe import slice v1
status: completed
type: governance-optimization
priority: high
mode: screen

goal: >
  Freeze the first-round safe project master-data import slice based only on
  the completed project mapping dry-run results, and define the safe import
  field set, project-code policy, template, preprocessing rules, identity
  policy, importer design, and readiness conclusion before any sample import.

user_visible_outcome:
  - "首轮项目骨架安全导入字段集、编码策略、模板、预处理规则、唯一性策略、导入器设计和准入结论完成冻结"

