task_id: ITER-2026-04-14-0030R
title: Project member dry-run source path recovery v1
status: in_progress
type: migration-permission-sensitive-dry-run-recovery
priority: high
mode: verify

goal: >
  Recover the failed project_member readonly dry-run by making the source CSV
  visible to the Odoo shell container through a migration artifact shadow copy,
  then rerun the same no-write mapping and permission-impact dry-run.

user_visible_outcome:
  - "project_member 只读 dry-run 源路径恢复并重新执行，不写库"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-14-0030R.yaml
    - scripts/migration/project_member_mapping_dry_run.py
    - artifacts/migration/project_member_source_shadow_v1.csv
    - artifacts/migration/project_member_dry_run_result_v1.json
    - docs/migration_alignment/project_member_mapping_strategy_v1.md
    - docs/migration_alignment/project_member_permission_impact_v1.md
    - agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030R.md
    - agent_ops/state/task_results/ITER-2026-04-14-0030R.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - tmp/raw/project_member/project_member.csv
    - docs/ops/governance/project_member_rule_binding_screen_v1.md
    - docs/migration_alignment/project_mapping_user_match_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 9
  max_output_lines: 320
  forbid_repo_wide_scan: true

change_rules:
  - no-db-write
  - readonly-odoo-shell-only
  - source-shadow-copy-only
  - no-user-create
  - no-project-member-create
  - no-record-rule-change
  - no-acl-security-change
  - no-payment-settlement-account-change

context:
  branch: codex/next-round
  baseline_sha: d243d59
  target_db: sc_demo
  target_lane: project_member
  importer_level: L1 dry-run recovery
  upstream_task: ITER-2026-04-14-0030
  recovery_authorization: "user said 同意解决"
  source_rows: 21390

architecture:
  layer_target: Project Member Migration Permission Dry Run Recovery
  module: project_member legacy user/project mapping
  module_owner: scripts/migration + artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The recovery only makes source business facts visible for readonly mapping.
    It does not create records or add presentation semantics.
  reason: >
    ITER-2026-04-14-0030 failed because the Odoo shell container could not read
    /mnt/tmp/raw/project_member/project_member.csv. The container can read
    /mnt/artifacts, so this recovery uses an artifact shadow copy and reruns the
    same readonly dry-run.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-14-0030R.yaml
    - test -s artifacts/migration/project_member_source_shadow_v1.csv
    - python3 -m py_compile scripts/migration/project_member_mapping_dry_run.py
    - DB_NAME=sc_demo make odoo.shell.exec < scripts/migration/project_member_mapping_dry_run.py
    - python3 -m json.tool artifacts/migration/project_member_dry_run_result_v1.json
    - test -s docs/migration_alignment/project_member_mapping_strategy_v1.md
    - test -s docs/migration_alignment/project_member_permission_impact_v1.md
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-14-0030R.json
    - make verify.native.business_fact.static

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - db_write_attempted
  - user_create_attempted
  - project_member_create_attempted
  - record_rule_or_acl_change_attempted
  - payment_settlement_account_change_attempted

deliverables:
  - task contract
  - source shadow artifact
  - dry-run script path recovery
  - dry-run result json
  - mapping strategy document
  - permission impact document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-14-0030

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-14-0030R.yaml
  - git restore scripts/migration/project_member_mapping_dry_run.py
  - git restore artifacts/migration/project_member_source_shadow_v1.csv
  - git restore artifacts/migration/project_member_dry_run_result_v1.json
  - git restore docs/migration_alignment/project_member_mapping_strategy_v1.md
  - git restore docs/migration_alignment/project_member_permission_impact_v1.md
  - git restore agent_ops/reports/2026-04-14/report.ITER-2026-04-14-0030R.md
  - git restore agent_ops/state/task_results/ITER-2026-04-14-0030R.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
