task_id: ITER-2026-04-03-899
title: Add handshake-failure short-circuit and diagnostics-bound endpoint ordering
type: backend
status: active
priority: high
mode: implement

goal: >
  Reduce host preflight timeout cost by ordering endpoints from diagnostics
  evidence and short-circuiting origin families that repeatedly fail handshake.

user_visible_outcome:
