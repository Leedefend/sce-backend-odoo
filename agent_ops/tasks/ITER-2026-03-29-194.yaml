task_id: ITER-2026-03-29-194
title: Normalize frontend nav and scene startup compatibility
type: product_task
status: pending
priority: high

goal: Fix frontend startup compatibility so contract nav nodes and scene registry inputs tolerate label/title-only payloads without emitting avoidable startup errors or invalid-scene noise.
user_visible_outcome:
  - frontend navigation consumes label/title-based nav payloads without undefined name noise
  - scene startup becomes more robust against partial scene-ready payload variance during login

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: startup nav and scene registry compatibility
  reason: The current login path already works, but startup logs show frontend consumers still assume legacy nav/scene field shapes, so a low-risk normalization pass is needed before broader productization continues.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-194.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-194.yaml frontend/apps/web/src/stores/session.ts frontend/apps/web/src/components/MenuTree.vue frontend/apps/web/src/app/resolvers/sceneRegistry.ts frontend/apps/web/src/app/resolvers/sceneRegistryCore.js agent_ops/reports/2026-03-29/report.ITER-2026-03-29-194.md agent_ops/state/task_results/ITER-2026-03-29-194.json

depends_on:
  - ITER-2026-03-29-193

notes: "Product hotfix batch: normalize nav/scene startup payloads on the frontend without changing backend contract shape."
