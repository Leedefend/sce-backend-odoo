acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-149.yaml
    - python3 -m py_compile addons/smart_core/core/scene_ready_contract_builder.py addons/smart_core/tests/test_scene_ready_strict_contract_guard.py
