task_id: ITER-2026-03-29-151
title: Preserve canonical semantic surfaces in system init payload
type: governance_task
status: pending
priority: high

goal: Make the minimal system.init startup payload preserve canonical permission, workflow and validation surface semantics from scene_ready contracts instead of trimming them to near-empty stubs.
