task_id: ITER-2026-04-01-503
title: Move execution-structure entry context normalization into Python helper
type: permission-governance
status: active
priority: high

goal: >
  Close the remaining execution-structure entry residual by moving action
  context normalization out of the server-action eval environment and into a
  Python helper under project_core.

user_visible_outcome:
  - "execution structure 入口对已交付角色稳定可用"
  - "server action 不再依赖 eval context 里的 safe_eval 键"
  - "不改 ACL、不改 manifest、不扩范围"

scope:
  allowed_paths:
    - addons/smart_construction_core/models/core/project_core.py
    - addons/smart_construction_core/actions/execution_structure_actions_base.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - ultra-narrow implementation batch
  - only introduce a Python helper for action-context normalization and reuse it from action_exec_structure_entry
  - no ACL, manifest, financial, or broader execution-surface changes

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: execution-structure entry context helper fix
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-502 proved the remaining blocker is no longer ACL or
    action retrieval. The residual is now strictly inside server-action context
    parsing, so the safest fix is to move normalization into Python code.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-503.yaml
    - make verify.smart_core
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - "runtime audit confirms action_exec_structure_entry.run() works for representative delivered roles without act_window.view ACL, ValueError, or KeyError failures"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - module_upgrade_fails
  - runtime_still_fails_on_exec_structure_entry
  - the_fix_requires_scope_expansion

deliverables:
  - execution-structure context helper fix
  - regression coverage for server-action context normalization
  - governance/report artifacts for ITER-2026-04-01-503

rollback:
  - rerun `make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo`
  - git restore addons/smart_construction_core/models/core/project_core.py
  - git restore addons/smart_construction_core/actions/execution_structure_actions_base.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-04-01-503.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-503.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-503.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-502
