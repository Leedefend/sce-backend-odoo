task_id: ITER-2026-03-31-486
title: Audit representative next-action recommendation correctness after overview count repair
type: permission-governance
status: active
priority: high

goal: >
  Continue the recommendation-correctness acceptance chain after ITER-2026-03-31-485
  by sampling representative draft and in_progress projects across delivered roles,
  verifying that overview counters and emitted next actions remain consistent.

user_visible_outcome:
  - "代表性 draft / in_progress 项目的 next-action 推荐与 overview 事实保持一致"
  - "不新增 ACL，不改变业务规则，只继续审计 recommendation correctness"
  - "如果再发现残差，能把问题收缩到具体规则或统计口径"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - audit-only batch
  - no code, ACL, record-rule, manifest, schema, or data changes
  - only inspect representative recommendation outputs against existing runtime facts
  - stop immediately if a new correctness residual is found

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: recommendation correctness follow-up audit
  module_owner: customer delivery permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-485 closed one concrete overview aggregation defect, so the
    next low-risk step is to sample the remaining representative recommendation
    combinations and verify that no new counter-to-rule mismatch remains.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-486.yaml
    - runtime audit confirms representative draft and in_progress recommendation outputs match overview facts for sampled delivered roles

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - any_new_recommendation_correctness_mismatch_is_found
  - runtime_audit_cannot_classify_a_rule_with_certainty

deliverables:
  - runtime audit evidence for representative next-action recommendation correctness
  - governance/report artifacts for ITER-2026-03-31-486

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-31-486.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-486.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-486.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-03-31-485
