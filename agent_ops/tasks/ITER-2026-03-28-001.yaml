task_id: ITER-2026-03-28-001
title: Bootstrap codex continuous iteration system
type: governance_task
status: pending
priority: high

goal: Establish the first runnable agent_ops governance skeleton, scripts, queue, and reporting flow.
user_visible_outcome:
  - agent_ops directory tree exists in git
  - sample iteration contract can be validated
  - queue and iteration entrypoints are available from Makefile

scope:
  allowed_paths:
    - agent_ops/**
    - Makefile
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: Governance/Tooling
  module: agent_ops + Makefile + docs/ops/iterations
  reason: Build a contract-first continuous iteration control plane without touching business modules.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-28-001.yaml
    - python3 -m py_compile agent_ops/scripts/common.py agent_ops/scripts/validate_task.py agent_ops/scripts/risk_scan.py agent_ops/scripts/classify_result.py agent_ops/scripts/build_report.py agent_ops/scripts/pick_next_task.py agent_ops/scripts/run_queue.py

risk:
  level: low
  manual_approval_required: false
  threshold_overrides:
    max_changed_files: 40
    max_added_lines: 2000
    max_removed_lines: 200

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code
  - report

rollback:
  - git restore agent_ops Makefile docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on: []
notes: "Sample bootstrap task for the first single-iteration closure."
