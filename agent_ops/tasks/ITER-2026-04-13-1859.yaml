task_id: ITER-2026-04-13-1859
title: Partner cross-source manual decision template v1
status: in_progress
type: migration-manual-decision-template
priority: high
mode: execute

goal: >
  Prepare a no-DB manual decision template for the 8 partner cross-source
  conflict rows. Do not fill final decisions and do not create partners.

user_visible_outcome:
  - "8 条跨源冲突人工决策模板完成"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1859.yaml
    - artifacts/migration/partner_cross_source_manual_decision_template_v1.csv
    - docs/migration_alignment/partner_cross_source_manual_decision_template_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1859.md
    - agent_ops/state/task_results/ITER-2026-04-13-1859.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  read_only_inputs:
    - artifacts/migration/partner_cross_source_conflicts_v1.csv
    - docs/migration_alignment/partner_cross_source_conflict_classification_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - scripts/**
    - tmp/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 6
  max_output_lines: 220
  forbid_repo_wide_scan: true

change_rules:
  - template-only
  - no-final-source-decision
  - no-db-write
  - no-orm
  - no-partner-create
  - no-partner-update
  - no-contract-import

context:
  branch: codex/next-round
  baseline_sha: d243d59
  input_csv: artifacts/migration/partner_cross_source_conflicts_v1.csv

architecture:
  layer_target: Partner Manual Decision Template
  module: res.partner cross-source conflict decision template
  module_owner: artifacts/migration + docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The template collects manual decisions needed to resolve partner source
    business facts without allowing the agent to fabricate those decisions.
  reason: >
    ITER-2026-04-13-1858 classified the 8 conflicts but intentionally made no
    final source decision. This batch prepares the manual decision surface only.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1859.yaml
    - python3 -m json.tool agent_ops/state/task_results/ITER-2026-04-13-1859.json
    - python3 -c "import csv; rows=list(csv.DictReader(open('artifacts/migration/partner_cross_source_manual_decision_template_v1.csv', encoding='utf-8'))); assert len(rows) == 8 and all(not r['selected_source'] and not r['decision_status'] for r in rows)"
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - final_source_decision_attempted
  - db_write_attempted
  - partner_create_attempted
  - partner_update_attempted
  - contract_import_attempted

deliverables:
  - task contract
  - manual decision template csv
  - template usage document
  - iteration report
  - task result json

depends_on:
  - ITER-2026-04-13-1858

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1859.yaml
  - git restore artifacts/migration/partner_cross_source_manual_decision_template_v1.csv
  - git restore docs/migration_alignment/partner_cross_source_manual_decision_template_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1859.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1859.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
