task_id: ITER-2026-04-05-1108
title: Decouple smart_core controllers from industry service imports via platform adapter
type: implementation
status: active
priority: medium
mode: execute

goal: >
  Remove direct `odoo.addons.smart_construction_core.services.*` imports from
  `addons/smart_core/controllers` by introducing a platform-owned runtime
  adapter module and routing controller calls through that adapter.

user_visible_outcome:
  - "platform controllers 不再直接 import 行业 services，控制器边界继续收敛"

scope:
  allowed_paths:
    - addons/smart_core/core/industry_runtime_service_adapter.py
    - addons/smart_core/controllers/platform_meta_api.py
    - addons/smart_core/controllers/platform_contract_portal_dashboard_api.py
    - addons/smart_core/controllers/platform_contract_capability_api.py
    - addons/smart_core/controllers/platform_insight_logic.py
    - addons/smart_core/controllers/platform_portal_execute_api.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - migrations/**
    - deploy/**

limits:
  max_files: 14
  max_candidates: 12
  max_output_lines: 280
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - controller_boundary_only_no_business_semantic_change

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: controller_boundary_recovery_phase6
  priority_lane: controller_boundary_recovery

architecture:
  layer_target: Platform Layer
  module: smart_core.controllers
  module_owner: platform
  kernel_or_scenario: kernel
  backend_sub_layer_target: scene_orchestration
  backend_sub_layer_reason: platform controllers should depend on platform-owned adapter contracts, not industry service modules directly.
  reason: remove remaining platform controller direct imports to industry runtime services.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-1108.yaml
    - python3 -m py_compile addons/smart_core/core/industry_runtime_service_adapter.py addons/smart_core/controllers/platform_meta_api.py addons/smart_core/controllers/platform_contract_portal_dashboard_api.py addons/smart_core/controllers/platform_contract_capability_api.py addons/smart_core/controllers/platform_insight_logic.py addons/smart_core/controllers/platform_portal_execute_api.py
    - bash -lc '! rg -n "odoo\.addons\.smart_construction_core\.services" addons/smart_core/controllers'
    - make verify.controller.platform_no_industry_import.guard
    - make verify.controller.allowlist.routes.guard
    - make verify.controller.route.policy.guard
    - make verify.controller.delegate.guard

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched

deliverables:
  - addons/smart_core/core/industry_runtime_service_adapter.py
  - addons/smart_core/controllers/platform_meta_api.py
  - addons/smart_core/controllers/platform_contract_portal_dashboard_api.py
  - addons/smart_core/controllers/platform_contract_capability_api.py
  - addons/smart_core/controllers/platform_insight_logic.py
  - addons/smart_core/controllers/platform_portal_execute_api.py

rollback:
  - git restore addons/smart_core/core/industry_runtime_service_adapter.py
  - git restore addons/smart_core/controllers/platform_meta_api.py
  - git restore addons/smart_core/controllers/platform_contract_portal_dashboard_api.py
  - git restore addons/smart_core/controllers/platform_contract_capability_api.py
  - git restore addons/smart_core/controllers/platform_insight_logic.py
  - git restore addons/smart_core/controllers/platform_portal_execute_api.py
  - git restore agent_ops/tasks/ITER-2026-04-05-1108.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-1108.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-1108.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-1107
