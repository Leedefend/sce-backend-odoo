task_id: ITER-2026-03-29-157
title: Consume workflow and validation semantics in smart_scene permissions
type: governance_task
status: pending
priority: high

goal: Make smart_scene project canonical workflow_surface and validation_surface into scene contract permissions instead of leaving those semantics only in diagnostics.
user_visible_outcome:
  - scene contracts now expose workflow state summaries from canonical workflow semantics
  - scene contracts now expose validation-gated submit actions from canonical validation semantics

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_engine + scene_contract_builder
  reason: smart_scene already receives canonical workflow_surface and validation_surface, but still drops them before final scene contract permissions. This iteration converts those runtime semantic surfaces into real scene-layer permission payload decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-157.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_engine.py addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-157.yaml addons/smart_scene/core/scene_engine.py addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-156

notes: "Batch acceleration: group workflow and validation semantic consumption into one smart_scene permissions iteration."
