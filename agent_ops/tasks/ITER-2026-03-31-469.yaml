task_id: ITER-2026-03-31-469
title: Align WBS read surface with cost_read delivery rule
type: permission-governance
status: active
priority: high

goal: >
  Align the WBS delivered read surface with the already-frozen customer rule
  that business-domain read access is opened to internal users, by adding a
  cost_read path to the WBS menu/action surface without widening operator or
  approval authority.

user_visible_outcome:
  - "WBS 对 cost_read 提供只读入口"
  - "四川保盛财务的跨域只读口径在成本域内部一致"
  - "不新增任何 WBS 经办或审批权限"

scope:
  allowed_paths:
    - addons/smart_construction_core/security/action_groups_patch.xml
    - addons/smart_construction_core/views/menu.xml
    - addons/smart_construction_core/views/core/project_views.xml
    - addons/smart_construction_core/views/support/tender_views.xml
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - additive or narrowing-only permission changes
  - WBS may gain read-only surface for cost_read
  - WBS must not grant cost_user/cost_manager/project_user/project_manager beyond current behavior
  - no ACL or record-rule edits in this batch
  - do not widen finance into any operator or approval path

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司

architecture:
  layer_target: Customer Permission Governance Implementation
  module: WBS read-surface alignment
  module_owner: industry permission surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-03-31-468 showed a concrete inconsistency inside the cost domain:
    budget and progress expose cost_read access, while WBS still blocks cost_read.
    The user clarified that read access is the baseline rule and this should be
    treated as an implementation residual rather than a new policy decision.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-469.yaml
    - make mod.upgrade CODEX_NEED_UPGRADE=1 MODULE=smart_construction_core DB_NAME=sc_odoo
    - make verify.smart_core
    - runtime audit confirms finance/cost_read can enter WBS while still lacking WBS operator authority

risk:
  level: high
  manual_approval_required: false

stop_conditions:
  - wbs_read_alignment_requires_acl_changes
  - wbs_read_alignment_leaks_operator_or_approval_authority
  - verify_smart_core_fails

deliverables:
  - WBS read-surface alignment for cost_read
  - verification artifacts for ITER-2026-03-31-469

rollback:
  - git restore addons/smart_construction_core/security/action_groups_patch.xml
  - git restore addons/smart_construction_core/views/menu.xml
  - git restore addons/smart_construction_core/views/core/project_views.xml
  - git restore addons/smart_construction_core/views/support/tender_views.xml
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-03-31-469.yaml
  - git restore agent_ops/reports/2026-03-31/report.ITER-2026-03-31-469.md
  - git restore agent_ops/state/task_results/ITER-2026-03-31-469.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

