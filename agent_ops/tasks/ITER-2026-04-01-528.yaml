task_id: ITER-2026-04-01-528
title: Verify native list route-preset deduplication with bounded role-parallel gating
type: frontend
status: active
priority: medium
mode: verify

goal: >
  Verify that the native list toolbar still renders correctly after route-preset
  deduplication and confirm the change remains a display-only usability fix
  without contract or behavior regressions.

user_visible_outcome:
  - "确认推荐筛选去重后的 list toolbar 仍可用"
  - "确认改动只停留在显示层"
  - "为下一条产品可用性批次提供可信验证结论"

scope:
  allowed_paths:
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

limits:
  max_files: 4
  max_candidates: 1
  max_output_lines: 80
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

role_parallel:
  enabled: true
  allowed_roles:
    - executor
    - auditor
    - reporter
  require_disjoint_writes: true
  require_new_session_per_role: true
  stop_on_conflict: true

change_rules:
  - low-cost verify stage only
  - bounded role-parallel execution is allowed inside this verify stage
  - do not modify product code in this batch
  - do not reopen repository scans
  - separate code-result and gate-result conclusions

context:
  branch: codex/next-round
  baseline_sha: 2a02eb6
  explicit_user_authorization: true
  input_from: ITER-2026-04-01-526
  use_new_session: true
  carry_long_context: false
  role_parallel_enabled: true

architecture:
  layer_target: Frontend Layer
  module: native metadata list toolbar verification
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The implementation batch removed duplicate route-preset exposure from the
    active-condition chips. The next safe step is to run bounded verification
    and record whether the list surface remains stable.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-528.yaml
    - pnpm -C frontend/apps/web typecheck:strict
    - make verify.portal.v0_5.host

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - verify_command_failed
  - environment_untrusted_for_frontend_smoke
  - role_parallel_conflict_detected
  - verification_requires_product_code_changes

deliverables:
  - verify verdict for route-preset deduplication
  - code result and gate result
  - governance/report artifacts for ITER-2026-04-01-528

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-01-528.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-528.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-528.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-526
