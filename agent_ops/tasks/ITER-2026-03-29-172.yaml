task_id: ITER-2026-03-29-172
title: Audit smart_scene runtime semantic state alignment
type: governance_task
status: pending
priority: high

goal: Make smart_scene contract diagnostics expose explicit assertions about runtime semantic state alignment with page status and record state summary.
user_visible_outcome:
  - scene contracts now include contract-level audit assertions for runtime semantic state alignment
  - downstream consumers can inspect whether page status and record state summary stayed aligned with runtime semantic state without recomputing it

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_contract_builder
  reason: smart_scene now computes, preserves, and validates runtime semantic state, but contract outputs still lack a first-class audit view that tells downstream consumers whether page status and record state summary remain aligned with that runtime snapshot. This iteration adds explicit runtime alignment assertions to contract diagnostics.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-172.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_builder.py
    - python3 addons/smart_scene/tests/test_scene_contract_builder.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-172.yaml addons/smart_scene/core/scene_contract_builder.py addons/smart_scene/tests/test_scene_contract_builder.py

