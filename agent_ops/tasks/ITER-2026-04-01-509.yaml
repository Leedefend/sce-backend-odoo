task_id: ITER-2026-04-01-509
title: Realign tender regression coverage to delivered-role semantics
type: permission-governance
status: active
priority: medium

goal: >
  Replace polluted tender verification samples with assertions that match real
  delivered-role semantics, so the tender query-vs-execution split is verified
  against finance, pm, and executive runtime roles instead of group-only users
  that get owner overlay by default.

user_visible_outcome:
  - "tender 回归验证与真实交付角色一致"
  - "finance 只读查询、pm/executive 执行写入的语义被稳定回归覆盖"
  - "不再依赖会被默认 owner 污染的样本创建方式"

scope:
  allowed_paths:
    - addons/smart_construction_core/tests/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/record_rules/**
    - addons/**/ir.model.access.csv
    - addons/**/__manifest__.py
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*
    - frontend/**
    - migrations/**
    - deploy/**

change_rules:
  - test-only verification alignment batch
  - do not change tender ACL or action/view semantics
  - update regression coverage to use role-accurate samples only

context:
  branch: codex/next-round
  baseline_sha: c23f8b2
  target_db: sc_odoo
  customer_name: 四川保盛建设集团有限公司
  customer_module: smart_construction_custom
  explicit_user_authorization: true

architecture:
  layer_target: Customer Delivery Flow Acceptance
  module: tender verification alignment
  module_owner: customer delivery scenario surface
  kernel_or_scenario: scenario
  reason: >
    ITER-2026-04-01-508 confirmed that the tender authority split works on real
    delivered roles, but current regression samples are polluted by default
    owner overlay during res.users.create. The next safe step is test-only
    alignment.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-01-509.yaml
    - make verify.smart_core
    - "test coverage asserts tender read-only semantics for finance and write semantics for pm/executive without relying on polluted group-only samples"

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - verify_smart_core_fails
  - tender_verification_cannot_be_expressed_without_scope_expansion
  - test_alignment_requires_more_acl_or_view_changes

deliverables:
  - tender regression coverage aligned to real roles
  - governance/report artifacts for ITER-2026-04-01-509

rollback:
  - git restore addons/smart_construction_core/tests
  - git restore agent_ops/tasks/ITER-2026-04-01-509.yaml
  - git restore agent_ops/reports/2026-04-01/report.ITER-2026-04-01-509.md
  - git restore agent_ops/state/task_results/ITER-2026-04-01-509.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-01-508
