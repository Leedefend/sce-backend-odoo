    - FRONTEND_API_BASE_URL=http://127.0.0.1:18069 ENV=test ENV_FILE=.env.prod.sim COMPOSE_PROJECT_NAME=sc-backend-odoo-prod-sim PROJECT=sc-backend-odoo-prod-sim DB_NAME=sc_prod_sim make verify.frontend_api

