task_id: ITER-2026-03-30-328
title: Audit remaining page composition requirements against completed native truths
type: analysis
status: in_progress
priority: high

goal: >
  After completing backend native truths for search, list, action, and form
  surfaces, audit remaining page composition requirements and determine which
  are already expressible from native Odoo truths, which are only partially
  expressible, and which genuinely require a later optimization composition
  contract.

user_visible_outcome:
  - repository contains a clear native-truth coverage audit for remaining page requirements
  - backend next-step planning is based on native extractability instead of frontend assumptions
  - optimization composition scope is reduced to only non-native requirements

scope:
