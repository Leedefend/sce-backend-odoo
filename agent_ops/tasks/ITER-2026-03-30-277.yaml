task_id: ITER-2026-03-30-277
title: Drive list search placeholder from native search metadata
type: feature
status: in_progress
priority: medium

goal: >
  Replace the generic list search placeholder with a contract-driven hint derived
  from native search-surface fields so the toolbar better reflects real searchable
  business dimensions.

user_visible_outcome:
  - list search input shows a metadata-based placeholder
  - placeholder reflects native search fields instead of generic wording
  - list toolbar becomes more self-explanatory without extra custom logic

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/apps/web/**
  forbidden_paths:
    - addons/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend only
  - no backend contract changes
  - derive labels from existing contract/search metadata only
  - fall back safely to generic text when metadata is absent

context:
  branch: codex/next-round
  baseline_sha: 65d6932

architecture:
  layer_target: Frontend Layer
  module: list metadata consumer
  module_owner: frontend/apps/web
  kernel_or_scenario: kernel
  reason: >
    The list search toolbar still uses a generic placeholder even though native search
    metadata already exposes searchable fields.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-277.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - acceptance_failed
  - search_metadata_shape_unclear

deliverables:
  - metadata_driven_search_placeholder
  - iteration_report

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-30-277.yaml
  - git restore frontend/apps/web/src/components/page/PageToolbar.vue frontend/apps/web/src/pages/ListPage.vue frontend/apps/web/src/views/ActionView.vue

depends_on:
  - ITER-2026-03-30-276

notes: >
  Prefer the first few readable field labels from native search metadata. If labels
  are noisy or missing, fall back to the generic placeholder.
