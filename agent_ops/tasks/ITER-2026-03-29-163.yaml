task_id: ITER-2026-03-29-163
title: Drive smart_scene closed-state decisions from semantic page gating
type: governance_task
status: pending
priority: high

goal: Make smart_scene consume semantic_page action_gating closed_states as real readonly decisions in page status and permissions.
user_visible_outcome:
  - scene contracts now mark closed-state records readonly from semantic page gating, not only from permission surfaces
  - scene permissions now block edit/delete/submit/workflow when semantic page gating marks the record as closed

scope:
  allowed_paths:
    - addons/smart_scene/core/**
    - addons/smart_scene/tests/**
    - docs/ops/**
    - agent_ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: scene layer
  module: smart_scene scene_engine + scene_resolver
  reason: smart_scene already uses permission surfaces and record-aware validation/workflow logic, but it still ignores semantic_page closed-state gating that already exists in parser semantics. This iteration turns that gating into readonly scene/page decisions.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-163.yaml
    - python3 -m py_compile addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py
    - python3 addons/smart_scene/tests/test_scene_resolver_semantics.py
    - python3 addons/smart_scene/tests/test_scene_engine_semantics.py

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-163.yaml addons/smart_scene/core/scene_resolver.py addons/smart_scene/core/scene_engine.py addons/smart_scene/tests/test_scene_resolver_semantics.py addons/smart_scene/tests/test_scene_engine_semantics.py

depends_on:
  - ITER-2026-03-29-162

notes: "Batch acceleration: consume semantic_page closed-state gating in smart_scene."
