task_id: ITER-2026-04-13-1820
title: Project skeleton small-sample dry-run import v1
status: completed
type: implementation
priority: high
mode: execute

goal: >
  Build and run a no-database-write, no-ORM, small-sample dry-run importer for
  the frozen project safe import slice, using only 20 to 50 selected project
  rows and producing the requested sample, result artifact, and go/no-go
  documents.

user_visible_outcome:
  - "项目骨架小样本 dry-run 导入逻辑通过样本文件和 JSON 结果验证，不写数据库"

scope:
  allowed_paths:
    - agent_ops/tasks/ITER-2026-04-13-1820.yaml
    - docs/migration_alignment/project_sample_selection_v1.md
    - data/migration_samples/project_sample_v1.csv
    - scripts/migration/project_dry_run_importer.py
    - artifacts/migration/project_dry_run_result_v1.json
    - docs/migration_alignment/project_dry_run_report_v2.md
    - docs/migration_alignment/project_import_go_no_go_v1.md
    - agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1820.md
    - agent_ops/state/task_results/ITER-2026-04-13-1820.json
    - docs/ops/iterations/delivery_context_switch_log_v1.md
  forbidden_paths:
    - addons/**
    - frontend/**
    - migrations/**
    - security/**
    - record_rules/**
    - addons/**/__manifest__.py
    - addons/**/security/ir.model.access.csv
    - addons/**/*payment*
    - addons/**/*settlement*
    - addons/**/*account*

limits:
  max_files: 10
  max_output_lines: 260
  forbid_repo_wide_scan: true

change_rules:
  - dry-run-only
  - no-database-write
  - no-orm-call
  - no-full-import
  - no-field-expansion
  - safe-slice-fields-only
  - no-contract-payment-supplier-import

context:
  branch: codex/next-round
  baseline_sha: d243d59
  explicit_user_authorization: true
  source_csv: tmp/raw/project/project.csv
  safe_slice: docs/migration_alignment/project_safe_import_slice_v1.md
  depends_on_safe_slice: ITER-2026-04-13-1819

architecture:
  layer_target: Migration Dry-Run Tooling
  module: project.project safe skeleton dry-run importer
  module_owner: scripts/migration + docs/migration_alignment
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The dry-run validates project skeleton business-fact preprocessing and
    identity behavior without writing database records or changing runtime
    semantics.
  reason: >
    The safe import slice is frozen. A bounded 20-50 row no-write dry run is the
    next step to validate sample preparation, required-field checks,
    duplicate/identity handling, and create/update classification.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-13-1820.yaml
    - python3 scripts/migration/project_dry_run_importer.py --input data/migration_samples/project_sample_v1.csv --output artifacts/migration/project_dry_run_result_v1.json
    - python3 -m json.tool artifacts/migration/project_dry_run_result_v1.json
    - make verify.native.business_fact.static

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - database_write_attempted
  - orm_call_introduced
  - sample_exceeds_50_rows
  - unsafe_field_in_sample

deliverables:
  - sample selection document
  - safe-slice sample CSV
  - no-write dry-run importer script
  - dry-run result JSON artifact
  - dry-run report v2
  - go/no-go document
  - iteration report

depends_on:
  - ITER-2026-04-13-1819

rollback:
  - git restore agent_ops/tasks/ITER-2026-04-13-1820.yaml
  - git restore docs/migration_alignment/project_sample_selection_v1.md
  - git restore data/migration_samples/project_sample_v1.csv
  - git restore scripts/migration/project_dry_run_importer.py
  - git restore artifacts/migration/project_dry_run_result_v1.json
  - git restore docs/migration_alignment/project_dry_run_report_v2.md
  - git restore docs/migration_alignment/project_import_go_no_go_v1.md
  - git restore agent_ops/reports/2026-04-13/report.ITER-2026-04-13-1820.md
  - git restore agent_ops/state/task_results/ITER-2026-04-13-1820.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
