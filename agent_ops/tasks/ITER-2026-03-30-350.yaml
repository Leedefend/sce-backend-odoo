task_id: ITER-2026-03-30-350
title: Fulfill portal-style preview entries through the custom frontend
type: code
status: in_progress
priority: high

goal: >
  Start the custom-frontend fulfillment line for the portal-style preview
  entries by using native menu/action facts as source anchors and routing users
  to supported custom frontend surfaces instead of the abandoned native portal frontend.

user_visible_outcome:
  - preview entries such as 工作台、生命周期驾驶舱、能力矩阵 move onto a supported custom frontend path
  - native menu/action anchors remain the source of truth
  - preview navigation keeps "can use now" semantics without depending on native portal pages

scope:
  allowed_paths:
    - frontend/apps/web/src/**
    - frontend/packages/schema/src/**
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py
    - addons/**
    - migrations/**
    - deploy/**

change_rules:
  - frontend-only fulfillment batch
  - preserve native menu/action facts as source anchors
  - no ACL, model, or business-rule changes

context:
  branch: codex/next-round
  baseline_sha: ddcc2e6

architecture:
  layer_target: Frontend Layer
  module: portal-style preview fulfillment
  module_owner: frontend/apps/web
  kernel_or_scenario: scenario
  reason: >
    The publication policy is now explicit: portal-style preview entries remain
    published from native facts, but their usable surface must be fulfilled by
    the custom frontend instead of the abandoned native portal frontend.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-30-350.yaml
    - pnpm -C frontend/apps/web typecheck:strict

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - preview_target_mapping_cannot_be_stated_clearly
  - frontend_consumer_change_breaks_existing_preview_routes

deliverables:
  - custom-frontend fulfillment path for portal-style preview entries
  - report and task result artifacts for ITER-2026-03-30-350
  - delivery log checkpoint for the new fulfillment line

rollback:
  - git restore frontend/apps/web/src
  - git restore frontend/packages/schema/src
  - git restore agent_ops/tasks/ITER-2026-03-30-350.yaml
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md
  - git restore agent_ops/reports/2026-03-30/report.ITER-2026-03-30-350.md
  - git restore agent_ops/state/task_results/ITER-2026-03-30-350.json

depends_on:
  - ITER-2026-03-30-349

notes: >
  Initial target set:
  `smart_construction_portal.action_sc_portal_dashboard`,
  `smart_construction_portal.action_sc_portal_lifecycle`,
  `smart_construction_portal.action_sc_portal_capability_matrix`.
