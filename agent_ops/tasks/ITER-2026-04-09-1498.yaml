    - "python3 scripts/verify/menu_fact_export.py --help"
    - 'python3 -c "from pathlib import Path; p=Path(\"artifacts/menu/menu_fact_snapshot_v1.json\"); print(\"snapshot_exists\", p.exists())"'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
