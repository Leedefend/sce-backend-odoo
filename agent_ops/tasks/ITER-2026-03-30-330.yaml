task_id: ITER-2026-03-30-330
title: Define minimal optimization composition contract on top of native truths
type: analysis
status: in_progress
priority: high

goal: >
  Define the smallest backend optimization composition contract that sits on
  top of completed native truths and only covers page hierarchy, filter
  prioritization, batch action composition, and guidance requirements that
  cannot be fully extracted from native Odoo metadata.

user_visible_outcome:
  - repository contains a minimal optimization composition contract definition
  - native truths and optimization composition responsibilities are explicitly separated
  - subsequent implementation batches can add backend composition without contract sprawl

