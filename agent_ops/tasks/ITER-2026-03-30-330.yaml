    - agent_ops/reports/**
    - agent_ops/state/task_results/**
  forbidden_paths:
    - addons/**
    - frontend/**
    - security/**
    - migrations/**
    - deploy/**

change_rules:
  - analysis and documentation only
  - no backend code changes
  - no frontend changes
  - no contract implementation yet

context:
  branch: codex/next-round
  baseline_sha: 03bd2ef

architecture:
  layer_target: Platform Layer
  module: optimization composition contract design
  module_owner: smart_core planning
  kernel_or_scenario: kernel
  reason: >
    Native truths are complete enough for structural and capability facts.
    Backend now needs the smallest possible optimization composition layer so
    frontend can stop owning page hierarchy and action grouping without
    expanding contract scope unnecessarily.

acceptance:
