  baseline_sha: d243d59
  sample: artifacts/migration/partner_30_row_create_only_sample_v1.csv

architecture:
  layer_target: Migration Post-Write Governance
  module: res.partner post-write readonly review and rollback dry-run lock
  module_owner: docs/migration_alignment + agent_ops
  kernel_or_scenario: scenario
  backend_sub_layer_target: business-fact layer
  backend_sub_layer_reason: >
    The design defines how newly created partner business facts are verified and
    locked for exact rollback by legacy identity after a bounded write.
  reason: >
    ITER-2026-04-13-1854 locked the 30-row sample but real partner creation
    still requires explicit authorization. The post-write review and rollback
    dry-run design must be frozen before any write-capable batch runs.

acceptance:
