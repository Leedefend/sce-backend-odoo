    The user explicitly requires the business-system-admin authority path to be
    implemented. Current AGENTS stop conditions forbid any security/** change,
    so the repository rule must be amended first in a narrowly scoped way.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-31-418.yaml

