task_id: ITER-2026-03-31-418
title: Amend repository rule for authorized high-risk permission batches
type: governance
status: active
priority: critical

goal: >
  Amend the repository execution rule so that a dedicated high-risk
  permission-governance batch with explicit user authorization may implement
  controlled changes under security/**, instead of being blocked by the generic
  stop condition.

user_visible_outcome:
  - "仓库规则明确允许受控高风险权限批次实施 security/** 改动"
  - "417 后续实现具备规则层合法性"

scope:
