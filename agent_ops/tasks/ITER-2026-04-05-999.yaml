task_id: ITER-2026-04-05-999
title: P0 migrate login session endpoints from smart_construction_core to smart_core
type: backend
status: active
priority: high
mode: implement

goal: >
  Move platform session entry routes (`/api/login`, `/api/logout`,
  `/api/session/get`) to smart_core controllers and remove these route
  definitions from smart_construction_core to start boundary restoration.

user_visible_outcome:
  - "平台会话主入口由 smart_core 持有，行业模块不再定义该三条路由"

scope:
  allowed_paths:
    - addons/smart_core/controllers/**
    - addons/smart_construction_core/controllers/frontend_api.py
    - agent_ops/tasks/**
    - agent_ops/reports/**
    - agent_ops/state/task_results/**
    - docs/ops/iterations/**
  forbidden_paths:
    - security/**
    - record_rules/**
    - addons/**/security/**
    - addons/**/__manifest__.py
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - migrations/**
    - deploy/**

limits:
  max_files: 8
  max_candidates: 20
  max_output_lines: 180
  forbid_repo_wide_scan: true
  use_new_session: true
  carry_long_context: false

change_rules:
  - p0_boundary_restoration_only
  - additive_on_platform_side
  - no_industry_semantics_into_platform_kernel
  - no_acl_or_financial_change

context:
  branch: codex/next-round
  baseline_sha: f4102e4
  explicit_user_authorization: true
  input_from: ITER-2026-04-05-998
  priority_lane: smart_construction_core_boundary_remediation_p0

architecture:
  layer_target: Platform Runtime Entry Ownership
  module: session/auth platform entry
  module_owner: smart_core
  kernel_or_scenario: kernel
  backend_sub_layer_target: business-fact
  backend_sub_layer_reason: >
    Login/session state is runtime business fact and platform bootstrap truth.
  reason: >
    Start substantial boundary remediation with smallest safe P0 slice by
    restoring platform ownership for session routes while keeping industry menu
    semantics outside kernel migration.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-04-05-999.yaml
    - python3 -m py_compile addons/smart_core/controllers/platform_session_api.py addons/smart_core/controllers/__init__.py addons/smart_construction_core/controllers/frontend_api.py

risk:
  level: medium
  manual_approval_required: false

stop_conditions:
  - acceptance_failed
  - forbidden_path_touched
  - kernel_absorbs_industry_semantics

deliverables:
  - platform_session_routes_owned_by_smart_core

rollback:
  - git restore addons/smart_core/controllers/platform_session_api.py
  - git restore addons/smart_core/controllers/__init__.py
  - git restore addons/smart_construction_core/controllers/frontend_api.py
  - git restore agent_ops/tasks/ITER-2026-04-05-999.yaml
  - git restore agent_ops/reports/2026-04-05/report.ITER-2026-04-05-999.md
  - git restore agent_ops/state/task_results/ITER-2026-04-05-999.json
  - git restore docs/ops/iterations/delivery_context_switch_log_v1.md

depends_on:
  - ITER-2026-04-05-998
