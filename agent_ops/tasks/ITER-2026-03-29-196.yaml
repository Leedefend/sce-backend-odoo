task_id: ITER-2026-03-29-196
title: Build project form contract page skeleton parity
type: product_task
status: pending
priority: high

goal: Make the main project form page feel like a contract-driven business page rather than a generic field container by projecting the backend form skeleton into visible frontend page structure.
user_visible_outcome:
  - project form shows a clearer page identity header and runtime state strip
  - project form exposes contract-driven statusbar and top action strip
  - form sections feel closer to a business page skeleton instead of a raw field list

scope:
  allowed_paths:
    - agent_ops/**
    - frontend/**
    - docs/ops/**
  forbidden_paths:
    - security/**
    - migrations/**
    - deploy/**
    - addons/**/security/**
    - addons/**/models/**/*payment*
    - addons/**/models/**/*settlement*
    - addons/**/models/**/*account*
    - addons/**/__manifest__.py

change_rules:
  - additive_only
  - no_schema_change
  - no_acl_change
  - no_record_rule_change

architecture:
  layer_target: frontend layer
  module: project contract form page skeleton
  reason: The fastest productization path is to project existing backend form layout/action/status semantics into the page shell so the project form resembles a real business page instead of a generic renderer.

acceptance:
  commands:
    - python3 agent_ops/scripts/validate_task.py agent_ops/tasks/ITER-2026-03-29-196.yaml
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && python3 agent_ops/scripts/frontend_verify_gate.py --frontend-dir frontend/apps/web --expect-status PASS'
    - bash -lc 'source ~/.nvm/nvm.sh >/dev/null 2>&1 && nvm use 20 >/dev/null && pnpm -C frontend/apps/web typecheck:strict'

risk:
  level: low
  manual_approval_required: false

stop_conditions:
  - forbidden_path_touched
  - verify_failed
  - contract_breaking_change
  - uncertain_business_decision

deliverables:
  - code

rollback:
  - git restore agent_ops/tasks/ITER-2026-03-29-196.yaml frontend/apps/web/src/pages/ContractFormPage.vue agent_ops/reports/2026-03-29/report.ITER-2026-03-29-196.md agent_ops/state/task_results/ITER-2026-03-29-196.json

depends_on:
  - ITER-2026-03-29-195

notes: "Productization batch: prioritize page skeleton parity for project.project form using existing backend contract layout/action/status data."
