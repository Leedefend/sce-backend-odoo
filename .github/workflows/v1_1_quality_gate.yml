name: v1.1 quality gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: v1-1-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    runs-on: [self-hosted, huawei, ubuntu22]
    timeout-minutes: 30

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner tools
        run: |
          node --version
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version
          python3 --version

      - name: Install frontend dependencies
        run: |
          pnpm --dir frontend/apps/web install --frozen-lockfile=false

      - name: Run unified PR quality gate
        run: |
          make ci

      - name: Publish convergence summary
        if: always()
        run: |
          {
            echo "## v1.1 Quality Gate"
            echo ""
            echo "- entry: \`make ci\`"
            echo "- scope: static, frontend, contract syntax, secret scan"
            echo "- heavier gates: \`make test.odoo.integration\`, \`make test.e2e\`"
          } >> "$GITHUB_STEP_SUMMARY"
